三相有畢竟究竟一切行事皆悉斷故有畢竟無垢一切煩惱畢竟斷故有畢竟梵行以為後邊謂已獲得彼對治故於第四相譬如世間具五種相名入宮城隨闕一種不名為入如是要具與彼相似五種相故當知名入涅槃宮城何等名具世間五相一者闢宮城門二者超踰隍塹而不墮落三者深起果決而越度之四者越隍塹已逼臨宮闕五者非自非餘之所希望勝幢既仆徐入中宮如是入宮無諸罣礙入涅槃宮亦復如是先斷能順五下分結如彼闢門次於涅槃起深坑想無明怖畏斷無餘故如超隍塹而不墮落能到薩迦耶彼岸故能持最後身故如彼果決而越度之將入無餘依涅槃界如逼宮闕已斷有愛於諸境界無復愛生遍於一切憍慢不起而入涅槃如非自他之所希望勝幢既仆徐入中宮如前所説五種因緣入涅槃宮當知亦爾又既入已由二種相安住聖住一由行故二由住故行由三相應正了知一不共故二無染故三正依止所依止故永斷順五下分結故於諸欲中畢竟離欲即於是處而遊行故説名不共於六恆住常攝受故名為無染於一分法思擇遠離謂惡象馬等於一分法思擇習近謂衣服飲食等是名為正依止所依如是於行善清淨已復由五相應了知住謂若由此而住若此為依若由此離繫若此為依若由此相應當知此中由不動心解脫而住於一分法思擇除遣謂遊行散亂劬勞因緣身心疲怠於一分法思擇忍受謂寒熱等是名為依由於三種雜染離繫謂見雜染及愛雜染尋思雜染由見雜染得離繫故於後有中心無動搖由愛雜染得離繫故於諸境界不被漂淪尋思雜染得離繫故尋思唯善無有不善如是名為由此離繫此依四種靜慮無動三摩地安住第一現法樂住是名為依由與無學心善解脫慧善解脫而共相應又離愛者於第二身不復生故於涅槃舍無退轉故剋證無上圓滿德故由此五相應知圓滿住第一住一二六一二六七二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當説所知法智及智者諦聽善思當為汝説云何所知法謂五受陰何等為五色受陰受想行識受陰是名所知法云何為智調伏貪欲斷貪欲越貪欲是名為智云何智者阿羅漢是阿羅漢者非有他世死非無他世死非有無他世死非非有無他世死廣説無量諸數永滅是名説所知法智及智者佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰二品總略三有異勝解斷流轉有性不善清淨善清淨善説惡説師等別二品總略略由三處總攝一切黑品白品一由所遍知法故二由遍知故三由成遍知故所遍知法者謂苦諦集諦當知總攝一切黑品遍知者謂滅諦當知此攝白品一分成遍知者謂補特伽羅及道諦補特伽羅雖是假有當知亦是白品所攝此即如來諸聖弟子於世俗諦及勝義諦皆悉善巧依二道理如實隨觀俱不可記謂如來滅後若有若無亦有亦無非有非無皆不可取亦不可記所以者何且依勝義彼不可得況其滅後或有或無若依世俗為於諸行假立如來為於涅槃若於諸行如來滅後無有一行流轉可得爾時何處假立如來既無如來何有無等若於涅槃涅槃唯是無行所顯絶諸戲論自內所證絶戲論故施設為有不應道理亦復不應施設非有勿當損毀施設妙有寂靜涅槃又此涅槃極難知故最微細故説名甚深種種非一諸行煩惱斷所顯故説名廣大現量比量及正教量所不量故説名無量一二七一二七七三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説重擔取擔捨擔擔者諦聽善思當為汝説云何重擔謂五受陰何等為五色受陰受想行識受陰云何取擔當來有愛貪喜俱彼彼樂著云何捨擔若當來有愛貪喜俱彼彼樂著永斷無餘已滅已吐盡離欲滅沒云何擔者謂士夫是士夫者如是名如是生如是姓族如是食如是受苦樂如是長壽如是久住如是壽命齊限是名為重擔取擔捨擔擔者爾時世尊而説偈言已捨於重擔不復應更取重任為大苦捨任為大樂當斷一切愛則盡一切行曉了有餘境不復轉還有佛説此經已諸比丘聞佛所説歡喜奉行三復次由三因緣內荷擔苦與外荷擔苦有其差別一所荷擔二能荷擔三荷擔時謂外荷擔色一分攝或稈或薪或餘種類是所荷擔愚夫乃以一切諸行為所荷擔又外荷擔屬在身肩是能荷擔愚夫乃以一切愛蘊為能荷擔又外荷擔唯以現肩荷擔所擔愚夫乃以一切愛蘊荷擔所擔欲捨所擔要并除蘊無別方便而能棄捨乃至未能捨所擔來恆常荷擔大重擔故執持尫劣微弱細軟不靜肩故長時無間荷所擔故內有三德領受如是荷擔衆苦外則不然是名二種荷擔差別一二八一二八七四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰何等為五色受陰受想行識受陰愚癡無聞凡夫不如實知色色集色滅色味色患色離不如實知故於色所樂讚歎繫著住色縛所縛內縛所縛不知根本不知津際不知出離是名愚癡無聞凡夫以縛生以縛死以縛從此世至他世於彼亦復以縛生以縛死是名愚癡無聞凡夫隨魔自在入魔網中隨魔所化魔縛所縛為魔所牽受想行識亦復如是多聞聖弟子如實知色色集色滅色味色患色離如實知故不貪喜色不讚歎不繫著住非色縛所縛非內縛所縛知根本知津濟知出離是名多聞聖弟子不隨縛生不隨縛死不隨縛從此世至他世不隨魔自在不入魔手不隨魔所作非魔所縛解脫魔縛離魔所牽受想行識亦復如是佛説此經已諸比丘聞佛所説歡喜奉行五復次由五種相愚夫內縛與彼外縛而有差別謂彼外縛為色一分之所繫縛或木或鐵或索所繫愚夫乃為諸行所縛又彼外縛他縛所縛愚夫乃為自縛所縛又彼外縛易可了知縛縛因緣脫脫方便愚夫內縛一切難知又彼外縛死後即無愚夫內縛死後諸行隨逐往來循環不捨又彼外縛所有出家能捨諸欲便得解脫一切怨讐不能拘礙愚夫內縛雖得離欲乃至有頂尚未能脫況唯出家當知此中在離欲位魔羅於彼不得自在未離欲位便得自在其出家位未脫魔手若在家位隨欲所作未離欲位魔縛所縛由世間道雖生有頂未脫魔羂一二九一二九七五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰何等為五謂色受陰比丘於色厭離欲滅不起解脫是名如來應等正覺如是受想行識厭離欲滅不起解脫是名如來應等正覺比丘亦於色厭離欲滅名阿羅漢慧解脫如是受想行識厭離欲滅名阿羅漢慧解脫比丘如來應等正覺阿羅漢慧解脫有何差別比丘白佛如來為法根為法眼為法依唯願世尊為諸比丘廣説此義諸比丘聞已當受奉行佛告比丘諦聽善思當為汝説如來應等正覺未曾聞法能自覺法通達無上菩提於未來世開覺聲聞而為説法謂四念處四正勤四如意足五根五力七覺八道比丘是名如來應等正覺未得而得未利而利知道分別道説道通道復能成就諸聲聞教授教誡如是説正順欣樂善法是名如來羅漢差別佛説此經已諸比丘聞佛所説歡喜奉行有異復次略由四相當知如來與慧解脫阿羅漢等同分異分由一種相説名同分謂解脫等故由三種相説名異分謂現等覺故能説法故行正行故此中如來無師自然修三十七菩提分法現等正覺等正覺已遍依勝義若於現法有能無能若現見法不現見法於一切種皆悉了達是名自然等覺菩提如是了達勝義法已於其二障善得解脫謂并習氣諸煩惱障及所知障與諸天衆及餘世間為解脫師獨一無二當知了達如是四相是名自然等覺菩提由此不與諸聲聞共又依他義作所作等能説正法由五種相當知不共何等為五一者如來如實了知一切種道為道一切種非道為非道二者知已如實宣説是道非道為令趣道不趣非道三者若有如所説道樂欲勤行為令彼行攝受方便如理所引作意正道以教授門而為宣説四者彼如聖教行時若有障礙止觀過失皆令除遣五者若有隨順彼法皆令攝受是名能説不同分法此中正行不同分者謂彼聲聞先依如來後行正行夫如來者無少所依又彼成就聲聞種性行於正行而佛如來成自種性又彼聲聞或已成熟或當成熟非最後有菩薩身中二行可得若未熟者彼隨道行能熟當來成熟相續若已熟者彼於現法成大師教如此二種如其聖教即如是行若隨道行彼於來世當證涅槃若於現法成大師教彼依此身便證聖道道果涅槃即此聖道及聖道果無損樂故名如實法饒益性故又説為善一三一三七六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰何等為五色受陰受想行識受陰汝等比丘當觀察於色觀察色已見有我異我相在不諸比丘白佛言不也世尊佛告比丘善哉善哉色無我無我者則無常無常者則是苦若苦者彼一切非我不異我不相在當作是觀受想行識亦復如是多聞聖弟子於此五受陰觀察非我非我所如是觀察已於世間都無所取無所取者則無所著無所著者自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行勝解復次於諸行中略有二種無我勝解一者聞思增上勝解二者修證增上勝解此中聞思增上勝解能與修證增上勝解作生依止諸善男子淨信出家雖復在此極善殷到且於其中不應喜足要此為依於諸行中漸次修習無常等想證得無我增上勝解為令彼證轉增勝故勤修觀解一三一一三一七七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當斷色欲貪欲貪斷已則色斷色斷已得斷知得斷知已則根本斷如截多羅樹頭未來不復更生如是受想行識欲貪斷乃至未來世不復更生佛説此經已諸比丘聞佛所説歡喜奉行斷復次由四種相應知諸行有二種斷何等為四一諸纏斷故二隨眠斷故三後有諸行因性斷故四現在諸行染行斷故如是四種當知總説為二種斷謂煩惱斷及以事斷前之二相名煩惱斷後之二相説為事斷一三二一三二七八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若色起住出則苦於此起病於此住老死於此出受想行識亦如是説比丘若色滅息沒苦於此滅病於此息老死於此沒受想行識亦復如是佛説此經已諸比丘聞佛所説歡喜奉行流轉復次於欲界中諸行流轉初中後位當知略有三種密苦一者生時為其胎藏所覆障故有覆障苦二者生已處嬰稚位多疾病苦三者衰耄諸根成熟有老死苦又彼諸行流轉生起初中後滅當知即是三種苦滅一三三一三三七九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去未來色尚無常況復現在色多聞聖弟子如是觀察已不顧過去色不欣未來色於現在色厭離欲滅寂靜受想行識亦復如是比丘若無過去色者多聞聖弟子無不顧過去色以有過去色故多聞聖弟子不顧過去色若無未來色者多聞聖弟子無不欣未來色以有未來色故多聞聖弟子不欣未來色若無現在色者多聞聖弟子不於現在色生厭離欲滅盡向以有現在色故多聞聖弟子於現在色生厭離欲滅盡向受想行識亦如是説佛説此經已諸比丘聞佛所説歡喜奉行一三四一三六一三四一三六如無常苦空非我三經亦如是説有性復次有三有性為斷彼故諸聖弟子當勤修學一依過去為因有性由是因緣淨信捨家趣於非家深見過患厭棄諸欲二依未來所生諸行為因有性三依現在未斷意樂雜染有性為斷如是三種有性故有三斷謂無顧戀故不欣樂故斷離欲滅界集成故一三七一三七八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當説聖法印及見清淨諦聽善思若有比丘作是説我於空三昧未有所得而起無相無所有離慢知見者莫作是説所以者何若於空未得者而言我得無相無所有離慢知見者無有是處若有比丘作是説我得空能起無相無所有離慢知見者此則善説所以者何若得空已能起無相無所有離慢知見者斯有是處云何為聖弟子及見清淨比丘白佛佛為法根法眼法依唯願為説諸比丘聞説法已如説奉行佛告比丘若比丘於空間處樹下坐善觀色無常磨滅離欲之法如是觀察受想行識無常磨滅離欲之法觀察彼陰無常磨滅不堅固變易法心樂清淨解脫是名為空如是觀者亦不能離慢知見清淨復有正思惟三昧觀色相斷聲香味觸法相斷是名無相如是觀者猶未離慢知見清淨復有正思惟三昧觀察貪相斷瞋恚癡相斷是名無所有如是觀者猶未離慢知見清淨復有正思惟三昧觀察我我所從何而生觀察我我所從若見若聞若嗅若嘗若觸若識而生復作是觀察若因若緣而生識者彼識因緣為常為無常復作是思惟若因若緣而生識者彼因彼緣皆悉無常復次彼因彼緣皆悉無常彼所生識云何有常無常者是有為行從緣起是患法滅法離欲法斷知法是名聖法印知見清淨是名比丘當説聖法印知見清淨如是廣説佛説此經已諸比丘聞佛所説歡喜奉行不善清淨善清淨復次於諸行中略有二種離增上慢觀無我見何等為二一不善清淨二善清淨云何名為不善清淨謂如有一遠離而住依觀諸行無常性忍由世間智於無我性發生勝解因此勝解於眼所識色乃至意所識法等隨觀察我我所相不現行故説名為斷又能制伏四外繫所攝貪瞋癡三種所有謂貪欲身繫攝貪所有瞋恚身繫攝瞋所有餘二身繫攝癡所有當知此中極鄙穢義是所有義離增上慢無我智者如理作意共相應故定地攝故當知此智由二因緣不善清淨一者即於此時謂於趣入順決擇分善根位時有麁我慢隨入微細現行作意間無間轉由是因緣作如是念我今於空能修能證空是我有由是空故計我為勝如空無相及無所有當知亦爾二者能令彼法現行因緣謂於諸欲或薩迦耶有染愛識由於如是有染愛識不遍了知增上力故便為諸欲薩迦耶愛之所漂溺由此意樂於彼涅槃不能趣入其心退還如前已説又由八相能遍了知遍了知故除諸過患當知是名極善清淨離增上慢無我真智又於此中已滅壞故滅壞法故説名無常諸業煩惱所集成故説名有為由昔願力所集成故名思所造從自種子現在外緣所集成故説名緣生於未來世衰老法故説名盡法死歿法故説名歿法未老死來為疾病等種種災橫所逼惱故名破壞法由依現量能離欲故能斷滅故名於現法得離欲法及以滅法當知此中除離欲法及以滅法由所餘相略觀三世所有過患由所除相觀彼出離若由如是過患出離遍知彼識名善遍知一切法中無有我性名諸法印即此法印隨論道理法王所造於諸聖身不為惱害隨喜能得一切聖財由此自然吉安超度生死廣大險難長道是故亦名衆聖法印當知此中由前名通達智由後名善清淨見一三八一三八八一如是我聞一時佛住毗耶離獼猴池側重閣講堂爾時有離車名摩訶男日日遊行往詣佛所時彼離車作是念若我早詣世尊所者世尊及我知識比丘皆悉禪思我今當詣七菴羅樹阿耆毗外道所即往詣彼富蘭那迦葉住處時富蘭那迦葉外道衆主與五百外道前後圍繞高聲嬉戲論説俗事時富蘭那迦葉遙見離車摩訶男來告其眷屬令寂靜住汝等默然是離車摩訶男是沙門瞿曇弟子此是沙門瞿曇白衣弟子毗耶離中最為上首常樂寂靜讚歎寂靜彼所之詣寂靜之衆是故汝等應當寂靜時摩訶男詣彼衆富蘭那所與富蘭那共相問訊相慰勞已卻坐一面時摩訶男語富蘭那言我聞富蘭那為諸弟子説法無因無緣衆生有垢無因無緣衆生清淨世有此論汝為審有此為是外人相毀之言世人所撰為是法為非法頗有世人共論難問嫌責以不富蘭那迦葉言實有此論非世妄傳我立此論是如法論我説此法皆是順法無有世人來共難問而呵責者所以者何摩訶男我如是見如是説無因無緣衆生有垢無因無緣衆生清淨時摩訶男聞富蘭那所説心不喜樂呵罵已從坐起去向世尊所頭面禮足卻坐一面以向與富蘭那所論事向佛廣説佛告離車摩訶男彼富蘭那為出意語不足記也如是富蘭那愚癡不辨不善非因而作是説無因無緣衆生有垢無因無緣衆生清淨所以者何有因有緣衆生有垢有因有緣衆生清淨摩訶男何因何緣衆生有垢何因何緣衆生清淨摩訶男若色一向是苦非樂非隨樂非樂長養離樂者衆生不應因此而生樂著摩訶男以色非一向是苦是樂隨樂樂所長養不離樂是故衆生於色染著染著故繫繫故有惱摩訶男若受想行識一向是苦非樂非隨樂非樂長養離樂者衆生不應因此而生樂著摩訶男以識非一向是苦是樂隨樂樂所長養不離樂是故衆生於識染著染著故繫繫故生惱摩訶男是名有因有緣衆生有垢摩訶男何因何緣衆生清淨摩訶男若色一向是樂非苦非隨苦非憂苦長養離苦者衆生不應因色而生厭離摩訶男以色非一向樂是苦隨苦憂苦長養不離苦是故衆生厭離於色厭故不樂不樂故解脫摩訶男若受想行識一向是樂非苦非隨苦非憂苦長養離苦者衆生不應因識而生厭離摩訶男以受想行識非一向樂是苦隨苦憂苦長養不離苦是故衆生厭離於識厭故不樂不樂故解脫摩訶男是名有因有緣衆生清淨時摩訶男聞佛所説歡喜隨喜禮佛而退知法及重擔往詣差別觀欲貪生及與略説法印富蘭那善説惡説師等別復次應知由五種相於內外法師及弟子高下差別一由住故二由御衆故三由論決擇故四由建立開顯道故五由行故謂諸外道師及弟子恆常住於憒鬧之住內法師弟時時住於極寂靜住是名第一高下差別又外道師由自有量出家弟子諸外道僧説名有僧由自有量在家弟子諸外道衆説名有衆希彼一切共許為師故名衆師愚類衆生咸謂有德是故説名共推善色當知如來與彼相違雖為一切天及世間無上大師於彼同尊而無所冀又外道師與自弟子共興議論決擇之時凡有所説展轉意解各各差別不相扶順轉增愚昧非淨其智當知內法與彼相違又外道師為諸弟子依止無因不平等因施設建立開顯其道聽聞如是不正法故為大羅剎嬈亂其心又由不正尋思相應非理作意其心散動以於他所懷勝負心咎責於他若他反詰便興辛暴不審思擇輕出言詞自為無因不平等因所覆藏故名為雜染由此愚夫於染因緣若自若他不如實知故名愚昧離清淨故名不明了於清淨因不善巧故説名不善又乃至於應所説語如所説語是處説語如是一切不如實知是故説彼為不知量為不知思當知內法與彼相違又諸外道師及弟子雖無異説所説無減無顛倒故雖不流漫所説無增無加益故雖等所説義相似故雖是法説文平等故雖復記別法及隨法然於同法樂為朋黨當知彼於法隨法行自義證得不放逸者尚不能得況縱逸者彼由如是不得自義便為他論制伏輕毀并彼所受諸惡邪法當知內法與彼相違是名五種高下差別非定復次由四種相當知諸行非定苦染又由四相非定樂淨如是四相總依三事何等為三一依生處故二依受故三依世故此中樂者謂在第三靜慮樂所隨者謂在人中容有二種喜樂遍者謂在初二靜慮未永離樂者謂在第四靜慮已上此中苦者謂在餓鬼及以傍生苦所隨者謂在人中憂苦遍者謂在那落迦未永離苦者謂在上天衆中當苦所隨故又言樂者謂不苦不樂受現在前位樂所隨者謂苦受現在前位喜樂遍者謂樂受現在前位不永離樂者謂於一切位樂因所隨故若與此相違當知苦差別又言樂者謂順樂行及樂已滅樂所隨者謂有樂因於未來世當生起樂喜樂遍者謂於現在隨順樂處未永離樂者謂餘三世與此相違苦差別四如應當知一三九一三九八二如是我聞一時佛住支提竹園精舍爾時世尊告諸比丘多聞聖弟子於何所而見無常苦諸比丘白佛言世尊為法根法眼法依唯願為説諸比丘聞已當如説奉行佛告比丘諦聽善思當為汝説多聞聖弟子於色見無常苦於受想行識見無常苦比丘色為是常無常耶比丘白佛無常世尊比丘無常者是苦耶比丘白佛是苦世尊比丘若無常苦是變易法多聞聖弟子寧於中見我異我相在不比丘白佛不也世尊受想行識亦復如是是故比丘所有諸色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切皆非我非異我不相在受想行識亦復如是多聞聖弟子如是觀察厭於色厭受想行識厭故不樂不樂故解脫解脫故我生已盡梵行已立所作已作自知不受後有時諸比丘聞佛所説歡喜奉行一四一四八三如是我聞一時佛住毗耶離獼猴池側重閣講堂爾時世尊告諸比丘多聞聖弟子於何所見非我不異我不相在如是平等正觀如實知見比丘白佛世尊為法根法眼法依唯願為説諸比丘聞已如説奉行佛告比丘諦聽善思當為汝説多聞聖弟子於色見非我不異我不相在是名如實正觀受想行識亦復如是佛告諸比丘色為是常為無常耶比丘白佛無常世尊又告比丘若無常者是苦不比丘白佛是苦世尊比丘若無常苦是變易法多聞聖弟子於中寧見有我異我相在不比丘白佛不也世尊受想行識亦復如是是故比丘所有諸色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切皆非我不異我不相在是名如實正觀受想行識亦復如是多聞聖弟子如是觀察於色得解脫於受想行識得解脫我説彼解脫生老病死憂悲惱苦純大苦聚佛説此經時諸比丘聞佛所説歡喜奉行一四一一四一八四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘色是無常無常則苦苦則非我非我者彼一切非我不異我不相在如實知是名正觀受想行識亦復如是多聞聖弟子於此五受陰非我非我所觀察如是觀察於諸世間都無所取無所取故無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行一四二一四二八五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘比丘於何所不見我異我相在比丘白佛世尊為法根法眼法依唯願為説諸比丘聞已如説奉行佛告比丘諦聽善思當為汝説於色不見有我異我相在不於受想行識亦復如是比丘色為是常無常耶比丘白佛無常世尊佛言比丘若無常者是苦不比丘白佛是苦世尊比丘若無常苦是變易法多聞聖弟子寧於中見我異我相在不比丘白佛不也世尊受想行識亦復如是是故比丘諸所有色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切非我不異我不相在受想行識亦復如是比丘多聞聖弟子觀察五受陰非我非我所如是觀察者於諸世間都無所取無所取者無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰二智并其事樂等行轉變請無請説經涅槃有二種二智并其事智有二種一者正智二者邪智此中正智依有事生邪智亦爾雖此二智俱依有事然正智如實取事邪智邪分別不如實取事由有正教如理作意為前行故於所知境正智得生由有邪教非理作意為前行故於所知境邪智得生非正智生壞所知境但於此境捨於邪執而起正智如暗中色明燈生時不壞此色但能照了當知此義亦復如是一四三一四三八六如是我聞