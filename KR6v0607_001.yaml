不取故彼色若變若異心不隨變異心不隨變異故心不繫著攝受心住不攝受心住故心不恐怖障礙顧念以不生不著故受想行識亦復如是是名不生則不繫著佛説此經已諸比丘聞佛所説歡喜奉行四怖復次應知由四因緣於二處所發生恐怖能為障礙何等為四一者若於此位生起二者若依此法生起三者若彼如是生起四者若彼行相生起位生起者謂於非聖位中生起於諸聖諦未得善巧又此非聖於五處所亦未善巧依生起者謂於諸行起邪行相計我我所薩迦耶見為依生起如是生起者謂由二種諸行變壞差別生起一由異緣所變壞故二由自心起邪分別而變壞故行相生起者謂於所愛慮恐未來當變壞故生恐怖行相於正變壞生損惱行相即於所愛已變壞中欣彼重生起顧戀行相又於涅槃分別自體永變壞故起怖畏行相如是行相差別轉時於愛樂聖教及愛樂涅槃能為障礙又由二種門於所緣境自所行處我我所執差別而轉謂推求故及領受故即見及受一五七一五七四五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰云何為五色受陰受想行識受陰若諸沙門婆羅門見有我者一切皆於此五受陰見我諸沙門婆羅門見色是我色異我我在色色在我見受想行識是我識異我我在識識在我愚癡無聞凡夫以無明故見色是我異我相在言我真實不捨以不捨故諸根增長諸根長已增諸觸六觸入處所觸故愚癡無聞凡夫起苦樂覺從觸入處起何等為六謂眼觸入處耳鼻舌身意觸入處如是比丘有意界法界無明界愚癡無聞凡夫無明觸故起有覺無覺有無覺我勝覺我等覺我卑覺我知我見覺如是知如是見覺皆由六觸入故多聞聖弟子於此六觸入處捨離無明而生明不生有覺無覺有無覺勝覺等覺卑覺我知我見覺如是知如是見已先所起無明觸滅後明觸覺起佛説此經已諸比丘聞佛所説歡喜奉行一五八一五八四六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰云何為五色受陰受想行識受陰若沙門婆羅門以宿命智自識種種宿命已識當識今識皆於此五受陰已識當識今識我過去所經如是色如是受如是想如是行如是識若可閡可分是名色受陰指所礙若手若石若杖若刀若冷若暖若渴若飢若蚊虻諸毒蟲風雨觸是名觸閡是故閡是色受陰復以此色受陰無常苦變易諸覺相是受受陰何所覺覺苦覺樂覺不苦不樂是故名覺相是受受陰復以此受受陰是無常苦變易諸想是想受陰何所想少想多想無量想都無所有作無所有想是故名想受陰復以此想受陰是無常苦變易法為作相是行受陰何所為作於色為作於受想行識為作是故為作相是行受陰復以此行受陰是無常苦變易法別知相是識受陰何所識識色識聲香味觸法是故名識受陰復以此識受陰是無常苦變易法諸比丘彼多聞聖弟子於此色受陰作如是學我今為現在色所食過去世已曾為彼色所食如今現在復作是念我今為現在色所食我若復樂著未來色者當復為彼色所食如今現在作如是知已不顧過去色不樂著未來色於現在色生厭離欲滅盡向滅多聞聖弟子於此受想行識受陰作如是學我今現在為現在識所食於過去世已曾為識所食如今現在我今已為現在識所食若復樂著未來識者亦當復為彼識所食如今現在如是知已不顧過去識不樂未來識於現在識生厭離欲滅盡向滅減而不增退而不進滅而不起捨而不取於何減而不增色減而不增受想行識減而不增於何退而不進色退而不進受想行識退而不進於何滅而不起色滅而不起受想行識滅而不起於何捨而不取色捨而不取受想行識捨而不取減而不增寂減而住退而不進寂退而住滅而不起寂滅而住捨而不取不生繫著不繫著已自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經時衆多比丘不起諸漏心得解脫佛説此經已諸比丘聞佛所説歡喜奉行我卑下種子封滯五轉七二繫著及覺三世陰所食善説惡説中宿住念差別復次由三種相善説法者惡説法者於等事中宿住隨念當知染淨有其差別何等為三謂惡説法者宿住隨念於彼諸行自相共相不如實知便於諸行或全計常或一分常或計非常或計無因善説法者宿住隨念如實知故無邪分別是名第一二念差別又惡説法者隨依何定發宿住念不能如實了知是苦便生愛味由愛味故於過去行深生顧戀於未來行深生欣樂於現在行不能修行厭離欲滅善説法者當知一切與彼相違是名第二二念差別又惡説法者如是邪行四種雜染所雜染故能感後有何等名為四種雜染一業雜染二見我慢纏雜染三愛纏雜染四彼隨眠雜染若諸新業造作增長若諸故業數數觸已而不變吐是名業雜染若於諸行邪分別起薩迦耶見於他有情以諸沙門婆羅門等與己挍量謂自為勝或等或劣是名見我慢纏雜染於內於外所起貪欲於愛行中應知其相是名愛纏雜染於相續中見我慢愛三品麁重常所隨逐是名彼隨眠雜染如是四種總攝為二謂業煩惱煩惱復二纏及隨眠於諸行中先起邪執後生貪著由此二種增上力故雖復有餘煩惱雜染而但取此爾所煩惱於諸行中不挍量他自起邪執説名為見挍量於他説名我慢如是邪執是無明品由此為先發起貪著名為愛品由此二種根本煩惱於生死中流轉不絶若善説法毗奈耶中正修行者能斷如是四種雜染於現法中能般涅槃又由此故能住究竟圓滿涅槃若不爾者尚不能住彼分涅槃何況究竟是名第三二念差別又於此中見及我慢説名高視愛説名煙何以故於諸行中為見我慢所覆障者不如實知其性弊劣諸行體相於人天身及彼衆具謂為高勝是故彼二説名高視愛猶如煙令心擾亂不得安隱是故名煙一五九一五九四七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘信心善男子應作是念我應隨順法我當於色多修厭離住於受想行識多修厭離住信心善男子即於色多修厭離住於受想行識多修厭離住故於色得厭於受想行識得厭厭已離欲解脫解脫知見我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行一六一六四八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘信心善男子正信非家出家自念我應隨順法於色當多修厭住於受想行識多修厭住信心善男子正信非家出家於色多修厭住於受想行識多修厭住已於色得離於受想行識得離我説是等悉離一切生老病死憂悲惱苦佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰無厭患無欲無亂問記相障希奇無因毀他染俱後無厭患無欲有二信者而非稱當信者所作何等為二一在家信者信有涅槃及一切行是無常性然於諸行不觀過患不厭離住不知出離而受用之二捨離家法趣於非家有淨信者彼於涅槃不能安住猛利樂欲不用此欲為所依止常勤修習所有善法於現法中不般涅槃與此相違應知稱當信者所作一六一一六一四九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告尊者阿難曰若信心長者長者子來問汝言於何等法知其生滅汝當云何答乎阿難白佛世尊若有長者長者子來問我者我當答言知色是生滅法知受想行識是生滅法世尊若長者長者子如是問者我當如是答佛告阿難善哉善哉應如是答所以者何色是生滅法受想行識是生滅法知色是生滅法者名為知色知受想行識是生滅法者名為知受想行識佛説此經已諸比丘聞佛所説歡喜奉行一六二一六二五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告尊者阿難曰若有諸外道出家來問汝言阿難世尊何故教人修諸梵行如是問者云何答乎阿難白佛世尊若外道出家來問我言阿難世尊何故教人修諸梵行者我當答言為於色修厭離欲滅盡解脫不生故世尊教人修諸梵行為於受想行識修厭離欲滅盡解脫不生故教人修諸梵行世尊若有外道出家作如是問者我當作如是答佛告阿難善哉善哉應如是答所以者何我實為於色修厭離欲滅盡解脫不生故教人修諸梵行於受想行識修厭離欲滅盡解脫不生故教人修諸梵行佛説此經已尊者阿難聞佛所説歡喜奉行無亂問記復次於內法中略有二種具聰明者若有淨信或諸外道來請問時能無亂記謂依中道於諸行中問生滅時不增有情不減實事唯於諸行安立生滅不亂而記若立有情有生有滅是名一邊謂增益邊若立生滅都無所有是第二邊謂損減邊唯於諸行安立生滅是名中道遠離二邊是故若能如是記別為善記別如來所讚或復有言何因緣故乃於沙門喬答摩所修習梵行若得此問應如前説遠離增益損減二邊依中道記名不亂記若謂有情修習染淨是名一邊謂增益邊若謂一切都無修習是第二邊謂損減邊若為諸行厭離欲滅而修習者是名中道遠離二邊是故此記名不亂記名為善記當知此記諸佛所讚一六三一六三五一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今為汝説壞不壞法諦聽善思當為汝説諸比丘色是壞法彼色滅涅槃是不壞法受想行識是壞法彼識滅涅槃是不壞法佛説此經已諸比丘聞佛所説歡喜奉行相復次法有二種一者有為二者無為此中有為是無常性三有為相施設可得一生二滅三住異性如是三相依二種行流轉安立一依生身展轉流轉二依剎那展轉流轉依初流轉者謂於彼彼有情衆同分中初生名生終沒名滅於二中間嬰孩等位立住異性乃至壽住説名為住諸位後後轉變差別名住異性依後流轉者謂彼諸行剎那剎那新新而生説名為生生剎那後不住名滅唯生剎那住故名住異性有二一異性異性二轉變異性異性異性者謂諸行相似相續而轉轉變異性者謂不相似相續而轉非此異性離住相外別體可得是故二種總攝為一施設一相與此相違應知常住無為三相一六四一六四五二鬱低迦修多羅如增一阿含經四法中説障復次應知修集涅槃資糧略有三障一者依廣事業財寶具足多行放逸二者無善知識方便曉喻三者未聞正法未得正法忽遇死緣非時夭沒與此相違當知無障亦有三種又諸聖者將欲終時略有二種聖者之相謂臨終時諸根澄淨蒙佛所記由三種相佛為過世一切聖者記別聖性種性滿故但記物類我已了知法及隨法者法謂正見前行聖道言隨法者謂依彼法聽聞他音如理作意又我未曾惱亂正法所依處者謂為此義如來告命及為此義有所宣説乃至為令諸漏永盡彼由此故已得盡漏一六五一六五五三如是我聞一時佛在拘薩羅國人間遊行於薩羅聚落村北申恕林中住爾時聚落主大姓婆羅門聞沙門釋種子於釋迦大姓剃除鬚髮著袈裟衣正信非家出家學道成無上等正覺於此拘薩羅國人間遊行到薩羅聚落村北申恕林中住又彼沙門瞿曇如是色貌名稱真實功德天人讚歎聞于八方為如來應等正覺明行足善逝世間解無上士調御丈夫天人師佛世尊於諸世間諸天魔梵沙門婆羅門中大智能自證知我生已盡梵行已立所作已作自知不受後有為世説法初中後善善義善味純一滿淨梵行清白演説妙法善哉應見善哉應往善應敬事作是念已即便嚴駕多將翼從執持金瓶金杖傘蓋往詣佛所恭敬奉事到於林口下車步進至世尊所問訊安不卻坐一面白世尊曰沙門瞿曇何論何説佛告婆羅門我論因説因又白佛言云何論因云何説因佛告婆羅門有因有緣集世間有因有緣世間集有因有緣滅世間有因有緣世間滅婆羅門白佛言世尊云何為有因有緣集世間有因有緣世間集佛告婆羅門愚癡無聞凡夫色集色滅色味色患色離不如實知不如實知故愛樂於色讚歎於色染著心住彼於色愛樂故取取緣有有緣生生緣老死憂悲惱苦是則大苦聚集受想行識亦復如是婆羅門是名有因有緣集世間有因有緣世間集婆羅門白佛言云何為有因有緣滅世間有因有緣世間滅佛告婆羅門多聞聖弟子於色集色滅色味色患色離如實知如實知已於彼色不愛樂不讚歎不染著不留住不愛樂不留住故色愛則滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲惱苦滅受想行識亦復如是婆羅門是名有因有緣滅世間有因有緣世間滅婆羅門是名論因是名説因婆羅門白佛言瞿曇如是論因如是説因世間多事今請辭還佛告婆羅門宜知是時佛説此經已諸婆羅門聞佛所説歡喜隨喜禮足而去希奇復次諸佛如來略有二種甚希奇法謂未信者令信已信者令增長速於聖教令得悟入謂大師相或法教相或已證得第一德相普於十方美妙聲稱廣大讚頌無不遍滿又能除遣説無因論及惡因論攝受一切説正因論所以者何説無因論及惡因論尚非欲往人天善趣及樂解脫諸聰慧者勝解依處況是其餘當所趣入説正因論當知其相與彼相違大師相者謂薄伽梵是真如來應正等覺乃至世尊廣釋如前攝異門分法教相者謂説正法初中後善乃至廣説當知亦如攝異門分證得第一德相者謂於一切此世他世自然通達現等正覺乃至廣説此中欲界説名此世色無色界名為他世現在過去二世別故當知是名第二差別不由師故説名自然六種通慧現所得故名為作證於諸有情最第一故説名圓滿此第一性自然知故顯示他故説名開示一六六一六六五四如是我聞一時佛住波羅㮈國仙人住處鹿野苑中彼時毗迦多魯迦聚落有婆羅門來詣佛所恭敬問訊卻坐一面白佛言瞿曇我有年少弟子知天文族姓為諸大衆占相吉凶言有必有言無必無言成必成言壞必壞瞿曇於意云何佛告婆羅門且置汝年少弟子知天文族姓我今問汝隨汝意答婆羅門於意云何色本無種耶答曰如是世尊受想行識本無種耶答曰如是世尊佛告婆羅門汝言我年少弟子知天文族姓為諸大衆作如是説言有必有言無必無知見非不實耶婆羅門白佛如是世尊佛告婆羅門於意云何頗有色常住百歲耶為異生異滅耶受想行識常住百歲耶異生異滅耶答曰如是世尊佛告婆羅門於意云何汝年少弟子知天文族姓為大衆説成者不壞知見非不異耶答曰如是世尊佛告婆羅門於意云何此法彼法此説彼説何者為勝婆羅門白佛言世尊此如法説如佛所説顯現開發譬如有人溺水能救獲囚能救迷方示路暗惠明燈世尊今日善説勝法亦復如是顯現開發佛説此經已毗迦多魯迦婆羅門聞佛所説歡喜隨喜即從坐起禮足而去無因復次由二種相無因論者於諸行中執無因轉謂於諸行生起因緣滅盡因緣不了知故由此生故彼諸行生由此滅故彼諸行滅於此二事不能證得又不證得諸行性相起如是見立如是論有者定有無者定無無不可生有不可滅即此論者於三位中現可證得諸行生滅一切世間共所了達麁淺現量毀謗違逆何以故現見彼彼若剎帝利或婆羅門吠舍等家所有男女和合因緣或過八月或九月已便生男女如是生已或有一類當於爾時壽盡中夭復有一類乃至住壽存活支持或苦或樂或非苦樂受位差別心諸心法皆是新新而非古古毀他復次略有二種自讚毀也謂唯語言及説法正行若唯語言而自稱讚毀呰他者彼但由於非善士法纏擾其心是名自毀非勝賢善若由説法行正行者雖無讚毀而是真實自讚毀他又諸如來宣説正法速能壞滅二種無智謂聞不正法生勝解等長時積習堅固無智及非久習近生無智復由俱生不能了知往善趣道亦不了知能往現法涅槃道故一六七一六七五五如是我聞一時佛在波羅㮈國仙人住處鹿野苑中爾時世尊告諸比丘我今當説陰及受陰云何為陰若所有諸色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切總説色陰隨諸所有受想行識亦復如是彼一切總説受想行識陰是名為陰云何為受陰若色是有漏是取若彼色過去未來現在生貪欲瞋恚愚癡及餘種種上煩惱心法受想行識亦復如是是名受陰佛説此經已諸比丘聞佛所説歡喜奉行一六八一六八五六如是我聞一時佛住波羅㮈國仙人住處鹿野苑中爾時世尊告諸比丘我今當説有漏無漏法若色有漏是取彼色能生愛恚如是受想行識有漏是取彼受想行識能生愛恚是名有漏法云何無漏法諸所有色無漏非受彼色若過去未來現在彼色不生愛恚如是受想行識無漏非受彼受想行識若過去未來現在不生貪恚是名無漏法佛説此經已諸比丘聞佛所説歡喜奉行二信二阿難壞法鬱低迦薩羅及世間陰漏無漏法染俱復次當知十一種相總攝諸行立為行聚應知聚義是其蘊義又由一向雜染因緣增上力故建立取蘊當知取蘊唯是有漏又由雜染清淨因緣二增上力建立總蘊當知此蘊通漏無漏又由三相於諸行中煩惱生起謂所依故所緣故助伴故一六九一六九五七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊著衣持鉢入舍衛城乞食還持衣鉢不語衆不告侍者獨一無二於西方國土人間遊行時安陀林中有一比丘遙見世尊不語衆不告侍者獨一無二見已進詣尊者阿難所白阿難言尊者當知世尊不語衆不告侍者獨一無二而出遊行爾時阿難語彼比丘若使世尊不語衆不告侍者獨一無二而出遊行不應隨從所以者何今日世尊欲住寂滅少事故爾時世尊遊行北至半闍國波陀聚落於人所守護林中住一跋陀薩羅樹下時有衆多比丘詣阿難所語阿難言今聞世尊住在何所阿難答曰我聞世尊北至半闍國波陀聚落人所守護林中跋陀薩羅樹下時諸比丘語阿難曰尊者當知我等不見世尊已久若不憚勞者可共往詣世尊哀愍故阿難知時默然而許爾時尊者阿難與衆多比丘夜過晨朝著衣持鉢入舍衛城乞食乞食已還精舍舉臥具持衣鉢出至西方人間遊行北至半闍國波陀聚落人所守護林中時尊者阿難與衆多比丘置衣鉢洗足已詣世尊所頭面禮足於一面坐爾時世尊為衆多比丘説法示教利喜爾時座中有一比丘作是念云何知云何見疾得漏盡爾時世尊知彼比丘心之所念告諸比丘若有比丘於此座中作是念云何知云何見疾得漏盡者我已説法言當善觀察諸陰所謂四念處四正勤四如意足五根五力七覺分八聖道分我已説如是法觀察諸陰而今猶有善男子不勤欲作不勤樂不勤念不勤信而自慢惰不能增進得盡諸漏若復善男子於我所説法觀察諸陰勤欲勤樂勤念勤信彼能疾得盡諸漏愚癡無聞凡夫於色見是我若見我者是名為行彼行何因何集何生何轉無明觸生愛緣愛起彼行彼愛何因何集何生何轉彼愛受因受集受生受轉彼受何因何集何生何轉彼受觸因觸集觸生觸轉彼觸何因何集何生何轉謂彼觸六入處因六入處集六入處生六入處轉彼六入處無常有為心緣起法彼觸受愛行亦無常有為心緣起法如是觀者而見色是我不見色是我而見色是我所不見色是我所而見色在我不見色在我而見我在色不見我在色而見受是我不見受是我而見受是我所不見受是我所而見受在我不見受在我而見我在受不見我在受而見想是我不見想是我而見想是我所不見想是我所而見想在我不見想在我而見我在想不見我在想而見行是我不見行是我而見行是我所不見行是我所而見行在我不見行在我而見我在行不見我在行而見識是我不見識是我而見識是我所不見識是我所而見識在我不見識在我而見我在識不見我在識復作斷見壞有見不作斷見壞有見而不離我慢不離我慢者而復見我見我者即是行彼行何因何集何生何轉如前所説乃至我慢作如是知如是見者疾得漏盡佛説經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰少欲自性等記三似正法疑癡處所不記變壞大師記三見滿外愚相等少欲由三種相如來心入少欲住中一由爾時化事究竟為欲安住現法樂住二由弟子於正行門深可厭薄三為化導常樂營為多事多業所化有情又如前説如來入于寂靜天住一切因緣當知此中亦復如是自性復次諸所化者略有三種所調伏性一愚癡放逸性二極下劣心性三能修正行性恭敬住復次由四種相於四處所生恭敬住速證無上一於所應得生猛利樂欲故二於得方便法隨法行生猛利愛樂故三於大師所生猛利愛敬故四於所説法生猛利淨信故三種無上復次有三種無上謂妙智無上正行無上解脫無上妙智無上者謂盡智無生智無學正見智正行無上者謂樂速通行解脫無上者謂不動心解脫當知此中總説智斷現法樂住有學妙智正行解脫不名無上猶有上故當知一切阿羅漢行皆得名為樂速通行一切麁重永滅故一切所作已辦故見慢復次依菩提分擇諸行故於二時中由四種相如實遍知薩迦耶見即於二時無間證得諸漏永盡云何二時一在異生地二在見地云何由四種相一由自性故二由處所故三由等起故四由果故自性故者謂諸行自性薩迦耶見及五種行彼計為我或為我所處所故者謂所緣境等起故者謂見取所攝無明觸生受為緣愛此復有五緣起次第謂界種種性為緣生觸種種性觸種種性為緣生受種種性受種種性為緣生愛種種性愛種種性為緣生取種種性夫緣生者體必無常由果故者謂於三時薩迦耶見能為障礙一依無我諦察法忍時二現觀時三得阿羅漢時此中一時由彼隨眠薩迦耶見增上力故有惑有疑由多修習諦察法忍為因緣故雖於疑惑少能除遣然於修習諦現觀時由意樂故恐於涅槃我當無有由此隨眠薩迦耶見增上力故於諸行中起邪分別謂我當斷當壞當無便於涅槃發生斷見及無有見由此因緣於般涅槃其心退還不樂趣入彼於異時雖從此過淨修其心又於聖諦已得現諦然謂我能證諦現諦彼於此慢由隨眠故仍未能離又時時間由忘念故觀我起慢因此慢纏差別而轉謂我為勝或等或劣前兩位中由隨眠力能作障礙於第三位由習氣力能作障礙又由三緣諸行生長一由宿世業煩惱力二由願力三由現在衆因緣力於異生地能遍知故於見地中無間能得見道所斷諸漏永盡於見地中能遍知故次斷餘結得阿羅漢無間證得諸漏永盡一七一七五八如是我聞一時佛住舍衛國東園鹿母講堂爾時世尊於晡時從禪覺於諸比丘前敷座而坐告諸比丘有五受陰云何為五謂色受陰受想行識受陰時有一比丘從座起整衣服偏袒右肩右膝著地合掌白佛言世尊此五受陰色受陰受想行識受陰耶佛告比丘還坐而問當為汝説時彼比丘為佛作禮還復本坐白佛言世尊此五受陰以何為根以何集以何生以何轉佛告比丘此五受陰欲為根欲集欲生欲轉時彼比丘聞佛所説歡喜隨喜而白佛言世尊為説五陰即受善哉所説今當更問世尊陰即受為五陰異受耶佛告比丘非五陰即受亦非五陰異受能於彼有欲貪者是五受陰比丘白佛善哉世尊歡喜隨喜今復更問世尊有二陰相關耶佛告比丘如是如是猶若有一人如是思惟我於未來得如是色如是受如是想如是行如是識是名比丘陰陰相關也比丘白佛善哉所説歡喜隨喜更有所問世尊云何名陰佛告比丘諸所有色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切總説陰是名為陰受想行識亦復如是如是比丘是名為陰比丘白佛善哉所説歡喜隨喜更有所問世尊何因何緣名為色陰何因何緣名受想行識陰佛告比丘四大因四大緣是名色陰所以者何諸所有色陰彼一切悉皆四大緣四大造故觸因觸緣生受想行是故名受想行陰所以者何若所有受想行彼一切觸緣故名色因名色緣是故名為識陰所以者何若所有識彼一切名色緣故比丘白佛善哉所説歡喜隨喜更有所問云何色味云何色患云何色離云何受想行云何識味云何識患云何識離佛告比丘緣色生喜樂是名色味若色無常苦變易法是名色患若於色調伏欲貪斷欲貪越欲貪是名色離若緣受想行識生喜樂是名受想行識味受想行識無常苦變易法是名受想行識患於受想行識調伏欲貪斷欲貪越欲貪是名受想行識離比丘白佛善哉所説歡喜隨喜更有所問世尊云何生我慢佛告比丘愚癡無聞凡夫於色見我異我相在於受想行識見我異我相在於此生我慢比丘白佛善哉所説歡喜隨喜更有所問世尊云何得無我慢佛告比丘多聞聖弟子不於色見我異我相在不於受想行識見我異我相在比丘白佛善哉所説更有所問何所知何所見疾得漏盡佛告比丘諸所有色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切非我不異我不相在受想行識亦復如是比丘如是知如是見疾得漏盡爾時會中復有異比丘鈍根無知在無明㲉起惡邪見而作是念若無我者作無我業於未來世誰當受報爾時世尊知彼比丘心之所念告諸比丘於此衆中若有愚癡人無智明而作是念若色無我受想行識無我作無我業誰當受報如是所疑先以解釋彼云何比丘色為常耶為非常耶答言無常世尊若無常者是苦耶答言是苦世尊若無常苦是變易法多聞聖弟子於中寧見是我異我相在不答言不也世尊受想行識亦復如是是故比丘若所有色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切非我非我所如是見者是為正見受想行識亦復如是多聞聖弟子如是觀者使修厭厭已離欲離欲已解脫解脫知見我生已盡梵行已立所作已作自知不受後有佛説此經時衆多比丘不起諸漏心得解脫佛説此經已諸比丘聞佛所説歡喜奉行陰根陰即受二陰共相關名字因味二我慢疾漏盡記復次由五種相於諸行中如理問記何等為五一自性故二流轉還滅根本故三還滅故四流轉故五流轉還滅方便故自性故者當知色等五種自性流轉還滅根本故者謂欲由善法欲乃至能得諸漏永盡是故此欲名還滅根本若由是欲願我當得人中下類乃至當生梵衆天等衆同分中由於此心親近修習多修習故得生於彼是故此欲名流轉根本還滅故者於諸行中唯欲貪取得斷滅故若即諸行是取性者應不可滅以阿羅漢猶有諸行現可得故若異諸行有取性者應是無為無為故常亦不可滅是故取性但是諸行一分所攝即此一分已得斷滅畢竟不行故可還滅流轉故者復有三種一後有因故二品類別故三現在因故後有因者謂如有一願樂當來造作諸業彼作是念願我來世當成此行由是因緣能引後有諸行生因不引現在彼於現在不能引故施設諸行唯有二種品類別者謂十一種諸行品類如前應知現在因者謂所造色因四大種受等心法以觸為緣所有諸識名色為緣流轉方便者謂薩迦耶見為所依故於諸行中發生我慢及諸愛味我我所見還滅方便者謂於諸行遠離我慢及見過患并彼出離無我我所又流轉方便者謂無明愛品隨其所應當知其相還滅方便者謂彼對治又由二緣諸不聰慧聲聞弟子越大師教墮惡見中或起言説何等二緣一愚世俗諦二愚勝義諦由此愚故違越一向世俗諦理及違越一向勝義諦理於行流轉不正思惟一七一一七一一三如是我聞一時有衆多上座比丘住拘舍彌國瞿師羅園時有差摩比丘住拘舍彌國跋陀梨園身得重病時有陀娑比丘為瞻病者時陀娑比丘詣諸上座比丘禮諸上座比丘足於一面住諸上座比丘告陀娑比丘言汝往詣差摩比丘所語言諸上座問汝身小差安隱苦患不增劇耶時陀娑比丘受諸上座比丘教至差摩比丘所語差摩比丘言諸上座比丘問訊汝苦患漸差不衆苦不至增耶差摩比丘語陀娑比丘言我病不差不安隱身諸苦轉增無救譬如多力士夫取羸劣人以繩繼頭兩手急絞極大苦痛我今苦痛有過於彼譬如屠牛以利刀生割其腹取其內藏其牛腹痛當何可堪我今腹痛甚於彼牛如二力士捉一劣夫懸著火上燒其兩足我今兩足熱過於彼時陀娑比丘還至諸上座所以差摩比丘所説病狀具白諸上座時諸上座還遣陀娑比丘至差摩比丘所語差摩比丘言世尊所説有五受陰何等為五色受陰受想行識受陰汝差摩能少觀察此五受陰非我非我所耶時陀娑比丘受諸上座比丘教已往語差摩比丘言諸上座語汝世尊説五受陰汝能少觀察非我非我所耶差摩比丘語陀娑言我於彼五受陰能觀察非我非我所陀娑比丘還白諸上座差摩比丘言我於五受陰能觀察非我非我所諸上座比丘復遣陀娑比丘語差摩比丘言汝能於五受陰觀察非我非我所如漏盡阿羅漢耶時陀娑比丘受諸上座比丘教往詣差摩比丘所語差摩言比丘能如是觀五受陰者如漏盡阿羅漢耶差摩比丘語陀娑比丘言我觀五受陰非我非我所非漏盡阿羅漢也時陀娑比丘還至諸上座所白諸上座差摩比丘言我觀五受陰非我非我所而非漏盡阿羅漢也時諸上座語陀娑比丘汝復還語差摩比丘汝言我觀五受陰非我非我所而非漏盡阿羅漢前後相違陀娑比丘受諸上座比丘教往語差摩比丘汝言我觀五受陰非我非我所而非漏盡阿羅漢前後相違差摩比丘語陀娑比丘言我於五受陰觀察非我非我所而非阿羅漢者我於我慢我欲我使未斷未知未離未吐陀娑比丘還至諸上座所白諸上座差摩比丘言我於五受陰觀察非我非我所而非漏盡阿羅漢者於五受陰我慢我欲我使未斷未知未離未吐諸上座復遣陀娑比丘語差摩比丘言汝言有我於何所有我為色是我為我異色受想行識是我為我異受想行識耶差摩比丘語陀娑比丘言我不言色是我我異色受想行識是我我異受想行識然於五受陰我慢我欲我使未斷未知未離未吐差摩比丘語陀娑比丘言何煩令汝驅馳往反汝取杖來我自扶杖詣彼上座願授以杖差摩比丘即自扶杖詣諸上座時諸上座遙見差摩比丘扶杖而來自為敷座安停腳機自往迎接為持衣鉢命令就座共相慰勞慰勞已語差摩比丘言汝言我慢何所見我色是我耶我異色耶受想行識是我耶我異受想行識耶差摩比丘白言非色是我非我異色非受想行識是我非我異受想行識然於五受陰我慢我欲我使未斷未知未離未吐譬如優鉢羅鉢曇摩拘牟頭分陀利華香為即根香耶為香異根耶為莖葉鬚精粗香耶為香異精粗耶為等説不諸上座答言不也差摩比丘非優鉢羅鉢曇摩拘牟頭分陀利根即是香非香異根亦非莖葉鬚精粗是香亦非香異精粗也差摩比丘復問彼何等香上座答言是華香差摩比丘復言我亦如是非色即我我不離色非受想行識即我我不離受想行識然我於五受陰見非我非我所而於我慢我欲我使未斷未知未離未吐諸上座聽我説譬凡智者因譬類得解譬如乳母衣付浣衣者以種種灰湯浣濯塵垢猶有餘氣要以種種雜香薰令消滅如是多聞聖弟子雖於五受陰正觀非我非我所然於五受陰我慢我欲我使未斷未知未離未吐然後於五受陰增進思惟觀察生滅此色此色集此色滅此受想行此識此識集此識滅於五受陰如是觀生滅已我慢我欲我使一切悉除是名真實正觀差摩比丘説此法時彼諸上座遠塵離垢得法眼淨差摩比丘不起諸漏心得解脫法喜利故身病悉除時諸上座比丘語差摩比丘言我聞仁者初所説已解已樂況復重聞所以問者欲發仁者微妙辨才非為嬈亂汝便堪能廣説如來應等正覺法時諸上座聞差摩比丘所説歡喜奉行三復次於三種處唯諸聖者隨其所樂能如實記非諸異生除從他聞謂諸行中我我所見我非如實若彼為依有我慢轉彼雖已斷而此我慢一切未斷若無起依我慢不斷如故現行當知此中二種我慢一於諸行執著現行二由失念率爾現行此中執著現行我慢聖者已斷不復現行第二我慢由隨眠故薩迦耶見雖復永斷以於聖道未善修故猶起現行薩迦耶見唯有習氣常所隨逐於失念時能與我慢作所依止令暫現行是故此慢亦名未斷亦得現行又諸聖者若於諸行思惟自相尚令我慢不復現行況觀共相若於假法作意思惟住正念者亦令我慢不得現行若於假法作意思惟不住正念爾時我慢暫得現行若諸異生雖於諸行思惟共相尚為我慢亂心相續況住餘位又薩迦耶見聖相續中隨眠與纏皆已斷盡於學位中習氣隨逐未能永斷若諸我慢隨眠與纏皆未能斷又計我欲者當知即是我慢纏攝何以故由失念故於欲於定為諸愛味所漂淪者依此欲門諸我慢纏數數現起言未斷者由隨眠故未遍知者由彼纏故彼於爾時有忘念故言未滅者雖於此纏暫得遠離尋復現行言未吐者由彼隨眠未永拔故問病復次同梵行者於餘同梵行所略有二種慰問一問病苦二問安樂問病苦者如問彼言所受疹疾寧可忍不者謂問氣息無擁滯乎得支持不者謂問苦受不至增乎非無間乎非不愛觸之所觸乎非違慮乎非笮身乎或被笮者得除釋乎問安樂者謂如有一隨所問言少病不者此問不為嬰疹惱耶少惱不者此問不為外諸災橫所侵逼耶起居輕利不者此問夜寐得安善耶所進飲食易消化耶有歡樂不者此問得住無罪觸耶如是等類差別言詞如聲聞地於所飲食知量中釋當知此問在四位中一內逼惱分二外逼惱分三住於夜分四住於晝分一七二一七二一四如是我聞一時佛住舍衛國祇樹給孤獨園爾時有比丘名焰摩迦起惡邪見作如是言如我解佛所説法漏盡阿羅漢身壞命終更無所有時有衆多比丘聞彼所説往詣其所語焰摩迦比丘言汝實作是説如我解佛所説法漏盡阿羅漢身壞命終更無所有耶答言實爾諸尊時諸比丘語焰摩迦勿謗世尊謗世尊者不善世尊不作是説汝當盡捨此惡邪見諸比丘説此語時焰摩迦比丘猶執惡邪見作如是言諸尊唯此真實異則虛妄如是三説時諸比丘不能調伏焰摩迦比丘即便捨去往詣尊者舍利弗所語尊者舍利弗言尊者當知彼焰摩迦比丘起如是惡邪見言我解知佛所説法漏盡阿羅漢身壞命終更無所有我等聞彼所説已故往問焰摩迦比丘汝實作如是知見耶彼答我言諸尊實爾異則愚説我即語言汝勿謗世尊世尊不作此語汝當捨此惡邪見再三諫彼猶不捨惡邪見是故我今詣尊者所唯願尊者當令焰摩迦比丘息惡邪見憐愍彼故舍利弗言如是我當令彼息惡邪見時衆多比丘聞舍利弗語歡喜隨喜而還本處爾時尊者舍利弗晨朝著衣持鉢入舍衛城乞食食已出城還精舍舉衣鉢已往詣焰摩迦比丘所時焰摩迦比丘遙見尊者舍利弗來即為敷座洗足安停腳機奉迎為執衣鉢請令就座尊者舍利弗就座洗足已語焰摩迦比丘汝實作如是語我解知世尊所説法漏盡阿羅漢身壞命終無所有耶焰摩迦比丘白舍利弗言實爾尊者舍利弗舍利弗言我今問汝隨意答我云何焰摩迦色為常耶為非常耶答言尊者舍利弗無常復問若無常者是苦不答言是苦復問若無常苦是變易法多聞聖弟子寧於中見我異我相在不答言不也尊者舍利弗受想行識亦復如是復問云何焰摩迦色是如來耶答言不也尊者舍利弗受想行識是如來耶答言不也尊者舍利弗復問云何焰摩迦異色有如來耶異受想行識有如來耶答言不也尊者舍利弗復問色中有如來耶受想行識中有如來耶答言不也尊者舍利弗復問如來中有色耶如來中有受想行識耶答言不也尊者舍利弗復問非色受想行識有如來耶答言不也尊者舍利弗如是焰摩迦如來見法真實如住無所得無所施設汝云何言我解知世尊所説漏盡阿羅漢身壞命終無所有為時説耶答言不也尊者舍利弗復問焰摩迦先言我解知世尊所説漏盡阿羅漢身壞命終無所有云何今復言非耶焰摩迦比丘言尊者舍利弗我先不解無明故作如是惡邪見説聞尊者舍利弗説已不解無明一切悉斷復問焰摩迦若復問比丘如先惡邪見所説今何所知見一切悉得遠離汝當云何答焰摩迦答言尊者舍利弗若有來問者我當如是答漏盡阿羅漢色無常無常者是苦苦者寂靜清涼永沒受想行識亦復如是有來問者作如是答舍利弗言善哉善哉焰摩迦比丘汝應如是答所以者何漏盡阿羅漢色無常無常者是苦若無常苦者是生滅法受想行識亦復如是尊者舍利弗説是法時焰摩迦比丘遠塵離垢得法眼淨尊者舍利弗語焰摩迦比丘今當説譬夫智者以譬得解如長者子長者子大富多財廣求僕從善守護財物時有怨家惡人詐來親附為作僕從常伺其便晚眠早起侍息左右謹敬其事遜其言辭令主意悅作親友想子想極信不疑不自防護然後手執利刀以斷其命焰摩迦比丘於意云何彼惡怨家為長者親友非為初始方便害心常伺其便至其終耶而彼長者不能覺知至今受害答言實爾尊者舍利弗語焰摩迦比丘於意云何彼長者本知彼人詐親欲害善自防護不受害耶答言如是尊者舍利弗如是焰摩迦比丘愚癡無聞凡夫於五受陰作常想安隱想不病想我想我所想於此五受陰保持護惜終為此五受陰怨家所害如彼長者為詐親怨家所害而不覺知焰摩迦多聞聖弟子於此五受陰觀察如病如癰如刺如殺無常苦空非我非我所於此五受陰不著不受不受故不著不著故自覺涅槃我生已盡梵行已立所作已作自知不受後有尊者舍利弗説是法時焰摩迦比丘不起諸漏心得解脫尊者舍利弗為焰摩迦比丘説法示教照喜已從座起去似正法復次若有説言諸阿羅漢於現法中於食物務蘊界處等若順不順不如實知言阿羅漢不順不順是不如理虛妄分別非阿羅漢現法不順所以者何彼於食物務蘊界處等現可見故由此因緣諸阿羅漢於其滅後不順諸行不了執著是故世尊言阿羅漢是不順者定是密語當知此是似正法見由二種義勢力為緣諸同梵行或大聲聞為欲斷滅如是所生似正法見極作功用勿令彼人或自陳説或示於他由是因緣墮極下趣或由愛敬如來聖教勿因如是似正法見令佛聖教速疾隱滅復有二因能生如是似正法見一者於內薩迦邪見未能永斷二者依此妄計流轉還滅士夫為斷如是二種因故説二正法以為對治謂於諸行次第宣説無常無我於四句中推求流轉還滅士夫都不可得謂依有為或依無為聲聞獨覺佛世尊我説名如來當知此我二種假立有餘依中假立有為無餘依中假立無為若依勝義非有為非無為亦非無為非有為由説如是正法教故於六種相覺悟生時當知永斷似正法見謂阿羅漢於依所攝滅壞法故覺悟無常於現法中為老病等衆苦器故覺悟是苦於任運滅斷界離界及與滅界覺悟為滅寂靜清涼及與永沒若具如是正覺悟者是阿羅漢邪增上慢俱行妄想尚不得有況可如是於其滅後若順不順戲論執著當知未斷薩迦耶見有二過患一於能害有苦諸行執我我所由此因緣能感流轉生死大苦二於現法能礙無上聖慧命根譬如有人自知無力能害怨家恐彼為害先相親附以如意事現承奉之時彼怨家知親附已便害其命愚夫異生亦復如是恐似怨家薩迦耶見當為苦害便起愛縛以可意行而現承奉如是愚癡異生之類於能為害薩迦耶見唯見功德不見過失殷到親附既親附已由未得退説名損害聖慧命根一七三一七三一五如是我聞一時佛住王舍城迦蘭陀竹園爾時有外道出家名仙尼來詣佛所恭敬問訊於一面坐白佛言世尊先一日時若沙門若婆羅門若遮羅迦若出家集於希有講堂如是義稱富蘭那迦葉為大衆主五百弟子前後圍繞其中有極聰慧者有鈍根者及其命終悉不記説其所往生處復有末迦梨瞿舍利子為大衆主五百弟子前後圍繞其諸弟子有聰慧者有鈍根者及其命終悉不記説所往生處如是先闍那毗羅胝子阿耆多翅舍欽婆羅迦羅拘陀迦栴延尼揵陀若提子等各與五百弟子前後圍繞亦如前者沙門瞿曇爾時亦在彼論中言沙門瞿曇為大衆主其諸弟子有命終者即記説言某生彼處某生此處我先生疑云何沙門瞿曇得如此法佛告仙尼汝莫生疑以有惑故彼則生疑仙尼當知有三種師何等為三有一師見現在世真實是我如所知説而無能知命終後事是名第一師出於世間復次仙尼有一師見現在世真實是我命終之後亦見是我如所知説復次仙尼有一師不見現在世真實是我亦復不見命終之後真實是我仙尼其第一師見現在世真實是我如所知説者名曰斷見彼第二師見今世後世真實是我如所知説者則是常見彼第三師不見現在世真實是我命終之後亦不見我是則如來應等正覺説現法愛斷離欲滅盡涅槃仙尼白佛言世尊我聞世尊所説遂更增疑佛告仙尼正應增疑所以者何此甚深處難見難知應須甚深照微妙至到聰慧所了凡衆生類未能辨知所以者何衆生長夜異見異忍異求異欲故仙尼白佛言世尊我於世尊所心得淨信唯願世尊為我説法令我即於此座慧眼清淨佛告仙尼今當為汝隨所樂説佛告仙尼色是常耶為無常耶答言無常世尊復問仙尼若無常者是苦耶答言是苦世尊復問仙尼若無常苦是變易法多聞聖弟子寧於中見我異我相在不答言不也世尊受想行識亦復如是復問云何仙尼色是如來耶答言不也世尊受想行識是如來耶答言不也世尊復問仙尼異色有如來耶異受想行識有如來耶答言不也世尊復問仙尼色中有如來耶受想行識中有如來耶答言不也世尊復問仙尼如來中有色耶如來中有受想行識耶答言不也世尊復問仙尼非色非受想行識有如來耶答言不也世尊佛告仙尼我諸弟子聞我所説不悉解義而起慢無間等非無間等故慢則不斷慢不斷故捨此陰已與陰相續生是故仙尼我則記説是諸弟子身壞命終生彼彼處所以者何以彼有餘慢故仙尼我諸弟子於我所説能解義者彼於諸慢得無間等得無間等故諸慢則斷諸慢斷故身壞命終更不相續仙尼如是弟子我不説彼捨此陰已生彼彼處所以者何無因緣可記説故欲令我記説者當記説彼斷諸愛欲永離有結正意解脫究竟苦邊我從昔來及今現在常説慢根慢集慢生慢起若於慢無間等觀衆苦不生佛説此法時仙尼出家遠塵離垢得法眼淨爾時仙尼出家見法得法斷諸疑惑不由他知不由他度於正法中心得無畏從座起合掌白佛言世尊我得於正法中出家修梵行不佛告仙尼汝於正法得出家受具足戒得比丘分爾時仙尼得出家已獨一靜處修不放逸住如是思惟所以族姓子剃除鬚髮正信出家出家學道修行梵行見法自知得證我生已盡梵行已立所作已作自知不受後有得阿羅漢聞佛所説歡喜奉行疑癡處所復次諸外道輩於內法律二種處所疑惑愚癡何等為二謂佛世尊誹毀有見及無有見而於弟子終歿之後記一有生記一無生又説勝義常住之我現法當來都不可得世有三師而現可得一常論者二斷論者三者如來此疑癡者有二種因當知如前似正法見二種法教能斷此因亦如前説由二因緣即此所説無我法性彼諸外道難入難了謂此自性難了知故雖此相貌易可了知然其相貌不相似故當知此中無虛誑義自所證義是不共義故彼自性難可悟入即此自性體是甚深似甚深現是故説名無虛誑義又此自性於內難見從他言音亦難覺了是故説名自所證義又此自性非尋思者之所尋思非度量者所行境界是故説名是不共義又即此法微妙審諦聰明智者內所證故説名難了此等差別當知如前攝異門分由二種相一切如來所説義智皆應了知何等為二一者教智二者證智教智者謂諸異生聞思修所成慧證智者謂學無學慧及後所得諸世間慧此中異生非於一切佛所説義皆能了知亦非於慢覺察是慢又未能斷若諸有學非於我見一切義中皆不了知又能於慢覺察是慢而未能斷若諸無學能作一切一七四一七四一六如是我聞一時佛住王舍城迦蘭陀竹園爾時有比丘名阿䨲羅度住耆闍崛山時有衆多外道出家往詣阿䨲羅度所共相問訊共相問訊已於一面住白阿䨲羅度言欲有所問寧有間暇為解釋不阿䨲羅度語諸外道言隨所欲問知者當答諸外道復問云何尊者如來死後為有耶阿䨲羅度言如世尊説此是無記又問如來死後為無耶阿䨲羅度言如世尊説此亦無記又問如來死後有無耶非有非無耶阿䨲羅度言如世尊説此亦無記復問阿䨲羅度言云何尊者如來死後有耶説言無記死後無耶説言無記死後有無耶非有非無耶説言無記云何尊者沙門瞿曇為不知不見耶阿䨲羅度言世尊非不知非不見時諸外道於阿䨲羅度所説心不喜悅呵罵已從座起去時阿䨲羅度知諸外道去已往詣佛所稽首佛足於一面住以諸外道所問向佛廣説白佛言世尊彼如是問我如是答為順諸法説耶得無謗世尊耶為順法耶為違法耶無令他來難詰墮訶責處耶佛告阿䨲羅度言我今問汝隨所問答阿䨲羅度色為常耶為無常耶答言無常受想行識為常無常耶答言無常世尊如焰摩迦契經廣説乃至識是如來耶答曰不也佛告阿䨲羅度作如是説者隨順諸説不謗如來非為越次如如來説諸次法説無有能來難詰訶責者所以者何我於色如實知色集色滅色滅道迹如實知阿䨲羅度若捨如來所作無知無見説者此非等説佛説此經已阿䨲羅度聞佛所説歡喜奉行不記復次諸佛如來於世俗諦及勝義諦皆如實知正觀於彼二種道理不應記別若記別者能引無義故不記別亦不執著謂於滅後若有若無亦有亦無非有非無若於如來如是智見為先不記謂無知者當知自顯妄見俱行無智之性一七五一七五一七如是我聞一時佛住婆祇國設首婆羅山鹿野深林中爾時有那拘羅長者百二十歲年耆根熟羸劣苦病而欲覲見世尊及先所宗重知識比丘來詣佛所稽首佛足退坐一面白佛言世尊我年衰老羸劣苦病自力勉勵覲見世尊及先所宗重知識比丘唯願世尊為我説法令我長夜安樂爾時世尊告那拘羅長者善哉長者汝實年老根熟羸劣苦患而能自力覲見如來并餘宗重知識比丘長者當知於苦患身常當修學不苦患身爾時世尊為那拘羅長者示教照喜默然而住那拘羅長者聞佛所説歡喜隨喜禮佛而去時尊者舍利弗去世尊不遠坐一樹下那拘羅長者往詣尊者舍利弗所稽首禮足退坐一面時尊者舍利弗問長者言汝今諸根和悅貌色鮮明於世尊所得聞深法耶那拘羅長者白舍利弗今日世尊為我説法示教照喜以甘露法灌我身心是故我今諸根和悅顏貌鮮明尊者舍利弗問長者言世尊為汝説何等法示教照喜甘露潤澤那拘羅長者白舍利弗我向詣世尊所白世尊言我年衰老羸劣苦患自力而來覲見世尊及所宗重知識比丘佛告我言善哉長者汝實衰老羸劣苦患而能自力詣我及見先所宗重比丘汝今於此苦患之身常當修學不苦患身世尊為我説如是法示教照喜甘露潤澤尊者舍利弗問長者言汝向何不重問世尊云何苦患身苦患心云何苦患身不苦患心長者答言我以是義故來詣尊者唯願為我略説法要尊者舍利弗語長者言善哉長者汝今諦聽當為汝説愚癡無聞凡夫於色集色滅色患色味色離不如實知不如實知故愛樂於色言色是我是我所而取攝受彼色若壞若異心識隨轉惱苦生惱苦生已恐怖障閡顧念憂苦結戀於受想行識亦復如是是名身心苦患云何身苦患心不苦患多聞聖弟子於色集色滅色味色患色離如實知如實知已不生愛樂見色是我是我所彼色若變若異心不隨轉惱苦生心不隨轉惱苦生已得不恐怖障閡顧念結戀受想行識亦復如是是名身苦患心不苦患尊者舍利弗説是法時那拘羅長者得法眼淨爾時那拘羅長者見法得法知法入法度諸狐疑不由於他於正法中心得無畏從座起整衣服恭敬合掌白尊者舍利弗我已超已度我今歸依佛法僧寶為優婆塞證知我我今盡壽歸依三寶爾時那拘羅長者聞尊者舍利弗所説歡喜隨喜作禮而去變壞復次應知略有二種變壞一者諸行衰老變壞謂如有一年百二十其形衰邁由是因緣名身老病二者心憂變壞由是因緣名心老病第一變壞若愚若智皆於其中不隨所欲第二變壞智者於中能隨所欲非諸愚者又諸愚夫若身老病當知其心定隨老病其有智者身雖老病而心自在不隨老病是名此中愚智差別一七六一七六一八如是我聞一時佛住釋氏天現聚落爾時有西方衆多比丘欲還西方安居詣世尊所稽首佛足退坐一面爾時世尊為其説法示教照喜種種示教照喜已時西方衆多比丘從座起合掌白佛言世尊我西方衆多比丘欲還西方安居今請奉辭佛告西方諸比丘汝辭舍利弗未答言未辭佛告西方諸比丘舍利弗淳修梵行汝當奉辭能令汝等以義饒益長夜安樂時西方諸比丘辭退欲去時尊者舍利弗去佛不遠坐一堅固樹下西方諸比丘往詣尊者舍利弗所稽首禮足退坐一面白尊者舍利弗言我等欲還西方安居故來奉辭舍利弗言汝等辭世尊未答言已辭舍利弗言汝等還西方處處異國種種異衆必當問汝汝等今於世尊所聞善説法當善受善持善觀善入足能為彼具足宣説不毀佛耶不令彼衆難問詰責墮負處耶彼諸比丘白舍利弗我等為聞法故來詣尊者唯願尊者具為我説哀愍故尊者舍利弗告諸比丘閻浮提人聰明利根若剎利若婆羅門若長者若沙門必當問汝汝彼大師云何説法以何教教汝當答言大師唯説調伏欲貪以此教教當復問汝於何法中調伏欲貪當復答言大師唯説於彼色陰調伏欲貪於受想行識陰調伏欲貪我大師如是説法彼當復問欲貪有何過患故大師説於色調伏欲貪受想行識調伏欲貪汝復應答言若於色欲不斷貪不斷愛不斷念不斷渴不斷者彼色若變若異則生憂悲惱苦受想行識亦復如是見欲貪有如是過故於色調伏欲貪於受想行識調伏欲貪彼復當問見斷欲貪有何福利故大師説於色調伏欲貪於受想行識調伏欲貪當復答言若於色斷欲斷貪斷念斷愛斷渴彼色若變若異不起憂悲惱苦受想行識亦復如是諸尊若受諸不善法因緣故今得現法樂住不苦不礙不惱不熱身壞命終生於善處者世尊終不説言當斷諸不善法亦不教人於佛法中修諸梵行得盡苦邊以受諸不善法因緣故今現法苦住障礙熱惱身壞命終墮惡道中是故世尊説言當斷不善法於佛法中修諸梵行平等盡苦究竟苦邊若受諸善法因緣現法苦住障礙熱惱身壞命終墮惡道中者世尊終不説受持善法於佛法中修諸梵行平等盡苦究竟苦邊以受持善法現法樂住不苦不礙不惱不熱身壞命終生於善處是故世尊讚歎教人受諸善法於佛法中修諸梵行平等盡苦究竟苦邊尊者舍利弗説是法時西方諸比丘不起諸漏心得解脫尊者舍利弗説是法時諸比丘歡喜隨喜作禮而去大師記復次善取法者由聞思故善思惟者由修慧故善顯了者如所有性故善通達者盡所有性故由二種相諸聖弟子能正請問大師善記謂於諸取斷遍知論何等為二一者於此諸取斷遍知論二者為此諸取斷遍知論當知此中於一切行斷遍知論所謂如來又此諸取若未斷滅隨觀彼有三種過患若已斷滅隨觀彼有三種功德一者於諸行中所生諸取行若變壞便生愁等應知是名第一過患已得諸行變壞所作二者於諸行中所生諸取為得未得可意諸行於追求時廣行非一種種衆多差別不善由此追求行不善故住四種苦一將現前鄰近所起二正現前現在所起三他逼迫增上所起四自雜染增上所起應知是名第二過患三者即由如是惡不善法愛習為因身壞死後往諸惡趣應知是名第三過患與此相違於諸取斷隨觀三種功德勝利如應當知一七七一七七一九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘譬如池水方五十由旬深亦如是其水盈滿復有士夫以毛以草或以指爪以渧彼水諸比丘於意云何彼士夫水渧為多池水為多比丘白佛彼士夫以毛以草或以指爪所渧之水少少不足言池水甚多百千萬倍不可為比如是諸比丘見諦者所斷衆苦如彼池水於未來世永不復生爾時世尊説是法已入室坐禪時尊者舍利弗於衆中坐世尊入室去後告諸比丘未曾所聞世尊今日善説池譬所以者何聖弟子具足見諦得無間等果若凡俗邪見身見根本身見集身見生身見起謂憂戚隱覆慶吉保惜説我説衆生説奇特矜舉如是衆邪悉皆除滅斷除根本如折多羅樹於未來世更不復生諸比丘何等為見諦聖弟子斷上衆邪於未來世永不復起愚癡無聞凡夫見色是我異我我在色色在我見受想行識是我異我我在識識在我云何見色是我得地一切入處正受觀已作是念地即是我我即是地我及地唯一無二不異不別如是水火風青黃赤白一切入處正受觀已作是念白即是我我即是白唯一無二不異不別如是於一切入處一一計我是名色即是我云何見色異我若彼見受是我見受是我已見色是我所或見想行識即是我見色是我所是名色異我云何見我中色謂見受是我色在我中又見想行識即是我色在我中是名我中色云何見色中我謂見受即是我於色中住入於色周遍其四體見想行識是我於色中住周遍其四體是名色中我云何見受即是我謂六受身眼觸生受耳鼻舌身意觸生受此六受身一一見是我是名受即是我云何見受異我謂見色是我受是我所謂想行識是我受是我所是名受異我云何見我中受謂色是我受在其中想行識是我受在其中是謂我中受云何見受中我謂色是我於受中住周遍其四體想行識是我於受中住周遍其四體是名受中我云何見想即是我謂六想身眼觸生想耳鼻舌身意觸生想此六想身一一見是我是名想即是我云何見想異我謂見色是我想是我所受行識是我想是我所是名想異我云何見我中想謂色是我想在中住受行識是我想在中住是謂我中想云何見想中我謂色是我於想中住周遍其四體受行識是我於想中住周遍其四體是名想中我云何見行是我謂六思身眼觸生思耳鼻舌身意觸生思於此六思身一一見是我是名行即是我云何見行異我謂色是我行是我所受想識是我行是我所是名行異我云何見我中行謂色是我行在中住受想識是我行在中住是謂我中行云何見行中我謂色是我於行中住周遍其四體謂受想識是我於行中住周遍其四體是名行中我云何見識即是我謂六識身眼識耳鼻舌身意識身於此六識身一一見是我是名識即是我云何見識異我見色是我識是我所見受想行是我識是我所是名識異我云何見我中識謂色是我識在中住受想行是我識在中住是名我中識云何識中我謂色是我於識中住周遍其四體受想行是我於識中住周遍其四體是名識中我如是聖弟子見四真諦得無間等果斷諸邪見於未來世永不復起所有諸色若過去若未來若現在若內若外若粗若細若好若醜若遠若近一向積聚作如是觀一切無常一切苦一切空一切非我不應愛樂攝受保持受想行識亦復如是不應愛樂攝受保持如是觀善繫心住不愚於法復觀精進離諸懈怠心得喜樂身心猗息寂靜捨住具諸道品修行滿足永離諸惡非不消煬非不寂滅滅而不起減而不增斷而不生不取不著自覺涅槃我生已盡梵行已立所作已作自知不受後有舍利弗説是法時六十比丘不受諸漏心得解脫佛説此經已諸比丘聞佛所説歡喜奉行三見滿復次當知略有三種聖者三見圓滿能超三苦云何名為三種聖者一正見具足謂於無倒法無我忍住異生位者二已見聖諦已能趣入正性離生已入現觀已得至果住有學位者三已得最後究竟第一阿羅漢果住無學位者云何名為三見圓滿一初聖者隨順無漏有漏見圓滿二未善淨無漏見圓滿三善清淨無漏見圓滿此三圓滿依説三種補特伽羅隨其次第如前應知云何名為超三種苦謂初見圓滿能超外道我見違諍所生衆苦第二見圓滿能超一切惡趣衆苦第三見圓滿能超一切後有衆苦此中云何名諸外道我見違諍所生衆苦謂此正法毗奈耶外所有世間種種異道薩迦耶見以為根本所生一切顛倒見趣如是一切總稱我見謂我論者我論相應一切見趣或一切常論者或一分常論者或無因論者或邊無邊論者或斷滅論者或現法涅槃論者彼論相應一切見趣或有情論者彼論相應一切見趣謂諸邪見撥無一切化生有情誹謗他世或命論者彼論相應一切見趣謂命論者計命即身或異身等或吉祥論者彼論相應一切見趣謂觀參羅曆算卜筮種種邪論妄計誦呪祠祀火等得所愛境能生吉祥能斷無義又計覩相為祥不祥彼復云何謂二十句薩迦耶見為所依止發起妄計前際後際六十二種諸惡見趣及起總謗一切邪見云何違諍所生衆苦謂彼展轉見欲相違互興諍論發起種種心憂惱苦深愛藏苦互勝劣苦堅執著苦當知此中若他所勝便生愁惱是名初苦若勝於他遂作方便令自見品轉復增盛令他見品漸更隱昧唯我見淨非餘所見執著邪見深起愛藏由此因緣發生種種不正尋思及起種種不寂靜意損害其心名第二苦愛藏邪見增上力故以他量己謂己為勝或等或劣因自高舉凌蔑於他是名第三互勝劣苦彼依此故追求利養即為追求苦之所觸凡有所作皆為惱亂詰責他論及為自論免脫他難是名第四堅執著苦如是四種名見違諍所生衆苦內法異生安住上品無我勝解當知已斷如是衆苦所以者何彼於當來由意樂故於如是等諸惡見趣堪能除遣是故若住初見圓滿能超初苦又即依此初見圓滿親近修習極多修習於內諸行發生法智於不現見發生類智總攝為一聚以不緣他智而入現觀謂以無常行或隨餘一行彼於爾時能隨證得第二見圓滿及能超第二苦彼住此已如先所得七覺分法親近修習極多修習能斷如前所説四種業等雜染能隨證得後見圓滿超後有苦此中第一補特伽羅猶殘二苦及殘現在所依身苦第二補特伽羅唯殘一苦及依身苦第三補特伽羅一切苦斷但依身苦暫時餘在譬如幻化又依分別薩迦耶見立二十句不依俱生又內法者無如是行依遍處定謂地為我我即是地乃至廣説一切應知一七八一七八一一如是我聞一時佛住毗舍離獼猴池側毗舍離國有尼揵子聰慧明哲善解諸論有聰明慢所廣集諸論妙智入微為衆説法超諸論師每作是念諸沙門婆羅門無敵我者乃至如來亦能共論諸論師輩聞我名者頭額津腋下汗毛孔流水我論議風能偃草折樹摧破金石伏諸龍象何況人間諸論師輩能當我者時有比丘名阿濕波誓晨朝著衣持鉢威儀詳序端視平涉入城乞食爾時薩遮尼揵子有少緣事詣諸聚落從城門出遙見比丘阿濕波誓即詣其所問言沙門瞿曇為諸弟子云何説法以何等法教諸弟子令其修習阿濕波誓言火種居士世尊如是説法教諸弟子令隨修學言諸比丘於色當觀無我受想行識當觀無我此五受陰勤方便觀如病如癰如刺如殺無常苦空非我薩遮尼揵子聞此語心不喜作是言阿濕波誓汝必誤聽沙門瞿曇終不作是説若沙門瞿曇作是説者則是邪見我當詣彼難詰令止爾時薩遮尼揵子往詣聚落諸離車等集會之處語諸離車言我今日見沙門瞿曇第一弟子名阿濕波誓薄共論議若如其所説者我當詣彼沙門瞿曇與共論議進卻回轉必隨我意譬如士夫刈拔茇草手執其莖空中抖擻除諸亂穢我亦如是與沙門瞿曇論議難詰執其要領進卻回轉隨其所欲去其邪説如沽酒家執其酒囊壓取清醇去其糟滓我亦如是詣沙門瞿曇論議難詰進卻回轉取其清真去諸邪説如織席師以席盛諸穢物欲市賣時以水洗澤去諸臭穢我亦如是詣沙門瞿曇所與共論議進卻回轉執其綱領去諸穢説譬如王家調象之師牽大醉象入深水中洗其身體四支耳鼻周遍沐浴去諸塵穢我亦如是詣沙門瞿曇所論議難詰進卻回轉隨意自在執其要領去諸穢説汝諸離車亦應共往觀其得失中有離車作如是言若薩遮尼揵子能與沙門瞿曇共論議者無有是處復有説言薩遮尼揵子聰慧利根能共論議時有五百離車與薩遮尼揵子共詣佛所為論議故爾時世尊於大林中坐一樹下住於天住時有衆多比丘出房外林中經行遙見薩遮尼揵子來漸漸詣諸比丘所問諸比丘言沙門瞿曇住在何所比丘答言在大林中依一樹下住於天住薩遮尼揵子即詣佛所恭敬問訊於一面坐諸離車長者亦詣佛所有恭敬者有合掌問訊者問訊已於一面住時薩遮尼揵子白佛言我聞瞿曇作如是説法作如是教授諸弟子教諸弟子於色觀察無我受想行識觀察無我此五受陰勤方便觀察如病如癰如刺如殺無常苦空非我為是瞿曇有如是教為是傳者毀瞿曇耶如説説耶不如説説耶如法説耶法次法説耶無有異忍來相難詰令墮負處耶佛告薩遮尼揵子如汝所聞彼如説説如法説法次法説非為謗毀亦無難問令墮負處所以者何我實為諸弟子如是説法我實常教諸弟子令隨順法教令觀色無我受想行識無我觀此五受陰如病如癰如刺如殺無常苦空非我薩遮尼揵子白佛言瞿曇我今當説譬佛告薩遮尼揵子宜知是時譬如世間一切所作皆依於地如是色是我人善惡從生受想行識是我人善惡從生又復譬如人界神界藥草樹本皆依於地而得生長如是色是我人受想行識是我人佛告火種居士汝言色是我人受想行識是我人耶答言如是瞿曇色是我人受想行識是我人此等諸衆悉作是説佛告火種居士且立汝論本用引衆人為薩遮尼揵子白佛言色實是我人佛告火種居士我今問汝隨意答我譬如國王於自國土有罪過者若殺若縛若擯若鞭斷絶手足若有功者賜其象馬車乘城邑財寶悉能爾不答言能爾瞿曇佛告火種居士凡是主者悉得自在不答言如是瞿曇佛告火種居士汝言色是我受想行識即是我得隨意自在令彼如是不令如是耶時薩遮尼揵子默然而住佛告火種居士速説速説何故默然如是再三薩遮尼揵子猶故默然時有金剛力士鬼神持金剛杵猛火熾然在虛空中臨薩遮尼揵子頭上作是言世尊再三問汝何故不答我當以金剛杵碎破汝頭令作七分佛神力故唯令薩遮尼揵子見金剛神餘衆不見薩遮尼揵子得大恐怖白佛言不爾瞿曇佛告薩遮尼揵子徐徐思惟然後解説汝先於衆中説色是我受想行識是我而今言不前後相違汝先常説言色是我受想行識是我火種居士我今問汝色為常耶為無常耶答言無常瞿曇復問無常者是苦耶答言是苦瞿曇復問無常苦者是變易法多聞聖弟子寧於中見我異我相在不答曰不也瞿曇受想行識亦如是説佛告火種居士汝好思而後説復問火種居士若於色未離貪未離欲未離念未離愛未離渴彼色若變若異當生憂悲惱苦不答曰如是瞿曇受想行識亦如是説復問火種居士於色離貪離欲離念離愛離渴彼色若變若異則不生憂悲惱苦耶答曰如是瞿曇如實無異受想行識亦如是説火種居士譬如士夫身嬰衆苦常與苦俱彼苦不斷不捨當得樂不答言不也瞿曇如是火種居士身嬰衆苦常與苦俱彼苦不斷不捨不得樂也火種居士譬如士夫持斧入山求堅實材見芭蕉樹洪大傭直即斷其根葉剽剝其皮乃至窮盡都無堅實火種居士汝亦如是自立論端我今善求真實之義都無堅實如芭蕉樹也而於此衆中敢有所説我不見沙門婆羅門中所知所見能與如來應等正覺所知所見共論議不摧伏者而便自説我論議風偃草折樹能破金石調伏龍象要能令彼額津腋汗毛孔水流汝今自論己義而不自立先所誇説能伏彼相今盡自取而不能動如來一毛爾時世尊於大衆中被鬱多羅僧現胸而示汝等試看能動如來一毛以不爾時薩遮尼揵子默然低頭慚愧失色爾時衆中有一離車名突目佉從座起整衣服合掌白佛言世尊聽我説譬佛告突目佉宜知是時突目佉白佛言世尊譬如有人執持斗斛於大聚穀中取二三斛今此薩遮尼揵子亦復如是世尊譬如長者巨富多財忽有罪過一切財物悉入王家薩遮尼犍子亦復如是所有才辨悉為如來之所攝受譬如城邑聚落邊有大水男女大小悉入水戲取水中蟹截斷其足置於陸地以無足故不能還復入於大水薩遮尼揵子亦復如是諸有才辨悉為如來之所斷截終不復敢重詣如來命敵論議爾時薩遮尼揵子忿怒熾盛罵唾突目佉離車言汝麁疏物不審諦何為其鳴吾自與沙門瞿曇論何豫汝事薩遮尼揵子呵罵突目佉已復白佛言置彼凡輩鄙賤之説我今別有所問佛告薩遮尼揵子恣汝所問當隨問答云何瞿曇為弟子説法令離疑惑佛告火種居士我為諸弟子説諸所有色若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切如實觀察非我非異我不相在受想行識亦復如是彼學必見迹不斷壞堪任成就厭離知見守甘露門雖非一切悉得究竟且向涅槃如是弟子從我教法得離疑惑復問瞿曇復云何教諸弟子於佛法得盡諸漏無漏心解脫慧解脫現法自知作證我生已盡梵行已立所作已作自知不受後有佛告火種居士正以此法諸所有色若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切如實知非我非異我不相在受想行識亦復如是彼於爾時成就三種無上智無上道無上解脫無上成就三種無上已於大師所恭敬尊重供養如佛世尊覺一切法即以此法調伏弟子令得安隱令得無畏調伏寂靜究竟涅槃世尊為涅槃故為弟子説法火種居士我諸弟子於此法中得盡諸漏得心解脫得慧解脫於現法中自知作證我生已盡梵行已立所作已作自知不受後有薩遮尼揵子白佛言瞿曇猶如壯夫鋒刃亂下猶可得免瞿曇論手難可得脫如盛毒蛇猶可得避曠澤猛火猶可得避凶惡醉象亦可得免狂餓師子悉可得免沙門瞿曇論議手中難可得脫非我凡品輕躁鄙夫論具不備以論議故來詣瞿曇沙門瞿曇此毗舍離豐樂國土有遮波梨支提漆菴羅樹支提多子支提瞿曇在拘樓陀支提婆羅受持支提捨重擔支提力士寶冠支提世尊當安樂於此毗舍離國諸天魔梵沙門婆羅門及諸世間於世尊所常得恭敬奉事供養令此諸天魔梵沙門婆羅門長夜安樂唯願止此明朝與諸大衆受我薄食爾時世尊默然而許時薩遮尼揵子知佛世尊默然受請已歡喜隨喜從座起去爾時薩遮尼揵子於彼道中語諸離車我已請沙門瞿曇及諸大衆供設飯食汝等人各辦一釜食送至我所諸離車各還其家星夜供辦晨朝送至薩遮尼揵子所薩遮尼揵子晨朝灑掃敷座供辦淨水遣使詣佛白言時到爾時世尊與諸大衆著衣持鉢往薩遮尼揵子所大衆前坐薩遮尼揵子自手奉施清淨飲食充足大衆食已洗鉢竟薩遮尼揵子知佛食竟洗鉢已取一卑床於佛前坐爾時世尊為薩遮尼揵子説隨喜偈言於諸大會中奉火為其最闈陀經典中婆毗諦為最人中王為最諸河海為最諸星月為最諸明日為最十方天人中等正覺為最爾時世尊為薩遮尼揵子種種説法示教照喜已還歸本處時諸比丘於彼道中衆共論議五百離車各為薩遮尼揵子供辦飲食彼諸離車於何得福薩遮尼揵子於何得福爾時諸比丘還自住處舉衣鉢洗足已至世尊所頭面禮足退坐一面白佛言世尊我等向於路中自共論議五百離車為薩遮尼揵子供辦飲食供養世尊諸大衆彼諸離車於何得福薩遮尼揵子於何得福佛告諸比丘彼諸離車供辦飲食為薩遮尼揵子於薩遮尼揵子所因緣得福薩遮尼揵子得福佛功德彼諸離車得施有貪恚癡因緣果報薩遮尼揵子得施無貪恚癡因緣果報波多羅十問差摩焰仙尼阿䨲羅長者西毛端薩遮外愚相復次諸外道輩略有五種愚夫之相由彼相故墮愚夫數謂諸外道性聰慧者猶尚不免懷聰慧慢況非聰慧是名第一愚夫之相又諸外道多為貪求利養恭敬自讚毀他是名第二愚夫之相又諸外道若諸聖者為説正法正教正誡即便違逆呵罵毀呰是名第三愚夫之相又諸外道喜自陳説似正法論或開示他是名第四愚夫之相又諸外道雖為如來如來弟子之所降伏亦知如來所説法律是真善説知自法律是妄惡説然由我慢增上力故都不信受乃至不集觀察因緣是名第五愚夫之相成就六分復次如來成就六分得名無間論師子王何等為六所謂最初往詣外道敵論者所乃至恣其問一切義凡所興論非為諍論唯除哀愍諸有情故其未信者令彼生信若已信者令倍增長又興論時諸根寂靜形色無變亦無怖畏習氣隨逐又終不為諸天世間之所勝伏一切世間無敵論者能越一翻唯説一翻皆能摧伏又諸世間極聰慧者極無畏者若與如來共興論時所有辨才皆悉謇訥增上怖畏逼切身心一切矯術虛詐言論皆不能設又復一切同一會坐處中大衆皆於佛所起勝他心於彼外道敵論者所起他勝心又佛世尊言辭威肅其敵論者所出言詞無有威肅二種論復次有二種論何等為二一有我論二無我論無我論有力有我論無力有我論者常為無我論者所伏唯除論者其力羸劣云何名為有我論者謂如有一起如是見立如是論於色等行建立為我謂我有行行是我所我在行中不流不散遍隨支節無所不至是故色等諸行性我依諸行田生福非福因茲領受愛不愛果譬如農夫依止良田營事農業及與種植藥草叢林是名我論云何名為無我論者謂有二種一破我論二立無我破我論者若計實我能有作用於愛非愛諸果業中得自在者此我恆時欣樂厭苦是故此我唯應生福不生非福又我作用常現在前內外諸行若變異時不應發生愁憂悲歎又我是常以覺為先凡所生起常應隨轉無有變易然不可得如是名為破有我論立無我者以一切行從衆緣生若隨福緣福便生起與此相違生起非福由此為緣能招一切愛非愛果依衆緣故皆是無常唯於如是因果所攝諸行流轉假立我等若依勝義一切諸法皆無我等如是名為立無我論學無學差別復次由五種相有學無學二種差別謂諸無學所成就智説名無上一切有學所成就智説名有上如智無上當知正行及與解脫無上亦爾又諸無學以善清淨諸聖慧眼觀佛法身有學不爾又諸無學以善圓滿無顛倒行奉事如來有學不爾是名五相六入處誦第二處擇攝第二二入處相應如是已説行擇攝處擇攝我今當説總嗢拖南曰初安立等智同等最後當知離欲等別嗢拖南曰安立與差別愚不愚教授解脫煩惱業皆廣説應知安立由五種相當知安立諸受差別一自性故二所依故三所緣故四助伴故五隨轉故自性故者謂有三受一苦二樂三不苦不樂所依故者謂有六種即眼耳鼻舌身與意所緣故者謂色等六所緣境界助伴故者謂想思或餘善不善無記心法與此相應隨轉故者謂此相應心由依彼故三受隨轉彼為諸受同生同滅所依止處差別復次如是五相安立諸受當知復有八種差別一內處差別二外處差別三六識身差別四六觸身差別五六受身差別六六想身差別七六思身差別八六愛身差別當知此中由三和合義立前三差別由受因緣義立第四差別由三和合觸果義立第五差別由分別受隨言説義立第六差別所以者何受諸受時作如是想我今領受此苦此樂此非苦樂亦復為他隨起言説由業煩惱二雜染義當知建立第七第八兩種差別所以者何由於彼受若合若離起思造作如如發起思所造作如是如是生愛求願一一七九一八八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當正觀察眼無常如是觀者是名正見正觀故生厭生厭故離喜離貪離喜貪故我説心正解脫如是耳鼻舌身意離喜離貪離喜貪故比丘我説心正解脫心正解脫者能自記説我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行二四一八一八二如無常如是苦空非我亦如是説五一八三一八九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於眼當正思惟觀察無常所以者何於眼正思惟觀察無常故於眼欲貪斷欲貪斷故我説心正解脫耳鼻舌身意正思惟觀察故欲貪斷欲貪斷者我説心正解脫如是比丘心正解脫者能自記説我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行六一八四一九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若於眼不識不知不斷不離欲者不堪任正盡苦耳鼻舌身意亦復如是諸比丘於眼若識若知若斷若離欲者堪任正盡苦於耳鼻舌身意若識若知若斷若離欲者堪任正盡苦佛説此經已諸比丘聞佛所説歡喜奉行七一八五一九一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於眼若不識不知不斷不離欲者不堪任越生老病死苦耳鼻舌身意不識不知不斷不離欲者不堪任越生老病死苦諸比丘於眼若識若知若斷若離欲者堪任越生老病死苦於耳鼻舌身意若識若知若斷若離欲堪任越生老病死苦佛説此經已諸比丘聞佛所説歡喜奉行八一八六一九二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若於眼不離欲心不解脫者不堪任正盡苦於耳鼻舌身意不離欲心不解脫者不堪任正盡苦諸比丘若於眼離欲心解脫者彼堪任正盡苦於耳鼻舌身意離欲心解脫者堪任正盡苦佛説此經已諸比丘聞佛所説歡喜奉行九一八七一九三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若於眼色不離欲心不解脫者不堪任越生老病死苦於耳鼻舌身意不離欲心不解脫者不堪任越生老病死苦諸比丘若於眼色離欲心解脫者堪任越生老病死苦於耳鼻舌身意離欲心解脫者堪任越生老病死苦佛説此經已諸比丘聞佛所説歡喜奉行一一八八一九四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若於眼生喜者則於苦生喜若於苦生喜者我説彼不解脫於苦於耳鼻舌身意生喜者則於苦生喜於苦生喜者我説彼不解脫於苦諸比丘若於眼不生喜者則於苦不生喜於苦不生喜者我説彼解脫於苦於耳鼻舌身意不生喜者則於苦不生喜於苦不生喜者我説彼解脫於苦佛説此經已諸比丘聞佛所説歡喜奉行一一一八九一九五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘一切無常云何一切無常謂眼無常若色眼識眼觸若眼觸因緣生受苦覺樂覺不苦不樂覺彼亦無常耳鼻舌身意亦復如是多聞聖弟子如是觀者於眼生厭若色眼識眼觸眼觸因緣生受苦覺樂覺不苦不樂覺於彼生厭耳鼻舌身意聲香味觸法耳識鼻識舌識身識意識意觸意觸因緣生受苦覺樂覺不苦不樂覺彼亦生厭厭故不樂不樂故解脫解脫知見我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行一二一四一九一九二如無常經如是苦空無我亦如是説一五一九三一九六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘一切無常云何一切無常謂眼無常若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦無常如是耳鼻舌身意若法意識意觸意觸因緣生受若苦若樂不苦不樂彼亦無常多聞聖弟子如是觀者於眼解脫若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦解脫如是耳鼻舌身意法意識意觸意觸因緣生受若苦若樂不苦不樂彼亦解脫我説彼解脫生老病死憂悲惱苦佛説此經已諸比丘聞佛所説歡喜奉行一六三九一九四二一七如説一切無常如是一切苦一切空一切非我一切虛業法一切破壞法一切生法一切老法一切病法一切死法一切愁憂法一切煩惱法一切集法一切滅法一切知法一切識法一切斷法一切覺法一切作證一切魔一切魔勢一切魔器一切然一切熾然一切燒皆如上一一經廣説愚復次當知略有二種一切一少分一切二一切一切如説一切皆無常者當知此依少分一切唯一切行非無為故言一切法皆無我者當知此依一切一切又由三相應知是愚一由自性故二由因緣故三由果故愚自性故者謂由纏故即是忘失於現在世由隨眠故即是當來忘失之法愚因緣故者謂於五相受安立中不能覺了是無常等及遍自體初中後位所有惱亂皆不了故當知即是於生老病及死法性不能覺了初惱亂者謂由生故中惱亂者謂由病故後惱亂者謂由老死二種法故愚果故者謂愁等苦愛等雜染不愚復次由三種相當知不愚一自性故二由礙故三由障故不愚自性者謂於五相受安立中善能覺了自相共相由此能斷一切煩惱能覺聖諦能證涅槃不愚礙者由四種魔謂由蘊魔遍一切處隨逐義故由彼天魔於時時間能數任持障礙義故死煩惱魔能與死生所生衆苦作器義故不愚障者謂緣不現見境煩惱及緣非不現見境纏或彼隨眠四二一八一九七如是我聞一時佛住迦闍尸利沙支提與千比丘俱皆是舊縈髮婆羅門爾時世尊為千比丘作三種示現教化云何為三神足變化示現他心示現教誡示現神足示現者世尊隨其所應而示現入禪定正受陵虛至東方作四威儀行住坐臥入火三昧出種種火光青黃赤白紅頗梨色水火俱現或身下出火身上出水身上出火身下出水周圓四方亦復如是爾時世尊作種種神變已於衆中坐是名神足示現他心示現者如彼心如彼意如彼識彼應作如是念不應作如是念彼應作如是捨彼應作如是身證住是名他心示現教誡示現者如世尊説諸比丘一切燒然云何一切燒然謂眼燒然若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦燒然如是耳鼻舌身意燒然若法意識意觸意觸因緣生受若苦若樂不苦不樂彼亦燒然以何燒然貪火燒然恚火燒然癡火燒然生老病死憂悲惱苦火燒然爾時千比丘聞佛所説不起諸漏心得解脫佛説此經已諸比丘聞佛所説歡喜奉行教授復次諸佛世尊佛聖弟子由三種相能正教授諸弟子衆何等為三一引導教授二隨其所應於所緣境安處教授三令所化得自義教授如是教授如其次第當知即是三種神變四一二一九一九八如是我聞一時佛住王舍城耆闍崛山爾時尊者羅睺羅往詣佛所稽首佛足退住一面白佛言世尊云何知云何見我內識身及外一切相令我我所我慢使繫著不生爾時世尊告羅睺羅善哉羅睺羅能問如來甚深之義佛告羅睺羅眼若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我非異我不相在如實知耳鼻舌身意亦復如是羅睺羅作如是知如是見我此識身及外一切相令我我所我慢使繫著不生羅睺羅如是我我所我慢使繫著不生者是名斷愛轉結正無間等究竟苦邊佛説此經已尊者羅睺羅聞佛所説歡喜奉行四二四八二二二二六如內入處如是外入處色聲香味觸法眼識耳鼻舌身意識眼觸耳鼻舌身意觸眼觸生受耳鼻舌身意觸生受眼觸生想耳鼻舌身意觸生想眼觸生思耳鼻舌身意觸生思眼觸生愛耳鼻舌身意觸生愛亦如上説四九二二七一九九如是我聞一時佛住王舍城迦蘭陀竹園爾時世尊告羅睺羅云何知云何見於此識身及外一切相無有我我所我慢使繫著羅睺羅白佛言世尊是法根法眼法依善哉世尊當為諸比丘廣説此義諸比丘聞已當受奉行佛告羅睺羅善哉諦聽當為汝説諸所有眼若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我非異我不相在如實正觀羅睺羅耳鼻舌身意亦復如是羅睺羅如是知如是見我此識身及外一切相我我所我慢使繫著不生羅睺羅如是比丘越於二離諸相寂滅解脫羅睺羅如是比丘斷諸愛欲轉去諸結正無間等究竟苦邊佛説此經已羅睺羅聞佛所説歡喜奉行五五六二二八二三四如內入如是外入乃至意觸因緣生受亦如是廣説五七二三五二如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者羅睺羅往詣佛所稽首佛足退坐一面白佛言善哉世尊為我説法我聞法已獨一靜處專精思惟不放逸住獨一靜處專精思惟不放逸住已如是思惟所以族姓子剃除鬚髮正信非家出家學道修持梵行見法自知作證我生已盡梵行已立所作已作自知不受後有爾時世尊觀察羅睺羅心解脫慧未熟未堪任受增上法問羅睺羅言汝以授人五受陰未羅睺羅白佛未也世尊佛告羅睺羅汝當為人演説五受陰爾時羅睺羅受佛教已於異時為人演説五受陰説已還詣佛所稽首佛足退住一面白佛言世尊我已為人説五受陰唯願世尊為我説法我聞法已獨一靜處專精思惟不放逸住乃至自知不受後有爾時世尊復觀察羅睺羅心解脫智未熟不堪任受增上法問羅睺羅言汝為人説六入處未羅睺羅白佛未也世尊佛告羅睺羅汝當為人演説六入處爾時羅睺羅於異時為人演説六入處説六入處已來詣佛所稽首禮足退住一面白佛言世尊我已為人演説六入處唯願世尊為我説法我聞法已當獨一靜處專精思惟不放逸住乃至自知不受後有爾時世尊觀察羅睺羅心解脫智未熟不堪任受增上法問羅睺羅言汝已為人説尼陀那法未羅睺羅白佛言未也世尊佛告羅睺羅汝當為人演説尼陀那法爾時羅睺羅於異時為人廣説尼陀那法已來詣佛所稽首禮足退住一面白佛言世尊為我説法我聞法已獨一靜處專精思惟不放逸住乃至自知不受後有爾時世尊復觀察羅睺羅心解脫智未熟廣説乃至告羅睺羅言汝當於上所説諸法獨於一靜處專精思惟觀察其義爾時羅睺羅受佛教敕如上所聞法所説法思惟稱量觀察其義作是念此諸法一切皆順趣涅槃流注涅槃浚輸涅槃爾時羅睺羅往詣佛所稽首禮足退住一面白佛言世尊我已於如上所聞法所説法獨一靜處思惟稱量觀察其義知此諸法皆順趣涅槃流注涅槃浚輸涅槃爾時世尊觀察羅睺羅心解脫智熟堪任受增上法告羅睺羅言羅睺羅一切無常何等法無常謂眼無常若色眼識眼觸如上無常廣説爾時羅睺羅聞佛所説歡喜隨喜禮佛而退爾時羅睺羅受佛教已獨一靜處專精思惟不放逸住所以族姓子剃除鬚髮著袈裟衣正信非家出家學道純修梵行乃至見法自知作證我生已盡梵行已立所作已作自知不受後有成阿羅漢心善解脫佛説此經已羅睺羅聞佛所説歡喜奉行解脫復次由二種相應求能成就解脫妙慧一者如理聞思久遠相續慧能成就有學解脫二者有學久遠相續慧能成就無學解脫復次略有二種解脫成就一者有學二者無學有學者謂金剛喻三摩地俱無學者謂彼已上復次心清淨行苾芻有五種法多有所作何等為五一正教授二奢摩他支三毗鉢舍那支四無間殷重加行五出世間慧正教授者謂有三種正友所顯一者大師二者軌範尊重三者同梵行者及住內法在家英睿如是名為三種正友諸有智者從彼應求積集善門真正教授奢摩他支者謂如有一具尸羅住廣説應知如聲聞地如是尸羅具足住已便無有悔無悔故歡廣説乃至樂故心定毗鉢舍那支者謂得三種隨欲言教一聖正言教二厭離言教三令心離蓋趣愛言教云何聖正言教謂依衆聖五無學蘊所有言教即是宣説諸聖成就如是戒如是定如是慧如是解脫如是解脫智見云何厭離言教謂依三種令增少欲喜足言教及依樂斷樂修令離憒鬧言教云何令心離蓋趣愛言教當知此教復有三門一者一切煩惱蓋離蓋趣愛言教二者五蓋離蓋趣愛言教三者無明蓋離蓋趣愛言教當知此中依為證得斷離滅界所有言説是初言教依即於彼見勝功德及於所治蓋處諸行深見過患所有言説當知是名第二言教隨順如是緣性緣起所有言説當知是名第三言教如是三種言教總名毗鉢舍那支又此言教以略言之復有三種一能生樂欲言教二能正安處資糧言教三能正安處作意言教謂聖正言教名能生樂欲言教厭離言教名正安處資糧言教令心離蓋趣愛言教名正安處作意言教依此言教勝奢摩他所攝受慧名毗鉢舍那是故説此言教名毗鉢舍那支云何無間殷重加行謂常所作委悉所作勤精進住當知即依止觀加行又勤精進應知五種一被甲精進二加行精進三不下精進四無動精進五無喜足精進此中最初當知發起猛利樂欲次隨所欲發起堅固勇悍方便次為證得所受諸法不自輕蔑亦無怯懼次能堪忍寒熱等苦後於下劣不生喜足欣求後後轉勝轉妙諸功德住彼由如是勤精進住入諦現觀證得諸聖出世間慧於修道中依止此慧若行若住能正除遣所依身中諸隨煩惱令心清淨謂住聚落或聚落邊若見少壯端嚴美妙形色母邑即便作意思惟不淨為欲損害緣彼貪故若遇他人迫逼惱亂即便作意思惟慈相為欲損害緣彼瞋故如是行時能正除遣諸隨煩惱令心清淨若遠離處修習入出二種息念除遣欲等諸惡尋思如是住時能正除遣諸隨煩惱令心清淨彼依如是已所證得出世間慧於一切行修無常想能正蠲除所餘我慢如是善士為所依止復得無倒教授前行由此漸次能證有學圓滿解脫得金剛喻三摩地故亦證無學圓滿解脫一切煩惱皆離繫故云何解脫謂起畢竟斷對治故一切煩惱品類麁重永息滅故證得轉依令諸煩惱決定究竟成不生法是名解脫若聖弟子無所有處已得離欲唯餘非想非非想處所有諸行復能安住勝有頂定爾時無間能隨證得諸漏永盡若所餘位雖能漸斷彼彼諸漏然非無間能隨證得諸漏永盡如是乃至無所有處未得離欲五八二三六二一如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘來詣佛所稽首佛足退住一面白佛言世尊云何知云何見次第疾得漏盡爾時世尊告彼比丘當正觀無常何等法無常謂眼無常若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂當觀無常耳鼻舌身意當觀無常若法意識意觸意觸因緣生受若苦若樂不苦不樂彼亦無常比丘如是知如是見次第盡有漏時彼比丘聞佛所説歡喜作禮而去五九七四二三七二五二如是比丘所説經若差別者云何知云何見次第盡一切結斷一切縛斷一切使斷一切上煩惱斷一切結斷諸流斷諸軛斷諸取斷諸觸斷諸蓋斷諸纏斷諸垢斷諸愛斷諸意斷邪見生正見斷無明生明比丘如是觀眼無常乃至如是知如是見次第無明斷明生時彼比丘聞佛所説歡喜歡喜已作禮而去煩惱復次諸欲界繫一切煩惱唯除無明説名欲漏諸色無色二界所繫一切煩惱唯除無明説名有漏若諸有情或未離欲或已離欲除諸外道所有邪僻分別愚癡所生惡見蔽覆其心依此惡見於彼諸欲一分尋求一分離欲乃至非想非非想處於彼三界所有無智總攝為一立無明漏復次有九種事能和合故當知建立九結差別云何九事一依在家品可愛有情非有情數一切境界貪愛纏事二即依此品可惡有情非有情數一切境界瞋恚纏事三依有情數憍慢纏事若四五六依惡説法諸出家品三種邪僻勝解纏事謂依聽聞不正法故依不如理邪思惟故依非方便所攝修故如是差別即為三種七於善説法律無勝解纏事八依出家品智貧窮事九依在家品財貧窮事由此九事如其所應當知配屬愛等九結此中由嫉變壞心故於正法內發起法慳由此當來智慧貧乏餘隨所應配屬應知復次由為貪縛所纏縛故於能隨順樂受境界心不能捨如是瞋縛所纏縛故於能隨順苦受境界心不能捨由愚癡縛所纏縛故於能隨順非苦樂受中庸境界心不能捨由此因緣故立三縛復次煩惱品所有麁重隨附依身説名隨眠能為種子生起一切煩惱纏故當知此復建立七種由未離欲品差別故由已離欲品差別故由二俱品差別故由未離欲品差別故建立欲貪瞋恚隨眠由已離欲品差別故建立有貪隨眠由二俱品差別故建立慢無明見疑隨眠如是總攝一切煩惱復次隨煩惱者謂貪不善根瞋不善根癡不善根若忿若恨如是廣説諸雜穢事當知此中能起一切不善法貪名貪不善根瞋癡亦爾若瞋恚纏能令面貌慘裂奮發説名為忿內懷怨結故名為恨隱藏衆惡故名為覆染污驚惶故名熱惱心懷染污不喜他榮故名為嫉於資生具深懷鄙吝故名為慳為欺誷彼內懷異謀外現別相故名為誑心不正直不明不顯解行邪曲故名為諂於所作罪望己不羞故名無慚於所作罪望他不恥故名無愧於他下劣謂己為勝或復於等謂己為等令心高舉故名為慢於等謂勝於勝謂等令心高舉故名過慢於勝謂勝令心高舉名慢過慢妄觀諸行為我我所令心高舉故名我慢於其殊勝所證法中未得謂得令心高舉名增上慢於多勝中謂己少劣令心高舉名下劣慢實無其德謂己有德令心高舉故名邪慢心懷染污隨恃榮譽形相疏誕故名為憍於諸善品不樂勤修於諸惡法心無防護故名放逸於諸尊重及以福田心不謙敬説名為傲若煩惱纏能令發起執持刀杖鬪訟違諍故名憤發心懷染污為顯己德假現威儀故名為矯心懷染污為顯己德或現親事或行軟語故名為詐心懷染污欲有所求矯示形儀故名現相現行遮逼有所乞丐故名研求於所得利不生喜足説獲他利更求勝利是故説名以利求利自現己德遠離謙恭於可尊重而不尊重故名不敬於不順言性不堪忍故名惡説諸有朋疇引導令作非利益事名為惡友耽著財利顯不實德欲令他知故名惡欲於大人所欲求廣大利養恭敬故名大欲懷染污心顯不實德欲令他知名自希欲於罵反罵名為不忍於瞋反瞋於打反打於弄反弄當知亦爾於自諸欲深生貪愛名為耽嗜於他諸欲深生貪著名遍耽嗜於勝於劣隨其所應當知亦爾於諸境界深起耽著説名為貪於諸惡行深生耽著名非法貪於自父母等諸財寶不正受用名為執著於他委寄所有財物規欲抵拒故名惡貪妄觀諸行為我我所或分別起或是俱生説名為見薩迦耶見為所依止於諸行中發起常見名為有見發起斷見名無有見當知五蓋如前定地已説其相不如所欲非時睡纏之所隨縛故名𧄼瞢非處思慕説名不樂麁重剛強心不調柔舉身舒布故曰頻申於所飲食不善通達若過若滅是故名為食不知量於所應作而便不作非所應作而更反作如所聞思修習法中放逸為先不起功用名不作意於所緣境深生繫縛猶如美睡隱翳其心是故説名不應理轉自輕蔑故名心下劣為性惱他故名抵突性好譏嫌故名諀訿欺誑師長尊重福田及同法者名不純直身語二業皆悉高疏其心剛徑又不清潔名不和軟於諸戒見軌則正命皆不同分名不隨順同分而轉心懷愛染攀緣諸欲起發意言隨順隨轉名欲尋思心懷憎惡於他攀緣不饒益相起發意言隨順隨轉名恚尋思心懷損惱於他攀緣惱亂之相起發意言餘如前説名害尋思心懷染污攀緣親戚起發意言餘如前説是故説名親里尋思心懷染污攀緣國土起發意言餘如前説是故説名國土尋思心懷染污攀緣自義推託遷延後時望得起發意言餘如前説是故説名不死尋思心懷染污攀緣自他若劣若勝起發意言餘如前説是名輕蔑相應尋思心懷染污攀緣施主往還家勢起發意言隨順隨轉是名家勢相應尋思愁歎等事如前應知復次一切煩惱皆有其纏由現行者悉名纏故然有八種諸隨煩惱於四時中數數現行是故唯立八種為纏謂於修學增上戒時無慚無愧數數現行能為障礙若於修學增上心時惛沈睡眠數數現行能為障礙若於修學增上慧時簡擇法故掉舉惡作數數現行能為障礙若同法者展轉受用財及法時嫉妬慳吝數數現行能為障礙復次欲貪瞋等欲界所繫煩惱行者欲界所繫上品煩惱未斷未知名欲暴流有見無明三種暴流如其所應當知亦爾謂於欲界未得離欲除諸外道名欲暴流已得離欲名有暴流若諸外道從多論門當知有餘二種暴流謂諸惡見略攝為一名見暴流惡見因緣略攝為一説名第四無明暴流復次若諸煩惱等分行者非增非減即上所説一切煩惱説名為軛復次當知依於二品建立四取一在家品二外道法中諸出家品當知此中若所取若能取若所為取如是一切總説為取問何所取答欲見戒禁我語是所取問何能取答四種欲貪是能取問何所為取答為得諸欲及為受用故起初取由貪利養及以恭敬增上力故或為詰責他所立論或為免脫他所徵難起第二取奢摩他支為所依止為所建立為欲往趣世間離欲乃至非想非非想處三摩鉢底起第三取為欲隨説分別所計作業受果所有士夫及為隨説流轉還滅士夫之相起我語取如是四取依於二品謂受用欲諸在家品及惡説法毗奈耶中諸出家品由佛世尊每自稱言我為諸取遍知永斷正論大師故於此法誓修行者雖帶煩惱身壞命終而不於彼建立諸取所以者何彼於諸欲無所顧戀而出家故於見戒禁及以我語無執受故惡説法者有二差別一於見愛展轉發起怨諍論者二能證入世間定者依於見愛展轉發起怨諍論者建立見取依能證入世間定者立戒禁取二品為依執著我語故依俱品立我語取此中見者謂六十二如前應知邪分別見之所受持身護語護説名為戒隨此所受形服飲食威儀行相説名為禁諦故住故論説有我名為我語執有實物説名諦故執可安立説名住故又於此中欲愛為緣建立欲取依止智論利養恭敬等愛為緣建立見取定愛為緣立戒禁取有無有愛為緣立我語取復次當知四繫唯依外道差別建立如前應知復次違背五處當知建立五蓋差別一為在家諸欲境界所漂淪故違背聖教立貪欲蓋二不堪忍諸同法者呵諫驅擯教誡等故違背所有可愛樂法立瞋恚蓋三由違背奢摩他故立惛沈睡眠蓋四由違背毗鉢舍那故立掉舉惡作蓋五由違背於法論議無倒決擇審察諸法大師聖教涅槃勝解故建立疑蓋復次若貪瞋癡纏所纏故或彼隨眠所隨眠故心不調柔心極愚昧於得自義能作衰損故名株杌復次於弊下境所起貪欲名為貪垢於不應瞋所緣境事所起瞋恚名為瞋垢於極顯現愚癡衆生尚能了事所起愚癡名為癡垢復次若貪瞋癡數數現行恆常流溢燒惱身心極為衰損説名燒害復次若貪瞋癡遠離慚愧無慚愧故一向無間不可制伏定為傷損説名為箭復次若貪瞋癡慚愧間雜由相續故非剎那故有可制伏説名所有是繫所攝極下穢義業復次一切不善身業名為惡行如説身業語業意業當知亦爾由此惡業數現行故於諸惡趣或已隨得或當隨得或現隨得是故説彼名為惡行由此示現業雜染義煩惱雜染前已顯了復次有二安立業雜染論一者邪論二者正論言邪論者謂如是説若有故思凡所造作諸不善業一切決定當受惡趣此論便謗修行梵行能證涅槃何以故諸有情類不易可得於現法中無有故思造不善業況在餘生若彼決定感惡趣者便應無有解脫可得是故當知此為邪論若如是説諸有故思造不善業此業亦作亦增長者定於當來受不可愛惡趣異熟若有雖作不增長者彼彼法受為依止故諸所造作或樂或苦當於造時於現法中此業決定或順樂受或順苦受諸有造作如是業已若無追悔不修對治補特伽羅彼於此業若更增長若不增長此業雖定順現法受亦轉令成順惡趣受於現法中能障解脫諸有造作如是業已若生追悔修習對治補特伽羅彼於此業若不增長若更增長此業雖是順惡趣受亦轉令成順現法受不障解脫是故此論不名誹謗修習梵行能證涅槃當知此論是為正論復次若有闕於十種對治為業雜染之所染污若有會遇如是十種便得清淨一者若由如是對治雖有作業而無增長彼望當來成不定受二者若由如是對治雖未永斷而更不受三者若由如是對治永斷離繫四者守護諸根門故善修其身為欲修習增上戒學五者修習增上戒已為欲修習增上心學六者修習增上心已為欲修習增上慧學七者修習增上慧已為斷諸漏八者猛利意樂修習九者長時修習十者無量門對治修習若有不會如是十種業對治者為業雜染之所染污與此相違當知清淨復次於現法中不善防護身語意業而住者彼先造作惡不善業亦令增長於當來世令其雜染若善防護身語意業而住者彼不雜染云何於現法中不善防護身語意業而住云何善防護身語意業而住不善防護身語意業而住者謂如有一於諸不善身語意業纏所發起能誓遠離然於能起不正作意相應無明猶故發起又於諸善身語意業受學隨轉由此因緣於現法中於諸煩惱邪欲尋求所作衆苦無有差別彼唯即於此誓受遠離便生喜足於現法中不起聖道不證涅槃彼雖如是防護而住於現法中暫時不作惡不善業然為煩惱隨眠纏縛既終沒已後有續生隨所受身依先業緣廣起雜染若善防護身語意業而住者有此差別謂此依彼誓受遠離不造新業故業雖熟暫觸異熟尋能變吐彼唯於此誓受遠離不生喜足於現法中能起聖道亦能證得彼果涅槃彼於爾時乃至有識身相續性恆受先業所感諸受於現法中彼有識身乃至壽量未滅盡位常相續住壽量若盡捨有識身於後命根更不成就由是因緣識與一切諸受俱滅後不相續彼如影受與其識樹皆滅盡故遍於一切不可施設彼於爾時由二因緣先所作業於當來世不能為染一由煩惱為其助伴令雜染者無餘斷故二由依此諸行相續成熟雜染無餘滅故彼於爾時諸有情所善友意樂相續轉故名無怨心於彼所緣瞋恚斷故名無恚心於業異熟深見過患增上緣力誓遠離故名無染心已具獲得能對治彼諸聖道故名無顛倒善解脫心彼由如是能具證得六種恆住若有於彼多所住者於現法中雖有種種諸惡不善業緣間雜由此遠離一向成善由是因緣當知此與先防護住有其差別復次當知施設領受業異熟論由五種相成其雜染由五種相成不雜染云何名為由五種相成其雜染謂由施設惡因論故亦由施設無因論故及由施設惡因無因有三過故此中施設惡因論者謂如有一起如是見立如是論若有士夫補特伽羅諸所領受一切皆是宿因所作如是或謂自在變化等因所作施設無因論者謂如有一起如是見立如是論若有士夫補特伽羅諸所領受當知一切無因無緣云何施設惡因無因有三種過謂現法中不善俱行不善諸受宿世業為因亦有過失現法業為因亦有過失若言此受宿世惡業以為因者是則有一依於不善諸樂法受而有其樂不善受生此用宿世諸不善業以為因生不應道理何以故非彼宿世諸不善業於現法中感樂異熟應正道理若言此受用現法中惡業為因是則退失自意所立諸惡因論及無因論謂諸所受皆宿因作乃至廣説是名初過又若説言諸不善法皆用宿世惡業為因是則決定所有善法亦用宿世善法為因如是所有不善對治諸善加行俱生精進皆成無用如是名為第二過失又若現在無有士用是則應無依善不善審正觀察是所應作所不應作又如實智應成無用謂了知已此我應轉此我應成彼非有故此亦非有故如實智理不成就智不成故念不安住念不住故無三摩地無有定故不正尋思令心迷亂心迷亂故便應欣慕愚夫同意所樂諸根由彼獲得愚夫同意所樂法故是則退失并沙門法及沙門論如是名為第三過失若略説此有三種過謂現在世諸不善受因不成過謗精進過謗正智過云何施設領受一切業異熟論由五種相成不雜染謂若能領受者若由此領受若如是領受若領受時如是雜染如是清淨當知此中依五取蘊施設假名補特伽羅為領受者即此假者由六觸處故能領受於母胎中四種差別謂依精血大種所造諸業煩惱之所攝受結生相續有取之識及母腹中所有孔穴由如是故得入母胎次有名色次有六處次觸次受如是次第而有領受又即此受亦用現在觸為其因亦用宿世業等為因彼若聽聞諸不正法非理作意以為因緣便觸無明觸所生受受為緣故復生於愛愛為緣故復生於取乃至當來生老死等衆苦差別如是領受諸無明觸所生受時便有雜染所攝二諦與此相違聽聞正法如理作意為因緣故便能領受明觸所生諸受差別受此受時便有清淨所攝二諦復次當知施設邪業清淨及邪行中有二過患何等為二一內證稽留過患二他所譏毀過患云何施設邪業清淨謂如有一實非大師妄分別己自稱大師宣説如是邪施設論謂現法中諸所受苦一切皆是宿因所作彼見宿世諸不善業為二種因謂現法中諸不善業皆是宿業串習所引諸所受苦亦是彼業之所造作由是因緣修自苦行令故惡業所招苦果皆悉變吐更不造作當不善業於現法中又能防護身語意住後當勤修一向善業令不善法轉成非漏由此因緣不善業盡由彼盡故衆苦亦盡證苦邊際云何邪行謂如有一不能了知自業雜染不能了知彼業對治又於前後所證差別不如實知彼成如是愚癡法故於其師所得無根信於非信處妄生真實聖教勝解彼由墜墮非實非理邪論朋黨他回動時於可疑處而不生疑不尋求師躬往請問為能正記為不能記為能淨疑為不能淨為一切智非一切智大師去世於所疑處畢竟隨轉何以故大師住世能為決了此一切智非一切智大師滅後何所請問云何決了是名邪行何緣應知如是施設令業清淨不應道理由二緣故謂彼苦行宿因所作不應理故由此能盡宿不善業不應理故所以者何軟中上品自苦行緣所逼切時軟中上品苦受生故即此三品逼緣遠離由所逼切三品苦受不得生故宿因所作不應道理又此苦行無有功能令宿所作能感苦受諸不善業成順樂受是故彼起如是定見由自苦行令宿所作惡業變吐若有是事彼宿所作能順苦受諸不善業為能感得於現法中自苦逼切苦受果不若言感得此苦受果修自苦行即為唐捐受彼果已自然變吐若如是者宿世所作諸不善業非自苦行所能變吐又即此業一分可吐謂現法中受彼果者若餘能順後所受業彼於後世當受其果非自苦行可令其果悉皆變吐若言現在逼切苦受非宿因作如是所説諸所領受一切皆是宿因所作不應道理如能隨順苦受惡業不可令其成順樂受如是宿世所作能順樂受善業不可令其成順不苦不樂受業或彼二種順現法受不可令其成順後受若順後受不可令其成無所受若未成熟不可令熟若已成熟不可彼彼方便令轉此中所説要略義者所謂一切善不善業自性決定時分決定品類決定若如是者隨業決定必能攝受如是類果於中更自受逼切苦復何所用又若此受宿業因感彼自所許令業一分減盡可得少分勝利由是因緣如此所計少分勝利亦無所有如是則為極自稽留業所縛故終無解脫由此道理是名於此邪論邪行第一過患謂於內證自義稽留云何他所譏毀過患謂彼依止二種邪論發起三種自苦惱行若作是説所有士夫補特伽羅諸所領受一切皆是宿因所作是名第一邪論謂惡因論復有説言如彼最初自在變化從是已後諸所領受一切皆是宿業所作是名第二邪論謂惡因論三種自苦行者謂身語意護身護者謂不以身與餘有情共相雜住唯往山林阿練若處獨居間靜都無所見而修苦行語護者謂彼受持默無言禁意護者謂心忍受自逼切苦彼起如是欲樂言説為他顯示由此二種所見圓滿及由三種苦行圓滿能越衆苦然其自苦不能越度是故為他之所譏毀若諸所受一切皆是宿因所作亦是自在變化因作亦是三種苦行能越因之所作是則三種修苦行俱所受衆苦定是宿世黑業所感亦是暴惡自在所化三種苦行皆不能越是故於今受斯苦受若彼雖復內證稽留而有為他所稱讚者猶尚不可況此為他稱讚勝利亦無所有是故名為第二過患由此分故唯可譏毀復次與上相違當知施設正業染淨及正行中有二勝利一者內證無滯勝利二者他所稱讚勝利云何施設業雜染論謂有二業一者善業二者不善業於過去世已曾造作善不善業今現法中受愛非愛異熟果等受愛非愛果差別時更復造作善不善業由此當來受愛非愛異熟果等如是名為業雜染論云何施設業清淨論謂如有一不造新業故業觸已尋復變吐由對治力永斷無餘故得清淨如是名為令雜染業得清淨論如是施設正業染淨名無上論云何正行謂如有一於正法中成就多聞於業雜染及以清淨正知雜染清淨相已捨不善業修習善業彼於聞思如理作意勤方便已為證修故住空間處淨修治心令離諸蓋及衆苦法為欲斷除貪欲瞋恚掉舉惡作以九種行安住其心令心棄捨止所對治為欲斷除惛沈睡眠及以疑蓋分析六事如理作意修飾其心令心棄捨觀所對治從彼止觀所治出已能正修學消伏衆苦彼既如是淨修其心令離諸蓋衆苦法已復於衣服飲食臥具受用儀則淨修其心若由習近如是衣服乃至臥具不善法增善法退減即便遠離寧可受用麁弊衣等惙爾自存忍受衆苦進修正行又由二緣受用勝妙衣服等因能令生長惡不善法謂諸妄想不正尋思何等二緣一於諸善未能長時串修習故心不調柔二於衣服飲食等事欲貪堅著由是因緣修正行者調柔其心令堪所作於衣服等欲貪堅著及諸無常衆緣生法恆常繫念深見過患爾時雖復受用勝妙衣服等事而於其中無所雜染如是行者亦受安樂亦無有罪由奢摩他毗鉢舍那修習力故淨修其心離諸蓋已由思擇力於衣服等邪受用故雖於爾時暫少成就心一境性欲貪隨眠仍未斷故於當來世復為雜染彼以妙慧通達是已便修加行為畢竟斷受用如法邊際臥具離諸貪著先善修治正定資糧漸次乃至能入清淨第四靜慮以此為依證諦現觀隨得漏盡心善解脫於一切苦得離繫故究竟寂靜所攝受故微妙清淨一切身心無間滿故一切煩惱永離繫故普能領納諸無漏受是名正行如是應知內證無滯及彼相違五種差別他所稱讚彼於爾時從諸蓋纏及一切苦心善解脫於現法中彼諸隨眠無餘永斷前際後際業及異熟所有雜染皆善解脫由於現法獲得聖道及道果故復次略有三種補特伽羅一者未入聖教異生二者已入聖教有學三者已入聖教異生由三種相應知最初補特伽羅第二第三當知亦爾云何三相應知最初補特伽羅謂初有一補特伽羅已得成就世間正見了知有施乃至廣説彼於異時聞不正法為因緣故而便發起非理作意世間正見臨將欲滅雖未一切悉皆已滅而堪能滅又彼所治誹謗邪見臨將欲生雖未已生而堪能生彼於中間聽聞正法為因緣故遂還發生如理作意彼臨欲生誹謗邪見不現行故説名為斷然其正見先成就故不名為生第二有一補特伽羅不成正見及以邪見聽聞正法如理作意為因緣故爾乃發生世間正見彼於邪見不名為斷先不成故第三有一補特伽羅成就邪見聽聞正法如理作意為因緣故斷滅邪見生起正見云何三相應知第二補特伽羅謂於佛等已得證淨彼於佛等先所現起一切無智當於諸諦得現觀時先已斷盡是故於今不名為斷而於佛等證淨俱行明現前故説名為生即以學道斷修所斷餘品無明而於其明不名生起此道與先種類同故彼無學道將現在前修斷無明皆悉滅盡又能生起諸無學明云何三相應知第三補特伽羅謂聞無我相應正法初但由聞發生信解而未悟入彼於無我生信解故能斷我見未悟入故不得名為生無我見如所聞法復能如理正思惟時於無我理能悟入故乃得名為生無我見於彼隨眠而未能斷從此已後由修道力證諦現觀方斷隨眠發生無漏復次嗢拖南曰五二與十三四業為最後五二十三四業有二種業一者重業二者輕業復有二業一者增進業二者不增進業復有二業一者故思所造業二者非故思所造業復有二業一者定所受業二者不定所受業復有二業一者異熟已熟業二者異熟未熟業有三種業謂善業不善業無記業復有三業謂順樂受業順苦受業順不苦不樂受業復有三業謂順現法受業順生受業順後受業復有三業謂學業無學業非學非無學業復有三業謂見所斷業修所斷業無斷業復有三業謂三曲業即身曲等復有三業謂三穢業即身穢等復有三業謂三濁業即身濁等復有三業謂三淨業即身淨等復有三業謂三默然業即身默然等有四種業一黑黑異熟業二白白異熟業三黑白黑白異熟業四不黑不白無異熟業能盡諸業當知此中由三因緣令業成重一由意樂故二由加行故三由田故由意樂者謂由猛利纏等所作於同法者見已歡喜於彼隨法多隨尋思多隨伺察如是名為由意樂故令業成重由加行者謂於彼業無間所作殷重所作長時積集又於其中勸他令作又即於彼稱揚讚歎如是名為由加行故令業成重由田故者謂諸有情於己有恩若住正行及正行果於彼發起善作惡作當知此業説名為重與彼相違説名為輕若業非是明了所作或夢中作或由無覆無記所作或不善作尋復追悔對治攝受又於一切清淨相續所有諸業如是皆名不增進業當知異此名增進業此中故思所造業者謂先思量已隨尋思已隨伺察已而有所作復或錯亂或不錯亂其錯亂者謂於餘處思欲殺害或欲劫盜或欲別離或欲妄語及欺誑等如是思已即以此想別處成辦當知此中由意樂故説名為重不由事故説名為重不錯亂者當知其相與此相違若異此業是即名為非故思造定受業者謂故思所起重業不定受業者謂故思所造輕業異熟已熟業者謂已與果業異熟未熟業者與此相違若欲證得阿羅漢時先所造作決定受業由異熟果現在前故能為障礙不由隨逐身相續故所以者何但由彼業生不平等所依身故能為障礙令不能得阿羅漢果若無生受而有後受於所證得阿羅漢果不能為障然彼非不是定受業何以故由即依彼煩惱助伴及即依彼諸行相續施設此業為定受故復次由二因緣建立善業一取愛果故二於所緣境如實遍知及彼果故由二因緣立不善業一取非愛果故二於所緣境邪執著故於善不善二種行相不可記故立無記業順樂受業者謂初二三靜慮地繫及欲界繫所有善業順苦受業者謂能招感惡趣生業生於餓鬼及傍生中先業為因感得樂受當知此業亦得名為順樂受業順不苦不樂受業者謂第四靜慮及上地等諸所有業唯除那落迦於所餘處當知皆得苦樂雜受即由彼業增上力故令此依身苦樂雜住不相妨礙順現法受業者謂由如是相狀意樂所作諸業若由如是相狀加行謂事加行或身加行或語加行所作諸業若由如是相狀良田所作諸業於現法中異熟成熟如是名為順現法受業若所作業於現法中異熟未熟於次生中當生異熟如是名為順生受業若所作業現法次生異熟未熟從此已後異熟方熟當知是名順後受業有學業者謂聖弟子於時時間依增上戒依增上心依增上慧修學無漏及此後得善有漏業名有學業無學業者謂於一切阿羅漢等身相續中隨應諸業此餘諸業是名非學非無學業若見所斷煩惱相應若此所發思等諸業一切能往諸惡趣業此等皆名見所斷業若修所斷煩惱相應及此所發思等諸業如是皆名修所斷業無斷業者所謂一切有學無學出世間業當知此中由三種相故思所造諸不善業即於現法作增長已還復除斷何等為三一現法斷故二生斷故三後斷故現法斷者謂如有一於現法中故思造業作增長已尋復厭離於其所作受厭離故此是異生未得離欲住此命終而未能令於次生位不造彼業不受異熟亦未能令於其後位無有是事於現法中亦未一向能令不造生斷故者謂復有一受厭離已雖是異生而於欲界已得離欲住此命終彼於現法更不造作尚於次生不受異熟況復生已當有所作然未解脫後位作業及受異熟後斷故者謂復有一雖是有學而於欲界未得離欲受厭離已獲得最初或復第二沙門果證彼作是念凡我所有由多麁重由多熱惱唯應棄捨可厭賤身所作惡業願於現法一切皆受或我所有現法受業若苦若樂皆願與彼俱時而受勿復令我當於生位或於後位受彼異熟如是正心發誓願已為斷彼故復修無量以奢摩他品定所攝正起加行為令能起彼業因緣究竟盡故及為進趣離欲愛故當知此中或瞋意樂或害意樂或嫉妬性或可愛事深生染著由此為因於諸有情發起邪行謂身語意所發惡業種種惡事若有為欲對治如是能起四種惡業因緣修四無量勝三摩地彼乃至於少男少女無處無容暫更發起作惡業思是故彼修如是加行能盡所有惡業因緣當知如是正修加行由二因緣於其所作及所增長一切惡業皆能摧伏謂由修習無量定故所以者何所作惡業但於有量有情境界欲不饒益意樂所起所修無量乃於無量有情境界欲作饒益意樂所起又能發起不善業心下劣界攝是所對治所修無量俱行之心勝妙界攝是能對治又心是勝諸所造業皆屬於心故説世間並是心胤繫屬心故依心轉故如是行者先發正願為所依止後善修習無量心定當於進趣離欲愛時便能獲得住不還果若但於此暫生喜足於現法中不求上進彼現法中尚不造業況於生位或於後位又定不能當受生位後位異熟又正法外墮邪見者行邪道者所有一切善不善業邪見所起邪見增上力所生故皆名曲業猛利貪瞋所起諸業皆名穢業猛利癡者上品鈍根忘失念者極暗鈍者癡所起業皆是濁業一切能往善趣妙行皆名淨業一切能往涅槃妙行名默然業復次能感各別處所那落迦惡業名黑黑異熟業能感各別處所天趣善業名白白異熟業能感餘處所有諸業名黑白黑白異熟業於是處所有二業果現前可得是故總説以為一業若出世間諸無漏業皆名不黑不白無異熟業能盡諸業若已盡業若當盡業二種總名能盡諸業令未生者當不生故令已生者得離繫故由約可愛因果異熟故説不白當知各別處所天趣一向白者謂過他化自在天處有欲界中魔王所都衆魔宮殿及上梵世乃至非想非非想處所有善業總説為一由彼處所眼所見色乃至意所知法一向可愛相續殊勝增上義故意門引發意成義故各別處所那落迦有四一大那落迦二別那落迦三寒那落迦四邊那落迦於此處所各別純受順樂受業諸果異熟各別純受順苦受業諸果異熟是故説名各別處所又於魔宮初二靜慮純受悅樂若於第三靜慮已上純受喜樂言喜樂者令心調柔令心安適與喜相似故名為喜非是喜受與樂相似説名為樂非是樂受六觸處門恆所領受者當知即彼名六觸處及各別處所因果相屬道理義故七五二五三二二如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘往詣佛所稽首佛足白佛言世尊云何知云何見次第我見斷無我見生佛告彼比丘於眼正觀無常若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦正觀無我如是乃至意觸因緣生受若苦若樂不苦不樂彼亦正觀無我比丘如是知如是見次第我見斷無我見生時彼比丘聞佛所説歡喜歡喜已作禮而去七六二五四二三如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘若有比丘能斷一法者則得正智能自記説我生已盡梵行已立所作已作自知不受後有諸比丘白佛言世尊是法根法眼法依唯願演説諸比丘聞已當受奉行佛告諸比丘諦聽善思當為汝説諸比丘云何一法斷故乃至不受後有所謂無明離欲明生得正智能自記説我生已盡梵行已立所作已作自知不受後有時有異比丘從坐起整衣服偏袒右肩為佛作禮右膝著地合掌白佛言世尊云何知云何見無明離欲明生佛告比丘當正觀察眼無常若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦正觀無常耳鼻舌身意亦復如是比丘如是知如是見無明離欲明生佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰無智智與定殊勝障學等著無我聖道二海不同分無智若諸邪見若諸我見若即無明依前所説三有情衆無智為根故得生起若能斷此無義根本一切衆中能起一切雜染一法當知彼能正記所解此中第一所起雜染損減實事第二雜染增益虛事第三雜染於其如實顯了方便能作愚癡於彼二因有愚癡故或起增益或起損減七七二五五二四如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告尊者阿難於眼當如實知如實見若眼色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦如實知如實見耳鼻舌身意亦復如是彼如實知如實見已於眼生厭若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦生厭耳鼻舌身意亦復如是厭已不樂不樂已解脫解脫知見我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行七八二五六二五如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊説一切優陀那偈已告尊者阿難眼無常苦變易異分法若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦無常苦變易異分法耳鼻舌身意亦復如是多聞聖弟子如是觀者於眼得解脫若色眼識眼觸眼觸因緣生受彼亦解脫耳鼻舌身意法意識意觸意觸因緣生受若苦若樂不苦不樂彼亦解脫我説彼解脫生老病死憂悲惱苦佛説此經已尊者阿難聞佛所説歡喜奉行七九二五七二六如是我聞一時佛住毗舍離城耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘當勤方便禪思內寂其心所以者何比丘方便禪思內寂其心如是如實知顯現於何如實知顯現於眼如實知顯現若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦如實知顯現耳鼻舌身意亦復如是此諸法無常有為亦如是如實知顯現佛説此經已諸比丘聞佛所説歡喜奉行八二五八二七如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘當修無量三摩提精勤繫念所以者何修無量三摩提精勤繫念已則如實顯現於何如實顯現於眼如實顯現如是廣説乃至此諸法無常有為此如實顯現佛説此經已諸比丘聞佛所説歡喜奉行智復次有二種如實智一者如理作意所發二者三摩地所發當知此中由正聞思所成作意聽聞正法增上力故於五種受分位轉變所起過患如實了知又即於此分位轉變如理思惟名不定地如實正智此為依止能隨入修云何名為分位轉變所起過患謂苦樂位諸無常性苦分位中有自性苦性樂分位中有變壞法性云何名為分位轉變謂樂分位與苦分位有別異性若苦分位與樂分位有別異性如是當知一切分位展轉別異於此別異如實觀見於此分位住無常想如實觀見別異過患知所有受皆是苦已住於苦想有如是想有如是見能證清淨是故亦得名如實智依定所發如實智者謂即依彼行相轉時輕安所攝清淨無擾寂靜而轉當知此行與前差別又無常性是一切行共相苦性是一切有漏法共相二如實智為依止故當知如實能正顯了彼法二相八一二五九二八如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘過去未來眼無常況現在眼多聞聖弟子如是觀者不顧過去眼不欣未來眼於現在眼厭不樂離欲向滅耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行八二八四二六二六二如無常苦空無我亦如是説八五九二二六三二七如內入處四經如是外入處色聲香味觸法四經內外入處四經亦如是説九三二七一二九如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘有六觸入處云何為六眼觸入處耳鼻舌身意觸入處沙門婆羅門於此六觸入處集滅味患離不如實知當知是沙門婆羅門去我法律遠如虛空與地時有異比丘從座起整衣服為佛作禮合掌白佛言我具足如實知此六觸入處集滅味患離佛告比丘我今問汝汝隨問答我比丘汝見眼觸入處是我異我相在不答言不也世尊佛告比丘善哉善哉於此眼觸入處非我非異我不相在如實知見者不起諸漏心不染著心得解脫是名初觸入處已斷已知斷其根本如截多羅樹頭於未來法永不復起所謂眼識及色汝見耳鼻舌身意觸入處是我異我相在不答言不也世尊佛告比丘善哉善哉於耳鼻舌身意觸入處非我非異我不相在作如是如實知見者不起諸漏心不染著心得解脫是名比丘六觸入處已斷已知斷其根本如截多羅樹頭於未來世永不復生謂耳識聲意識法佛説此經已諸比丘聞佛所説歡喜奉行定復次住內法者未得定心尚與外道定心差別由智勝故何況定心何以故彼諸外道雖得定心乃至極遠證得非想非非想定然猶未能於六觸處以其五轉如實了知心正離欲證得解脫是故彼與此正法律猶如地空相去極遠住內法者雖未得定但由信聞無我勝解便能證得三摩地心於六觸處能斷能知心得離欲及證解脫是故當知於正法律彼有失壞此無失壞唯正勝解相續轉時於六境界依止六根略有五種寂靜妙行謂深於彼見過患故名為善調於不應役諸境界中而不役故名為善覆於所應役諸境界中或於率爾現前境上善住念故名為善守一切煩惱皆能斷故名為善護已善修習圓滿道故名為善修九四二七二二一如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘莫樂莫苦所以者何有六觸入處地獄衆生生彼地獄中者眼所見不可愛色不見可愛色見不可念色不見可念色見不善色不見善色以是因緣故一向受憂苦耳聲鼻香舌味身觸意所識法見不可愛不見可愛見不可念不見可念見不善法不見善法以是因緣故長受憂苦諸比丘有六觸入處其有衆生生彼處者眼見可愛不見不可愛見可念色非不可念色見善色非不善色以是因緣故一向長受喜樂耳聲鼻香舌味身觸意所識法可愛非不可愛可念非不可念見善非不善佛説此經已諸比丘聞佛所説歡喜奉行殊勝復次於二處所如來證得勝安立智能正顯説超諸苦樂非不證得勝安立智於中若有作如是解此大沙門喬答摩種無知無解於諸世間一向安樂為令弟子謂此安樂間雜衆苦深怖畏故為超苦樂間雜依附諸世間故為欲超過諸苦樂故宣説法要當知此解是為邪想是邪分別是大邪見然其如來善知世間或一向樂或一向苦或雜苦樂然彼一切皆是無常是故為令諸弟子衆超過一切無常世間超過苦樂説正法要由三種相應正了知諸可意事謂未來世諸可愛事名所追求若過去世諸可愛事名所尋思若現在世可愛外境名所受用若現在世可愛內受名所耽著當知此中墮於三世有四行相一於未來一於過去二於現在於此行相能隨悟入是悅意相意所樂相可愛色相平安色相如其所應當知即是可欣可樂可愛可意四種行相九五二七三二一一如是我聞一時佛住毗舍離耆婆拘摩羅藥師菴羅園爾時世尊告諸比丘我昔未成正覺時獨一靜處禪思思惟自心多向何處觀察自心多逐過去五欲功德少逐現在五欲功德逐未來世轉復微少我觀多逐過去五欲心已極生方便精勤自護不復令隨過去五欲功德我以是精勤自護故漸漸近阿耨多羅三藐三菩提汝等諸比丘亦復多逐過去五欲功德現在未來亦復微少汝今亦當以心多逐過去五欲功德故增加自護亦當不久得盡諸漏無漏心解脫慧解脫現法自知作證我生已盡梵行已立所作已作自知不受後有所以者何眼見色因緣生內受若苦若樂不苦不樂耳鼻舌身意法因緣生內受若苦若樂不苦不樂是故比丘於彼入處當覺知若眼滅色想則離耳鼻舌身意滅聲想法想則離佛説當覺六入處言已入室坐禪時有衆多比丘世尊去後作此論議世尊為我等略説法要不廣分別而入室坐禪世尊説言當覺六入處若彼眼滅色想則離耳鼻舌身意滅聲想法想則離我等今日於世尊略説法中猶故不解今此衆中誰有慧力能為我等於世尊略説法中廣為我等演説其義復作是念唯有尊者阿難常侍世尊常為大師之所讚歎聰慧梵行唯有尊者阿難堪能為我等於世尊略説法中演説其義我等今日皆共往詣尊者阿難所問其要義如阿難所説悉當奉持爾時衆多比丘往詣尊者阿難所共相問訊已於一面坐白尊者阿難言尊者當知世尊為我等略説法要如上所説具問阿難當為我等廣説其義尊者阿難語諸比丘諦聽善思於世尊略説法中當為汝等廣説其義世尊略説者即是滅六入處有餘當説故言眼處滅色想則離耳鼻舌身意入處滅聲想法想則離世尊略説此法已入室坐禪我今已為汝等分別説義尊者阿難説此義已諸比丘聞其所説歡喜奉行障復次勤修定者略由二門二時二地所有諸欲於所引發三種等持能為障礙為欲斷除如是障礙正勤修習五種對治當知此中先所受用過去諸欲於遠離處由尋思門令心飄蕩復有現在居家所有利養恭敬俱行諸欲由尋思門令心散亂此中利養恭敬俱行所有諸欲於其行時令心飄蕩先所受用居家諸欲於其住時令心散亂即此諸欲於異生地能為障礙於有學地亦為障礙又於異生所修無量俱行等持能為障礙亦於有學能善通達一切智事廣大等持能為障礙亦於無學極善修習究竟等持能為障礙當知如是諸所生起一切等持皆與喜俱此中第一於諸有情利益安樂意樂門中與喜俱行第二領受有學解脫喜故與喜俱行第三領受無學解脫喜故與喜俱行彼由眼等所識色等所緣別故復有六種又此等持具諸相故名為圓滿又此等持究竟邊際謂能往趣世間離欲或能往趣出世離欲過此更無能趣清淨等持可得是故説此無有缺減若欲速證沙門果者於身命等無所顧戀恆常無間殷重加行熾然精進於諸欲中了知自相堅守正念了知過患無希望等正知現前正念正知為所依故方便勤修四無放逸謂於晝分若行若坐於諸障法淨修其心乃至廣説如是發起勇猛精進於其所證無所怯劣由九種相安住其心一向修習奢摩他定身得輕安無愛味等故無染污不為惛沈及以睡眠二隨煩惱之所擾亂一向念住為所依止精勤修習毗鉢舍那堅守正念遠離掉舉隨煩惱故無有愚癡已入止觀雙運轉道其心正定即此二分一境隨行為斷彼障修習如是五種對治為依止故能於彼障遍知永斷於三等持依六境事所有差別喜俱行定圓滿能引由二因緣諸佛世尊為諸弟子宣説自己能引導法一於黑品所有過失令生解故二於白品所有功德令生解故九六二七四二一二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我不為一切比丘説不放逸行亦非不為一切比丘説不放逸行不向何等像類比丘説不放逸行若比丘得阿羅漢盡諸有漏離諸重擔逮得己利盡諸有結心正解脫如是像類比丘我不為説不放逸行所以者何彼諸比丘已作不放逸故不復堪能作放逸事我今見彼諸尊得不放逸果是故不為彼説不放逸行為何等像類比丘説不放逸行若諸比丘在學地者未得心意增上安隱向涅槃住如是像類比丘我為其説不放逸行所以者何以彼比丘習學諸根心樂隨順資生之具親近善友不久當得盡諸有漏無漏心解脫慧解脫現法自知作證我生已盡梵行已立所作已作自知不受後有所以者何彼眼識所可愛樂染著之色彼比丘見已不喜不讚歎不染不繫著住以不喜不讚歎不染不著住故專精勝進身心止息心安極住不忘常定一心無量法喜但逮得第一三昧正受終不退滅隨於眼色於耳聲鼻香舌味身觸意所識法亦復如是佛説此經已諸比丘聞佛所説歡喜奉行學等復次於此正法毗奈耶中略有二種補特伽羅一已得意二未得意已得意者復有二種一已見諦已得有學心解脫意二阿羅漢已得無學心解脫意未得意者謂於三學創修事業有學異生彼全未得一切二種心解脫意是故希求異生體後有餘依滅及自體後無餘依滅涅槃界時於三學中多修學住若諸無學雖已證得心解脫意而或失念行縱逸時便有退失現法樂住彼雖於此現法樂住或退不退然無堪能退失解脫若有修行不放逸者一切皆為證得解脫然已證得解脫無退修不放逸復何所用若為證得現法樂住勤作功用如造工業非不放逸若諸有學先已證得心解脫意彼亦決定趣三菩提於所修道不由他緣自然能修無放逸行於現法中猶未畢竟息放逸故若有一切未得意者彼應決定修不放逸又由三相辦所應作一由諸根所集成故資糧圓滿二由習近隨順如法諸臥具故心得安住三由依止親近善士聞他法音如理作意衆因緣故乃至獲得二心解脫又即於此應不放逸所作轉時由二種相應知於彼六處寂滅有增上慢無增上慢謂於未滅起邪分別妄執為滅由所緣故及於未得起邪分別妄執為得彼雖如是起邪分別謂滅解脫而未能令身壞已後壽命永盡六處永滅亦不能離諸境界想又彼由於六處寂滅若緣若證邪領受故有如是事此二種相應知説名有增上慢與此相違當知説名無增上慢九七二七五二一三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當為汝等演説二法諦聽善思何等為二眼色為二耳聲鼻香舌味身觸意法為二是名二法若有沙門婆羅門作如是説是非二者沙門瞿曇所説二法此非為二彼自以意説二法者但有言説問已不知增其疑惑以非其境界故所以者何緣眼色眼識生三事和合緣觸觸生受若苦若樂不苦不樂若於此受集受滅受味受患受離不如實知者種貪欲身觸種瞋恚身觸種戒取身觸種我見身觸亦種殖增長諸惡不善法如是純大苦聚皆從集生如是耳鼻舌身意法緣生意識三事和合觸廣説如上復次眼緣色生眼識三事和合觸觸緣受若苦若樂不苦不樂於此諸受集滅味患離如實知如實知已不種貪欲身觸不種瞋恚身觸不種戒取身觸不種我見身觸不種諸惡不善法如是諸惡不善法滅純大苦聚滅耳聲鼻香舌味身觸意法亦復如是佛説此經已諸比丘聞佛所説歡喜奉行著復次住內法者於二種著應當了知二種過患謂諸異生於二緣識及能依受不能了知無我性故未離欲者於利養恭敬增上業緣所起諸受有第一著已離欲者於離諸欲緣所起諸受有第二著此著為因當來生起説名為生又諸外道由取著故生諸繫縛繫縛生故能生一切惡不善法當知是名第一過患又由此著增上力故當於正法毗奈耶沒及當來世生等衆苦差別而生於現法中此增上力為因緣故不般涅槃當知是名第二過患與此相違應知即是白品差別九八二七六二一四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有二因緣生識何等為二謂眼色耳聲鼻香舌味身觸意法如是廣説乃至非其境界故所以者何眼色因緣生眼識彼無常有為心緣生色若眼識無常有為心緣生此三法和合觸觸已受受已思思已想此等諸法無常有為心緣生所謂觸想思耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行無我復次由四因緣於法無我能到究竟謂一切法皆無我者除識自性識諸因緣識諸助伴其餘所有不可得故又識自性是無常故又此因緣是無常故又此助伴是無常故九九二七七二一五如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者富留那比丘往詣佛所稽首佛足退住一面白佛言世尊説現法説滅熾然説不待時説正向説即此見説緣自覺世尊云何為現法乃至緣自覺佛告富留那善哉富留那能作此問富留那諦聽善思當為汝説富留那比丘眼見色已覺知色覺知色貪我此內有眼識色貪我此內有眼識色貪如實知富留那若眼見色已覺知色覺知色貪我此內有眼識色貪如實知者是名現見法云何滅熾然云何不待時云何正向云何即此見云何緣自覺富留那比丘眼見色已覺知色不起色貪覺我有內眼識色貪不起色貪覺如實知若富留那比丘眼見色已覺知色不起色貪覺如實知色不起色貪覺如實知是名滅熾然不待時正向即此見緣自覺耳鼻舌身意亦復如是佛説此經已富留那比丘聞佛所説歡喜奉行聖道復次由八聖支道法故及此果故顯發正法及毗奈耶由五種相當知八聖支道法最勝無罪謂於現法煩惱有無善分別故名為現見能令煩惱得離繫故名無熾然若行若住若坐若臥一切時中皆可修習易修習故名為應時導涅槃故名為引導不共一切諸外道故名唯此見遠離信他欣樂行相周遍尋思隨聞所起見審察忍唯自證故名內所證此道果法亦有五相當知已如攝異門分分別其相一二七八二一六如是我聞一時佛在舍衛國祇樹給孤獨園爾時世尊告諸比丘言大海者愚夫所説非聖所説此大小水耳云何聖所説海謂眼識色已愛念染著貪樂身口意業是名為海一切世間阿修羅衆乃至天人悉於其中貪樂沉沒如狗肚藏如亂草蘊此世他世絞結纏鎖亦復如是耳識聲鼻識香舌識味身識觸此世他世絞結纏鎖亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一一二二七九二八如身口意業如是貪恚癡老病死亦如是説一三一五二八一二八三如五根三經六根三經亦如是説一六二八四二一七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘所謂海者世間愚夫所説非聖所説海大小水耳眼是人大海彼色為濤波若能堪忍色濤波者得度眼大海竟於濤波洄澓諸水惡蟲羅剎女鬼耳鼻舌身意是人大海聲香味觸法為濤波若堪忍彼聲香味觸法濤波得度於耳鼻舌身意海竟於濤波洄澓惡蟲羅剎女鬼爾時世尊以偈頌曰大海巨濤波惡蟲羅剎怖難度而能度集離永無餘能斷一切苦不復受餘有永之般涅槃不復還放逸佛説此經已諸比丘聞佛所説歡喜奉行二海不同分復次海有二種一者水海二生死海由三種相當知水海與生死海而不同分何等為三一者自性不同分故二者淪沒不同分故三者超渡不同分故此中自性不同分者謂水大海用色一分為自性故有邊有量生死大海用一切行為自性故無邊無量此中淪沒不同分者謂若所有淪沒若由此淪沒若如是淪沒皆不同分謂水大海或傍生趣或有人趣於中淪沒生死大海諸天世間亦常淪沒又水大海唯由身故於中淪沒不由語故不由意故不由貪故不由瞋故不由癡故不由生等衆苦法故於中淪沒此中宣説諸業煩惱彼果三分如其次第應知彼相生死大海亦由身故乃至亦由生等苦故於中淪沒諸出家者由妄尋思由妄觀察由自所起諸邪分別發起種種不正尋思令心擾亂於生死海恆常淪沒又餘外道諸煩惱繫所纏繫故於生死海恆常淪沒諸在家者恆常無間衆苦逼切煩惱燒然而不能厭故名淪沒其餘依止諸業煩惱於諸生處往還無絶故名淪沒其水大海唯墮其中暫時衰損或傍生趣由業煩惱一分勢力而生其中暫時淪沒而非究竟當知是名沒不同分此中超渡不同分者謂水大海未離欲貪諸異生類尚能越渡何況其餘生死大海三分建立未離欲者由五可愛境差別故已離欲者由意所識可愛諸法境差別故諸有學者由內六處有差別故其未離欲諸異生類於五可愛境界大海未能超渡其已離欲諸異生類於內各別六處大海未能超渡由彼於此未超渡故於前二種境界大海亦未超渡其有學者普於六處遍知為苦即於所緣修習正道彼由安住如是住故於未離欲已離欲地二種境界所有心意所緣境相明了現前又由猛利觀察作意於先所見等隨憶念由此因緣於彼速疾以慧通達亦能除遣又彼於其六處大海速能超渡能超渡故於前二種境界大海畢竟超渡及能超渡能發棄捨所學煩惱能發尋思亂心煩惱能發耽著世間利養恭敬煩惱能發一切惡行煩惱一七二八五二一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當為汝等説苦集道迹苦滅道迹諦聽善思當為汝説云何苦集道迹緣眼色生眼識三事和合觸緣觸受緣受愛緣愛取緣取有緣有生緣生老病死憂悲惱苦集如是純大苦聚集耳鼻舌身意亦復如是是名苦集道迹云何苦滅道迹緣眼色生眼識三事和合觸觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老病死憂悲惱苦滅如是純大苦聚滅耳鼻舌身意亦如是説是名苦滅道迹佛説此經已諸比丘聞佛所説歡喜奉行一八二八六二一九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説涅槃道迹云何為涅槃道迹謂觀察眼無常若色眼識眼觸因緣生受內覺若苦若樂不苦不樂彼亦無常耳鼻舌身意亦復如是是名涅槃道迹佛説此經已諸比丘聞佛所説歡喜奉行一九二八七二二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有似趣涅槃道迹云何為似趣涅槃道迹觀察眼非我若色眼識眼觸因緣生受內覺若苦若樂不苦不樂彼亦觀察非我耳鼻舌身意亦復如是是名似趣涅槃道迹佛説此經已諸比丘聞佛所説歡喜奉行嗢拖南曰道師不同分王國二世間有為遮身行堅執三空性道不同分略有二種道不同分一自性不同分二行相不同分若趣苦集行若趣苦滅行是名自性不同分當知初一能趣雜染第二能趣清淨是名此中不同分義即此趣滅行或有有為共相行轉或有有為無為共相行轉是名行相不同分當知此中若諸有為共相行相彼望道果名不同分若有為無為共相行相彼望道果亦名同分何以故道果涅槃常無我故一一二八八二二一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有趣一切取道迹云何為趣一切取道迹緣眼色生眼識三事和合觸觸緣受受緣愛愛緣取取所取故耳鼻舌身意亦復如是取所取故是名趣一切取道迹云何斷一切取道迹緣眼色生眼識三事和合觸觸滅則受滅受滅則愛滅愛滅則取滅如是知耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一一二八九二二二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當知一切知法一切識法諦聽善思當為汝説云何一切知法一切識法諸比丘眼是知法識法若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼一切是知法識法耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一二二九二二三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我不説一法不知不識而得究竟苦邊云何不説一法不知不識而得究竟苦邊謂不説於眼不知不識而得究竟苦邊若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂亦復不説不知不見而得究竟苦邊耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一三二九一二二四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘一切欲法應當斷云何一切欲法應當斷謂眼是一切欲法應當斷若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼一切欲法應當斷耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一四二九二二二五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我不説一法不知不斷而究竟苦邊云何不説一法不知不斷而究竟苦邊謂不説眼不知不斷而究竟苦邊若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼一切不説不知不斷而究竟苦邊耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一一五二九三二二六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説斷一切計諦聽善思當為汝説云何不計謂不計我見色不計眼我所不計相屬若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼亦不計樂我我所不計樂相屬不計耳鼻舌身意亦復如是如是不計者於諸世間常無所取無所取故無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行一一六二九四如上所説眼等不計一切事不計亦如是一一七二九五二二七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘計者是病計者是癰計者是刺如來以不計住故離病離癰離刺是故比丘欲求不計住離病離癰離刺者彼比丘莫計眼我我所莫計眼相屬莫計色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼亦莫計是我我所相在耳鼻舌身意亦復如是比丘如是不計者則無所取無所取故無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行一一八二九六如眼等所説餘一一事亦如是一一九二九七二二八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説增長法損減法云何增長法謂緣眼色生眼識三事和合觸觸緣受廣説乃至純大苦聚集是名增長法耳鼻舌身意亦復如是是名增長法云何損減法緣眼色生眼識三事和合觸觸滅則受滅廣説乃至純大苦聚滅耳鼻舌身意亦復如是是名損減法佛説此經已諸比丘聞佛所説歡喜奉行一二一二一二九八二九九如增長損減如是起法處變易法集法滅法亦如上説師不同分復次於正法內略有五種師假立句諸外道師所製論中都不可得謂趣諸取行趣諸取盡行若一切法遍知永斷作苦邊際若於五相受建立處一一相中不依四相薩迦耶見用彼為依能害四種行相憍慢若慢為因有三過患離慢為因有三勝利當知此中懷憍慢者於涅槃界其心退還由怖畏故是名第一過患於諸惡行恆現行中及於可愛諸雜染事其心趣入是名第二過患於涅槃界深生怖畏增上力故便能生起當來生等生死重病如由怖畏增上力故如是亦由於諸惡行及於可愛諸雜染事其心趣入增上力故堪能生起當來生等生死重病如生等病眼等處癰貪等毒箭當知亦爾是名第三過患與此相違當知即是離慢為因三種勝利若隨緣起增上力故於現法中後有種子或增或減由此為因當來後有或生不生以能攝受種子煩惱或有集起或滅沒故一切世間及出世間所有法教如實建立唯於內法有此大師為諸弟子正所宣説師假立句真實可得非諸外道一二二三二二九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説有漏無漏法云何有漏法謂眼色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂耳鼻舌身意法意識意觸意觸因緣生受內覺若苦若樂不苦不樂世俗者是名有漏法云何無漏法謂出世間意若法意識意觸意觸因緣生受內覺若苦若樂不苦不樂出世間者是名無漏法佛説此經已諸比丘聞佛所説歡喜奉行一二三三一二三如是我聞一時佛住舍衛國祇樹給孤獨園時有比丘名三彌離提往詣佛所稽首佛足退坐一面白佛言世尊所謂世間者云何名世間佛告三彌離提謂眼色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂耳鼻舌身意法意識意觸意觸因緣生受內覺若苦若樂不苦不樂是名世間所以者何六入處集則觸集如是乃至純大苦聚集三彌離提若無彼眼無色無眼識無眼觸無眼觸因緣生受內覺若苦若樂不苦不樂無耳鼻舌身意法意識意觸意觸因緣生受內覺若苦若樂若不苦不樂者則無世間亦不施設世間所以者何六入處滅則觸滅如是乃至純大苦聚滅故佛説此經已諸比丘聞佛所説歡喜奉行一二四一二五三二三三如世間如是衆生如是魔亦如是説王國復次於欲界中諸器世間當知譬如王所王國有情世間譬如臣民彼惡天魔譬如君主一二六三四二三一如是我聞一時佛住舍衛國祇樹給孤獨園時有比丘名三彌離提往詣佛所稽首佛足退坐一面白佛言世尊所謂世間者云何名世間佛告三彌離提危脆敗壞是名世間云何危脆敗壞三彌離提眼是危脆敗壞法若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼一切亦是危脆敗壞耳鼻舌身意亦復如是是説危脆敗壞法名為世間佛説此經已三彌離提比丘聞佛所説歡喜奉行二世間復次有二世間一有情世間二器世間其器世間為火災等之所壞滅有情世間剎那剎那各各內身任運壞滅一二七三五二三二如是我聞一時佛住舍衛國祇樹給孤獨園時有比丘名三彌離提往詣佛所稽首佛足退坐一面白佛言世尊所謂世間空云何名為世間空佛告三彌離提眼空常恆不變易法空我所空所以者何此性自爾若色眼識眼觸眼觸因緣生受若苦若樂不苦不樂彼亦空常恆不變易法空我所空所以者何此性自爾耳鼻舌身意亦復如是是名空世間佛説此經已三彌離提比丘聞佛所説歡喜奉行有為復次空有二種一者有為二者無為此中有為空無常恆久久安住不變易法及我我所若諸無為唯空無有我及我所又此空性離諸因緣法性所攝法爾道理為所依趣此或如是或異或非遍一切處無不同歸法爾道理一二八三六二三三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我今當説世間集世間滅世間滅道迹諦聽善思云何為世間謂六內入處云何六眼內入處耳鼻舌身意內入處云何世間集謂當來有愛喜貪俱彼彼樂著云何世間滅謂當來有愛喜貪俱彼彼樂著無餘斷已捨已吐已盡離欲滅止沒云何世間滅道迹謂八聖道正見正志正語正業正命正方便正念正定佛説此經已諸比丘聞佛所説歡喜奉行一二九三七二三四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我不説有人行到世界邊者我亦不説不行到世界邊而究竟苦邊者如是説已入室坐禪時衆多比丘世尊去後即共議言世尊向者略説法言我不説有人行到世界邊者我亦不説不行到世界邊而得究竟苦邊者如是説已入室坐禪我等今於世尊略説法中未解其義是中諸尊誰有堪能於世尊略説法中廣為我等説其義者復作是言唯有尊者阿難聰慧總持而常給侍世尊左右世尊讚歎多聞梵行堪為我等於世尊略説法中廣説其義今當往詣尊者阿難所請求令説時衆多比丘往詣尊者阿難所共相問訊已於一面坐具以上事廣問阿難爾時阿難告諸比丘諦聽善思今當為説若世間世間名世間覺世間言辭世間語説此等皆入世間數諸尊謂眼是世間世間名世間覺世間言辭世間語説是等悉入世間數耳鼻舌身意亦復如是多聞聖弟子於六入處集滅味患離如實知是名聖弟子到世界邊知世間世間所重度世間爾時尊者阿難復説偈言非是遊步者能到世界邊不到世界邊不能免衆苦是故牟尼尊名知世間者能到世界邊諸梵行已立世界邊唯有正智能諦了覺慧達世間故説度彼岸如是諸尊向者世尊略説法已入室坐禪我今為汝分別廣説尊者阿難説是法已衆多比丘聞其所説歡喜奉行遮身行復次如來不遮能得一切世間邊際唯遮身行隨往能得世間邊際此中當依勝義道理應知世間若得世間邊際方便及世邊際謂於方處有世間想假名施設增上力故即由世間若智若想增上力故説有世間若想若智增上力故於諸世間廣起言説由或見聞或覺或知增上力故於六觸處由其五轉起如實智名得世間邊際方便未來諸行因永盡故名為能到世間邊際於世因果如實知故名世間解能正任持最後身故名善運轉世間邊際於現法中一切境界愛永盡故具恆住故説名能超世間愛者由如是等所説行相當知名得世間邊際一三三八二三五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有師有近住弟子則苦獨住無師無近住弟子則樂獨住云何有師有近住弟子則苦獨住緣眼色生惡不善覺貪恚癡俱若彼比丘行此法者是名有師若於此邊住者是名近住弟子耳鼻舌身意亦復如是如是有師有近住弟子常苦獨住云何無師無近住弟子常樂獨住緣眼色生惡不善覺貪恚癡俱彼比丘不行是名無師不依彼住是名無近住弟子是名無師無近住弟子常樂獨住若彼比丘無師無近住弟子者我説彼得梵行福所以者何無師無近住弟子比丘於我建立梵行能正盡苦究竟苦集佛説此經已諸比丘聞佛所説歡喜奉行堅執復次非善説法毗奈耶中諸出家者隨有一惡不善尋思未生生時一向能為梵行障礙如彼生已堅執不捨此中不行最為殊勝設有行者不應堅執於相續中不應為作居住依止何以故剎那雜染不能傾動所修梵行要當相續能傾動故一三一三九二三六如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者舍利弗晨朝著衣持鉢入舍衛城乞食乞食已還精舍舉衣鉢洗足已持尼師檀入林中晝日坐禪時舍利弗從禪覺詣世尊所稽首禮足退坐一面爾時佛告舍利弗汝從何來舍利弗答言世尊從林中晝日坐禪來佛告舍利弗今入何等禪住舍利弗白佛言世尊我今於林中入空三昧禪住佛告舍利弗善哉善哉舍利弗汝今入上座禪住而坐禪若諸比丘欲入上座禪者當如是學若入城時若行乞食時若出城時當作是思惟我今眼見色頗起欲恩愛愛念著不舍利弗比丘作如是觀時若眼識於色有愛念染著者彼比丘為斷惡不善故當勤欲方便堪能繫念修學譬如有人火燒頭衣為盡滅故當起增上方便勤教令滅彼比丘亦復如是當起增上勤欲方便繫念修學若比丘觀察時若於道路若聚落中行乞食若出聚落於其中間眼識於色無有愛念染著者彼比丘願以此喜樂善根日夜精勤繫念修習是名比丘於行住坐臥淨除乞食是故此經名清淨乞食住佛説此經已尊者舍利弗聞佛所説歡喜奉行三空性復次當知略有二種空住一者尊勝空住二者引彼空住諸阿羅漢觀無我住如是名為尊勝空往由阿羅漢法爾尊勝觀無我住於諸住中最為尊勝如是或尊勝所住或即住尊勝由此因緣是故説名尊勝空住引彼空住者謂如有一若行若住如實了知煩惱有無知有煩惱便修斷行知無煩惱便生歡喜生歡喜故乃至令心證三摩地由心證得三摩地故如實觀察諸法無我晝夜隨學曾無懈廢如是名為引彼空住當知此中於內煩惱如實了知有知為有無知為無是名空性復次正見圓滿已見諦迹諸聖弟子皆能如實越彼邪空亦能如實入正不空以世間道及出世道修習空性其義云何謂於此處彼非有故正觀為空若於此處所餘有故如實知有譬如客舍於一時間無諸人物説名為空於一時間有諸人物説名不空或即此舍由無一類説名為空謂無材木或無覆苫或無門戶或無關鍵或隨一分無所有故然非此舍即舍體空如是自體所依止身亦名受趣亦名想趣亦名思趣然此自體所依止身於一時間由無一類或受或想或復思等一切煩惱隨煩惱等説名為空於一時間由有一類説名不空或即自體所依止身於一時間由無一類或眼或耳或鼻或舌或身一分或意一分説名為空然非自體所依止身即自身體一切皆空當知此中總略義者若觀諸法所有自性畢竟皆空是名於空顛倒趣入亦名違越佛所善説法毗奈耶若觀諸法由自相故一類是有一類非有此有非有畢竟遠離又觀有性於一時間一分遠離於一時間一分不離如是名為於彼空性無有顛倒如實趣入以世間道修空性者謂聖弟子住遠離處先於城邑聚落人想作意思惟次復思惟阿練若想彼即觀察於自身中此想為空謂人邑等想此想不空謂阿練若想又餘不空謂阿練若想為緣阿練若想相應諸受思等或即此想由一類故觀之為空謂無麁重不寂靜住及熾然等由一類故觀為不空謂有微細極寂靜住離熾然等又即於彼能取山林卉木禽獸等阿練若差別相想無復思惟但思惟地無別相想又即於彼能取險惡高下不平多諸刺棘瓦礫等地差別相想無復思惟但思惟地平坦細滑猶如掌中無別相想從此次第除色想等漸次思惟空處識處無所有處差別相想後於非想非非想處所有相想作意思惟於一切處如前所説歷觀空性觀諸下地有麁想等觀諸上地有靜想等如是名為諸聖弟子以世間道修習空性當知為趣乃至上極無所有處漸次離欲自斯已後修聖道行漸次除去無常行等能趣非想非非想處畢竟離欲彼於爾時自觀身中空無諸想謂一切漏一向寂靜永離熾然又觀身中有法不空謂此依止為緣六處展轉互相任持乃至壽住為緣諸清淨法無有壞滅當知世尊於昔修習菩薩行位多修空住故能速證阿耨多羅三藐三菩提非如思惟無常苦住是故今者證得上妙菩提住已由昔串習隨轉力故多依空住復次有二種空一者應所證空二者應所修空若諸苾芻樂依雜住於此二種不能成辦應所證空不能證故應所修空不能修故因於二種不成辦故當知退失四種妙樂謂於一切攝受惡事遽務衆苦皆悉解脫妙出離樂解脫貪欲瞋恚等事初靜慮中妙遠離樂尋伺止息妙寂靜樂二解脫攝無所造作無恐怖攝妙等覺樂二解脫者一時愛心解脫二不動心解脫若阿羅漢根性鈍故於世間定是其退法未能解脫所有定障故名時愛心解脫以退法故時時退失時時現前故説名時於現法樂喜欲證住故説名愛不動心解脫者謂阿羅漢根性利故是不退法一切皆以無漏道力而得解脫於一切種都無退失當知此中決定義是三昧耶義餘如前説無所造作無恐怖者當知無有異類可得令阿羅漢心於中染彼變異故生愁歎等應所證空略有二種一者外空二者內空外空者謂超過一切五種色想則五妙欲之所引發於離欲貪正能作證內空者謂於內諸行斷增上慢正能作證應所修空亦有二種一於內外諸境界中修無我見二即於彼修無常見此四種空當知四行為所依止外空以內住心增上緣力離所生樂滋潤其身為所依止及我慢遍知內空以內外空於內外法修無我見為所依止無我見以即於彼修無常見為所依止無常見以聞正法如理作意為所依止又於此中若諸苾芻為離欲貪精勤修學觀察作意增上力故於欲界繫諸不淨相勉勵思惟彼於外空未作證故於其正道未善修故趣染習故於外空性心不證入不愛樂故便於其中由我慢門心不流散等隨觀察以寂靜相思惟內空彼由我慢未永斷故於其正道未善修故亦於此中心不證入遂於內外一切行中修無我見於無我見未善修故亦於其中心不證入乃於內外一切行中修無常見令心不動於諸行中見無常故一切種動皆無所有故無常見名不動界由於是處心無勝解故以正慧如實通達或緣不淨或緣慈悲或緣息念所有境界或緣諸行無常境界於三摩地極多修習為因緣故令心調柔由是漸次於一切處皆能證入由此因緣於所證空能證圓滿因於所證得圓滿故其心解脫一切能順下上分結由此因緣於所修空能修圓滿因於所修得圓滿故成就無學正見等法若於是時乃至於空未能證入當知此時是異生位若時證入是有學位若時修習已得圓滿是無學位為令此修得圓滿故勤修正行令心證入以善尋思而正尋思則於其中能善知量離諸雜染而起言説於經行處能正經行於所坐處能正安坐於如是等一切處所皆善知量如是行時清淨為先於其住時亦得清淨其間能以觀察作意數數觀察現行煩惱淨修治心如是能趣一向成就諸白淨法一切魔怨所不能奪及彼一切惡不善法四種雜染謂後有因性故現法身心遍燒惱故惡趣因性故生等衆苦因性故言説有二一者隨逐音聲勝解言説二者隨逐法隨法行言説第一言説是於正法受持讀誦請問徵核之所發起第二言説是於所緣令心安往究竟解脫施設教授之所發起若為是義如來出世諸弟子衆隨入聖教應勤修習如是善法若於彼法毗奈耶中無一切種所修梵行當知亦無修梵行者以於其中無梵行故稱梵行者皆修邪行師弟展轉互相觸惱各自許有尊卑體式於正法中二俱可得若有棄捨大果大利應所證空應所修空為極下劣有大罪過利養恭敬愛味所漂多習邪行當知彼為大梵行災之所觸惱彼由如是耽嗜愛著利養恭敬自逼惱故於能隨順解脫言教不欲聽聞雖為宣説不能屬耳或為貪著利養恭敬增上力故而強聽聞無心求解不欲修行不為究竟善自調伏乃至不為證般涅槃由如是事憎惡大師行不平等以於廣大現前恩德不能報故當知此中總略義者謂善説法毗奈耶中既出家已由四因緣如於自己正所應行而不能行如於大師聖教出家正所應行亦不能行謂樂相雜住故隨順隨逐音聲勝解言説故耽著利養恭敬故由此耽著增上緣力聽聞正法不修自利利他行故又佛世尊不欲自顯能善御衆而攝徒衆唯深哀愍諸有情故由是因緣於行邪行弟子衆中能無護惜分明示語寧使弟子由此分明麁利益語現捨正法及毗奈耶當獲利益勿令住此廣興邪行一三二三一二三七如是我聞一時佛住毗舍離獼猴池側重閣講堂時有長者名郁瞿婁往詣佛所稽首佛足退坐一面白佛言世尊何故有一比丘見法般涅槃何故比丘不得見法般涅槃佛告長者若有比丘眼識於色愛念染著以愛念染著故常依於識為彼縛故若彼取故不得見法般涅槃耳鼻舌身意識於法亦復如是若比丘眼識於色不愛樂染著不愛樂染著者不依於識不觸不著不取故此諸比丘得見法般涅槃耳鼻舌身意識於法亦復如是是故長者有比丘得見法般涅槃者有不得見法般涅槃者一三三一三四三一一三一二如長者所問經如是阿難所問經及佛自為諸比丘所説經亦如上説復次嗢拖南曰離欲未離欲問因緣染路保命著處等皆廣説應知離欲未離欲若有苾芻於其欲界或已離欲或未離欲於五妙欲意所識法定地三世由三種纏及彼根本所有隨眠正雜染時於現法中不任趣證究竟涅槃當知此中由過去世依彼取識由未來世屬彼取識由現在世著彼取識由彼根本所有隨眠墮在相續常隨逐故執彼取識與此相違無雜染時於現法中堪能趣證究竟涅槃問復次於聖教中當知有四如理問者一有淨信若諸長者若長者子二具聰慧多聞苾芻三是大師親承侍者四即大師有二因緣佛於弟子知而故問謂觀弟子雖欲請問而無無畏或於其義無所了知為遮現在未來過故為令正法得久住故一三五三一三二三八如是我聞一時佛住毗舍離獼猴池側重閣講堂時有異比丘往詣佛所稽首佛足退坐一面白佛言世尊何因何緣眼識生何因何緣耳鼻舌身意識生佛告比丘眼因緣色眼識生所以者何若眼識生一切眼色因緣故耳聲因緣鼻香因緣舌味因緣身觸因緣意法因緣意識生所以者何諸所有意識彼一切皆意法因緣生故是名比丘眼識因緣生乃至意識因緣生時彼比丘聞佛所説歡喜隨喜作禮而去因緣復次由二因緣説六識身以內六處為因以外六處為緣謂內六處為彼種子所依附故又內六處相續一類如先所得畢竟轉故境界不爾非彼種子所依附故又非一類相續轉故一三六三一四二三九如是我聞一時佛住毗舍離獼猴池側重閣講堂爾時世尊告諸比丘我今當説結所繫法及結法云何結所繫法眼色耳聲鼻香舌味身觸意法是名結所繫法云何結法謂欲貪是名結法佛説此經已諸比丘聞佛所説歡喜奉行一三七三一五二四如是我聞一時佛住毗舍離獼猴池側重閣講堂爾時世尊告諸比丘我今當説所取法及取法云何所取法眼色耳聲鼻香舌味身觸意法是名所取法云何取法謂欲貪是名取法佛説此經已諸比丘聞佛所説歡喜奉行染路復次由二種相當總了知一切雜染一者一切雜染自性二者一切雜染行路言自性者所謂欲貪與諸雜染為根本故言行路者謂內外處能取所取有差別故一三八三一六二四一如是我聞一時佛住毗舍離獼猴池側重閣講堂爾時世尊告諸比丘愚癡無聞凡夫比丘寧以火燒熱銅籌以燒其目令其熾然不以眼識取於色相取隨形好所以者何取於色相取隨形好故墮惡趣中如沈鐵丸愚癡無聞凡夫寧燒鐵錐以鑽其耳不以耳識取其聲相取隨聲好所以者何耳識取聲相取隨聲好者身壞命終墮惡趣中如沈鐵丸愚癡無聞凡夫寧以利刀斷截其鼻不以鼻識取於香相取隨香好所以者何以取香相取隨香好故身壞命終墮惡趣中如沈鐵丸愚癡無聞凡夫寧以利刀斷截其舌不以舌識取於味相取隨味好所以者何以取味相隨味好故身壞命終墮惡趣中如沈鐵丸愚癡無聞凡夫寧以剛鐵利槍以刺其身不以身識取於觸相及隨觸好所以者何以取觸相及隨觸好故身壞命終墮惡趣中如沈鐵丸諸比丘睡眠者是愚癡活是癡命無利無福然諸比丘寧當睡眠不於彼色而起覺想若起覺想者必生纏縛諍訟能令多衆起於非義不能饒益安樂天人彼多聞聖弟子作如是學我今寧以熾然鐵槍以貫其目不以眼識取於色相墮三惡趣長夜受苦我從今日當正思惟觀眼無常有為心緣生法若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼亦無常有為心緣生法耳鼻舌身入處當如是學寧以鐵槍貫其身體不以身識取於觸相及隨觸好故墮三惡道我從今日當正思惟觀身無常有為心緣生法若觸身識身觸身觸因緣生受內覺若苦若樂不苦不樂彼亦無常有為心緣生法多聞聖弟子作如是學睡眠者是愚癡活癡命無果無利無福我當不眠亦不起覺想起想者生於纏縛諍訟令多人非義饒益不得安樂多聞聖弟子如是觀者於眼生厭若色眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂彼亦生厭厭故不樂不樂故解脫解脫知見我生已盡梵行已立所作已作自知不受後有耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行保命復次若諸苾芻於二處所等隨觀察若行若住如理作意為所依止於二雜染應脫其心云何名為於二處所謂自保命忽然夭喪不善心殞往諸惡趣云何名為如理作意為所依止復於何等二種雜染應脫其心謂我寧遭種種楚撻損害於己諸處之身勿復令我不善心殞生諸惡趣又我應當與喜樂俱如實觀察為欲對治現行不善懇勵修習諸行無常若經行時於諸境界執取諸相執取隨好所有雜染令心解脫遠離住時於諸不善種種尋思所有雜染令心解脫當知此中第一雜染是相似因第二雜染是相似果又二雜染現在轉時生於二處謂自保命即於爾時倏歸夭喪不善心殞往諸惡趣是故於彼二種雜染一剎那中深見過患發生慚愧尚為妙善況能相續一三九一四二三一七三二二四二如是我聞一時佛住毗舍離獼猴池側重閣講堂爾時世尊告諸比丘若眼不知不識不斷不離欲不堪能正盡苦於眼若知若識若斷若離欲堪能正盡苦佛説此經已諸比丘聞佛所説歡喜奉行一四三一六二三二一三四如眼四經如是乃至意二十四經如上説一六三三四一二四三如是我聞一時佛住毗舍離獼猴池側重閣講堂爾時世尊告諸比丘若諸比丘於眼味者當知是沙門婆羅門不得自在脫於魔手魔縛所縛入於魔繫耳鼻舌身意亦復如是若沙門婆羅門於眼不味者當知是沙門婆羅門不隨於魔脫於魔手不入魔繫佛説此經已諸比丘聞佛所説歡喜奉行一六四一六九三四二三四七如味如是歡喜讚歎染著堅住愛樂憎嫉亦如是説一七一七六三四八三五四如內入處七經外入處七經亦如是説一七七一七八三五五三五六二四四如是我聞一時佛住毗舍離獼猴池側重閣講堂爾時世尊告諸比丘有六魔鈎云何為六眼味著色是則魔鈎耳味著聲是則魔鈎鼻味著香是則魔鈎舌味著味是則魔鈎身味著觸是則魔鈎意味著法是則魔鈎若沙門婆羅門眼味著色者當知是沙門婆羅門魔鈎鈎其咽於魔不得自在穢説淨説廣説如上一七九三五七二四五如是我聞一時佛住拘留搜調伏駮牛聚落爾時世尊告諸比丘我今當為汝等説法初語亦善中語亦善後語亦善善義善味純一滿淨清白梵行謂四品法經諦聽善思當為汝説何等為四品法經有眼識色可愛可念可樂可著比丘見已歡喜讚歎樂著堅住有眼識色不可愛不可念不可樂著苦厭比丘見已瞋恚嫌薄如是比丘於魔不得自在乃至不得解脫魔繫耳鼻舌身意亦復如是有眼識色可愛可念可樂可著比丘見已知喜不讚歎不樂著堅實有眼識色不可愛念樂著比丘見已不瞋恚嫌薄如是比丘不隨魔自在乃至解脫魔繫耳鼻舌身意亦復如是是名比丘四品法經著處復有衆多魔所歸向所有雜染著安足處智者了知應當遠避謂已離欲諸異生類繫屬定生喜樂諸處所有愛味著安足處未離欲者於妙五欲受為依故喜樂諍競貪愛耽染著安足處於恩於怨諸有情所一切愛恚著安足處廣大上品能引境界順樂順苦所求所尋所可貪愛所有三世著安足處當知此中可欣可樂可愛可意諸句差別如前已辨不可欣者於未來世不可樂故不可樂者於過去世由隨憶念不可樂故不可愛者於諸境界不可樂故不可意者由於諸受不可樂故又言苦者即於境界不可樂故言損惱者即於諸受不可樂故言違背者於過去世不可樂故言逆意者於未來世不可樂故一八三五八二四六如是我聞一時佛住王舍城耆闍崛山爾時世尊晨朝著衣持鉢入王舍城乞食爾時天魔波旬作是念沙門瞿曇晨朝著衣持鉢入王舍城乞食我今當往亂其道意時魔波旬化作御車象類執杖覓牛著弊衣蓬頭亂髮手腳剝裂手執牛杖至世尊前問言瞿曇見我牛不世尊作是念此是惡魔欲來亂我即告魔言惡魔何處有牛何用牛為魔作是念沙門瞿曇知我是魔而白佛言瞿曇眼觸入處是我所乘耳鼻舌身意觸入處是我所乘復問瞿曇欲何所之佛告惡魔汝有眼觸入處耳鼻舌身意觸入處若彼無眼觸入處無耳鼻舌身意觸入處汝所不到我往到彼爾時天魔波旬即説偈言若常有我者彼悉是我所一切悉屬我瞿曇何所之爾時世尊説偈答言若言有我者彼説我則非是故知波旬即自墮負處魔復説偈言若説言知道安隱向涅槃汝自獨遊往何煩教他為世尊復説偈答言若有離魔者問度彼岸道為彼平等説真實永無餘時習不放逸永離魔自在魔復説偈言有石似段肉餓烏來欲食彼作軟美想欲以補飢虛竟不得其味折觜而騰虛我今猶如烏瞿曇如石生不入愧而去猶烏陵虛逝內心懷愁毒即彼沒不現二雜染復次有二雜染一者外境雜染二者內受雜染眼等為依於色等境起諸貪著名外境雜染諸觸為依貪著內受名內受雜染此二雜染於永寂滅般涅槃中皆不可得非諸魔怨所能遊履一八一三五九二四七如是我聞一時佛住王舍城耆闍崛山爾時世尊告諸比丘若沙門婆羅門眼習近於色則為魔所自在乃至不得解脫魔繫耳鼻舌身意亦復如是若沙門婆羅門眼不習近於色不隨魔自在乃至得解脫魔繫耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行一八二一九五三六三七三如習近如是繫著如是味如是鄰聚若使受持繫著我所求欲淳濃不捨亦如上説十五相復次由十五相應當了知一切種類愛見雜染謂於諸處由諸纏故名藏由隨眠故名護由我見故名覆所餘差別廣説如前攝異門分一九六三七四二四八如是我聞一時佛住波吒利弗多羅國雞林園爾時尊者阿難往詣尊者大純陀所共相問訊已於一面坐爾時尊者阿難語尊者純陀言欲有所問寧有間暇見答與不尊者純陀語尊者阿難言隨仁所問知者當答尊者阿難問尊者純陀如世尊如來應等正覺所知所見説四大造色施設顯露此四大色非我如來應等正覺所知所見亦復説識非我耶尊者純陀語尊者阿難言仁者最為多聞我從遠來詣尊者所為問此法故今日尊者唯願為説此義尊者阿難語純陀言我今問尊者隨意見答尊者純陀為有眼有色有眼識不答言有尊者阿難復問為緣眼及色生眼識不答言如是尊者阿難復問若眼及色生眼識彼因彼緣為常為無常答言無常尊者阿難又問彼因彼緣生眼識彼因彼緣無常變易時彼識住耶答曰不也尊者阿難尊者阿難復問於意云何彼法若生若滅可知多聞聖弟子於中寧見是我異我相在不答曰不也尊者阿難耳鼻舌身於意云何有意有法有意識不答曰有尊者阿難復問為緣意及法生意識不答曰如是尊者阿難復問若意緣法生意識彼因彼緣為常為無常答曰無常尊者阿難復問若因若緣生意識彼因彼緣無常變易時意識住耶答曰不也尊者阿難復問於意云何彼法若生若滅可知多聞聖弟子寧於中見我異我相在不答言不也尊者阿難尊者阿難語純陀言是故尊者而如來應等正覺所知所見説識亦無常譬如士夫持斧入山見芭蕉樹謂堪材用斷根截葉斫枝剝皮求其堅實剝至於盡都無堅處如是多聞聖弟子正觀眼識耳鼻舌身意識當正觀時都無可取無可取故無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有彼二正士説是法時展轉隨喜各還其所復次總嗢拖南曰因同分等唯作緣等上品貪等後多住等別嗢拖南曰因同分思縛解脫相觸遍勝解護根門教愛相為後因同分諸聖弟子因同分識隨入無我由三種相於諸識中正觀而住云何因同分識隨入無我謂由現見五有色處四大種身若增若減若取若捨無常性故於緣彼識隨入無常無常則苦苦則無我由是因緣隨入無我云何隨入無我性已由三種相於諸識中正觀而住謂諸邪見一切皆以我見為根是故此根必應先斷又以正慧即觀彼識所依所緣差別轉故有無量種又觀此識差別轉時如剎那量安住堅實尚不可得何況畢竟一九七三七五二四九如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者阿難詣尊者舍利弗所語尊者舍利弗欲有所問寧有間暇為解説不舍利弗言隨仁所問知者當答尊者阿難問尊者舍利弗六觸入處盡離欲滅息沒已更有餘不尊者舍利弗語阿難言莫作此問六觸入處盡離欲滅息沒已更有餘不阿難又問尊者舍利弗六觸入處盡離欲滅息沒已無有餘耶尊者舍利弗答阿難言亦復不應作如是問六觸入處盡離欲滅息沒已無有餘耶阿難復問尊者舍利弗六觸入處盡離欲滅息沒已有餘無餘非有餘非無餘耶尊者舍利弗答阿難言此亦不應作此問六觸入處盡離欲滅息沒已有餘無餘非有餘非無餘耶尊者阿難又問舍利弗如尊者所説六觸入處盡離欲滅息沒已有亦不應説無亦不應説有無亦不應説非有非無亦不應説此語有何義尊者舍利弗語尊者阿難六觸入處盡離欲滅息沒已有餘耶此則虛言無餘耶此則虛言有餘無餘耶此則虛言非有餘非無餘耶此則虛言若言六觸入處盡離欲滅息沒已離諸虛偽得般涅槃此則佛説時二正士展轉隨喜各還本處思復次於六處滅究竟寂靜無戲論中由戲論俱四種行相不應思惟不應分別不應詰問唯應依他增長覺慧審諦觀察真實意趣云何為四謂或有無或異不異以彼六處有生有滅展轉異相施設可知由生滅故有無可得有異相故待他種類異性可得待自種類前後無別不異可得六處永滅常寂靜相是故由彼戲論俱行四種行相思惟觀察不應道理當知此中能引無義思惟分別所發語言名為戲論何以故於如是事勤加行時不能少分增益善法損不善法是故説彼名為戲論一九八三七六二五如是我聞一時佛住王舍城迦蘭陀竹園時尊者舍利弗尊者摩訶拘絺羅俱在耆闍崛山尊者摩訶拘絺羅晡時從禪覺詣尊者舍利弗所共相問訊已退坐一面語舍利弗言欲有所問寧有間暇見答與不尊者舍利弗語摩訶拘絺羅隨仁所問知者當答尊者摩訶拘絺羅問尊者舍利弗言云何尊者舍利弗眼繫色耶色繫眼耶耳聲鼻香舌味身觸意法意繫法耶法繫意耶尊者舍利弗答尊者摩訶拘絺羅言非眼繫色非色繫眼乃至非意繫法非法繫意尊者摩訶拘絺羅於其中間若彼欲貪是其繫也尊者摩訶拘絺羅譬如二牛一黑一白共一軛鞅縛繫人問言為黑牛繫白牛為白牛繫黑牛為等問不答言不也尊者舍利弗非黑牛繫白牛亦非白牛繫黑牛然於中間若軛若繫鞅者是彼繫縛如是尊者摩訶拘絺羅非眼繫色非色繫眼乃至非意繫法非法繫意中間欲貪是其繫也尊者摩訶拘絺羅若眼繫色若色繫眼乃至若意繫法若法繫意世尊不教人建立梵行得盡苦邊以非眼繫色非色繫眼乃至非意繫法非法繫意故世尊教人建立梵行得盡苦邊尊者摩訶拘絺羅世尊眼見色若好若惡不起欲貪其餘衆生眼若見色若好若惡則起欲貪是故世尊説當斷欲貪則心解脫乃至意法亦復如是時二正士展轉隨喜各還本處縛解脫復次於內外處若有欲貪境界現前或不現前而其諸根不能棄捨故名為縛若無欲貪設有境界正現在前諸根於彼尚能棄捨況不現前故名解脫一九九三七七二五一如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者舍利弗尊者摩訶拘絺羅俱在耆闍崛山中尊者摩訶拘絺羅晡時從禪覺詣尊者舍利弗所共相問訊已退坐一面語尊者舍利弗欲有所問寧有間暇見答與不舍利弗言隨仁所問知者當答尊者摩訶拘絺羅問尊者舍利弗言謂無明者云何為無明尊者舍利弗言所謂無知無知者是為無明云何無知謂眼無常不如實知是名無知眼生滅法不如實知是名無知耳鼻舌身意亦復如是如是尊者摩訶拘絺羅於此六觸入處如實不知不見不無間等愚癡無明大冥是名無明尊者摩訶拘絺羅又問尊者舍利弗所謂明者云何為明舍利弗言所謂為知知者是明為何所知謂眼無常眼無常如實知眼生滅法眼生滅法如實知耳鼻舌身意亦復如是尊者摩訶拘絺羅於此六觸入處如實知見明覺悟慧無間等是名為明時二正士各聞所説展轉隨喜各還其所二三七八二五二如是我聞一時佛住王舍城迦蘭陀竹園時有比丘名優波先那住王舍城寒林中冢間蛇頭巖下迦陵伽行處時尊者優波先那獨一於內坐禪時有惡毒蛇長尺許於上石間墮優波先那身上優波先那喚舍利弗語諸比丘毒蛇墮我身上我身中毒汝等駛來扶持我身出置於外莫令於內身壞碎如粳糟聚時尊者舍利弗於近處住一樹下聞優波先那語即詣優波先那所語優波先那言我今觀汝色貌諸根不異於常而言中毒持我身出莫令散壞如粳糟聚竟為云何優波先那語舍利弗言若當有言我眼是我我所耳鼻舌身意耳鼻舌身意是我我所色聲香味觸法色聲香味觸法是我我所地界地界是我我所水火風空識界水火風空識界是我我所色陰色陰是我我所受想行識陰受想行識陰是我我所者面色諸根應有變異我今不爾眼非我我所乃至識陰非我我所是故面色諸根無有變異舍利弗言如是優波先那汝若長夜離我我所我慢繫著使斷其根本如截多羅樹頭於未來世永不復起云何面色諸根當有變異時舍利弗即周匝扶持優波先那身出於窟外優波先那身中毒碎壞如聚粳糟時舍利弗即説偈言久殖諸梵行善修八聖道歡喜而捨壽猶如棄毒鉢久殖諸梵行善修八聖道歡喜而捨壽如人重病愈久殖諸梵行善修八聖道如出火燒宅臨死無憂悔久殖諸梵行善修八聖道以慧觀世間猶如穢草木不復更求餘餘亦不相續時尊者舍利弗供養優波先那尸已往詣佛所稽首禮足退坐一面白佛言世尊尊者優波先那有小惡毒蛇如治眼籌墮其身上其身即壞如聚粳糟佛告舍利弗若優波先那誦此偈者則不中毒身亦不壞如聚粳糟舍利弗白佛言世尊誦何等偈何等辭句佛即為舍利弗而説偈言常慈念於彼堅固賴吒羅慈伊羅槃那尸婆弗多羅欽婆羅上馬亦慈迦拘吒及彼黑瞿曇難陀跋難陀慈悲於無足及以二足者四足與多足亦悉起慈悲慈悲於諸龍依於水陸者慈一切衆生有量及無量安樂於一切亦離煩惱生欲令一切賢一切莫生惡常住蛇頭巖衆惡不來集凶害惡毒蛇能害衆生命如此真諦言無上大師説我今誦習此大師真實語一切諸惡毒無能害我身貪欲瞋恚癡世間之三毒如此三惡毒永除名佛寶法寶滅衆毒僧寶亦無餘破壞凶惡毒攝受護善人佛破一切毒汝蛇毒今破故説是呪術章句所謂塢耽婆隸耽婆隸航陸波婆耽陸㮈渧肅㮈渧抧跋渧文那移三摩移檀諦尼羅抧施婆羅拘閇塢隸塢娛隸悉波呵舍利弗優波先那善男子爾時説此偈説此章句者蛇毒不能中其身身亦不壞如粳糟聚舍利弗白佛言世尊優波先那未曾聞此偈未曾聞此呪術章句世尊今日説此正為當來世耳尊者舍利弗聞佛所説歡喜作禮而去相復次善修梵行於諸蘊處我我所見已永斷者若為損身乃至奪命苦受所觸終無色變心變可得如是名麁善守根相彼由如是善守諸根四苦解脫增上力故得四種喜一由當來外緣生苦得解脫故二由當來內緣生苦得解脫故三於現法般涅槃時由二種依所作衆苦得解脫故四命終已與世所見草木相似一切衆苦不相續故由二種相草木相似一者六處離有情想與世所見草木相似二者六處為所依止貪瞋癡火乃得燒然與世所見草木相似善修梵行諸聖弟子當來後有苦不生故與諸如來成就明力少分相似非現法緣苦不生故設暫生已速疾斷故然諸如來二種明力皆悉成就是故説名無上明持二一三七九二五三如是我聞一時尊者優陀夷往拘薩羅國人間遊行至拘磐茶聚落到毗紐迦旃延氏婆羅門尼菴羅園中住時毗紐迦旃延氏婆羅門尼有諸年少弟子遊行採樵至菴羅園中見尊者優陀夷坐一樹下容貌端正諸根寂靜心意安諦成就第一調伏見已往詣其所共相問訊已退坐一面時優陀夷為諸年少種種説法勸勵已默然而住彼諸年少聞尊者優陀夷所説歡喜隨喜從座起去時諸年少擔持束薪還至毗紐迦旃延氏婆羅門尼所置薪束於地詣毗紐迦旃延氏婆羅門尼所白言我和上尼當知菴羅園中有沙門優陀夷姓瞿曇氏依於彼住極善説法毗紐迦旃延氏婆羅門尼語諸年少言汝可往請沙門優陀夷瞿曇氏明日於此飯食時諸年少弟子受毗紐迦旃延氏婆羅門尼教已往詣尊者優陀夷所白優陀夷言尊者當知我和上毗紐迦旃延氏婆羅門尼請尊者優陀夷明旦飯食時優陀夷默然受請時彼諸年少知優陀夷受請已還歸和上毗紐迦旃延氏婆羅門尼所白言和上尼我以和上尼語請尊者優陀夷尊者優陀夷默然受請和上尼自知時爾時尊者優陀夷夜過晨朝著衣持鉢往詣毗紐迦旃延氏婆羅門尼舍時毗紐迦旃延氏婆羅門尼遙見尊者優陀夷來疾敷床座請令就坐設種種飲食自手供養豐美滿足食已澡漱洗鉢訖還就本坐時毗紐迦旃延氏婆羅門尼知食已訖著好革屣以衣覆頭別施高床現起輕相慠慢而坐語優陀夷言欲有所問寧有間暇見答與不優陀夷答言姊妹今是非時作此語已從座起去如是明日諸弟子復至菴羅園採樵聽法還復白和上尼和上尼復遣詣請食如前三返乃至請法答言非時不為説法諸年少弟子復白和上尼菴羅園中沙門優陀夷極善説法和上尼答言我亦知彼極善説法再三請來設食問法常言非時不説而去諸弟子言和上尼著好革屣以衣覆頭不恭敬坐彼云何説所以者何彼尊者優陀夷以敬法故不説而去和上尼答言若如是者更為我請彼諸弟子受教更請供養如前時和上尼知食訖已脫革屣整衣服更坐卑床恭敬白言欲有所問寧有間暇見答與不優陀夷答言汝今宜問當為汝説彼即問言有沙門婆羅門説苦樂自作復有説言苦樂他作復有説言苦樂自他作復有説言苦樂非自非他作尊者復云何尊者優陀夷答言姊妹阿羅訶説苦樂異生非如是説婆羅門尼復問其義云何優陀夷答言阿羅訶説從其因緣生諸苦樂優陀夷復語婆羅門尼言我今問汝隨意答我於意云何有眼不答言有有色不答言有有眼識眼觸眼觸因緣生受內覺若苦若樂不苦不樂不答言如是尊者優陀夷優陀夷復問有耳鼻舌身有意有色有意識意觸意觸因緣生受內覺若苦若樂不苦不樂不答言如是尊者優陀夷優陀夷言此是阿羅訶説從其因緣生於苦樂婆羅門尼言尊者優陀夷如是阿羅訶説從其因緣生苦樂耶優陀夷答言如是婆羅門尼婆羅門尼復問沙門云何阿羅訶説因緣生苦樂不苦不樂滅優陀夷答言我今問汝隨意答我婆羅門尼一切眼一切時滅無餘猶有眼觸因緣生受內覺若苦若樂不苦不樂耶答言無也沙門如是耳鼻舌身意一切時滅永盡無餘猶有意觸因緣生受內覺若苦若樂不苦不樂耶答言無也沙門如是婆羅門尼是為阿羅訶説因緣生苦樂不苦不樂滅尊者優陀夷説是法時毗紐迦旃延氏婆羅門尼遠塵離垢得法眼淨爾時毗紐迦旃延氏婆羅門尼見法得法知法入法度疑惑不由於他入佛教法於法得無所畏從坐起整衣服恭敬合掌白尊者優陀夷我今日超入決定我從今日歸依佛歸依法歸依僧我從今日盡壽歸依三寶爾時優陀夷為婆羅門尼説法示教照喜已從坐起去觸遍復次有一沙門或婆羅門越勝現量世間愚夫尚不迷惑況諸智者一切愚癡所安足處虛妄推度以為依止或依前際或依現法堅固執著建立四種苦樂邪論謂依前際虛妄計度宿作因故立諸苦樂一向自作虛妄計度自在變化以為因故立諸苦樂一向他作虛妄計度先自在作然後宿作因所作故立諸苦樂自作他作虛妄計度無因生故立諸苦樂非自非他所作因生或依現法虛妄計度若隨自欲自作功用所生起者立為自作若不隨欲不自覺知他所引者立為他作若隨所欲自所覺知他所引者立自他作若非自他功用為先所生起者但由境界現在前故不能了達微細因觸便起邪執謂非自他所作因生立無因生此中唯有諸根境識和合所生苦樂可得都無前際或現法中若自若他實有可得唯即於此三事和合假立自他是故當知唯有其觸遍行一切為苦樂因二二三八二五四如是我聞一時佛住王舍城迦蘭陀竹園爾時尊者二十億耳住耆闍崛山常精勤修習菩提分法時尊者二十億耳獨靜禪思而作是念於世尊弟子精勤聲聞中我在其數然我今日未盡諸漏我是名族姓子多饒財寶我今寧可還受五欲廣行施作福爾時世尊知二十億耳心之所念告一比丘汝等今往二十億耳所告言世尊呼汝是一比丘受佛教已往詣二十億耳所語言世尊呼汝二十億耳聞彼比丘稱大師命即詣世尊所稽首禮足退住一面爾時世尊告二十億耳汝實獨靜禪思作是念世尊精勤修學聲聞中我在其數而今未得漏盡解脫我是名族姓子又多錢財我寧可還俗受五欲樂廣施作福耶時二十億耳作是念世尊已知我心驚怖毛竪白佛言實爾世尊佛告二十億耳我今問汝隨意答我二十億耳汝在俗時善彈琴不答言如是世尊復問於意云何汝彈琴時若急其絃得作微妙和雅音不答言不也世尊復問云何若緩其絃寧發微妙和雅音不答言不也世尊復問云何善調琴絃不緩不急然後發妙和雅音不答言如是世尊佛告二十億耳精進太急增其掉悔精進太緩令人懈怠是故汝當平等修習攝受莫著莫放逸莫取相時尊者二十億耳聞佛所説歡喜隨喜作禮而去時尊者二十億耳常念世尊説彈琴譬獨靜禪思如上所説乃至漏盡心得解脫成阿羅漢爾時尊者二十億耳得阿羅漢內覺解脫喜樂作是念我今應往問訊世尊爾時尊者二十億耳往詣佛所稽首禮足退坐一面白佛言世尊於世尊法中得阿羅漢盡諸有漏所作已作捨離重擔逮得己利盡諸有結正智心解脫當於爾時解脫六處云何為六離欲解脫離恚解脫遠離解脫愛盡解脫諸取解脫心不忘念解脫世尊若有依少信心而言離欲解脫此非所應貪恚癡盡是名真實離欲解脫若復有人依少持戒而言我得離恚解脫此亦不應貪恚癡盡是名真實離恚解脫若復有人依於修習利養遠離而言遠離解脫是亦不應貪恚癡盡是真實遠離解脫貪恚癡盡亦名離愛亦名離取亦名離忘念解脫如是世尊若諸比丘未得羅漢未盡諸漏於此六處不得解脫若復比丘在於學地未得增上樂涅槃習向心住爾時成就學戒成就學根後時當得漏盡無漏心解脫乃至自知不受後有當於爾時得無學戒得無學諸根譬如嬰童愚小仰臥爾時成就童子諸根彼於後時漸漸增長諸根成就當於爾時成就長者諸根在學地者亦復如是未得增上安樂乃至成就無學戒無學諸根若眼常識色終不能妨心解脫慧解脫意堅住故內修無量善解脫觀察生滅乃至無常耳識聲鼻識香舌識味身識觸意識法不能妨心解脫慧解脫意堅住故內修無量善解脫觀察生滅譬如村邑近大石山不斷不壞不穿一向厚密假使四方風吹不能動搖不能穿過彼無學者亦復如是眼常識色乃至意常識法不能妨心解脫慧解脫意堅住故內修無量善解脫觀察生滅爾時二十億耳重説偈言離欲心解脫無恚脫亦然遠離心解脫貪愛永無餘諸取心解脫及意不忘念曉了入處生於彼心解脫彼心解脫者比丘意止息諸所作已作更不作所作猶如大石山四風不能動色聲香味觸及法之好惡六入處常對不能動其心心常住堅固諦觀法生滅尊者二十億耳説是法時大師心悅諸多聞梵行者聞尊者二十億耳所説皆大歡喜爾時尊者二十億耳聞佛説法歡喜隨喜作禮而去爾時世尊知二十億耳去不久告諸比丘善心解脫者應如是記説如二十億耳以智記説亦不自舉亦不下他正説其義非如增上慢者不得其義而自稱歎得過人法自取損減勝解復次由四種相正發精進速令諸漏永盡無餘何等為四一者發起平等精進謂不極掉舉發勤精進令其身心疲倦損惱亦不極下發起精進虛棄身命令無所得是名初相又不由此而生憍慢謂我獨能發勤精進餘則不爾是第二相又於正發勤精進果世間安觸所證差別無有愛味與此俱行修不放逸是第三相又於精進平等之相能善攝受令於當來無有退失是第四相如是正發勤精進故永盡諸漏成阿羅漢若欲於彼大師有智同梵行所記別自己所證差別唯阿羅漢六處勝解能正記別謂依三學及以五種補特伽羅云何名為六處勝解一出離勝解二無惱勝解三遠離勝解四愛盡勝解五取盡勝解六心無忘失勝解云何三學一增上戒學二增上心學三增上慧學云何五種補特伽羅一者異生處在居家唯依於信發生欣樂出離勝解從境界縛心求出離是名第一補特伽羅二者異生既出離已唯依於戒於諸有情由身語意行無惱行是名第二補特伽羅三者異生能斷利養及恭敬愛於現法中離欲界欲是名第三補特伽羅四者有學已見諦迹是名第四補特伽羅五者無學得阿羅漢是名第五補特伽羅當知此中第一第二處所勝解初學所依第三處所所起勝解與第二學作其所依後三處所所起勝解與第三學作其所依若由此智能斷煩惱及煩惱斷當知是名心無忘失又於當來後有因斷説名愛盡現法境界諸雜染斷説名取盡又彼第一補特伽羅雖有正信出離勝解而未決定堪於當來令彼一切悉皆棄捨及與變異第二有其無惱勝解第三有其遠離勝解當知亦爾若諸有學六處勝解雖無堪能當來棄捨及與變異然似幼童等持念慧皆悉羸劣雖生聖處未善修故於貪瞋癡不能遠離無餘永斷由慧劣故及由貪等未永斷故若遇勝妙境界現前時時忘念由此因緣而勤生起學心解脫及慧解脫盡諸煩惱是故有學補特伽羅仍有所作由此分故而名減劣若阿羅漢六處勝解尚無堪能當來變異況有棄捨善修道故貪瞋癡等永斷無餘愛盡取盡勝解圓滿已得盡智無生智故六種恆住所攝受故所有智慧非如有學時時忘念故阿羅漢六處勝解由第一義最極圓滿亦名成就最極清淨非餘下位補特伽羅由此因緣亦無自高記別所解於三摩地所行所緣無散亂故名內心住即三摩地善成滿故名不狹小一切煩惱皆離繫故名善解脫所有智慧善積集故説名善修見滅盡故無有愛味其心一向善而無罪二三三八一二五五如是我聞一時尊者摩訶迦旃延住阿磐提國濕摩陀江側獼猴室阿練若窟有魯醯遮婆羅門恭敬承事如羅漢法爾時尊者摩訶迦旃延晨朝著衣持鉢入獼猴室聚落次行乞食乞食還舉衣鉢洗足已入室坐禪時魯醯遮婆羅門有諸年少弟子遊行採薪至尊者摩訶迦旃延窟邊共戲笑言此中剃髮沙門住是黑暗人非世勝人而魯醯遮婆羅門尊重供養如羅漢法時尊者摩訶迦旃延語諸年少言年少年少莫作聲諸年少言終不敢復言如是再三語猶不止於是尊者摩訶迦旃延出戶外語諸年少言年少年少汝等莫語我今當為汝等説法汝等且聽諸年少言諾唯願説法我當聽受爾時尊者摩訶迦旃延即説偈言古昔婆羅門修習勝妙戒得生宿命智娛樂真諦禪常住於慈悲關閉諸根門調伏於口過古昔行如是捨本真實行而存虛偽事守族姓放逸從諸根六境自餓居冢間三浴誦三典不守護根門猶如夢得寶編髮衣皮褐戒盜灰坌身麁衣以蔽形執杖持水瓶假形婆羅門以求於利養善攝護其身澄淨離塵垢不惱於衆生是道婆羅門爾時諸年少婆羅門瞋恚不喜語尊者摩訶迦旃延謗我經典毀壞所説罵辱婆羅門執持薪束還魯醯遮婆羅門所語魯醯遮婆羅門言和上知不彼摩訶迦旃延誹謗經典毀呰言説罵辱婆羅門魯醯遮婆羅門語諸年少諸年少莫作是語所以者何摩訶迦旃延宿重戒德不應謗毀經典毀呰言説罵婆羅門諸年少言和上不信我言當自往看時魯醯遮婆羅門不信諸年少語往詣摩訶迦旃延共相問訊慰勞已退坐一面語摩訶迦旃延言我諸年少弟子來到此不答言到此少多與共言語不答云與共言語魯醯遮婆羅門言汝與諸年少共語今可為我盡説是摩訶迦旃延即為廣説時魯醯遮婆羅門亦復瞋恚心得不喜語摩訶迦旃延我先不信諸年少語今摩訶迦旃延真實誹謗經典毀呰而説罵辱婆羅門作此語已小默然住須臾復語摩訶迦旃延仁者所説門何等為門摩訶迦旃延言善哉善哉婆羅門所問如法我今當為汝説門婆羅門眼是門以見色故耳鼻舌身意是門以識法故婆羅門言奇哉摩訶迦旃延我問其門即説其門如摩訶迦旃延所説不守護門云何不守護門摩訶迦旃延言善哉善哉婆羅門問不守護門是如法問今當為汝説不守護門婆羅門愚癡無聞凡夫眼見色已於可念色而起緣著不可念色而起瞋恚不住身念處故於心解脫慧解脫無如實知於彼起種種惡不善法不得無餘滅盡於心解脫慧解脫妨礙不得滿足心解脫慧解脫不滿故身滿惡行不得休息心不寂靜以不寂靜故於其根門則不調伏不守護不修習如眼色耳聲鼻香舌味身觸意法亦復如是魯醯遮婆羅門言奇哉奇哉摩訶迦旃延我問不守護門即為我説不守護門摩訶迦旃延云何復名善守護門摩訶迦旃延語婆羅門言善哉善哉汝能問我善守護門義諦聽善思當為汝説守護門義多聞聖弟子眼見色已於可念色不起緣著不可念色不起瞋恚常攝其心住身念處無量心解脫慧解脫如實知於彼所起惡不善法寂滅無餘於心解脫慧解脫而得滿足解脫滿足已身觸惡行悉得休息心得正念是名初門善調伏守護修習如眼及色耳聲鼻香舌味身觸意法亦復如是魯醯遮婆羅門言奇哉摩訶迦旃延我問守護門義即為我説守護門義譬如士夫求毒藥草反得甘露今我如是瞋恚而來至此座坐而摩訶迦旃延以大法雨雨我身中如雨甘露摩訶迦旃延家中多事今請還家摩訶迦旃延言婆羅門宜知是時時魯醯遮婆羅門聞摩訶迦旃延所説歡喜隨喜從座起去護根門復次略有二種補特伽羅一者不能密護根門二者善能密護根門云何名為不能密護根門補特伽羅謂如有一於諸境界不能如理作意思惟於可愛色為貪欲纏之所纏縛於不愛色為瞋恚纏之所纏縛又於彼境不能隨念所有過患設有隨念不善修習由是因緣心為諸纏之所覆蔽起諸纏已不能制伏又是異生未得有學心慧解脫於上無學心慧解脫不如實知由不知故於諸有學心慧解脫亦不能滿彼於爾時未以修力為所依止於煩惱品所有麁重未能永害又不依先善思擇力念不成就為因緣故當知不能密護根門由此三相補特伽羅應知不能密護根門一由纏故二由思擇所攝對治有缺減故三由修力所攝對治有缺減故與此相違當知白品於諸根門善能密護二四三八二一一六四如是我聞一時佛住波羅㮈國仙人住處鹿野苑中時有衆多比丘集於講堂作如是論諸尊如世尊説波羅延低舍彌德勒所問若知二邊者於中永無著説名大丈夫不顧於五欲無有煩惱鎖超出縫紩憂諸尊此有何義云何邊云何二邊云何為中云何為縫紩云何思以智知以了了智所知了所了作苦邊脫於苦有一答言六內入處是一邊六外入處是二邊受是其中愛為縫紩習於愛者得彼彼因身漸轉增長出生於此即法以智知以了了智所知了所了作苦邊脫於苦復有説言過去世是一邊未來世是二邊現在世名為中愛為縫紩習近此愛彼彼所因身漸轉增長出生乃至脫苦復有説言樂受者是一邊苦受者是二邊不苦不樂是其中愛為縫紩習近此愛彼彼所得自身漸轉增長出生乃至脫苦復有説言有者是一邊集是二邊受是其中愛為縫紩如是廣説乃至脫苦復有説言身者是一邊身集是二邊愛為縫紩如是廣説乃至脫苦復有説言我等一切所説不同所謂向來種種異説要不望知云何世尊有餘之説波羅延低舍彌德勒所問經我等應往具問世尊如世尊説我等奉持爾時衆多比丘詣世尊所稽首禮足退坐一面白佛言世尊向諸比丘集於講堂作如是言於世尊所説波羅延低舍彌德勒所問經所謂二邊乃至脫苦有人説言內六入處是説一邊外六入處是説二邊受是其中愛為縫紩如前廣説悉不決定今日故來請問世尊具問斯義我等所説誰得其義佛告諸比丘汝等所説皆是善説我今當為汝等説有餘經我為波羅延低舍彌德勒有餘經説謂觸是一邊觸集是二邊受是其中愛為縫紩習近愛已彼彼所得身緣轉增長出生於此法以智知以了了習所知了所了作苦邊脫於苦佛説此經已諸比丘聞佛所説歡喜奉行教復次由二種相諸聖弟子於其大師所説法教能正記別能善宣説謂能辨釋真實義故云何為二一者由是意趣宣説善能悟入如是意趣而正記別二者如來以無量門廣宣聖教為無量品補特伽羅種種辨説於此法教不違法性能正記別二五三八三一一六五如是我聞一時尊者賓頭盧住拘睒彌國瞿師羅園時有婆蹉國王名優陀延那詣尊者賓頭盧所共相問訊問訊已退坐一面婆蹉王優陀延那白尊者賓頭盧言欲有所問寧有間暇見答與不尊者賓頭盧答言大王大王且問知者當答婆蹉王優陀延那問尊者賓頭盧何因何緣新學年少比丘於此法律出家未久極安樂住諸根欣悅顏貌清淨膚色鮮白樂靜少動任他而活野獸其心堪能盡壽修持梵行純一清淨尊者賓頭盧答言如佛所説如來應等正覺所知所見為比丘説汝諸比丘若見宿人當作母想見中年者作姊妹想見幼稚者當作女想以是因緣年少比丘於此法律出家未久安隱樂住諸根敷悅顏貌清淨膚色鮮白樂靜少動任他而活野獸其心堪能盡壽修持梵行純一清淨婆蹉王優陀延那語尊者賓頭盧言今諸世間貪求之心若見宿人而作母想見中年者作姊妹想見幼稚者而作女想當於爾時心亦隨起貪欲燒燃瞋恚燒燃愚癡燒燃要當更有勝因緣不尊者賓頭盧語婆蹉王優陀延那更有因緣如世尊説如來應等正覺所知所見為比丘説此身從足至頂骨幹肉塗覆以薄皮種種不淨充滿其中周遍觀察髮毛爪齒塵垢流唌皮肉白骨筋脈心肝肺脾腎腸肚生藏熟藏胞淚汗涕沫肪脂髓痰癊膿血腦汁屎溺大王此因此緣故年少比丘於此法律出家未久安隱樂住乃至純一滿淨婆蹉王優陀延那語尊者賓頭盧人心飄疾若觀不淨隨淨想現頗更有因緣令年少比丘於此法律出家未久安隱樂住乃至純一滿淨不尊者賓頭盧言大王有因有緣如世尊説如來應等正覺所知所見告諸比丘汝等應當守護根門善攝其心若眼見色時莫取色相莫取隨形好增上執持若於眼根不攝斂住則世間貪憂惡不善法則漏其心是故汝等當受持眼律儀耳聲鼻香舌味身觸意法亦復如是乃至受持意律儀爾時婆蹉王優陀延那語尊者賓頭盧善哉善説法乃至受持諸根律儀尊者賓頭盧我亦如是有時不守護身不持諸根律儀不一其念入於宮中其心極生貪欲熾燃瞋恚燒燃愚癡燒燃正使間房獨處亦復三毒燒燃其心況復宮中又我有時善護其身善攝諸根專一其念入於宮中貪欲恚癡不起燒燃其心於內宮中尚不燒身亦不燒心況復間獨以是之故此因此緣能令年少比丘於此法律出家未久安隱樂住乃至純一滿淨時婆蹉王優陀延那聞尊者賓頭盧所説歡喜隨喜從坐起去愛相復次於佛善説法毗奈耶深心愛樂新學苾芻由二種相應正了知一由身相無變異故二由心相無變異故謂由形色極光淨故面貌熙怡極鮮潔故膚體充實不羸損故諸根適悅而寂靜故身無變異隨有所得生喜足故遠離貪樂畜積資財而受用故於其室家無顧戀故心無變異復有三種淫貪對治能令淫貪未生不生已生尋斷一者思惟不應行想二者思惟極不淨想三者密護一切根門此中密護一切根門略廣應知如聲聞地謂能密護諸根門者不令母邑摩觸身故名善護身於諸母邑不觀不聽不憶念故名善守根設見設聞設隨憶念即能長時攝受正念以猛利慧深見過故名善住念彼由如是善護其身善守諸根善住正念便能思惟不應行想由此煩惱不能蔽心令暫欣味又能思惟極不淨想由此煩惱不能蔽心令速回轉二六三八四一一六六如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘有手故知有取捨有足故知有往來有關節故知有屈伸有腹故知有飢渴如是比丘有眼故眼觸因緣生受內覺若苦若樂不苦不樂耳鼻舌身意亦復如是諸比丘若無手則不知取捨若無足則不知往來若無關節則不知有屈伸若無腹則不知有飢渴如是諸比丘若無眼則無眼觸因緣生受內覺若苦若樂不苦不樂耳鼻舌身意亦復如是佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰唯緣尋思願一切種律儀入聖教不護勝資糧善備捨所學著處不善義隨流菩薩勝餘乘論施設最後唯緣由先所作諸業煩惱及自種子相續所引諸受生起其六觸處唯為作緣如心所起功用所引諸取受業手唯能作助取受緣當知此中道理亦爾二七三八五一一六七如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘過去世時有河中草有龜於中住止時有野干飢行覓食遙見龜蟲疾來捉取龜蟲見來即便藏六野干守伺兾出頭足欲取食之久守龜蟲永不出頭亦不出足野干飢乏瞋恚而去諸比丘汝等今日亦復如是知魔波旬常伺汝便兾汝眼著於色耳聞聲鼻嗅香舌嘗味身覺觸意念法欲令出生染著六境是故比丘汝等今日常當執持眼律儀住執持眼根律儀住惡魔波旬不得其便隨出隨緣耳鼻舌身意亦復如是於其六根若出若緣不得其便猶如龜蟲野干不得其便爾時世尊即説偈言龜蟲畏野干藏六於殼內比丘善攝心密藏諸覺想不依不怖彼覆心勿言説佛説此經已諸比丘聞佛所説歡喜奉行尋思復次諸有苾芻受用如法邊際臥具安住空間若有能令尋思躁擾勝妙境相來現於心當知是魔品類所作此中苾芻應以九相安住其心從諸境界相應尋思攝心令住無容尋思隨一更起若由此依由此境界有所餐味於此境界隨其所得隨其所住能自遠離彼於爾時於可愛事終不依止諸欲尋思而有所作於恚尋思及害尋思亦能遠離淨修其心於現法中能得涅槃得涅槃已終不共他諍競而住謂諸諍競於佛聖法毗奈耶中極作衰損如是愚癡所生尋思亦不尋思如餘外道二八三八六一一六八如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘譬如䵃麥著四衢道頭有六壯夫執杖共打須臾塵碎有第七人執杖重打諸比丘於意云何如䵃麥聚六人共打七人重打當極碎不諸比丘白佛言如是世尊佛告諸比丘如是愚癡士夫六觸入處之所捶打何等為六謂眼觸入處常所捶打耳鼻舌身意觸入處常所捶打彼愚癡士夫為六觸入處之所捶打猶復念求當來世有如第七人重打令碎比丘若言是我是則動搖言是我所是則動搖未來當有是則動搖未來當無是則動搖當復有色是則動搖當復無色是則動搖當復有想是則動搖當復無想是則動搖當復非有想非無想是則動搖動搖故病動搖故癰動搖故刺動搖故著正觀察動搖故苦者得不動搖心多修習住繫念正知如動搖如是思量虛誑有行因愛言我是則為愛言我所是則為愛言當來有是則為愛言當來無是則為愛當有色是則為愛當無色是則為愛當有想是則為愛當無想是則為愛當非想非非想是則為愛愛故為病愛故為癰愛故為刺若善思觀察愛生苦者當多住離愛心正念正知諸比丘過去世時阿修羅興軍與帝釋鬪時天帝釋告三十三天今日諸天阿修羅共戰若諸天勝阿修羅不如者當生執阿修羅縛以五繫送還天宮阿修羅語其衆言今阿修羅軍與諸天戰若阿修羅勝諸天不如者當生執帝釋縛以五繫還歸阿修羅宮當其戰諍諸天得勝阿修羅不如時三十三天生執毗摩質多羅阿修羅王縛以五繫還歸天宮爾時毗摩質多羅阿修羅王身被五繫置於正法殿上以種種天五欲樂而娛樂之毗摩質多羅阿修羅王作是念唯阿修羅賢善聰慧諸天雖善我今且當還歸阿修羅宮作是念時即自見身被五繫縛諸天五欲自然化沒毗摩質多羅阿修羅王復作是念諸天賢善智慧明徹阿修羅雖善我今且當住此天宮作是念時即自見身五縛得解諸天五欲自然還出毗摩質多羅阿修羅王乃至有如是微細之縛魔波旬縛轉細於是心動搖時魔即隨縛心不動搖魔即隨解是故諸比丘多住不動搖心正念正知應當學佛説此經已諸比丘聞佛所説歡喜奉行願復次若由先世後有苦因於現法中有六觸處果法而轉由六境界所損惱時若有苾芻為求後有自發誓願修行梵行彼於爾時令其第七後有苦因倍更增長轉為損惱於現法中能障涅槃由此因緣能得當來有暇圓滿不決定故此後有願當知於彼微細縛中最極微細何以故如彼三十三天宮中有一囹圄其中禁縛天或非天然彼法爾暫得解脫以天妙欲遊戲而住乃至未起逃竄之心此心若起便失妙欲還見自身為縛所縛彼才起心便為微細縛之所縛以時分故説名微細非難識故而説微細由被縛時能自解了我今有縛若諸苾芻心願後有此心若起便即被縛既被縛已不能了知自身有縛是故此縛最極微細當知時分及以難識俱微細故名極微細二九三八七一一六九如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘若有比丘比丘尼眼色識因緣生若欲若貪若昵若念若決定著處於彼諸心善自防護所以者何此等皆是恐畏之道有礙有難此惡人所依非善人所依是故應自防護耳鼻舌身意亦復如是譬如田夫有好田苗其守田者懶惰放逸欄牛噉食愚癡凡夫亦復如是六觸入處乃至放逸亦復如是若好田苗其守田者心不放逸欄牛不食設復入田盡驅令出所謂若心若意若識多聞聖弟子於五欲功德善自攝護盡止令滅若好田苗其守護田者不自放逸欄牛入境左手牽鼻右手執杖遍身捶打驅出其田諸比丘於意云何彼牛遭苦痛已從村至宅從宅至村復當如前過食田苗不答言不也世尊所以者何憶先入田遭捶杖苦故如是比丘若心若意若識多聞聖弟子於六觸入處極生厭離恐怖內心安住制令一意諸比丘過去世時有王聞未曾有好彈琴聲極生愛樂耽湎染著問諸大臣此何等聲甚可愛樂大臣答言此是琴聲王語大臣取彼聲來大臣受教即往取琴來白言大王此是琴作好聲者王語大臣我不用琴取其先聞可愛樂聲來大臣答言如此之琴有衆多種具謂有柄有槽有麗有絃有皮巧方便人彈之得衆具因緣乃成音聲非不得衆具而有音聲前所聞聲久已過去轉亦盡滅不可持來爾時大王作是念言咄何用此虛偽物為世間琴者是虛偽物而令世人耽湎染著汝今持去片片析破棄於十方大臣受教析為百分棄於處處如是比丘若色受想思欲知此諸法無常有為心因緣生而便説言是我我所彼於異時一切悉無諸比丘應作如是平等正智如實觀察佛説此經已諸比丘聞佛所説歡喜奉行一切種律儀復次若諸苾芻精勤加行守護諸根於其律儀及非律儀應當了知於軟中上世間有學無學律儀應當了知云何律儀謂如有一於可愛境諸雜染心不忍不受不執不取設令暫起尋還棄捨是名律儀云何非律儀謂一苾芻如營農者親近善士聽聞正法如理作意正修所緣境界良田令其生起善根苗稼然其種性猛利多貪未嘗串習貪欲對治猛利慚愧亦未曾有若遇勝妙境界現前彼由本性猛利貪故未曾串習貪對治故所有慚愧皆羸劣故便起貪纏堅執不捨心於貪纏不能防護而自放縱非理作意相應心牛入境界田損壞所有善根苗稼以是因緣名非律儀又如有一能速作意於諸境界而自攝斂然未能觀所有過患令不再起是名為軟世間律儀又如有一能速作意於諸境界而自攝斂亦能觀彼所有過患令不再起是名為中世間律儀由此為依獲得四種作意所攝九相心住當知如前聲聞地説由得此故名離欲貪諸異生類彼先修習加行觀時如營農者今得增上猶如大王於先所得等至所生勝妙諸受能正了知是大放逸安足處已便使如臣聽聞正法增上所生勝奢摩他之所攝護毗鉢舍那令其觀察彼所生受性是緣生緣生性故體是無常彼由此故便以意地諸過患相俱行作意而得離欲既離欲已復觀等至所依別故十種差別時分別故多百差別此中等至所依別故十種別者謂有尋有伺無尋唯伺無尋無伺若喜俱行若樂俱行若捨俱行退分住分若勝進分順決擇分時分別故多百差別者謂即觀察如是行相依生住滅時分所作差別道理當知復有多百差別如是了知彼所生受是無常性流轉差別種種性已略由三相復審觀彼是無常性謂所依故現行故因故所依故者謂極乃至第四靜慮所有色身是受所依現行故者謂極乃至滅受想定其間想受多分現行言因故者謂當來世所有受因即思求願觀察如是乃至有頂所有諸法緣生性故皆是無常如是如理審正觀察諸離欲地是名上品世間律儀當知此中前二律儀思擇力攝後一律儀修習力攝彼既成就如是勝妙不放逸力如實通達聖諦理故便能永斷執我我所以為前行一切見道所斷煩惱又能獲得有學律儀彼即修習有學律儀復能永斷妄執我慢以為前行一切修道所斷煩惱究竟證得無學律儀此上更無若過若勝所餘律儀二一三八八一一七如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘如癩病人四體瘡壞入茅荻中為諸刺葉針刺所傷倍增苦痛如是愚癡凡夫六觸入處受諸苦痛亦復如是如彼癩人為草葉針刺所傷膿血流出如是愚癡凡夫其性弊暴六觸入處所觸則起瞋恚惡聲流出如彼癩人所以者何愚癡無聞凡夫心如癩瘡我今當説律儀不律儀云何律儀云何不律儀愚癡無聞凡夫眼見色已於可念色而起貪著不可念色而起瞋恚於彼次第隨生衆多覺想相續不見過患復見過患不能除滅耳鼻舌身意亦復如是比丘是名不律儀云何律儀多聞聖弟子若眼見色於可念色不起欲想不可念色不起恚想次第不起衆多覺想相續住見色過患見過患已能捨離耳鼻舌身意亦復如是是名律儀佛説此經已諸比丘聞佛所説歡喜奉行二一一三八九一一七一如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘譬如士夫遊空宅中得六種衆生一者得狗即執其狗繫著一處次得其鳥次得毒蛇次得野干次得失收摩羅次得獼猴得斯衆生悉縛一處其狗者樂欲入村其鳥者常欲飛空其蛇者常欲入穴其野干者樂向冢間失收摩羅者長欲入海獼猴者欲入山林此六衆生悉繫一處所樂不同各各嗜欲到所安處各各不相樂於他處而繫縛故各用其力向所樂方而不能脫如是六根種種境界各各自求所樂境界不樂餘境界眼根常求可愛之色不可意色則生其厭耳根常求可意之聲不可意聲則生其厭鼻根常求可意之香不可意香則生其厭舌根常求可意之味不可意味則生其厭身根常求可意之觸不可意觸則生其厭意根常求可意之法不可意法則生其厭此六種根種種行處種種境界各各不求異根境界此六種根其有力者堪能自在隨覺境界如彼士夫繫六衆生於其堅柱正出用力隨意而去往反疲極以繩繫故終依於柱諸比丘我説此譬欲為汝等顯示其義六衆生者譬猶六根堅柱者譬身念處若善修習身念處有念不念色見可愛色則不生著不可愛色則不生厭耳聲鼻香舌味身觸意法於可意法則不求欲不可意法則不生厭是故比丘當勤修習多住身念處佛説此經已諸比丘聞佛所説歡喜奉行入聖教不護復次若諸苾芻已入聖教不護諸根彼便一向造作衆苦謂後法苦或現法苦當知如是不護根者如癩病人入蘆荻叢為如其葉可愛境界破裂其身攝受當來微細俱行後有衆苦而不能覺如是名為由後法苦説造衆苦彼又於此起染起著廣生毀犯由是因緣雖住空寂阿練若處而受現行追悔所起尋思之苦如菅茅刺傷害其足不能無畏往淨仙衆設強趣入清淨僧中便為有智同梵行人舉其所犯由彼內懷覆藏意故心如鴆毒於能舉邊發憤摻害又諸有智同梵行者知其鄙劣樂捨沙門即便遠避不與同住若諸村邑若阿練若咸共譏毀言此長老如是毀犯如是惡説如是惡作如是非法雜染而住已淨信者令其變退未淨信者令信不生是故彼人於現法中領受如此追悔所作發憤所作遠避所作譏毀所作種種諸苦此及前説領受後法所作衆苦總略為一名受衆苦此中云何名非律儀謂於如是現法後法具衆過患行處境界起不如理妄執諸相隨好邪想邪想為先於其住處發起順彼相應尋思由此不能於前所説一切過失如實觀見雖復觀見所有過失未能數數多修習故於所依中諸煩惱品所有麁重未能除遣身未輕安謂色心身由此行相纏及隨眠猶尚和合能令違背思擇修習二力對治名非律儀與此相違當知即是律儀行相又此律儀三因緣故能令修習速得圓滿何等為三所謂最初於善説法毗奈耶中淨信出家既出家已便用神力相應聞慧攝持蟲獸相似六根既攝持已復用如理作意思慧正審觀察過患方便在聞慧上修慧下故中間繫縛中間繫已為欲試察於彼神力得自在不乃取淨相於諸境界而放縱之於彼神力未自在故各各馳散別別境界然其不能究竟逃竄未善觀見彼過患故令彼蟲獸未善調伏又令神力不得自在了知是已復多修習如理思慧令到究竟超過作意轉更勤修循身正念於此正念善修習故彼不復能各各馳散別別境界當知爾時彼善調伏神力於彼而得自在二一二三九一一七二如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘譬如有四蚖蛇凶惡毒虐盛一篋中時有士夫聰明不愚有智慧求樂厭苦求生厭死時有一士夫語向士夫言汝今取此篋盛毒蛇摩拭洗浴恩親養食出內以時若四毒蛇脫有惱者或能殺汝或令近死汝當防護爾時士夫恐怖馳走忽有五怨拔刀隨逐要求欲殺人復語言有五怨拔刀隨逐要求欲殺汝當防護爾時士夫畏四毒蛇及五拔刀怨驅馳而走人復語言士夫內有六賊隨逐伺汝得便當殺汝當防護爾時士夫畏四毒蛇五拔刀怨及內六賊恐怖馳走還入空村見彼空舍危朽腐毀有諸惡物捉皆危脆無有堅固人復語言士夫是空聚落當有群賊來必奄害汝爾時士夫畏四毒蛇五拔刀賊內六惡賊空村群賊而復馳走忽爾道路臨一大河其水浚急但見此岸有諸怖畏而見彼岸安隱快樂清涼無畏無橋船可渡得至彼岸作是思惟我取諸草木縛束成筏手足方便渡至彼岸作是念已即拾草木依於岸傍縛束成筏手足方便截流橫渡如是士夫免四毒蛇五拔刀怨六內惡賊復得脫於空村群賊度於浚流離於此岸種種怖畏得至彼岸安隱快樂我説此譬當解其義比丘篋者譬此身色麁四大四大所造精血之體穢食長養沐浴衣服無常變壞危脆之法毒蛇者譬四大地界水界火界風界地界若諍能令身死及以近死水火風諍亦復如是五拔刀怨者譬五受陰六內賊者譬六愛喜空村者譬六內入善男子觀察眼入處是無常變壞執持眼者亦是無常虛偽之法耳鼻舌身意入處亦復如是空村群賊者譬外六入處眼為可意不可意色所害耳聲鼻香舌味身觸意為可意不可意法所害浚流者譬四流欲流有流見流無明流河者譬三愛欲愛色愛無色愛此岸多恐怖者譬有身彼岸清涼安樂者譬無餘涅槃筏者譬八正道手足方便截流渡者譬精進勇猛到彼岸婆羅門住處者譬如來應等正覺如是比丘大師慈悲安慰弟子為其所作我今已作汝今亦當作其所作於空間樹下房舍清淨敷草為座露地冢間遠離邊坐精勤禪思慎莫放逸令後悔恨此則是我教授之法佛説此經已諸比丘聞佛所説歡喜奉行勝資糧善備復次有諸苾芻先已修集妙慧資糧復得值遇善友圓滿聽聞諸行三種過患謂現法過患後法過患現法後法過患當知此中大種互違為所依止一切疾病名現法過患惡趣諸行常恆隨逐能作能往名後法過患先於現法成就喜貪以為所依能引現法後法老死名現法後法過患如是總略有三種苦一疾病苦二惡趣苦三老死苦謂依善趣及依惡趣聽聞如是諸過患已精進修行法隨法行因斯能入聖諦現觀次由善淨無我真智如入空室現觀內外六處皆空彼於爾時以慧通達依諸境界忘念所生諸煩惱纏能為損害及有餘殘煩惱隨眠貪愛隨眠又自通達於相續中有諸煩惱有諸貪愛有諸苦惱有諸損害及過一切煩惱貪愛證有餘依般涅槃界一向寂靜次後復證無有餘依般涅槃界彼先修習譬如草木枝條莖葉正法門慧積集聖道法隨法行為所依筏於修道中正勤修習漸次證於心善解脫住有餘依般涅槃界一切災惱皆得解脫既住於此當知究竟越度衆苦到於彼岸二一三三九一一一七三如是我聞一時佛住拘睒彌國瞿師羅園爾時世尊告諸比丘多聞聖弟子於一切苦法集滅味患離如實知見見五欲猶如火坑如是觀察五欲已於五欲貪欲愛欲念欲著不永覆心知其欲心行處住處而自防閉行處住處逆防閉已隨其行處住處世間貪憂惡不善法不漏其心云何名為多聞聖弟子於一切苦法集滅味患離如實知見多聞聖弟子於此苦聖諦如實知此苦集此苦滅此苦滅道迹聖諦如實知是名多聞聖弟子於一切苦法集滅味患離如實知見云何多聞聖弟子見五欲如火坑乃至世間貪憂惡不善法不永覆心譬如近一聚落邊有深坑滿中盛火無有煙焰時有士夫不愚不癡聰明黠慧樂樂厭苦樂生惡死彼作是念此有火坑滿中盛火我若墮中必死無疑於彼生遠思遠欲遠如是多聞聖弟子見五欲如火坑乃至世間貪憂惡不善法不永覆心若行處住處逆防逆知乃至世間貪憂惡不善法不漏其心譬如聚落邊有㮈林多諸棘刺時有士夫入於林中有所營作入林中已前後左右上下盡有棘刺爾時士夫正念而行正念來去正念明目正念端視正念屈身所以者何莫令利刺傷壞身故多聞聖弟子亦復如是若依聚落城邑而住晨朝著衣持鉢入村乞食善護其身善執其心正念安住正念而行正念明目正念觀察所以者何莫令利刺傷聖法律云何利刺傷聖法律謂可意愛念之色是名利刺傷聖法律云何是可意愛念之色傷聖法律謂五欲功德眼識色生愛念長養欲樂耳識聲鼻識香舌識味身識觸生愛念長養欲樂是名可愛念色傷聖法律是名多聞聖弟子所行處所住處逆防逆知乃至不令世間貪憂惡不善法以漏其心或時多聞聖弟子失於正念生惡不善覺長養欲長養恚長養癡是鈍根多聞聖弟子雖起集滅以欲覆心譬如鐵丸燒令極熱以少水灑尋即乾消如是多聞聖弟子鈍根生念尋滅如是多聞聖弟子如是行如是住若王大臣若親族往詣其所請以俸祿語言男子何用剃髮執持瓦器身著袈裟家家乞食為不如安慰服五欲樂行施作福云何比丘多聞聖弟子國王大臣諸親檀越請以俸祿彼當還戒退減以不答曰不也所以者何多聞聖弟子於一切苦法集滅味患離如實知見故見火坑譬五欲乃至世間貪憂惡不善法不永覆心行處住處逆防逆知乃至世間貪憂惡不善法不漏其心若復為國王大臣親族請以俸祿還戒退減無有是處佛告諸比丘善哉善哉彼多聞聖弟子其心長夜臨趣流注浚輸向於遠離向於離欲向於涅槃寂靜捨離樂於涅槃於有漏處寂滅清涼若為國王長者親族所請還戒退減者無有是處餘得大苦譬如恆河長夜臨趣流注浚輸東方多衆斷截欲令臨趣流注浚輸西方寧能得不答言不能世尊所以者何恆水長夜流注東方欲令西流未而可得彼諸大衆徒辛苦耳如是多聞聖弟子長夜臨趣流注浚輸向於遠離乃至欲令退減無有是處徒辛苦耳佛説此經已諸比丘聞佛所説歡喜奉行捨所學復次由七因緣於善説法毗奈耶中雖出家已復還退捨正所修學云何為七謂諸異生未能超度諸異生地於五取蘊衆苦惱法不能如實了知五轉或復異生於諸妙欲不能上品觀其過患又於行時及於住時恆常縱逸於可愛境取不如理所有相貌不繫念故恆常尋思善品惡刺非理尋思又無無畏若王若餘因事呼逼由怖畏故則便隨從復有親愛於諸親屬有所顧戀彼若招命由親愛故則便隨從又於境界或隨順貪或隨順瞋或隨順癡發起猛利諸煩惱纏又即於彼心相續中常有隨縛又由成就下劣勝解無有一切廣大勝解謂於出離遠離涅槃由彼成就劣勝解故於諸境界其心趣入由於一切父母等事不能孑然無顧戀故於其出離心不趣入於八聖支無勝解故於其遠離心不趣入由於彼果煩惱斷中無勝解故於其涅槃心不趣入略由二處攝一切漏一見所斷二修所斷當知此中非理作意及所緣境名順漏法若諸有學於能發起修所斷漏非理作意所緣境界雖未永斷而由妙慧正通達故説名於此順漏法中其心寂靜猶有失念增上所生微劣纏故未名清涼未名宴默然其所起一切見道所斷諸漏皆永斷故亦名清涼以於當來不生法故亦名宴默而彼異生成就下劣諸勝解者遍於一切順諸漏法心不寂靜不名清涼不名宴默當知由是七因緣故復還退捨正所修學與此相違所有白品七因緣故於善説法毗奈耶中既出家已終不退捨正所修學二一四三九二一一七四如是我聞一時佛住阿毗闍恆水邊時有比丘來詣佛所稽首佛足退住一面白佛言善哉世尊為我説法我聞法已獨一靜處專精思惟不放逸住所以族姓子剃除鬚髮正信非家出家學道於上增修梵行見法自知作證我生已盡梵行已立所作已作自知不受後有爾時世尊觀察恆水見恆水中有一大樹隨流而下語彼比丘汝見此恆水中大樹流不答言已見世尊佛告比丘此大樹不著此岸不著彼岸不沈水底不閡洲渚不入洄澓人亦不取非人不取又不腐敗當隨水流順趣流注浚輸大海不比丘白佛如是世尊佛言比丘亦復如是亦不著此岸不著彼岸不沈水底不閡洲渚不入洄澓人亦不取非人不取又不腐敗當隨水流臨趣流注浚輸涅槃比丘白佛云何此岸云何彼岸云何沈沒云何洲渚云何洄澓云何人取云何非人取云何腐敗善哉世尊為我廣説我聞法已當獨一靜處專精思惟不放逸住乃至自知不受後有佛告比丘此岸者謂六入處彼岸者謂六外入處人取者猶如有一習近俗人及出家者若喜若憂若苦若樂彼彼所作悉與共同始終相隨是名人取非人取者猶如有人願修梵行我今持戒苦行修諸梵行當生在處處天上是非人取洄澓者猶如有一還戒退轉腐敗者犯戒行惡不善法腐敗寡聞猶莠稗吹貝之聲非沙門為沙門像非梵行為梵行像如是比丘是名不著此彼岸乃至浚輸涅槃時彼比丘聞佛所説歡喜隨喜作禮而去時彼比丘獨一靜處思惟佛所説水流大樹經教乃至自知不受後有得阿羅漢時有牧牛人名難屠去佛不遠執杖牧牛比丘去已詣世尊所稽首禮足於一面住白佛言世尊我今堪能不著此岸不著彼岸不沈沒不閡洲渚非人所取不非人取不入洄澓亦不腐敗我得於世尊正法律中出家修梵行不佛告牧牛者汝送牛還主不牧牛者言諸牛中悉有犢牛自能還歸不須送也但當聽我出家學道佛告牧牛者牛雖能還家汝今已受人衣食要當還報其家主時牧牛者聞佛教已歡喜隨喜作禮而去時尊者舍利弗在此會中牧牛者去不久白佛言世尊難屠牧牛者求欲出家世尊何故遣還歸家佛告舍利弗難屠牧牛者若還住家受五欲者無有是處牛付主人已輒自當還於此法律出家學道淨修梵行乃至自知不受後有得阿羅漢時難屠牧牛者以牛付主人已還至佛所稽首禮足退住一面白佛言世尊牛已付主聽我於正法律出家學道佛告難屠牧牛者汝得於此法律出家受具足得比丘分出家已思惟所以族姓子剃除鬚髮著袈裟衣正信非家出家學道增修梵行乃至自知不受後有成阿羅漢著處復次若有苾芻依四著處當知彼行四種邪行何等名為四種著處謂有苾芻於內外處有貪愛故能感後有於現法中不樂涅槃是初著處復有苾芻於先所捨外諸所有父母等事有所顧戀繫縛其心如是名為第二著處復如有一於現法中希求一切利養恭敬於諸所得利養恭敬耽著不捨如是名為第三著處復如有一是有學者已見諦迹有餘我慢少分貪愛之所隨逐於修棄捨縱逸而住如是名為第四著處云何名為四種邪行謂彼最初愛樂後有補特伽羅於現法中不樂涅槃若諸有學行於縱逸由此著處增上力故樂與在家及出家衆共相雜住如是名為最初邪行又復即前愛樂後有補特伽羅愛樂後有增上力故發起邪願行於梵行如是名為第二邪行又復於先所捨外事有所顧戀由彼著處增上力故能令退捨正所修學如是名為第三邪行又於現世希求利養及與恭敬於諸所得利養恭敬耽著不捨補特伽羅由此著處增上力故毀犯尸羅廣説乃至螺音狗行彼由顧戀利養恭敬不捨所學不見是罪公然犯戒如是名為第四邪行二一五三九三一一七五如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘獨處坐禪作是思惟比丘云何知云何見得見清淨作是念已詣諸比丘語諸比丘言諸尊比丘云何知云何見令見清淨比丘答言尊者於六觸入處集滅味患離如實正知比丘作如是知如是見者得見清淨是比丘聞彼比丘記説心不歡喜復詣餘比丘所問彼比丘言諸尊比丘云何知云何見得見清淨彼比丘答言於六界集滅味患離如實正知如是比丘如是知如是見得見清淨時比丘聞其記説心亦不喜復詣餘比丘作是問言比丘云何知云何見得見清淨彼比丘答言於五受陰觀察如病如癰如刺如殺無常苦空非我作如是知如是見得見清淨是比丘聞諸比丘記説心亦不喜往詣佛所稽首禮足退坐一面白佛言世尊我獨靜思惟比丘云何知云何見得見清淨作是念已詣諸比丘三處所説具白世尊我聞彼説心不歡喜來詣世尊故以此義請問世尊比丘云何知云何見得見清淨佛告比丘過去世時有一士夫未曾見緊獸往詣曾見緊獸者問曾見緊獸士夫言汝知緊獸不答言知復問其狀云何答言其色黑如火燒柱當彼見時緊獸黑色如火燒柱時彼士夫聞緊獸黑色如火燒柱不大歡喜復更詣一曾見緊獸士夫復問彼言汝知緊獸不彼答言知復問其狀云何彼曾見緊獸士夫答言其色赤而開敷狀似肉段彼人見時緊獸開敷實似肉段是士夫聞彼所説猶復不喜復更詣餘曾見緊獸士夫問汝知緊獸不答言知復問其狀云何答言毿毿下垂如尸利沙果是人聞已心復不喜復行問餘知緊獸者問汝知緊獸不彼答言知又問其狀云何彼復答言其葉青其葉滑其葉長廣如尼拘婁陀樹如彼士夫問其緊獸聞則不喜處處更求而彼諸人見緊獸者隨時所見而為記説是故不同如是諸比丘若於獨處專精思惟不放逸住所因思惟法不起諸漏心得解脫隨彼所見而為記説汝今復聽我説譬其智者以譬喻得解譬如有邊國王善治城壁門下堅固交道平正於四城門置四守護悉皆聰慧知其來去當其城中有四交道安置床榻城主坐上若東方使來問守門者城主何在彼即答言主在城中四交道頭床上而坐彼使聞已往詣城主受其教令復道而還南西北方遠使來人問守門者城主何在彼亦答言在其城中四交道頭彼使聞已悉詣城主受其教令各還本處佛告比丘我説斯譬今當説義所謂城者以譬人身麁色如篋毒蛇譬經説善治城壁者謂之正見交道平正者謂內六入處四門者謂四識住四守門者謂四念處城主者謂識受陰使者謂正觀如實言者謂四真諦復道還者以八聖道佛告比丘若大師為弟子所作我今已作以哀愍故如篋毒蛇譬經説爾時比丘聞佛説已專精思惟不放逸住增修梵行乃至不受後有成阿羅漢不善義復次有諸苾芻於義不善從他所聞種種文字一義言説便懷猶豫不生歡喜今於是中何者為實復有四種能生微妙清淨智見無倒觀門何等為四謂極精勤觀察苦者於生受因如實妙智又於依持及所依因如實妙智又於住因如實妙智又於依緣自性助伴隨順苦樂非苦樂行如實妙智又二緣故如來除滅於義不善補特伽羅所有猶豫一者顯示種種文詞所表一義文有差別義無差別由是能令斷除猶豫二者開顯聖教廣義由此能令於義通達云何名為聖教廣義謂從資糧地乃至漏盡皆説名為聖教廣義此中邊際根成熟住如來所化無我相應善受堅固聞思所成正見成就此為依止此為建立獨處空間緣內外處四種識住為欲斷滅諸有取識修循身念勝奢摩他毗鉢舍那之所攝受由此親近修習勢力發生如實緣初識住鄰逼現觀止觀雙行從此無間於聖諦中能入現觀復更修習如所得道以漸進趣能得一切諸漏永盡如能如實緣初識住乃至如實緣第四識住當知亦爾二一六三九四一一七六如是我聞一時世尊釋氏人間遊行至迦毗羅衛國住尼拘婁陀園爾時迦毗羅衛釋氏作新講堂未有諸沙門婆羅門釋迦年少及諸人民在中住者聞世尊來至釋氏迦毗羅衛人間遊行住尼拘婁陀園論苦樂義此堂新成未有住者可請世尊與諸大衆於中供養得功德福報長夜安隱然後我等當隨受用作是議已悉共出城詣世尊所稽首禮足退坐一面爾時世尊為諸釋氏演説要法示教照喜已默然而住時諸釋氏從座起整衣服為佛作禮右膝著地合掌白佛言世尊我等釋氏新作講堂未有住者今請世尊及諸大衆於中供養得功德福利長夜安隱然後我等當隨受用爾時世尊默然受請時諸釋氏知世尊受請已稽首佛足各還其所即以其日以車輿經紀運其衆具莊嚴新堂敷置床座軟草布地備香油燈衆事辦已往詣佛所稽首白言衆事辦已惟聖知時爾時世尊與諸大衆前後圍繞至新堂外洗足已然後上堂於中柱下東向而坐時諸比丘亦洗足已隨入講堂於世尊後西面東向次第而坐時諸釋氏即於東面西向而座爾時世尊為諸釋氏廣説法要示教照喜已語諸釋氏瞿曇初夜已過於時可還迦毗羅越時諸釋氏聞佛所説歡喜隨喜作禮而去爾時世尊知釋氏去已告大目揵連汝當為諸比丘説法我今背疾當自消息時大目揵連默然受教爾時世尊四褻鬱多羅僧安置脅下卷襞僧伽梨置於頭下右脅而臥屈膝纍足係念明相作起想思惟爾時大目揵連語諸比丘佛所説法初中後善善義善味純一滿淨清白梵行我今當説漏不漏法汝等諦聽云何為漏法愚癡無聞凡夫眼見色已於可念色而起樂著不可念色而起憎惡不住身念處於心解脫慧解脫無少分智而起種種惡不善法不無餘滅不無餘永盡耳鼻舌身意亦復如是比丘如是者天魔波旬往詣其所伺其虛短於其眼色即得其闕耳聲鼻香舌味身觸意法亦復如是即得其闕譬如枯乾草積四方火起尋時即燒如是比丘於其眼色天魔波旬即得其闕如是比丘不勝於色於耳聲鼻香舌味身觸意法受制於法不能勝法不勝色不勝聲香味觸法亦復不勝惡不善法諸煩惱熾然苦報及未來世生老病死諸尊我從世尊親受於此諸有漏法是名有漏法經云何無漏法經多聞聖弟子眼見色於可念色不起樂著不可念色不起憎惡繫念而住無量心解脫慧解脫如實知於彼已起惡不善法無餘滅盡耳鼻舌身意亦復如是如是像類比丘弊魔波旬往詣其所於其眼色伺求其短不得其短於耳聲鼻香舌味身觸意法伺求其短不得其短譬如樓閣墻壁牢固窗戶重閉埿塗厚密四方火起不能燒然斯等比丘亦復如是弊魔波旬往詣其所伺求其短不得其短如是比丘能勝彼色不為彼色之所勝也勝於聲香味觸法不為彼法之所勝也若勝於色勝於聲香味觸法已亦復勝於惡不善法煩惱熾然苦報及未來世生老病死我親從世尊面受此法是名無漏法經爾時世尊知大目揵連説法竟起正身坐繫念在前告大目揵連善哉善哉目揵連為人説此經法多所饒益多所過度長夜安樂諸天世人爾時世尊告諸比丘汝當受持漏無漏法經廣為人説所以者何義具足故法具足故梵行具足故開發神通正向涅槃乃至信心善男子在家出家當受持讀誦廣為人説佛説此經已諸比丘聞佛所説歡喜奉行隨流復次如先所説不護根門補特伽羅煩惱諸纏現前不捨世及出世思擇修習二力對治有所闕乏煩惱生已性多堅執魔既了知性堅執已便往其所以諸境界而媚惑之如是彼魔於性執著煩惱諸纏補特伽羅而得其便為欲媚惑於其相續安立所緣又即如是不護根門補特伽羅於般涅槃欲樂劣故親愛劣故譬如乾朽葦草舍宅魔便於彼積集可愛境界炬火而焚燎之由二因緣彼為境界常所蔽伏一未生纏令其生故二已生纏令相續故由為境界愛所蔽伏於廣追覓諸境界時多行種種惡不善行於行如是邪惡行時復為種種惡不善法之所蔽伏如前所説行邪行已失路而行沿流而去名順流者與此相違所有白品當知是名非順流者二一七三九五一一七七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘譬如灰河南岸極熱多諸利刺在於暗處衆多罪人在於河中隨流漂沒中有一人不愚不癡聰明黠慧樂樂厭苦樂生厭死作如是念我今何緣在此灰河南岸極熱又多利刺在暗冥處隨流漂沒我當以手足方便逆流而上漸見小明其人默念今已疾強見此小明復運手足勤加方便遂見平地即住於彼觀察四方見大石山不斷不壞亦不穿穴即登而上復見清涼八分之水所謂冷美輕軟香淨飲時不噎咽中不閡飲已安身即入其中若浴若飲離諸惱熱然後復進大山上見七種華謂優鉢羅華鉢曇摩華拘牟頭華分陀利華修揵提華彌離頭揵提華阿提目多華聞華香已復上石山見四層階堂即坐其上見五柱帳即入其中斂身正坐種種枕褥散華遍布莊嚴妙好而於其中自恣坐臥涼風四湊令身安隱坐高林下高聲唱言灰河衆生諸賢正士如彼灰河南岸極熱多諸利刺其處暗冥求出於彼河中有聞聲者乘聲問言何方得出從何處出其中有言汝何須問何處得出彼喚聲者亦自不知不見從何而出彼亦當復在此灰河南岸極熱多諸利刺於暗冥中隨流來下用問彼為如是比丘我説此譬今當説義灰者謂三惡不善覺云何三欲覺恚覺害覺河者謂三愛欲愛色愛無色愛南岸極熱者謂內外六入處多諸利刺者謂五欲功德暗冥處者謂無明障閉慧眼衆多人者謂愚癡凡夫流謂生死河中有一人不愚不癡者謂菩薩摩訶薩手足方便逆流上者謂精勤修學微見小明者謂得法忍得平地者謂持戒觀四方者謂見四真諦大石山者謂正見八分水者謂八聖道七種華者謂七覺分四層堂者謂四如意足五柱帳者謂信等五根正身坐者謂無餘涅槃散華遍布者謂諸禪解脫三昧正受自恣坐臥者謂如來應等正覺四方風吹者謂四增心見法安樂住舉聲唱喚者謂轉法輪彼有人問諸賢正士何處去何處出者謂舍利弗目揵連等諸賢聖比丘於中有言汝何所問彼亦不如不見有所出處彼亦當復於此灰河南岸極熱多諸利刺於暗冥處隨流來下者謂六師等諸邪見輩所謂富蘭那迦葉末伽梨瞿舍梨子散闍耶毗羅胝子阿耆多枳舍欽婆羅伽拘羅迦氈延尼揵連陀闍提弗多羅及餘邪見輩如是比丘大師為諸聲聞所作我今已作汝今當作所作如前篋毒蛇説佛説此經已諸比丘聞佛所説歡喜奉行菩薩勝餘乘復次由八種相當知總攝後有菩薩諸正行道及以道果勝聲聞乘為無有上初等為八謂哀愍故內勇悍故諦察法忍性現前故能出離故自內發起觀諦行故廣大善修世間正見現在前故由獲無漏菩提分法得清淨故由善清淨修覺分俱進修無上純淨修道依止六處修習圓滿獲得六種最勝無上圓滿德故當知此中於諸有情長時哀愍熏修其心住最後有諸大菩薩見諸愚夫墮貪愛河順流漂溺為五相苦之所逼切既觀見已深起大悲何等為五一者見彼墮貪愛河不正尋思不可愛水常所逼觸二者見彼內外六處三毒火難住於兩岸三者見彼在於欲界衆多憂苦種種災橫諸惡毒刺遍布其下四者見彼在於色界世間慧眼有所闕故猶如盲冥處在其中五者見彼在無色界世間慧眼已圓滿故諸聖慧眼有所闕故猶如昏暗居在其上既見如是墮貪愛河諸有情類遍於一切皆不寂靜若觸若岸若下中上苦逼迫已發起大悲是名哀愍又即成就此哀愍者或生王家或帝師家雖未出家內興勇悍我今定當通達妙迹歸修梵行終無退轉如是名為內興勇悍又彼即於未出家位居贍部影獨坐思惟便能證入最初靜慮後於自他老病死法正審觀察能定忍可如是名為諦察法忍內自現前又彼宿世所習善根一切善行之所覺發復由勇悍諦察法忍增上力故便能棄捨廣大妙欲淨信出家雖無施設正梵行者而能自然受持禁戒由此禁戒為依止故漸次能證乃至非想非非想處如是名為能正出離又彼為欲棄世間道正求出離由於先世正等覺所獲得無上究竟出離正聞勝解積集熏修身相續故於世間道都無信樂由是因緣往菩提樹即依先時觀老病死假想之道於諸諦相次第觀察作是思惟是諸世間有情之類墮在種種艱險衆苦有生有老有病有死然其不能於老病死究竟出離如實了知如是次第觀於老死觀老死集觀老死滅觀能趣證老死滅行如理作意為依止故久已積集大資糧故以俱生慧便能覺悟一切法性安住諸法法住法界如是名為自內發起觀察諦行又彼復欲求上漏盡方便發起宿住念智憶念先世從諸如來正等覺所於漏盡道積習聞思由是發起長時積集世間正見令現在前然此正見如教授者以此為依能令菩薩安處一坐乃至證得究竟漏盡如是名為廣大善修正見現前又即由彼如教授者所有正見漸次勝進先已遠離下地諸欲乃至上極無所有處當於聖諦得現觀時便證無漏四念住等乃至最後八聖支道所有一切菩提分法舉其最後當知亦攝前位一切由得彼故成不還果以得無漏菩提分法是故説名獲得清涼彼由如是獲得世間究竟安樂獲得出世無漏安樂得清涼故名離熾然由世間道乃至已離無所有處所繫煩惱及已遠離見道所斷諸煩惱故名離熱惱為欲無餘永斷有頂所繫煩惱故復勤修純無漏道所謂修習無上覺支是名進修無上修道由此修故無學地中六種修法究竟圓滿一者修聖神通究竟圓滿二者修淨五根究竟圓滿三者證得煩惱并諸習氣無餘離繫究竟圓滿四者證得四種現法樂住究竟圓滿五者證得世間靜慮解脫等持等至究竟圓滿六者發得名身句身文身得隨所欲得無艱難宣説正法究竟圓滿當知此中修淨信根究竟滿者謂於涅槃意樂淨故修精進根究竟滿者謂能勇猛造作一切有情義利善清淨故修習念根究竟滿者謂三念住無忘失法善清淨故修習定根究竟滿者謂於聖天及以梵住善清淨故修習慧根究竟滿者謂十智力善清淨故彼由如是能住六處修圓滿因得為大王所謂法王由是證得六種圓滿謂聖神通增上力故得大財富自在圓滿諸根清淨增上力故得大舍宅自在圓滿斷諸煩惱增上力故得受安樂諸坐臥具自在圓滿現法樂住增上力故處其舍宅坐臥其中證得第一無諸損惱大安樂住自在圓滿靜慮解脫等持等至增上力故證得能辦一切有情正利益事遊戲喜樂自在圓滿於諸名身句身文身得隨所欲得無艱難宣説正法增上力故得為法王能於他所獲得平等分布作用自在圓滿如是名為六處修滿為依止故證得六種自在圓滿二一八三九六二七三如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘獨靜思惟云何為我我何所為何等是我我何所住從禪覺已往詣佛所稽首禮足退住一面白佛言世尊我獨一靜處作是思惟云何為我我何所為何法是我我於何住佛告比丘今當為汝説於二法諦聽善思云何為二眼色為二耳聲鼻香舌味身觸意法為二是名二法比丘若有説言沙門瞿曇所説二法此非為二我今捨此更立二法彼但有言數問已不知增其疑惑以非境界故所以者何緣眼色生眼識比丘彼眼者是肉形是內是因緣是堅是受是名眼肉形內地界比丘若眼肉形若內若因緣津澤是受是名眼肉形內水界比丘若彼眼肉形若內若因緣明暖是受是名眼肉形內火界比丘若彼眼肉形若內若因緣輕飄動搖是受是名眼肉形內風界比丘譬如兩手和合相對作聲如是緣眼色生眼識三事和合觸觸俱生受想思此等諸法非我非常是無常之我非恆非安隱變易之我所以者何比丘謂生老死沒受生之法比丘諸行如幻如炎剎那時頃盡朽不實來實去是故比丘於空諸行當知當喜當念空諸行常恆住不變易法空無我我所譬如明目士夫手執明燈入於空室彼空室觀察如是比丘於一切空行心觀察歡喜於空法行常恆住不變易法空我我所如眼耳鼻舌身意法因緣生意識三事和合觸觸俱生受想思此諸法無我無常乃至空我我所比丘於意云何眼是常為非常耶答言非常世尊復問若無常者是苦耶答言是苦世尊復問若無常苦是變易法多聞聖弟子寧於中見我異我相在不答言不也世尊耳鼻舌身意亦復如是如是多聞聖弟子於眼生厭厭故不樂不樂故解脫解脫知見我生已盡梵行已立所作已作自知不受後有耳鼻舌身意亦復如是時彼比丘聞世尊説合手聲譬經教已獨一靜處專精思惟不放逸住乃至自知不受後有成阿羅漢論施設復次略有四種尋求我論由此論故薩迦耶見未永斷者求我尋思數數現行云何為四一者尋求我我用何以為自性二者尋求我我為常為是無常三者尋求云何我我是常無常四者尋求我所有我住在何處當知此中略有四種尋求於我一者尋求自性二者尋求其轉三者尋求其因四者尋求窟宅此中三種可得施設諸行差別又此施設可非顛倒第四一種由一切種終不可得施設差別當知施設我自性者謂即施設十二種處所生六識并受想思以為其我過此餘我不可得故又即此我體是無常由有生故老故死故又此諸行以於諸趣種種自體生起差別不成實故説如幻事想心見倒迷亂性故説如陽焰起盡法故説有增減剎那性故名曰暫時數數壞已速疾有餘頻頻續故説為速疾現前相續來無所從往無所至是故説為本無今有有已散滅由如是相略説生身展轉無常及有因剎那展轉無常如是三種如理施設我之自性若轉若因施設我之所有窟宅終不可得由諸行中離諸行性則有實我住諸行中不可得故由是因緣約世俗諦諸行尚空不可施設何況勝義是故一向於空立空如是由心如理作意聞解了故思等了故修諦了故如其次第差別説言應當歡喜應當等喜應當遍喜二一九三九七二七四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘非汝有者當棄捨捨彼法已長夜安樂諸比丘於意云何於此祇桓中諸草木枝葉有人持去汝等頗有念言此諸物是我所彼人何故輒持去答言不也世尊所以者何彼亦非我非我所故汝諸比丘亦復如是於非所有物當盡棄捨捨彼法已長夜安樂何等為非汝所有謂眼眼非汝所有彼應棄捨棄捨彼法已長夜安樂耳鼻舌身意亦復如是云何比丘眼是常耶為非常耶答言無常世尊復問若無常者是苦耶答言是苦世尊復問若無常苦者是變易法多聞聖弟子寧於中見我異我相在不答言不也世尊耳鼻舌身意亦復如是多聞聖弟子於此六入處觀察非我非我所觀察已於諸世間都無所取無所取故無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行二二三九八二七五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘其有説言大力者其唯難陀此是正説其有説言最端政者其唯難陀是則正説其有説言愛欲重者其唯難陀是則正説諸比丘而今難陀關閉根門飲食知量初夜後夜精勤修習正念正智成就堪能盡壽純一滿淨梵行清白彼難陀比丘關閉根門故若眼見色不取色相不取隨形好若諸眼根增不律儀無明暗障世間貪憂惡不善法不漏其心生諸律儀防護於眼耳鼻舌身意根生諸律儀是名難陀比丘關閉根門飲食知量者難陀比丘於食繫數不自高不放逸不著色不著莊嚴支身而已任其所得為止飢渴修梵行故故起苦覺令息滅未起苦覺令不起故成其崇向故氣力安樂無罪觸住故如人乘車塗以膏油不為自高乃至莊嚴為載運故又如塗瘡不貪其味為息苦故如是善男子難陀知量而食乃至無罪觸住是名難陀知量而食彼善男子難陀初夜後夜精勤修業者彼難陀晝則經行坐禪除去陰障以淨其身於初夜時經行坐禪除去陰障以淨其身於中夜時房外洗足入於室中右脅而臥屈膝纍足係念明相作起覺想於後夜時徐覺徐起經行坐禪是名善男子難陀初夜後夜精勤修習彼善男子難陀勝念正知者是善男子難陀觀察東方一心正念安住觀察觀察南西北方亦復如是一心正念安住觀察如是觀者世間貪憂惡不善法不漏其心彼善男子難陀覺諸受起覺諸受住覺諸受滅正念而住不令散亂覺諸想起覺諸想住覺諸想滅覺諸覺起覺諸覺住覺諸覺滅正念而住不令散亂是名善男子難陀正念正智成就是故諸比丘當作是學關閉根門如善男子難陀飲食知量如善男子難陀初夜後夜精勤修業如善男子難陀正念正智成就如善男子難陀如教授難陀法亦當持是為其餘人説時有異比丘而説偈言善關閉根門正念攝心住飲食知節量覺知諸心相善男子難陀世尊之所歎佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰上貪教授及苦住觀察引發不應供明解脫修無我論定法見苦最為後上貪三因緣故補特伽羅於所緣境上品貪行何等為三一者康強非羸劣二者端嚴非醜陋三者習貪非捨貪復由三種對治攝受尚令如是懷上品貪補特伽羅於善説法毗奈耶中勤修梵行調伏其心令得寂靜何況但懷中軟品貪微薄塵者何等為三一者密護根門為所依止遠離一切欲樂邊故二者於食知量初夜後夜減省睡眠為所依止遠離一切自苦邊故三者最勝正念正知為所依止行於中道出離行故當知此中於四念住善住心者或於行時境界現前若不取相及與隨好如實了知受生住滅若取其相及與隨好如實了知想生住滅或於住時如實了知彼因尋思生住與滅由如是相正念正知於一切時於一切種所緣境界能如正軌守護其心是名最勝正念正如復有最勝正念正知謂已獲得滅盡定者或已獲得無想定者或已獲得無尋伺者當知依止聖住天住除此最勝正念知住更無有餘能過上者或從滅定起已而住或將入定方便而住如實了知受生住滅是名最勝正念正知如依滅定如實知受依無想定如實知想無尋伺定如實了知所有尋伺當知亦爾由此最勝正念正知唯取法故不於如是受想尋伺起我我所虛妄分別若諸愚夫受想尋伺差別生時於受等法不能發起唯有法想但作是念我能領受乃至廣説由是因緣彼尚無有正念正知何況最勝此中後説正念正知或不還果或阿羅漢當知前説正念正知從得作意無有放逸諸異生位至一來果二二一三九九二七六如是我聞一時佛住舍衛國祇樹給孤獨園爾時有如是像類大聲聞尼衆住舍衛國王園中比丘尼衆其名曰純陀比丘尼民陀比丘尼摩羅婆比丘尼波羅遮羅比丘尼阿羅毗迦比丘尼差摩比丘尼難摩比丘尼吉離舍瞿曇彌比丘尼優鉢羅色比丘尼摩訶波闍波提比丘尼此等及餘比丘尼住王園中爾時摩訶波闍波提比丘尼與五百比丘尼前後圍繞來詣佛所稽首禮足退坐一面爾時世尊為摩訶波闍波提比丘尼説法示教照喜種種説法示教照喜已發遣令還言比丘尼應時宜去摩訶波闍波提比丘尼聞佛所説歡喜隨喜作禮而去爾時世尊知摩訶波闍波提比丘尼去已告諸比丘我年已老邁不復堪能