body:
  text: 五陰誦第一行擇攝第一一陰相應事契經者謂四阿笈摩一者雜阿笈摩二者中阿笈摩三者長阿笈摩四者增一阿笈摩雜阿笈摩者謂於是中世尊觀待彼彼所化宣説如來及諸弟子所説相應蘊界處相應緣起食諦相應念住正斷神足根力覺支道支入出息念學證淨等相應又依八衆説衆相應後結集者為令聖教久住結嗢拖南頌隨其所應次第安布當知如是一切相應略由三相何等為三一是能説二是所説三是所為説若如來若如來弟子是能説如弟子所説佛所説分若所了知若能了知是所説如五取蘊六處因緣相應分及道品分若諸苾芻天魔等衆是所為説如結集品如是一切粗略標舉能説所説及所為説即彼一切事相應教間廁鳩集是故説名雜阿笈摩即彼相應教復以餘相處中而説是故説名中阿笈摩即彼相應教更以餘相廣長而説是故説名長阿笈摩即彼相應教更以一二三等漸增分數道理而説是故説名增一阿笈摩如是四種師弟展轉傳來于今由此道理是故説名阿笈摩是名事契經當説契經摩呾理迦為欲決擇如來所説如來所稱所讚所美先聖契經譬如無本母字義不明了如是本母所不攝經其義隱昧義不明了與此相違義即明了是故説名摩呾理迦總嗢拖南曰界略教想行速通因斷支二品智事諍無厭少欲住別嗢拖南曰界説前行觀察果愚相無常等定界二種漸次應當知非斷非常及染淨一一一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當觀色無常如是觀者則為正見正見者則生厭離厭離者喜貪盡喜貪盡者説心解脫如是觀受想行識無常如是觀者則為正見正見者則生厭離厭離者喜貪盡喜貪盡者説心解脫如是比丘心解脫者若欲自證則能自證我生已盡梵行已立所作已作自知不受後有二四二四如觀無常苦空非我亦復如是時諸比丘聞佛所説歡喜奉行五五二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於色當正思惟觀色無常如實知所以者何比丘於色正思惟觀色無常如實知者於色欲貪斷欲貪斷者説心解脫如是受想行識當正思惟觀識無常如實知所以者何於識正思惟觀識無常者則於識欲貪斷欲貪斷者説心解脫如是心解脫者若欲自證則能自證我生已盡梵行已立所作已作自知不受後有時諸比丘聞佛所説歡喜奉行界有四種所化有情先數習邪解脫見所集成界何等為四謂於先有先世先身先所得自體中聽聞常見增上不正法不如理作意增上力故於今由彼為因由彼為緣數習邪解脫見所集成界如説由常見如是由斷見由現法涅槃見由薩迦耶見廣説亦爾此中世尊由種種勝解智力種種界智力增上力故尋求彼先勝解及彼後界如其所應為調伏彼邪勝解界故多分為轉四種法教或為餘智未成熟者令彼智成熟故智已成熟者令彼解脫諸煩惱故為初邪界有情説因滅故行滅由行盡門説無常性為調伏彼邪勝解界故為隨第二邪界有情説因集故行集由行起門説無常性為調伏彼邪勝解界故為隨第三邪界有情由諸行苦門轉正法教為調伏彼邪勝解界故為隨第四邪界有情若離諸行起薩迦耶見行者由諸行空門轉正法教若即諸行起薩迦耶見行者由無我門轉正法教為調伏彼邪勝解界故説復次善説法律略由三種不共支故不共外道墮善説數一者宣説真實究竟解脫故二者宣説即彼方便故三者宣説即彼自內所證故云何真實究竟解脫謂畢竟解脫及一切解脫即是見道果及此後所得世出世修道果此中見道果由畢竟故得名真實而非究竟於一切解脫猶有所應作故又解脫有三種一世間解脫二有學解脫三無學解脫世間解脫非是真實有退轉故有學解脫雖是真實而非究竟猶有所作故當知所餘具足二種云何方便謂於諸行中依如所有性及盡所有性修無常想依無常修苦想依苦修空無我想因此得入諦現觀時由正觀察所知境故獲得正見由此正見為依止故修道位中遍於諸行住厭逆想彼於住時雖由彼相應受憶念思惟不現前境明了現前而不生喜由不生喜增上力故彼於行時即於彼受所緣境界不生染著彼於一切所求境界得處中故尚不希求何況耽著彼由如是若住若行於喜貪纏速能滅盡心清淨住又即於彼如所得道極多修習為因緣故永拔彼品麁重隨眠獲得真實究竟解脫當知即是心善解脫云何自內所證當知有四種相若於有學解脫轉時由二種相內慧觸證謂我已盡諸惡趣中所生諸行又我已盡除其七生二生一生所餘後有所生諸行又我已住能究竟盡無退轉道若於無學解脫轉時即由如是二種相故內慧觸證謂我已作為斷其餘一切煩惱所應學事我今尚無餘一生在況二況七又隨所樂亦能為他如實記別如是名為自內所證前行復次即彼解脫有二種前行法一者見前行法二者道果前行法見前行法者謂由解脫及彼方便自內所證增上力故從他言音起聞思修所成妙善如理作意未入正性離生能入正性離生得如實見出世正見道果前行法者謂得如是正見已復起所餘正思惟等或同時生或後時生道前行法為斷所餘諸煩惱故六六三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於色不知不明不斷不離欲則不能斷苦如是受想行識不知不明不斷不離欲則不能斷苦諸比丘於色若知若明若斷若離欲則能斷苦如是受想行識若知若明若斷若離欲則能堪任斷苦時諸比丘聞佛所説歡喜奉行七七四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於色不知不明不斷不離欲貪心不解脫者則不能越生老病死怖如是受想行識不知不明不斷不離欲貪心不解脫者則不能越生老病死怖比丘於色若知若明若斷若離欲貪心解脫者則能越生老病死怖如是受想行識若知若明若斷若離欲貪心解脫者則能越生老病死怖時諸比丘聞佛所説歡喜奉行八八五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於色不知不明不離欲貪心不解脫心不解脫者則不能斷苦如是受想行識不知不明不離欲貪心不解脫者則不能斷苦於色若知若明若離欲貪心得解脫者則能斷苦如是受想行識若知若明若離欲貪心得解脫者則能斷苦時諸比丘聞佛所説歡喜奉行九九六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於色不知不明不離欲貪心不解脫者則不能越生老病死怖如是受想行識不知不明不離欲貪心不解脫者則不能越生老病死怖諸比丘於色若知若明若離欲貪心解脫者則能越生老病死怖如是受想行識若知若明若離欲貪心解脫者則能越生老病死怖時諸比丘聞佛所説歡喜奉行觀察復次為欲證得所未得解脫故應觀察八事謂於諸行中愛味過患出離觀察及聞思思擇力見道修道觀察於諸行中觀察愛味時能善通達諸行愛味所有自相即於諸行觀察過患時能善了知三受分位過患共相謂於是中甚少愛味多諸過患如是了知愛味染著多諸過患共相應已於所愛味一切行中隨所生起欲貪煩惱即能除遣制伏斷捨於此欲貪不現行故説名為斷非永離欲故名為斷又於彼事心未解脫若於隨眠究竟超越乃永離欲心得解脫是名一門觀察差別又修行者於彼諸行正觀察時先以聞所成慧如阿笈摩了知諸行體是無常無常故苦苦故空及無我彼隨聖教如是勝解如是通達既通達已復以推度相應思惟所成微細作意即於彼境如實了知即由如是通達了知增上力故於彼相應煩惱現行現法當來所有過患如實觀察由思擇力為依止故設復生起而不實著即能捨離彼由如是通達了知及思擇力多修習故能入正性離生既入正性離生已由修道力漸離諸欲彼由思擇見道二種力故隨其所應斷諸煩惱謂不現行斷故及一分斷故由修道力究竟離欲如是由前二種漸離欲貪由修道力心得解脫果復次有二種煩惱斷果及苦滅果一者見所斷果由證彼故能自了知我已永盡捺落迦傍生餓鬼我今證得預流無退墮法乃至廣説二者修所斷果由證彼故能自了知我最後身暫時支持第二有等永不復轉復有二種苦滅一者現在為因未來苦滅二者過去為因現在苦滅復有二種苦滅一者心苦滅二者身苦滅復有二種苦滅一者壞苦苦苦苦滅二者行苦苦滅復有二種苦滅一者非愛業果苦滅二者可愛業果苦滅復有少分已見諦迹諸聖弟子雖已超過諸惡道苦所有怖畏由未永盡一切結故其心猶有於當來世共諸異生老死怖為斷彼故而能發起猛利樂欲乃至正念及無放逸勤修觀行一一七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於色愛喜者則於苦愛喜於苦愛喜者則於苦不得解脫如是受想行識愛喜者則愛喜苦愛喜苦者則於苦不得解脫諸比丘於色不愛喜者則不喜於苦不喜於苦者則於苦得解脫如是受想行識不愛喜者則不喜於苦不喜於苦者則於苦得解脫時諸比丘聞佛所説歡喜奉行無常及苦空非我正思惟無知等四種及於色喜樂愚相復次有二種愚夫之相何等為二一者於所應求不如實知二者非所應求而反生起何等名為是所應求所謂涅槃諸行永滅而諸愚夫於當來世諸行不生都無樂欲於諸行生唯有欣樂由是因緣於所應求及諸行生所有衆苦不如實知何等名為非所應求而反生起非所求者謂老病死非愛合會所愛別離所欲匱乏愁歎憂苦種種熱惱彼於如是諸行生起反生欣樂於生為本一切行中深起樂著於生為本所有諸業造作積集由是因緣於有生苦及生為本老病死等衆苦差別不得解脫如是名為非所應求而反生起一一一一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去未來色無常況現在色聖弟子如是觀者不顧過去色不欣未來色於現在色厭離欲正向滅盡如是過去未來受想行識無常況現在受想行識聖弟子如是觀者不顧過去識不欣未來識於現在識厭離欲正向滅盡一二一四一二一四如無常如是苦空非我亦復如是時諸比丘聞佛所説歡喜奉行無常等定復次於諸行中有四決定一無常決定二苦決定三空決定四無我決定云何諸行無常決定由三種相當知過去未來諸行尚定無常何況現在何等為三謂先無而有故先有而無故起盡相應故若未來行先所未有定非有者是即應非先無而有如是應非無常決定由彼先時施設非有非有為先後時方有是故未來諸行無常決定若現在從緣行生已決定有者是即應非先有而無未來諸行便應非是無常決定現在諸行亦應不與起盡相應由現在行從緣生已非決定有以有為先施設非有是故過去諸行無常決定如是現在諸行因未來行先無而有因過去行先有而無由此施設起盡相應是故説言當知去來諸行無常性尚決定何況現在是名諸行無常決定云何諸行苦性決定謂去來諸行尚是生等苦法何況現在所以者何過去諸行是已度苦未來諸行是未至苦現在諸行是現前苦是名諸行苦性決定云何諸行空性決定謂去來諸行尚定空性何況現在所以者何未來諸行其性未有由此故空過去諸行其性已滅由此故空現在諸行雖有未滅諦義勝義性所遠離由此故空是名諸行空性決定云何諸行無我決定謂去來諸行尚定無我何況現在所以者何未來諸行非我之相未現前故過去諸行非我之相已越度故現在諸行非我之相正現前故是名諸行無我決定又由二相當知諸行決定無常一由過去世已滅壞故二由未來現在世是應滅壞法故又由二相當知諸行決定是苦一是生等苦法故二是三苦性故此諸苦相如前應知又由二相當知諸行決定是空一畢竟離性空故二後方離性空故畢竟離性空者謂諸行中我我所性畢竟空故後方離性空者謂於已斷一切煩惱心解脫中一切煩惱皆悉空故又由二相當知諸行決定無我一諸行種種外性故二諸行從衆緣生不自在故復由十相當知諸行四相決定謂由敗壞變易別離相應法性相故非可樂不安隱相應遠離異相相故如是等相如前聲聞地已廣分別界復次依出世道作意修中有五離繫品界一者斷界二者無欲界三者滅界四者有餘依涅槃界五者無餘依涅槃界謂見道所斷諸行斷故名為斷界修道所斷諸行斷故名無欲界即此唯有餘依故名有餘依涅槃界此依滅故名為滅界亦名無餘依涅槃界即此五界由一切行永寂靜故名諸行止由我我所我慢執著及與隨眠皆遠離故説名為空由一切相皆遠離故名無所得於斷界中一切隨順有漏法上所有貪愛皆遠離故名為愛盡於無欲界所有欲貪皆遠離故名為無欲於滅界中及於有餘依無餘依涅槃界中如其所應皆永滅故皆寂靜故隨其次第説名為滅亦名涅槃又於斷界未得為得勤修習故名於諸行修厭於無欲界未得為得勤修習故名於諸行修離欲於滅界未得為得勤修習故名於諸行修滅一五一五九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘色無常無常即苦苦即非我非我者亦非我所如是觀者名真實正觀如是受想行識無常無常即苦苦即非我非我亦非我所如是觀者名真實正觀聖弟子如是觀者厭於色厭受想行識厭故不樂不樂故得解脫解脫者真實智生我生已盡梵行已立所作已作自知不受後有時諸比丘聞佛所説歡喜奉行一六一六一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘色無常無常即苦苦即非我非我者即非我所如是觀者名真實正觀如是受想行識無常無常即苦苦即非我非我即非我所如是觀者名真實正觀聖弟子如是觀者於色解脫於受想行識解脫我説是等解脫於生老病死憂悲惱苦時諸比丘聞佛所説歡喜奉行二種漸次復次為心解脫勤修習者有二種漸次一智漸次二智果漸次云何智漸次謂於諸行中先起無常智由思擇彼生滅道理故次後於彼生相應行觀為生法老法乃至憂苦熱惱等法由是因緣一切皆苦此即依先無常智生後苦智又彼諸行由是生法乃至是熱惱法故即是死生緣起展轉流轉不得自在行相道理故無有我此則依先苦智生後無我智如是觀無常故苦苦故無我是名智漸次云何智果漸次謂厭離欲解脫遍解脫云何厭謂有對治現前故起厭逆想令諸煩惱不復現行云何離欲謂由修習厭心故雖於對治不作意思惟然於一切染愛事境貪不現行此由伏斷增上力故云何解脫謂即於此伏斷對治多修習故永拔隨眠如是名厭離欲解脫第一差別復有差別謂於厭位斷界極成滿故名厭即依止厭除非想非非想處於餘下地得離欲時施設離欲位故名離欲於非想非非想處得離欲時施設解脫位故名解脫是名厭離欲解脫第二差別云何遍解脫謂由如是煩惱雜染解脫故生等諸苦雜染亦普解脫是名遍解脫如是由智增上力故於諸行中起厭由習厭故得離欲由習離欲故得解脫及遍解脫如是名為智果漸次此中復有四種邪執何等為四一見邪執二慢邪執三自內邪執四他教邪執見邪執者謂於諸行中執我我所慢邪執者謂於諸行中起我慢執前見邪執障諦現觀後我慢邪執障修所斷煩惱等斷自內邪執者謂獨處空間不正分別為依止故執有實我或見邪執或慢邪執他教邪執者謂由他教起邪執者謂此是我此是我所我慢行轉又於內起不正分別執我我所名內邪執亦名非他教邪執如是一切邪執永斷當知是名智果一七一七一一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘色無常若因若緣生諸色者彼亦無常無常因無常緣所生諸色云何有常如是受想行識無常若因若緣生諸識者彼亦無常無常因無常緣所生諸識云何有常如是諸比丘色無常受想行識無常無常者則是苦苦者則非我非我者則非我所聖弟子如是觀者厭於色厭於受想行識厭者不樂不樂則解脫解脫知見我生已盡梵行已立所作已作自知不受後有時諸比丘聞佛所説歡喜奉行一八一八一二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘色無常若因若緣生諸色者彼亦無常無常因無常緣所生諸色云何有常受想行識無常若因若緣生諸識者彼亦無常無常因無常緣所生諸識云何有常如是比丘色無常受想行識無常無常者則是苦苦者則非我非我者則非我所如是觀者名真實正觀聖弟子如是觀者於色解脫於受想行識解脫我説是等為解脫生老病死憂悲惱苦時諸比丘聞佛所説歡喜奉行非斷非常復次由三種相應知諸行非斷非常何等為三一以無住行為因故二生已無住因故三未來諸行因性滅故此中諸行因無常故生已住因不可得故當知諸行非常能生未來諸行現在因性滅故當知諸行非斷復有四緣能令諸行展轉流轉何等為四一因緣二等無間緣三所緣緣四增上緣即此四緣略有二種一因二緣因唯因緣餘三唯緣又因緣者謂諸行種子等無間緣者謂前六識等及相應法等無間滅後六識等及相應法等無間生所緣緣者謂五識身等以五別境為所緣第六識身等以一切法為所緣增上緣者謂五識等以眼等各別所依為增上緣及以能生作意等為增上緣意識身等以四大種身及能生作意等為增上緣又先所造業望所生愛非愛果當知亦是增上緣如是資糧望道道望得涅槃當知亦是增上緣攝一九一九一三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若衆生於色不味者則不染於色以衆生於色味故則有染著如是衆生於受想行識不味者彼衆生則不染於受想行識以衆生味受想行識故彼衆生染著於受想行識諸比丘若色於衆生不為患者彼諸衆生不應厭色以色為衆生患故彼諸衆生則厭於色如是受想行識不為患者彼諸衆生不應厭受想行識以受想行識為衆生患故彼諸衆生則厭於受想行識諸比丘若色於衆生無出離者彼諸衆生不應出離於色以色於衆生有出離故彼諸衆生出離於色如是受想行識於衆生無出離者彼諸衆生不應出離於受想行識以受想行識於衆生有出離故彼諸衆生出離於受想行識諸比丘若我於此五受陰不如實知味是味患是患離是離者我於諸天若魔若梵沙門婆羅門天人衆中不脫不出不離永住顛倒亦不能自證得阿耨多羅三藐三菩提諸比丘我以如實知此五受陰味是味患是患離是離故我於諸天若魔若梵沙門婆羅門天人衆中自證得脫得出得離得解脫結縛永不住顛倒亦能自證得阿耨多羅三藐三菩提時諸比丘聞佛所説歡喜奉行二二一四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我昔於色味有求有行若於色味隨順覺則於色味以智慧如實見如是於受想行識味有求有行若於受想行識味隨順覺則於受想行識味以智慧如實見諸比丘我於色患有求有行若於色患隨順覺則於色患以智慧如實見如是受想行識患有求有行若於識患隨順覺則於識患以智慧如實見諸比丘我於色離有求有行若於色離隨順覺則於色離以智慧如實見如是受想行識離有求有行若於受想行識離隨順覺則於受想行識離以智慧如實見諸比丘我於五受陰不如實知味是味患是患離是離者我於諸天若魔若梵沙門婆羅門天人衆中不脫不離不出永住顛倒不能自證得阿耨多羅三藐三菩提諸比丘我以如實知五受陰味是味患是患離是離我於諸天若魔若梵沙門婆羅門天人衆中以脫以離以出永不住顛倒能自證得阿耨多羅三藐三菩提時諸比丘聞佛所説歡喜奉行過去四種説厭離及解脫二種説因緣味亦復二種染淨復次由三種事二種相應當觀察雜染清淨云何由三種事觀察一切雜染清淨一者於諸行中觀察雜染因緣謂觀彼愛味為愛味故二者於諸行中觀察清淨因緣謂觀彼過患為過患故三者於諸行中觀察清淨謂觀彼出離為出離故如是一切總略為一名由三事觀察一切雜染清淨云何由二種相觀察一切雜染清淨一者由如所有性故二者由盡所有性故如所有性者謂於諸行中若愛味若過患若出離盡所有性者謂於諸行中盡所有愛味盡所有過患盡所有出離此中觀察諸行為緣生樂生喜是名於彼愛味又此愛味極為狹小如是由二種相觀察如所有性所有愛味又觀察諸行是無常苦變壞之法是名於彼過患又此過患極為廣大如是由二種相觀察如所有性所謂過患又復觀察於諸行中欲貪滅欲貪斷欲貪出是名於彼出離又此出離寂靜無上畢竟安隱如是由二種相觀察如所有性所謂出離又即此愛味即此過患即此出離於諸行中若過去若未來若現在若內若外若麁若細若劣若勝若遠若近審諦觀察當知是名於彼觀察盡所有性所謂愛味過患出離又為了知如是三事體性是有應知三種有情衆別一於諸欲染著衆二於諸欲遠離衆三於諸欲離繫衆於此三處復有三種世間愚癡謂若天世間若沙門婆羅門若諸天人如是三種世間由三因緣應知安立一由得欲自在及淨自在故謂若魔若梵世間二由勤修得彼因故謂若沙門婆羅門三趣種種業因果故謂若諸天人又於此三處隨其所應能斷作證有二種道離四倒心謂已入見地及於上修道多修習住又此二種道有四種相心解脫果一貪瞋縛解脫相二欲貪滅斷出離相三九結離繫相四生等諸苦解脫相此中前三相顯示因處煩惱解脫後一相顯示果處諸苦解脫於此義中譬如有人處在囹圄為種種縛之所繫縛所謂或木或索或鐵又置餘人令其防守或設有彼從幽縶處逃至遠所還執將來或有尚不令彼轉動況得逃避或有安置廣大微妙種種可愛所繫妙欲在幽縶處令彼自然心生樂著無欲逃避如是彼人為一切種縛之所縛為善方便守之所守為最堅牢繫之所繫復為怨家隨欲加害所謂打拍或復解割或加杖捶或總斷命若有能脫是四縛者乃得名為從一切縛而得解脫如是於彼三處世間愚癡有情為種種縛所繫縛者當知即譬貪瞋癡縛其守禁者譬不正尋思及未永拔煩惱隨眠不正尋思故尚不令動況得離欲而遠逃避煩惱隨眠未永拔故雖世間道方便逃避遠至有頂復執將還可愛妙欲譬之九結由彼結故令於生死自然樂著於自繫縛不欲解脫彼既如是為種種縛極所密縛善方便縛之所密縛最堅牢縛之所密縛復四魔怨隨其所欲以生等苦而加害之若能從彼四種繫縛善解脫者乃可名為從一切縛而得解脫二一二一一五如是我聞一時佛住舍衛國祇樹給孤獨園爾時有異比丘來詣佛所稽首佛足卻住一面白佛言善哉世尊今當為我略説法要我聞法已當獨一靜處修不放逸修不放逸已當復思惟所以善男子出家剃除鬚髮身著法服信家非家出家學道為究竟無上梵行現法作證我生已盡梵行已立所作已作自知不受後有爾時世尊告彼比丘善哉善哉比丘快説此言云當為我略説法要我聞法已獨一靜處修不放逸乃至自知不受後有如是説耶比丘白佛如是世尊佛告比丘諦聽諦聽善思念之當為汝説比丘若隨使使者即隨使死若隨使死者為取所縛比丘若不隨使使則不隨使死不隨使死者則於取解脫比丘白佛知已世尊知已善逝佛告比丘汝云何於我略説法中廣解其義比丘白佛言世尊色隨使使色隨使死隨使使隨使死者則為取所縛如是受想行識隨使使隨使死隨使使隨使死者為取所縛世尊若色不隨使使不隨使死不隨使使不隨使死者則於取解脫如是受想行識不隨使使不隨使死不隨使使不隨使死者則於取解脫如是世尊略説法中廣解其義佛告比丘善哉善哉比丘於我略説法中廣解其義所以者何色隨使使隨使死隨使使隨使死者則為取所縛如是受想行識隨使使隨使死隨使使隨使死者則為取所縛比丘色不隨使使不隨使死不隨使使不隨使死者則於取解脫如是受想行識不隨使使不隨使死不隨使使不隨使死者則於取解脫時彼比丘聞佛所説心大歡喜禮佛而退獨在靜處精勤修習住不放逸精勤修習住不放逸已思惟所以善男子出家剃除鬚髮身著法服信家非家出家乃至自知不受後有時彼比丘即成羅漢心得解脫復次嗢拖南曰略教教果終墮數三遍智斷縛解脫見慢雜染淨説句遠離四具三圓滿略教由三因緣有諸聲聞往大師所請略教授何等為三謂唯多聞為究竟者於諸餘行而厭背者生如是解但略聞法足得自義何藉多聞以為究竟要修正行為貞實故又棄捨多聞究竟欲故又有怖畏於所入門多所作者為善方便而得入故或有即彼已於多法善聽善思彼作是念我於多法已善聽思若我今者盡已聽思所得諸法以為依止於住心境及解脫境欲繫心者將不令我作意散亂若爾住心尚不能得何況解脫又於如是所聞所思一切法中不得決定當依何者速證通慧當依何者速得出離當緣何境而得住心當緣何境而得解脫彼既如是自不決定若於大師或衆所識如來弟子現前見已便即往詣請略教授教果復次當知正教授有四種自義果得謂為此出家及如此出家即形相具足事業具足意樂具足處捨取具足依此故得無上得現法得自然得內證得終復次有六種死謂過去死現在死不調伏死調伏死同分死不同分死過去死者謂過去諸行沒乃至命根滅故死現在死者謂現在諸行沒乃至命根滅故死不調伏死者謂於過去世不調不伏有隨眠行展轉隨眠世俗説言士夫隨眠而命終已於現在世結生相續有隨眠行所攝自體而得生起於現在世乃至壽盡亦復如是不調不伏廣説乃至而命終已未來自體復得生起又能攝取有隨眠行由攝取彼以為因故便為生等衆苦所縛亦為貪等大縛所縛調伏死者謂於現在世已調已伏無有隨眠而命終已未來自體不復生起亦不攝取有隨眠行不攝取彼以為因故解脫生等衆苦差別亦復解脫貪等大縛同分死者謂如過去不調不伏曾捨身命於現在世亦復如是而捨身命當知如此名同分死名相似死名隨順死若於過去不調不伏捨身命已於現在世已調已伏而捨身命當知此名不同分死不相似死不隨順死若於現在有隨眠行展轉隨眠而命終時如過去死名同分死及隨順死不如過去而命終時不能攝取當所結生未來相續同分諸行又此六種死當知有二種相謂諸行流轉過患相及諸行還滅勝利相若於過去及於現在不調不伏同分而死復於未來取生等苦及為貪等煩惱縛者名諸行流轉過患相若於現在已調已伏不同分死又於未來不取衆苦解脫一切煩惱縛者名諸行還滅勝利相二二二二一六如是我聞一時佛住舍衛國祇樹給孤獨園爾時有異比丘來詣佛所所問如上差別者隨使使隨使死者則增諸數若不隨使使不隨使死者則不增諸數佛告比丘汝云何於我略説法中廣解其義時彼比丘白佛言世尊若色隨使使隨使死隨使使隨使死者則增諸數如是受想行識隨使使隨使死隨使使隨使死者則增諸數世尊若色不隨使使不隨使死不隨使使不隨使死者則不增諸數如是受想行識不隨使使不隨使死不隨使使不隨使死者則不增諸數如是世尊我於略説法中廣解其義如是乃至得阿羅漢心得解脫墮數復次由八種相得入於彼諸行生起世俗言説士夫數中謂如是名如是種類如是族姓如是飲食如是領受若苦若樂如是長壽如是久住如是所有壽量邊際如是諸相於菩薩地宿住念中當知如前已廣分別二三二三一七如是我聞一時佛住舍衛國祇樹給孤獨園有異比丘從坐起偏袒右肩合掌白佛言善哉世尊為我略説法要我聞法已當獨一靜處專精思惟住不放逸所以善男子出家剃除鬚髮身著法服信家非家出家學道為究竟無上梵行現法身作證我生已盡梵行已立所作已作自知不受後有爾時世尊告彼比丘善哉善哉汝作是説世尊為我略説法要我於略説法中廣解其義當獨一靜處專精思惟住不放逸乃至自知不受後有汝如是説耶比丘白佛如是世尊佛告比丘諦聽諦聽善思念之當為汝説比丘非汝所應之法宜速斷除斷彼法者以義饒益長夜安樂時彼比丘白佛言知已世尊知已善逝佛告比丘云何於我略説法中廣解其義比丘白佛言世尊色非我所應宜速斷除受想行識非我所應宜速斷除以義饒益長夜安樂是故世尊我於世尊略説法中廣解其義佛言善哉善哉比丘汝於我略説法中廣解其義所以者何色者非汝所應宜速斷除如是受想行識非汝所應宜速斷除斷除已以義饒益長夜安樂時彼比丘聞佛所説心大歡喜禮佛而退獨一靜處精勤修習住不放逸精勤修習住不放逸已思惟所以善男子出家剃除鬚髮身著法服正信非家出家乃至自知不受後有時彼比丘成阿羅漢心得解脫二四二四一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時有異比丘從坐起偏袒右肩為佛作禮卻住一面而白佛言善哉世尊為我略説法要我聞法已當獨一靜處專精思惟不放逸住乃至自知不受後有佛告比丘善哉善哉汝作如是説世尊為我略説法要我聞法已當獨一靜