滅阿難以五受陰是本行所作本所思願是無常滅法彼法滅故是名為滅時二正士各聞所説歡喜而去三相行復次由三種相諸行滅故説名無餘依涅槃界一者先所生起諸行滅故二者自性滅壞諸行滅故三者一切煩惱永離繫故先所生起諸行滅者謂於先世能感後有諸業煩惱之所造作及由先願之所思求今所生起諸行永滅自性滅壞諸行滅者謂彼生已任性滅壞非究竟住諸行永滅一切煩惱永離繫者謂諸煩惱無餘斷滅由今滅故後不更生是故由此三相諸行滅故説名寂滅非永無相其相異故若永無相不可施設説名寂滅四四四四二六一如是我聞一時尊者阿難住拘睒彌國瞿師羅園時尊者阿難告諸比丘尊者富留那彌多羅尼子年少初出家時常説深法作如是言阿難生法計是我非不生阿難云何於生法計是我非不生色生生是我非不生受想行識生生是我非不生譬如士夫手執明鏡及淨水鏡自見面生生故見非不生是故阿難色生生故計是我非不生如是受想行識生生故計是我非不生云何阿難色是常耶為無常耶答曰無常又問無常者是苦耶答曰是苦又問若無常苦者是變易法聖弟子於中復計我異我相在不答曰不也如是受想行識為是常耶為無常耶答曰無常若無常是苦耶答曰是苦又問若無常苦者是變易法多聞聖弟子於中寧復計我異我相在不答曰不也阿難是故色若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在如是受想行識若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在如實知如實觀察如是觀者聖弟子於色生厭離欲解脫我生已盡梵行已立所作已作自知不受後有如是受想行識生厭離欲解脫我生已盡梵行已立所作已作自知不受後有諸比丘當知彼尊者於我有大饒益我從彼尊者所聞法已遠塵離垢得法眼淨我從是來常以此法為四衆説非餘外道沙門婆羅門出家者説我見差別復次有四種我見為所依止能生我慢一有分別我見謂諸外道所起二俱生我見謂下至禽獸等亦能生起三緣自依止我見謂於各別內身所起四緣他依止我見謂於他身所起分別我見為所依止生我慢者謂由此見觀自他身計有實我由此二種我見為依發生我慢譬如清淨圓鏡面上質像為依發生影像影像為依於自依止發生劣中勝想如是由邪分別故緣自依止我見為緣發生緣他依止我見如依質像發生影像又此為緣發生我慢方他謂己或勝或等或劣俱生我見為緣生我慢者當知譬喻與前差別如明眼人臨淨水器自觀眼耳所餘如前應知其相此一切種薩迦耶見唯依善説法毗奈耶方能永斷非餘邪教如是如來及衆共知同梵行者或諸弟子同梵行者有大恩德唯由如是一因緣故名於大師或滅度後同梵行者真實報恩又由第二謂若有能即依如是差別句義為利益故勤修正行如是亦名隨分報恩彼所希望未滿足故四五四五二六二如是我聞一時有衆多上座比丘住波羅㮈國仙人住處鹿野苑中佛般泥洹未久時長老闡陀晨朝著衣持鉢入波羅㮈城乞食食已還攝衣鉢洗足已持戶鈎從林至林從房至房從經行處至經行處處處請諸比丘言當教授我為我説法令我知法見法我當如法知如法觀時諸比丘語闡陀言色無常受想行識無常一切行無常一切法無我涅槃寂滅闡陀語諸比丘言我已知色無常受想行識無常一切行無常一切法無我涅槃寂滅闡陀復言然我不喜聞一切諸行空寂不可得愛盡離欲涅槃此中云何有我而言如是知如是見是名見法第二第三亦如是説闡陀復言是中誰復有力堪能為我説法令我知法見法復作是念尊者阿難今在拘睒彌國瞿師羅園曾供養親覲世尊佛所讚歎諸梵行者皆悉識知彼必堪能為我説法令我知法見法時闡陀過此夜已晨朝著衣持鉢入波羅㮈城乞食食已還攝舉臥具攝臥具已持衣鉢詣拘睒彌國漸漸遊行到拘睒彌國攝舉衣鉢洗足已詣尊者阿難所共相問訊已卻坐一面時闡陀語尊者阿難言一時諸上座比丘住波羅㮈國仙人住處鹿野苑中時我晨朝著衣持鉢入波羅㮈城乞食食已還攝衣鉢洗足已持戶鈎從林至林從房至房從經行處至經行處處處見諸比丘而請之言當教授我為我説法令我知法見法時諸比丘為我説法言色無常受想行識無常一切行無常一切法無我涅槃寂滅我爾時語諸比丘言我已知色無常受想行識無常一切行無常一切法無我涅槃寂滅然我不喜聞一切諸行空寂不可得愛盡離欲涅槃此中云何有我而言如是知如是見是名見法我爾時作是念是中誰復有力堪能為我説法令我知法見法我時復作是念尊者阿難今在拘睒彌國瞿師羅園曾供養親覲世尊佛所讚歎諸梵行者皆悉知識彼必堪能為我説法令我知法見法善哉尊者阿難今當為我説法令我知法見法時尊者阿難語闡陀言善哉闡陀我意大喜我慶仁者能於梵行人前無所覆藏破虛偽刺闡陀愚癡凡夫所不能解色無常受想行識無常一切諸行無常一切法無我涅槃寂滅汝今堪受勝妙法汝今諦聽當為汝説時闡陀作是念我今歡喜得勝妙心得踊悅心我今堪能受勝妙法爾時阿難語闡陀言我親從佛聞教摩訶迦旃延言世人顛倒依於二邊若有若無世人取諸境界心便計著迦旃延若不受不取不住不計於我此苦生時生滅時滅迦旃延於此不疑不惑不由於他而能自知是名正見如來所説所以者何迦旃延如實正觀世間集者則不生世間無見如實正觀世間滅則不生世間有見迦旃延如來離於二邊説於中道所謂此有故彼有此生故彼生謂緣無明有行乃至生老病死憂悲惱苦集所謂此無故彼無此滅故彼滅謂無明滅則行滅乃至生老病死憂悲惱苦滅尊者阿難説是法時闡陀比丘遠塵離垢得法眼淨爾時闡陀比丘見法得法知法起法超越狐疑不由於他於大師教法得無所畏恭敬合掌白尊者阿難言正應如是如是智慧梵行善知識教授教誡説法我今從尊者阿難所聞如是法於一切行皆空皆悉寂不可得愛盡離欲滅盡涅槃心樂正住解脫不復轉還不復見我唯見正法時阿難語闡陀言汝今得大善利於甚深佛法中得聖慧眼時二正士展轉隨喜從座而起各還本處輸屢那三種無明亦有三無間等及滅富留那闡陀法總等品復次由三解脫門增上力故當知建立四種法嗢拖南謂空解脫門無願解脫門無相解脫門一切行無常一切行苦者依無願解脫門建立第一第二法嗢拖南一切法無我者依空解脫門建立第三法嗢拖南涅槃寂靜者依無相解脫門建立第四法嗢拖南復次當知有二種法嗢拖南增上行欲一者勝解俱行欲二者意樂俱行欲勝解俱行欲者由四種法嗢拖南故於諸行中而生樂欲又於諸行寂靜生樂欲者由意樂故獨處空間作意思惟由四種相於彼寂靜其心退還一者於中由見勝利不趣入故二者不信彼得不清淨信故三者於彼所緣不生喜樂不安住故四者於彼而起不樂勝解故與彼相違當知即是意樂俱行欲又由二緣依止無我勝解之欲於彼涅槃由驚恐故其心退還一由於此欲不善串習未到究竟故二於作意時由彼因緣念忘失故又此忍欲未串習故當爾之時於諸行中了唯行智其心愚昧數數思惟我我爾時當何所在尋求我行微細俱行障礙而轉由此緣故彼作是思我當不有不作是念唯有諸行當來不有彼由如是隨逐身見為依止故發生變異隨轉之識由驚恐故於彼寂滅其心退還三復次為斷如是驚恐有二種法多有所作一者於諸有智同梵行所如實自顯二者因善法欲發解了心及調柔心又發如是解了心者聽聞正法由三種相發生歡喜一者由補特伽羅增上故二者由法增上故三者由自增上故補特伽羅增上者謂由覩見深可讚仰具大威力端嚴大師及所稱揚善説法者法增上者謂所説法能令出離煩惱業苦及令信解最上深義自增上者謂有力能於所説法能隨覺悟又發如是調柔心者謂有三見一者若依彼而轉二者若由彼遍知三者若應所引發依彼而轉者謂於諸諦未得現觀為得現觀依彼勝解俱行極善串習正見而轉由彼遍知者謂依隨順現觀正見於三事我執薩迦耶見及彼隨眠斷常兩見所依止性并所得果能遍了知言三事者一若所取二若能取三若如是取此何所取謂五取蘊誰能取謂四取云何而取謂四識住隨其次第如前應知為二取心之所依處又即於彼所有諸纏非理所引緣彼境界薩迦耶見生起執著及彼隨眠如前應知云何應所引發謂住於彼而能永斷薩迦耶見三事執著及彼隨眠於聖諦智不藉他緣又若依彼應所遍知正見轉時於其三處起我執著及有隨眠於諸行中若集若沒不善知故於處中行尚不能入況得出離若隨順現觀正見住時於三事中所有我執皆已離繫猶被隨眠之所繫縛於諸行中若集若沒能善知故遠離二邊入處中行雖未出離堪能出離若已引發聖諦現觀由正見故於三事中無我執著遠離隨眠於處中行先趣入已後由此故方得出離當知如是三見轉時有此差別四六四六二六三如是我聞一時佛住拘留國雜色牧牛聚落爾時佛告諸比丘我以知見故得諸漏盡非不知見云何以知見故得諸漏盡非不知見謂此色此色集此色滅此受想行此識此識集此識滅不修方便隨順成就而用心求令我諸漏盡心得解脫當知彼比丘終不能得漏盡解脫所以者何不修習故不修習何等謂不修習念處正勤如意足根力覺道譬如伏雞生子衆多不能隨時蔭卵消息冷暖而欲令子以觜以爪啄卵自生安隱出㲉當知彼子無有自力堪能方便以觜以爪安隱出㲉所以者何以彼雞母不能隨時蔭卵冷暖長養子故如是比丘不勤修習隨順成就而欲令得漏盡解脫無有是處所以者何不修習故不修何等謂不修念處正勤如意足根力覺道若比丘修習隨順成就者雖不欲令漏盡解脫而彼比丘自然漏盡心得解脫所以者何以修習故何所修習謂修念處正勤如意足根力覺道如彼伏雞善養其子隨時蔭卵冷暖得所正復不欲令子方便自啄卵出然其諸子自能方便安隱出㲉所以者何以彼伏雞隨時蔭卵冷暖得所故如是比丘善修方便正復不欲漏盡解脫而彼比丘自然漏盡心得解脫所以者何以勤修習故何所修習謂修念處正勤如意足根力覺道譬如巧師巧師弟子手執斧柯捉之不已漸漸微盡手指處現然彼不覺斧柯微盡而盡處現如是比丘精勤修習隨順成就不自知見今日爾所漏盡明日爾所漏盡然彼比丘知有漏盡所以者何以修習故何所修習謂修習念處正勤如意足根力覺道譬如大舶在於海邊經夏六月風飄日暴藤綴漸斷如是比丘精勤修習隨順成就一切結縛使煩惱纏漸得解脫所以者何善修習故何所修習謂修習念處正勤如意足根力覺道説是法時六十比丘不起諸漏心得解脫佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰速通自體智境界流轉善足行順流知斷相想立違糧師所作等品後廣速通為欲證得未得真實究竟解脫略有三法能令獲得速疾通慧一者智力二者不放逸力三者數習力智力者謂若住彼堪能無間永盡諸漏當知即是有學智見不放逸力者謂已獲得如是知見即依如是所得之道方便勤修於心防護惡不善法數習力者謂即依此方便勤修常作常轉終不謂我為於今日得盡諸漏心解脫耶為於來日為於後日由此邪思令心厭倦無厭倦已便無怯畏無怯畏已不捨加行能盡諸漏問智見何差別答若照過去及以未來非現見境此慧名智照現在境此慧名見又所取為緣此慧名智能取為緣此慧名見又聞思所成此慧名智修所成者此慧名見又能斷煩惱此慧名見煩惱斷已能證解脫此慧名智又緣自相境此慧名智緣共相境此慧名見又由假施設遍於彼彼內外行中或立為我或立有情天龍藥叉健達縛阿素洛揭路荼緊捺洛牟呼洛伽等或立軍林及舍山等以如是等世俗理行緣所知境此慧名智若能取於自相共相此慧名見又尋求諸法此慧名智既尋求已伺察諸法此慧名見又緣無分別影像為境此慧名智緣有分別影像為境此慧名見又有色爾焰影像為緣此慧名見無色爾焰影像為緣此慧名智彼由如是若智若見為所依止方便修時復更勤修四善巧事一觀察事二捨取事三出受事四方便事觀察事者謂四念住為欲對治四顛倒故如實遍知一切境故捨取事者謂四正斷為欲斷除不善法故及為修集諸善法故出受事者謂四神足依四靜慮次第超出始從憂根乃至樂故方便事者謂諸根力覺支道支當知即是能斷見修所斷煩惱正方便故如是勤修善巧事者當知有四種所依能依義所依義者謂觀行者正勤修習能依義者謂成就學諸無漏法而未清淨餘無明㲉所纏裹故又彼諸法由清淨道後方清淨此清淨道當知復有四種差別一者習近正法正審靜慮二者親事善友三者以尸羅根護少欲等法熏練其心四者獨處空間用奢摩他毗鉢舍那勝正安樂以為翼從又清淨者謂即依彼清淨行道多修習故令有學法破無明㲉趣無學地又為得真實究竟解脫當知略有五種漸次一者先集資糧以為依止二者以此為依修奢摩他毗鉢舍那三者以此為依具諦現觀涅槃勝解四者以此為依於劣少證不生喜足亦不安住於可厭法深生厭患五者以此為依證得最後金剛喻定相應學心四七四七二六四如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘於禪中思惟作是念頗有色常恆不變易正住耶如是受想行識常恆不變易正住耶是比丘晡時從禪起往詣佛所頭面禮足卻住一面白佛言世尊我於禪中思惟作是念頗有色常恆不變易正住耶如是受想行識常恆不變易正住耶今白世尊頗有色常恆不變易正住耶頗有受想行識常恆不變易正住耶爾時世尊手執小土摶告彼比丘言汝見我手中土摶不比丘白佛已見世尊比丘如是少土我不可得若我可得者則是常恆不變易正住法佛告比丘我自憶宿命長夜修福得諸勝妙可愛果報之事曾於七年中修習慈心經七劫成壞不還此世七劫壞時生光音天七劫成時還生梵世空宮殿中作大梵王無勝無上領千世界從是以後復三十六反作天帝釋復百千反作轉輪聖王領四天下正法治化七寶具足所謂輪寶象寶馬寶摩尼寶玉女寶主藏臣寶主兵臣寶千子具足皆悉勇健於四海內其地平正無諸毒刺不威不迫以法調伏灌頂王法有八萬四千龍象皆以衆寶莊嚴而挍餝之寶網覆上建立寶幢布薩象王最為導首朝晡二時自會殿前我時念言是大群象日日再反往來蹈殺衆生無數願令四萬二千象百年一來即如所願八萬四千象中四萬二千象百年一至灌頂王法復有八萬四千匹馬亦以純金為諸乘具金網覆上婆羅馬王為其導首灌頂王法有八萬四千四種寶車所謂金車銀車琉璃車頗梨車師子虎豹皮雜色欽婆羅以為覆襯跋求毗闍耶難提音聲之車為其導首灌頂王法領八萬四千城安隱豐樂人民熾盛拘舍婆提王而為上首灌頂王法有八萬四千四種宮殿所謂金銀琉璃頗梨摩尼琉璃由訶而為上首比丘灌頂王法有八萬四千四種寶床所謂金銀琉璃頗梨種種繒褥氍氀毾㲪迦陵伽臥具以敷其上安置丹枕復次比丘灌頂王法復有八萬四千四種衣服所謂迦尸細衣芻摩衣頭鳩羅衣拘沾婆衣復次比丘灌頂王法有八萬四千玉女所謂剎利女似剎利女況復餘女復次比丘灌頂王法有八萬四千釜食衆味具足比丘八萬四千玉女中唯以一人以為給侍八萬四千寶衣唯著一衣八萬四千寶床唯臥一床八萬四千宮殿唯處一殿八萬四千城唯居一城名拘舍婆提八萬四千寶車唯乘一車名毗闍耶難提瞿沙出城遊觀八萬四千寶馬唯乘一馬名婆羅訶毛尾紺色八萬四千龍象唯乘一象名布薩陀出城遊觀比丘此是何等業報得如是威德自在耶此是三種業報云何為三一者布施二者調伏三者修道比丘當知凡夫染習五欲無有厭足聖人智慧成滿而常知足比丘一切諸行過去盡滅過去變易彼自然衆具及以名稱皆悉磨滅是故比丘永息諸行厭離斷欲解脫比丘色為常無常比丘白佛言無常世尊若無常者是苦耶比丘白佛言是苦世尊比丘若無常苦是變易法聖弟子寧復於中計我異我相在不比丘白佛不也世尊如是受想行識為常為無常比丘白佛言無常世尊若無常者是苦耶比丘白佛言是苦世尊比丘若無常苦是變易法聖弟子寧復於中計我異我相在不比丘白佛不也世尊佛告比丘諸所有色若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在如是受想行識若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在比丘於色當生厭離欲解脫如是於受想行識當生厭離欲解脫解脫知見我生已盡梵行已立所作已作自知不受後有時彼比丘聞佛所説踊躍歡喜作禮而去常念土摶譬教授獨一靜處精勤思惟不放逸住不放逸住已所以善男子剃除鬚髮正信非家出家學道為究竟無上梵行見法自知身作證我生已盡梵行已立所作已作自知不受後有時彼尊者亦自知法心得解脫成阿羅漢自體復次由五因緣當知一切自體諸行皆悉無常謂一切自體壽量有限假使有人欲自祈驗我今以手執持泥團或牛糞團能經幾時作是願已隨取彼團是人爾時任情所欲能執不捨乃至於後欲棄即棄欲持即持非如所受必死之身至壽盡際尚不能遂己之所欲延一剎那況乎久住又一切自體因所生故彼因作故是無常故又有自體廣大興盛終歸磨滅而可得故謂在色界欲界天人大梵帝釋轉輪王等又由無倒阿笈摩故謂佛世尊於諸自體無常法性現見現證而宣説故復有三種諸受欲者圓滿差別由是因緣諸受欲者恆常戲論何等為三一資産圓滿二自體圓滿三廣大殊勝有情供養圓滿當知復有三種因緣能得如是圓滿差別謂施戒調伏諸根俱行及欲界慈修所得果慈為先導慈為因處於諸有情損害寂靜行相轉故四八四八二六五如是我聞一時佛住阿毗陀處恆河側爾時世尊告諸比丘譬如恆河大水暴起隨流聚沫明目士夫諦觀分別諦觀分別時無所有無牢無實無有堅固所以者何彼聚沫中無堅實故如是諸所有色若過去若未來若現在若內若外若麁若細若好若醜若遠若近比丘諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固如病如癰如刺如殺無常苦空非我所以者何色無堅實故諸比丘譬如大雨水泡一起一滅明目士夫諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固所以者何以彼水泡無堅實故如是比丘諸所有受若過去若未來若現在若內若外若麁若細若好若醜若遠若近比丘諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固如病如癰如刺如殺無常苦空非我所以者何以受無堅實故諸比丘譬如春末夏初無雲無雨日盛中時野馬流動明目士夫諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固所以者何以彼野馬無堅實故如是比丘諸所有想若過去若未來若現在若內若外若麁若細若好若醜若遠若近比丘諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固如病如癰如刺如殺無常苦空非我所以者何以想無堅實故諸比丘譬如明目士夫求堅固材執持利斧入於山林見大芭蕉樹傭直長大即伐其根斬截其峯葉葉次剝都無堅實明目士夫諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固所以者何以彼芭蕉無堅實故如是比丘諸所有行若過去若未來若現在若內若外若麁若細若好若醜若遠若近比丘諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固如病如癰如刺如殺無常苦空非我所以者何以彼諸行無堅實故諸比丘譬如幻師若幻師弟子於四衢道頭幻作象兵馬兵車兵步兵有智明目士夫諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固所以者何以彼幻無堅實故如是比丘諸所有識若過去若未來若現在若內若外若麁若細若好若醜若遠若近比丘諦觀思惟分別諦觀思惟分別時無所有無牢無實無有堅固如病如癰如刺如殺無常苦空非我所以者何以識無堅實故爾時世尊欲重宣此義而説偈言觀色如聚沫受如水上泡想如春時焰諸行如芭蕉諸識法如幻日種姓尊説周匝諦思惟正念善觀察無實不堅固無有我我所於此苦陰身大智分別説離於三法者身為成棄物壽暖及諸識離此餘身分永棄丘冢間如木無識想此身常如是幻偽誘愚夫如殺如毒刺無有堅固者比丘勤修習觀察此陰身晝夜常專精正智繫念住有為行長息永得清涼處時諸比丘聞佛所説歡喜奉行智境界復次當知於所知事有七種如實通達智行一已得智二未得智三無顛倒智四是處非有知非有智五是處所餘知不空智六苦不淨智七速滅壞智又由十五種相覺了諸行能速斷滅一切行愚何等十五謂水界所生故無我似我而顯現故不住隨欲而造作故覺了諸色猶如聚沫三和合生相似法故如雲地雨和合方便覺了諸受喻若浮泡於所知境能顯能燒能使迷亂相似法故覺了諸想同於陽焰薩迦耶見根本斷故多品自體因差別故剎那量後時無暫停相似法故覺了諸行譬芭蕉柱有取之識依四識住發起種種自體隨轉相似法故覺了諸識方於幻事此廣分別如前攝異門分應知四九四九二六六如是我聞一時佛住舍衛國祇樹給孤獨園爾時佛告諸比丘衆生於無始生死無明所蓋愛結所繫長夜輪回不知苦之本際有時長久不雨地之所生百穀草木皆悉枯乾諸比丘若無明所蓋愛結所繫衆生生死輪回愛結不斷不盡苦邊諸比丘有時長夜不雨大海水悉皆枯竭諸比丘無明所蓋愛結所繫衆生生死輪回愛結不斷不盡苦邊諸比丘有時長夜須彌山王皆悉崩落無明所蓋愛結所繫衆生長夜生死輪回愛結不斷不盡苦邊諸比丘有時長夜此大地悉皆敗壞而衆生無明所蓋愛結所繫衆生長夜生死輪回愛結不斷不盡苦邊比丘譬如狗子繫柱彼繫不斷長夜繞柱輪回而轉如是比丘愚夫衆生不如實知色色集色滅色味色患色離長夜輪回順色而轉如是不如實知受想行不如實知識識集識滅識味識患識離長夜輪回順識而轉諸比丘隨色轉隨受轉隨想轉隨行轉隨識轉隨色轉故不脫於色隨受想行識轉故不脫於受想行識以不脫故不脫生老病死憂悲惱苦多聞聖弟子如實知色色集色滅色味色患色離故不隨色轉如實知受想行如實知識識集識滅識味識患識離故不隨識轉不隨轉故脫於色脫於受想行識我説脫於生老病死憂悲惱苦佛説此經已時諸比丘聞佛所説歡喜奉行流轉復次有二世間攝一切行一有情世間二器世間有情世間名種類生死器世間名器生死種類生死不同其餘生死法故望器生死當知略有五不同分謂器生死共因所生種類生死但由不共是名第一因不同分又器生死於無始終前後際斷種類生死於無始終相續流轉常無斷絶是名第二時不同分又器生死或火水風之所斷壞種類生死則不如是是名第三治不同分又器生死因無永斷種類生死則不如是是名第四斷不同分又器生死斷而復續種類生死斷已無續是名第五續不同分又於生死由五種相一切愚夫流轉不息一由愛因故二由愛果故三由愛自性故四由因展轉故五即因展轉依止前際無窮盡故此中無明是名愛因能往善趣惡趣諸業是名愛果由往善趣業故愛結所繫愚夫自然樂往由往惡趣業故愛鎖所縶愚夫雖不欲往強逼令去愛自性者略有三種一後有愛二喜貪俱行愛三彼彼喜樂愛如是三愛略攝為二一者有愛二者境愛後有愛者是名有愛喜貪俱行愛者謂於將得現前境界及於已得未受用境並於現前正受用境所有貪愛彼彼喜樂愛者謂於未來所希求境所有貪愛當知此中由喜貪俱行愛故名愛結繫由後有愛及彼彼喜樂愛故名愛鎖繫若於彼事愛結所繫名為馳走若於彼事愛鎖所繫名為流轉又於長世因展轉來諸行相續前際難知後無窮盡由是五相流轉愚夫當知復由五相所縛一於彼處縛二由彼而縛三正是能縛四依彼故縛五有所領受於彼處縛者謂由能往善趣業故於善趣柱而繫縛之或由能往惡趣業故於惡趣撅而繫縛之又由喜貪俱行愛故於自事柱而繫縛之由彼彼喜樂愛及後有愛故於自事撅而繫縛之由彼而縛者謂愚夫異生為無明縛正是能縛者謂自同類於苦無厭相似法故依彼故縛者謂依後蘊而被縛故有所領受者謂領受彼生等衆苦五五二六七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘衆生於無始生死無明所蓋愛結所繫長夜輪回生死不知苦際諸比丘譬如狗繩繫著柱結繫不斷故順柱而轉若住若臥不離於柱如是凡愚衆生於色不離貪欲不離愛不離念不離渴輪回於色隨色轉若住若臥不離於色如是受想行識隨受想行識轉若住若臥不離於受想行識諸比丘當善思惟觀察於心所以者何長夜心為貪欲所染瞋恚愚癡所染故比丘心惱故衆生惱心淨故衆生淨比丘我不見一色種種如斑色鳥心復過是所以者何彼畜生心種種故色種種是故比丘當善思惟觀察於心諸比丘長夜心貪欲所染瞋恚愚癡所染心惱故衆生惱心淨故衆生淨比丘當知汝見嗟蘭那鳥種種雜色不答言曾見世尊佛告比丘如嗟蘭那鳥種種雜色我説彼心種種雜亦復如是所以者何彼嗟蘭那鳥心種種故其色種種是故當善觀察思惟於心長夜種種貪欲瞋恚愚癡所染心惱故衆生惱心淨故衆生淨譬如畫師畫師弟子善治素地具衆彩色隨意圖畫種種像類如是比丘凡愚衆生不如實知色色集色滅色味色患色離於色不如實知故樂著於色樂著色故復生未來諸色如是凡愚不如實知受想行不如實知識識集識滅識味識患識離不如實知故樂著於識樂著識故復生未來諸識當生未來色受想行識故於色不解脫受想行識不解脫我説彼不解脫生老病死憂悲惱苦有多聞聖弟子如實知色色集色滅色味色患色離如實知故不樂著於色以不樂著故不生未來色如實知受想行如實知識識集識滅識味識患識離如實知故不樂著於識不樂著故不生未來諸識不樂著於色受想行識故於色得解脫受想行識得解脫我説彼等解脫生老病死憂悲惱苦佛説此經已時諸比丘聞佛所説歡喜奉行喜足行復次愚夫異生於有漏事有四喜足當知多分是諸外道何等為四一於人身喜足二於欲界天身喜足三於生梵世喜足四於到邊際有頂喜足愚夫於彼隨其次第若趨若住若坐若臥復有五種一切愚夫愛所行路一者後有二者未來所求境界三者將得現前境界四者已得所有境界五者現前受用境界當知於彼如其次第趨等差別應知此中趨有二種一於後有二於未來所求境界復有四種愛所行路一者意業希求境界二者身語二業三者獲得四者於所得中隨其所欲若轉若習此是發業愛所行路若求境界或復諸有當知於彼四種行路如其次第趨等差別如説趨等於餘所説諸有漏事所有喜足愛所行路喜樂戲論染著耽湎四處差別如其次第當知亦爾復有二種遊愛行路果相差別一心差別二身差別心差別者復有二種一品類差別二雜染差別品類差別者謂由自性故所依故所緣故助伴故雜染差別者謂由貪瞋癡等所有煩惱及隨煩惱身差別者亦有二種一種種身差別故二一種身差別故當知此中心之所有雜染差別能為二種身差別因為斷彼故諸修行者應以無倒數數作意勤修觀行復由四種因差別故令果差別謂若於此差別若由此差別若即此差別若如此差別於此差別者謂於善趣惡趣所有差別由此差別者謂由貪瞋癡所染污心令彼差別即此差別者謂五種行所攝受身種種差別如此差別者謂於諸行流轉雜染清淨因緣及清淨體不如實知生喜樂等及趨走等種種差別五一五一二六八如是我聞一時佛在舍衛國祇樹給孤獨園爾時世尊告諸比丘譬如河水從山澗出彼水深駛其流激注多所漂沒其河兩岸生雜草木大水所偃順靡水邊衆人涉渡多為水所漂隨流沒溺遇浪近岸手援草木草木復斷還隨水漂如是比丘若凡愚衆生不如實知色色集色滅色味色患色離不如實知故樂著於色言色是我彼色隨斷如是不如實知受想行不如實知識識集識滅識味識患識離不如實知故樂著於識言識是我識復隨斷若多聞聖弟子如實知色色集色滅色味色患色離如實知故不樂著於色如實知受想行如實知識識集識滅識味識患識離如實知故不樂著識不樂著故如是自知得般涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已時諸比丘聞佛所説歡喜奉行順流復次不能了達諸行無常薩迦耶見為所依止順流而行諸愚夫類由五種相當知順流而被漂溺謂若於此漂溺若由此漂溺若依此漂溺若如此漂溺若漂溺時諸所有相於此漂溺者謂於善趣惡趣而被漂溺如從兩岸彼此往來俱被漂溺由此漂溺者謂由愛河浸淫之性之所漂溺當知此愛有五種相一遊諸境界趣下分故二微細隨行難覺了故三於諸境界難回轉故四乃至有頂一切廣大種種諸行所隨逐故五不寂靜相亂身心故依此漂溺者謂依色等五種諸行而被漂溺即於善趣惡趣兩岸有五種行品類差別數數攀緣順流漂溺如此漂溺者云何漂溺謂於諸行如前所説流轉等事隨其次第不如實知或計為我及我所故於漂溺時所有相者謂彼如是被漂溺時雖寶愛身欲使長久由自性滅不能令住如為漂溺與此相違當知即是逆流行者又聰慧者有十種相當知具攝諸聰慧相謂成就俱生慧故又成就方便聞思修所成慧故又成就故無動搖故善思所思善説所説善作所作又能自依己所有性未嘗為命依附於他又有所求無不安樂又有所求能依正行皆悉以法不以非法又自所宜資産衆具能正防守不令散失又觀過患而受用之又於病緣所有醫藥觀察思擇然後服行又能善避非時死緣如是十種聰慧者相當知具攝諸聰慧相五二五二二六九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘非汝所應法當盡捨離捨彼法已長夜安樂比丘何等法非汝所應當速捨離如是色受想行識非汝所應當盡捨離斷彼法已長夜安樂譬如祇桓林中樹木有人斫伐枝條擔持而去汝等亦不憂戚所以者何以彼樹木非我非我所如是比丘非汝所應者當盡捨離捨離已長夜安樂何等非汝所應色非汝所應當盡捨離捨離已長夜安樂如是受想行識非汝所應當速捨離捨彼法已長夜安樂諸比丘色為常耶為無常耶諸比丘白佛言無常世尊比丘無常者為是苦耶答言是苦世尊佛告比丘若無常苦是變易法多聞聖弟子寧於中見有我異我相在不答言不也世尊如是受想行識為是常耶無常耶答言無常世尊比丘若無常者是苦耶答言是苦世尊佛告比丘若無常苦是變易法多聞聖弟子寧於中見有我異我相在不答言不也世尊比丘是故諸所有色若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在如是受想行識若過去若未來若現在若內若外若麁若細若好若醜若遠若近彼一切非我不異我不相在聖弟子觀此五受陰非我我所如是觀時於諸世間無所取著無所取著者自得涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已時諸比丘聞佛所説歡喜奉行知斷相復次於諸行中依無我理知者斷者當知略由三相差別謂於諸行能遍了知薩迦耶見而未斷者彼於諸行忘念之行多分現行少不忘念薩迦耶見已永斷者當知其相與彼相違是名第一差別之相又於諸行雖遍了知薩迦耶見而未斷者於諸廣大可愛事中多生喜樂於諸下劣不可愛境多生憂苦彼二境界現在前時無縱逸者尚自不能繫守正念況縱逸者彼於爾時薩迦耶見纏繞其心由彼令心不能解了薩迦耶見已永斷者當如其相與彼相違是名第二差別之相又於諸行薩迦耶見未永斷者未能於內一切行中現前安立離有情想如於草木葉等外事薩迦耶見已永斷者當知其相與彼相違是名第三差別之相如是已斷薩迦耶見有此三種差別之相當知復有三種勝利一者永斷能感後有一切煩惱二者依彼不久獲得速能積集彼對治道三者既作自義利已即依彼道方便勤修現法樂住由此獲得極安樂住五三五三二七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如田夫於夏末秋初深耕其地發荄斷草如是比丘無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如比丘如人刈草手攬其端舉而抖擻萎枯悉落取其長者如是比丘無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如菴羅果著樹猛風搖條果悉墮落如是無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如樓閣中心堅固衆材所依攝受不散如是無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如一切衆生迹象迹為大能攝受故如是無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如閻浮提一切諸河悉赴大海其大海者最為第一悉攝受故如是無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如日出能除一切世間暗冥如是無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明譬如轉輪聖王於諸小王最上最勝如是無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明諸比丘云何修無常想修習多修習能斷一切欲愛色愛無色愛掉慢無明若比丘於空露地若林樹間善正思惟觀察色無常受想行識無常如是思惟斷一切欲愛色愛無色愛掉慢無明所以者何無常想者能建立無我想聖弟子住無我想心離我慢順得涅槃佛説是經已時諸比丘聞佛所説歡喜奉行想立復次由四差別當知修習一切種行無常苦想何等為四一果差別故二自性差別故三品類差別故四方便差別故果差別者謂修此想能遣一切欲貪色貪及無色貪掉慢無明當知此中顯示三種本煩惱斷及顯三種隨煩惱斷欲貪煩惱掉為助伴色貪煩惱慢為助伴無色貪惑無明為伴復有差別謂於此中顯示下分上分結盡自性差別者謂於此中由正修習聞所成慧説名親近由正修習思所成慧能入修故説名修習由正修習修所成慧名多修習又由修習了相作意故名親近唯除加行究竟作意由正修習諸餘作意故名修習修習加行究竟作意名多修習是名第二三種差別又由所依所緣作意隨其次第當知是名為乘為事為隨建立又由長時串修習故説名純熟數數無倒修方便故説名善受及與善發品類差別者謂修如是無常想時速能永拔一切隨眠棄捨下地一切善法攝受上地一切善法於餘一切不淨想等最高廣性能善住持遍行一切猶如觀察所取之事即如是觀能取之事彼相解脫能得無漏無常之想若有漏想若無漏想如是一切皆於涅槃善能隨順趣向臨入皆能對治無明大暗一切永斷永斷彼故清淨鮮白諸無學想皆由一切無漏學想增上故得方便差別者謂獨處空間以無顛倒數數作意觀察諸行無常之性由無常想住無我想於見道中既住無漏無我想已於上修道由有學想永害我慢隨得涅槃二種皆具五四五四二七一如是我聞一時佛住舍衛國祇樹給孤獨園爾時有比丘名曰低舍與衆多比丘集於食堂語諸比丘言諸尊我不分別於法不樂修梵行多樂睡眠疑惑於法爾時衆中有一比丘往詣佛所禮佛足卻住一面白佛言世尊低舍比丘與衆多比丘集於食堂作如是説唱言我不能分別於法不樂修梵行多樂睡眠疑惑於法佛告比丘是低舍比丘是愚癡人不守根門飲食不知量初夜後夜心不覺悟懈怠懶惰不勤精進不善觀察思惟善法彼於分別法心樂修梵行離諸睡眠於正法中離諸疑惑無有是處若當比丘守護根門飲食知量初夜後夜覺悟精進觀察善法樂分別法樂修梵行離於睡眠心不疑法斯有是處爾時世尊告一比丘汝往語低舍比丘言大師呼汝比丘白佛唯然受教前禮佛足詣低舍所而作是言長老低舍世尊呼汝低舍聞命詣世尊所稽首禮足卻住一面爾時世尊語低舍比丘言汝低舍實與衆多比丘集於食堂作是唱言諸長老我不能分別於法不樂梵行多樂睡眠疑惑於法耶低舍白佛實爾世尊佛問低舍我今問汝隨汝意答於意云何若於色不離貪不離欲不離愛不離念不離渴彼色若變若異於汝意云何當起憂悲惱苦為不耶低舍白佛如是世尊若於色不離貪不離欲不離愛不離念不離渴彼色若變若異實起憂悲惱苦世尊實爾不異佛告低舍善哉善哉低舍正應如是色不離貪欲説法低舍於受想行於識不離貪不離欲不離愛不離念不離渴彼識若變若異於汝意云何當起憂悲惱苦為不耶低舍白佛如是世尊於識不離貪不離欲不離愛不離念不離渴彼識若變若異實起憂悲惱苦世尊實爾不異佛告低舍善哉善哉正應如是識不離貪欲説法佛告低舍於意云何若於色離貪離欲離愛離念離渴彼色若變若異時當生憂悲惱苦耶低舍白佛不也世尊如是不異於意云何受想行識離貪離欲離愛離念離渴彼識若變若異當生憂悲惱苦耶低舍答曰不也世尊如是不異佛告低舍善哉善哉低舍今當説譬夫智慧者以譬得解如二士夫共伴行一路一善知路一不知路其不知者語知路者作如是言我欲詣某城某村某聚落當示我路時知路者即示彼路語言士夫從此道去前見二道捨左從右前行復有坑澗渠流復當捨左從右復有叢林復當捨左從右汝當如是漸漸前行得至某城佛告低舍其譬如是不知路者譬愚癡凡夫其知路者譬如來應等正覺前二路者謂衆生狐疑左路者三不善法貪恚害覺其右路者謂三善覺出要離欲覺不瞋覺不害覺前行左路者謂邪見邪志邪語邪業邪命邪方便邪念邪定前行右路者謂正見正志正語正業正命正方便正念正定坑澗渠流者謂瞋恚覆障憂悲叢林者謂五欲功德也城者謂般涅槃佛告低舍佛為大師為諸聲聞所作已作如今當作哀愍悲念以義安樂皆悉已作汝等今日當作所作當於樹下或空露地山巖窟宅敷草為座善思正念修不放逸莫令久後心有悔恨我今教汝爾時低舍聞佛所説歡喜奉行違糧復次為住涅槃仍未積集善資糧者略有五種違資糧法一者憶念往昔笑戲歡娛承奉等事因發思慕俱行作意生愁歎等二者由彼種種為依於所領受究竟法中多生忘念令於諸法不能顯了三者所食或過或少由此令身沈重羸劣於諸梵行不樂修行四者喜眠不串習斷故為上品睡眠所纏五者親近猥雜而住遠離諦思正法加行如是五種違資糧法復有五種隨順彼法一者於二離欲猶未能離隨一種欲謂於諸纏遠分離欲勤修善品及於隨眠永害離欲得正對治二者不護根門三者食不知量四者初夜後夜不能勤修勉勵警覺五者不能觀察善法究竟與上相違當知是名順資糧法及能隨順彼隨順法又諸聲聞修行如是順資糧法及彼因緣於其中間求涅槃時大師為彼制立五種正道言教一者由依觀察如所聞法遍於一切諸行無常諸法無我涅槃寂靜且以世間作意而得無惑無疑二者即於住時不著三事不正尋思何等三事一者資命衆具二者他損害相三者或他毀罵或隨有一非愛現行同梵行者不同分法三者教授為先由依他音如理作意能生正見能斷邪見當知此三是名住時正道言教復有二種於彼行時正道言教謂諸有智同梵行者為彼宣説處非處時不生忿怒又由麁弊資命衆具若得不得及由戒等所有災害心不熱惱是名第一於得所勝利養恭敬心不悒然是名第二彼由如是住時行時能正修行涅槃妙道由此不久當得涅槃終無毀失五五五五二七二如是我聞一時佛住舍衛國祇樹給孤獨園爾時衆中有少諍事世尊責諸比丘故晨朝著衣持鉢入城乞食食已出攝舉衣鉢洗足入安陀林坐一樹下獨靜思惟作是念衆中有少諍事我責諸比丘然彼衆中多年少比丘出家未久不見大師或起悔心愁憂不樂我已長夜於諸比丘生哀愍心今當復還攝取彼衆以哀愍故時大梵王知佛心念如力士屈伸臂頃從梵天沒住於佛前而白佛言如是世尊如是善逝責諸比丘以少諍事故於彼衆中多有年少比丘出家未久不見大師或起悔心愁憂不樂世尊長夜哀愍攝受衆僧善哉世尊願今當還攝諸比丘爾時世尊心已垂愍梵天故默然而許時大梵天知佛世尊默然已許為佛作禮右繞三匝忽然不現爾時世尊大梵天王還去未久即還祇樹給孤獨園敷尼師檀斂身正坐表現微相令諸比丘敢來奉見時諸比丘來詣佛所懷慚愧色前禮佛足卻坐一面爾時世尊告諸比丘出家之人卑下活命剃髮持鉢家家乞食如被禁呪所以然者為求勝義故為度生老病死憂悲惱苦究竟苦邊故諸善男子汝不為王賊所使非負債人不為恐怖不為失命而出家正為解脫生老病死憂悲惱苦汝等不為此而出家耶比丘白佛實爾世尊佛告比丘汝等比丘為如是勝義而出家云何於中猶復有一愚癡凡夫而起貪欲極生染著瞋恚凶暴懈怠下劣失念不定諸根迷亂譬如士夫從暗而入暗從冥入冥從糞廁出復墮糞廁以血洗血捨離諸惡還復取惡我説此譬凡愚比丘亦復如是又復譬如焚尸火燼捐棄冢間不為樵伐之所採拾我説此譬愚癡凡夫比丘而起貪欲極生染著瞋恚凶暴懈怠下劣失念不定諸根散亂亦復如是比丘有三不善覺法何等為三貪覺恚覺害覺此三覺由想而起云何想想有無量種種貪想恚想害想諸不善覺從此而生比丘貪想恚想害想貪覺恚覺害覺及無量種種不善云何究竟滅盡於四念處繫心住無相三昧修習多修習惡不善法從是而滅無餘永盡正以此法善男子善女人信樂出家修習無相三昧修習多修習已住甘露門乃至究竟甘露涅槃我不説此甘露涅槃依三見者何等為三有一種見如是如是説命則是身復有如是見命異身異又作是説色是我無二無異長存不變多聞聖弟子作是思惟世間頗有一法可取而無罪過者思惟已都不見一法可取而無罪過者我若取色即有罪過若取受想行識則有罪過作是知已於諸世間則無所取無所取者自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已時諸比丘聞佛所説歡喜奉行應説小土摶泡沫二無知河流祇林樹低舍責諸想師所作復次大師於諸聲聞略有五種師所作事一者正折伏二者正攝受三者正訶責四者正説雜染五者正説清淨復次由二因緣於諸諍事違越聲聞覆相記別彼所諍事一擾亂增廣故二與律相應故復次由七因緣大師驅擯諸聲聞衆一者見一切種皆行邪行故二者見彼多分故三者由彼衆首上座阿遮利耶塢波拖耶方便故四者不堪共住故五者被驅擯故六者避現前過故七者令不生起未來過故復次由十因緣如來入於聚落乞食一者當顯杜多功德故二者為欲引彼一分令入乞食故三者為欲以同事行攝彼一分故四者為與未來衆生作大照明故乃至令彼暫起觸證故五者為欲引彼麁弊勝解諸外道故六者為彼承聲起謗故現妙色寂靜威儀令其驚歎心生歸向故七者為彼處中衆生以其少功而樹多福故八者為令壞信放逸深生恥愧雖用小功而獲大福故如為放逸者懈怠者亦然九者為彼盲聾癲狂心亂衆生種種災害皆令靜息故十者為令無量無邊廣大威德天龍藥叉健達縛阿素洛揭路荼緊捺洛牟呼洛伽等隨從如來至所入家深生羡仰勤加賓衛不為惱害故復次由八因緣如來入於寂靜天住一者為引樂雜住者令入遠離故二者為欲以同事行攝遠離者故三者自受現法樂住故四者為與大族諸天示同集會故五者為以佛眼觀察十方世界現大神化隨其所應作饒益事故六者為令諸聲聞衆於見如來深生渴仰故七者為顯諸大聲聞於所略説善能悟入故八者勸捨樂著戲論制作言詞故復次由五種相大師攝受諸聲聞衆一以法故二以財故三與依止故四初攝受故五擯攝受故復次由七因緣釋梵天等往如來所一為供養如來故二為聽聞正法故三為決所生疑故四為順他而為翼從故五為愍他欲為饒益故六由愛重如來聖教故七知如來起世俗心欲令赴會故復次由五種相當知一切初新者性一由晚出家故二由幼出家故三由少出家故四由勞策出家故五由受具出家故復次由三種相生起惡作一違越所學增上故二誓受法律增上故三棄捨居家增上故復次如來將欲為諸聲聞宣説正法現四種相一者從極下坐安詳而起升極高座儼然而坐二者安住隨順説法威儀三者發謦咳音示將説法四者面目顧視如龍象王復次犯戒聲聞當於三處安住慚羞往大師所一者深知己犯為增上處二者師事失儀為增上處三者由事乖則當以方便謂順威儀往大師所為增上處復次由三種相應正呵責犯戒聲聞一曰汝期鄙劣活命二曰汝意樂不清淨三曰汝以活命意樂行非法行復次於善説法毗奈耶中略由六相當知遍攝一切邪行一者現行過失故二者意樂過失故三者加行過失故四者智慧過失故五者尋思過失故六者依止過失故現行過失者謂由貪纏故染瞋纏故憎既懷猛利貪瞋等故遂無羞恥無羞恥故住惡不捨意樂過失者謂於染者邊此貪意樂最為下劣如是於憎者邊此瞋意樂最為下劣加行過失者謂或有不發精進或有精進慢緩智慧過失者謂或於聞思所成慧中忘失正念多住愚癡於修所成心不寂定尋思過失者謂於隨順居家所有惡不善覺多分尋思於正法律其心錯亂依止過失者謂彼依止於其往昔不修集因由不修集因故成就自性微褊小信成就自性修住小戒成就自性住守小念成就自性俱生小慧復次由四種相能令彼人雖入聖教而行邪行一由微劣不淨意樂故二由伺求聖教瑕隙為正法賊故三由專為飲食衣服活命因緣故四由怖畏王賊債主所加迫切故若行如是諸邪行者便於二事有所稽留一者失壞在家自義稽留二者失壞出家自義稽留復次如是邪行有二因緣謂於三事不正尋思及彼前行諸不正想其三事者如前應知於彼發起諸不正想隨取相好自斯已後於其隨法多隨尋思多隨伺察復次為斷如是邪行因緣當知亦有二種對治一者為斷不正尋思以無顛倒數數二行於諸念住善住其心二者為斷諸不正想修習無相心三摩地此修對治要由於彼修對治中猛利樂欲方得成辦非彼樂欲不猛利者此猛利欲由二緣生謂此對治有大果故不共一切諸外道故有大果者謂修習時便能剋證無相心定及住二界妙甘露門所謂斷界及無欲界若有餘依及無餘依安住此者近二涅槃未於今時一切皆得言不共者謂無相定唯內法有諸外道無何以故由彼外道若有所得即便增益不如量觀若無所得即妄分別由我見故愚於諸行或唯於身或唯無色或總於二生我執著以執我故謂我當無使於涅槃心不欣樂尚未能入況乎安住唯增驚怖其心退還住內法者與彼相違於般涅槃心無退轉了唯苦滅見唯靜德若諸有學唯祈內滅非為生道更從他求教授教誡若諸無學唯欣內滅終不更求盡諸煩惱唯有先因所生諸行任運歸滅而般涅槃五六五六五九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰云何為五色受陰受想行識受陰觀此五受陰是生滅法所謂此色此色集此色滅此受想行此識此識集此識滅云何色集云何色滅云何受想行識集云何受想行識滅愛喜集是色集愛喜滅是色滅觸集是受想行集觸滅是受想行滅名色集是識集名色滅是識滅比丘如是色集色滅是為色集色滅如是受想行識集受想行識滅是為受想行識集受想行識滅佛説此經已時諸比丘聞佛所説歡喜奉行復次嗢拖南曰因勝利二智愚夫分位五二種見差別於斯聖教等因一切行因略有二種一共二不共共因者謂喜為先因由此喜故於彼彼生處障於厭離滋潤自體為欲將生所生之處雖有一切煩惱為因而於生處生喜者生非於彼起厭逆想者又即此喜唯依色説宿因生已不待餘因究竟轉故不共因者謂順苦樂非苦樂觸望於受等所有心法無間滅意及俱生名十種色等望六種識由彼雖從先因所生剎那剎那別待餘因方得生起五七五七六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰何等為五所謂色受陰受想行識受陰善哉比丘不樂於色不讚歎色不取於色不著於色善哉比丘不樂於受想行不樂於識不讚歎識不取於識不著於識所以者何若比丘不樂於色不讚歎色不取於色不著於色則於色不樂心得解脫如是受想行不樂於識不讚歎識不取於識不著於識則於識不樂心得解脫若比丘不樂於色心得解脫如是受想行識不樂心得解脫不滅不生平等捨住正念正智彼比丘如是知如是見者前際俱見永盡無餘前際俱見永盡無餘已後際俱見亦永盡無餘後際俱見永盡無餘已前後際俱見永盡無餘無所封著無所封著者於諸世間都無所取無所取者亦無所求無所求者自覺涅槃我生已盡梵行已立所作已作自知不受後有佛説此經已時諸比丘聞佛所説歡喜奉行勝利復次有解脫心有淨智見諸阿羅漢有四勝利當知不與諸外道共一於行時恆常住性二於住時無相住性三往昔因所生諸行任運歸滅四後有行今因斷故當不復生為證如是四種勝利有三漸次謂學智見為依止故得厭離者於諸行中不生喜樂乃至不生耽湎而住厭離為先而得離欲離欲為先心善解脫自斯已後即由如是心善解脫恆常住故無順無違又於行時或於住時於一切相無復作意於無相界作意思惟無相而住能障於此一切見趣先已永斷況當為礙彼由是二若行若住乃至壽盡便以無學內般涅槃而般涅槃先所生有於今永盡當來諸行無復更生又由三分當知建立薩迦耶見以為根本一切見趣一由前際俱行故二由後際俱行故三由前後際俱行故前際俱行者謂如有一作是思惟我於去世為曾有耶為曾無耶曾為是誰云何曾有後際俱行者謂如有一作是思惟我於來世為當有耶為當無耶當為是誰云何當有前後際俱行者謂如有一作是思惟我曾有誰誰當有我今此有情來何所從於此沒已去何所至又諸外道薩迦耶見以為根本有六十二諸惡見趣謂四常見論四一分常見論二無因論四有邊無邊想論四不死矯亂論如是十八諸惡見趣是計前際説我論者又有十六有見想論八無想論八非有想非無想論七斷見論五現法涅槃論此四十四諸惡見趣是計後際説我論者如是計度後際論者略攝有五一有想論二無想論三非有想非無想論四斷見論五現法涅槃論如是五種復略為三一常見論二斷見論三現法涅槃論又此一切諸惡見趣由六因緣而得建立一由因緣故二由依教故三由依靜慮故四由依世故五由依諸見故六由生處故由因緣者謂彼一切薩迦耶見以為因緣由依教者謂由依彼能顯見趣不正法藏師弟傳聞展轉相授為方便故由依靜慮者謂以靜慮為依止故於先所聞先所信解而得決定又此靜慮復有二種一與宿住隨念俱行二與所得天眼俱行宿住隨念俱行者謂計前際三常論中由下中上清淨差別及於四種邊無邊論由彼憶念諸器世間成壞兩劫出現方便若時憶念成劫分位爾時便生三種妄想若有一向憶念上下下至無間捺落迦下上至第四靜慮之上憶念如是分量邊際便於世間住有邊想若有一向傍憶無際便於世間住無邊想若有憶念二種俱行便於世間住二俱想若時憶念壞劫分位爾時便住非有邊想非無邊想諸器世間無所得故復有依止諸靜慮故當知或説一分常論或説無因論或説不死矯亂論應知此中有二淨天一不善清淨二善清淨若唯能入世俗定者當知是天不善清淨於諸諦中不了達故其心未得善解脫故若能證入內法定者當知是天名善清淨於諸諦中已了達故其心已得善解脫故當知無亂亦有二種一無相無分別二有相有分別此中第一是善清淨天第二是不善清淨天前清淨天於自不死無亂而轉是故説名不死無亂後不清淨若有依於不死無亂有所詰問便託餘事矯亂避之以於諸諦無相心定不善巧故先興心慮作是思惟我等既稱不死無亂復有所餘不死無亂於諸聖諦無相心定已得善巧彼所成德望我為勝彼苦於中詰問於我我若記別或為異記或撥實有或許非有彼於記別見如是等諸過失已作是思惟我於一切所詰問中皆不應記又於是中見有餘過謂他由此鑒我無知因則輕笑不死無亂有行諂者作是思惟我於此中應如是記非我淨天一切隱密皆許記別謂自所證及清淨道如是思已故設詭言而相矯亂彼既如是住邪思惟遍布其心於彼最上清淨天所故稱我是不死無亂由懷恐怖而無記別勿我劣昧為他所知由是因緣不能解脫以此為室而自安處又有愚戇專修止行不能以其諂詐方便矯設亂言但作是思諸有來問我當反詰隨彼所答我當一切如言無減而印順之由是計度有差別故建立四種由依世者謂依過去及現在世起分別故名計前際依未來世起分別故名計後際由依諸見者謂依三見如前應知由依初見於現法中計我有色後或有色有想或無有想或非有想非無想依第二見於現法中計我無色於後所計如前應知依第三見我論有二一者説我有色無色二者説我非有色非無色餘如前説又即計我是有色者或言狹小或言無量計我無色當知亦爾此二我論依第三見立為二論一者計我狹小二者計我無量由是四種我論差別説我有邊説我無邊説我亦有邊亦無邊説我非有邊非無邊隨其次第如前應知又即依止如是諸見及依我論復宣説我清淨解脫於欲靜慮皆得自在隨其所欲多住處化如其所欲安住靜慮以清淨見遊戲受用方便法樂如是名為依諸見故應知安立由生處者謂我有一想乃至廣説有一想者謂在無色空無邊處識無邊處有種種想者謂在下地即如所説隨其次第應知説我有狹小想有無量想一向有樂者謂在下三靜慮一向有苦者謂在捺落迦有樂有苦者謂在鬼傍生人欲界天有不苦不樂者謂在第四靜慮已上乃至非想非非想處又於如是諸外道處當知總有三種衰損一者見及欲樂展轉相違論衰損二者依我無智論問記衰損三者依法隨法行證得衰損此中三種若計有想若計無想若計非有想非無想論者及斷見論者或依責他為勝利論或依免難為勝利論而起計度當知是名第一衰損由彼諸論計度後際依未來世妄計於我為有無故依我無智論問記衰損者謂於若諸雜染若雜染處若能雜染如是一切世俗勝義二諦道理不如實知由此無智有所趣向以為先故得有差別從此無智何所趣向謂三四轉一常無常等二有邊無邊等三自作他作等所以者何彼由無智要先趣向如是差別後方問記又於聖法毗奈耶中所有智者不可記事於二道理不容計故謂世俗勝義二諦道理此中四種一向常論計前際者及計前際無因論者二種差別皆先計我後方緣我一向常等諸論差別又即四種一分常論計前際者彼有差別謂有一分緣常無常論或有一分緣非常非無常論邊無邊等諸轉如前邊無邊等應知其相若欲一切皆宿因作名自作論若欲一切皆自在等變化因作名他作論若欲少分自在天等變化因作一分不爾名俱作論若無因作論名俱非作論當知是名第二依我無智論問記衰損由彼諸論計度前際依過現世妄分別故依法隨法行證得衰損者謂有沙門若婆羅門不觀責他為勝利論不觀免難為勝利論亦不依我無智諸論為求利養恭敬等事樂欲開闡於惡説法毗奈耶中而求出家唯除樂求出離解脫當知彼是薄塵種類為性愚戇專修止行彼由為得初靜慮定教授教誡能於後際俱行見趣及於前際俱行見趣不然許故而得超過於現法中又能超過欲界諸結證遠離喜自斯已上無聞無知即於此中生涅槃想如由彼故證遠離喜如是或有由別因緣證得第二第三靜慮無愛味樂第四靜慮無苦樂受從此已上乃至非想非非想處當知亦爾於種種想俱行苦樂受等差別已超過故如是彼於趣諸取行不能超越樂退還法未般涅槃起涅槃慢當知是名第三衰損此中如來自然證覺寂靜妙迹於如所説一切行相三種衰損由五種相如實了知謂若彼自性若彼諸見若由無智彼得生起若所緣轉若彼所緣麁弊過患及上出離於如是事如實了知即出離中常自出離五八五八六一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰何等為五謂色受陰受想行識受陰云何色受陰所有色彼一切四大及四大所造色是名為色受陰復次彼色是無常苦變易之法若彼色受陰永斷無餘究竟捨離滅盡離欲寂沒餘色受陰更不相續不起不出是名為妙是名寂靜是名捨離一切有餘愛盡無欲滅盡涅槃云何受受陰謂六受身何等為六謂眼觸生受耳鼻舌身意觸生受是名受受陰復次彼受受陰無常苦變易之法乃至滅盡涅槃云何想受陰謂六想身何等為六謂眼觸生想乃至意觸生想是名想受陰復次彼想受陰無常苦變易之法乃至滅盡涅槃云何行受陰謂六思身何等為六謂眼觸生思乃至意觸生思是名行受陰復次彼行受陰無常苦變易之法乃至滅盡涅槃云何識受陰謂六識身何等為六謂眼識身乃至意識身是名識受陰復次彼識受陰是無常苦變易之法乃至滅盡涅槃比丘若於此法以智慧思惟觀察分別忍是名隨信行超升離生越凡夫地未得須陀洹果中間不死必得須陀洹果比丘若於此法增上智慧思惟觀察忍是名隨法行超升離生越凡夫地未得須陀洹果中間不死必得須陀洹果比丘於此法如實正慧等見三結盡斷知謂身見戒取疑比丘是名須陀洹果不墮惡道必定正趣三菩提七有天人往生然後究竟苦邊比丘若於此法如實正慧等見不起心漏名阿羅漢諸漏已盡所作已作捨離重擔逮得己利盡諸有結正智心得解脫佛説此經已諸比丘聞佛所説歡喜奉行二智復次有二智能令見清淨及見善清淨謂法住智及此為先涅槃智法住智者謂能了知諸行自相種類差別及能了知諸行共相過患差別謂於隨順若苦若樂不苦不樂三位諸行方便了知三苦等性涅槃智者謂於如是一切行中先起苦想後如是思即此一切有苦諸行無餘永斷廣説乃至名為涅槃如是了知名涅槃智即此二智令見清淨及善清淨要由二門正勤修習方令彼淨一自無力補特伽羅因他教授能令彼淨二自有力補特伽羅多聞思求能令彼淨此中第一補特伽羅不聰利故信等諸根唯一味故止觀所緣於少分法諦察忍轉與此相違當知第二補特伽羅復有三種現觀邊智修習彼故見得清淨一能順生無漏智二無漏智三無漏智後相續智初世間第一法所攝智第二若住於彼能斷見斷一切煩惱第三煩惱斷後解脫相續智若住中智便名已入正性離生超過異生地未得預流果雖未剋證第三解脫預流果智於其中間所住剎那如未剋證終無中夭以時少故從此無間必證第三住此位中如實現見所知境故名見清淨有餘惑故非善清淨若於此智更多修習成阿羅漢一切煩惱皆離繫故名善清淨又無餘斷三相應知一由不現行故二由界故三由事故不現行者謂雖生起而不染著雖未永斷由數修習諸善法故令成遠分諸纏煩惱不復現行界者三界如前應知事謂二事一煩惱事二是苦事又於安樂利益隨逐諸離繫品五種界中有寂靜微妙勝功德等乃至涅槃為其最後差別應知又於此中一切依持皆棄捨者當知割捨父母等事又於中有生有後有無復更生如其次第當知説名無有相續無取無生又於三品由三種門為障礙故當知建立三結差別謂未發趣故雖已發趣邪成立故於正法中不正行故即在家品處惡説法毗奈耶中而出家品處善説法毗奈耶品又行趣向逆流行者解脫惡趣成就二種解脫決定一者煩惱解脫決定二者後有解脫決定由是因緣故名預流乃至廣説又若證得阿羅漢果先在學地於諸行中已不執受我及我所後於諸漏皆得解脫又與四種義相應故當知是名阿羅漢相一者自事已究竟應作他事義故二者應得自義一切遍滿道理義故三者未來行因已永斷滅應證現法樂住義故四者超有學地入無學地相應義故五九五九六二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰謂色受陰受想行識受陰愚癡無聞凡夫無慧無明於五受陰生我見繫著使心結縛而生貪欲比丘多聞聖弟子有慧有明於此五受陰不為見我繫著使心結縛而起貪欲云何愚癡無聞凡夫無慧無明於五受陰見我繫著使心結縛而生貪欲比丘愚癡無聞凡夫無慧無明見色是我異我相在如是受想行識是我異我相在如是愚癡無聞凡夫無慧無明於五受陰説我繫著使心結縛而生貪欲比丘云何聖弟子有慧有明不説我繫著使結縛心而生貪欲聖弟子不見色是我異我相在如是受想行識不見是我異我相在如是多聞聖弟子有慧有明於五受陰不見我繫著使結縛心而生貪欲若所有色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切正觀皆悉無常如是受想行識若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切正觀皆悉無常佛説此經已諸比丘聞佛所説歡喜奉行愚夫分位五復次愚位有五若於中轉墮愚夫數何等為五一不獲得俱生慧故二不獲得從聞他音緣生慧故三不獲得真聖慧故四愚癡纏所纏縛故五彼隨眠所隨縛故復有四種妄計我論一者宣説諸行是我二者宣説我有諸行三者宣説諸行屬我四者宣説我在行中由二因緣妄計我論作諸雜染一執著故二隨眠故執著故者謂諸外道雖求解脫由彼為障於一切種不能獲得隨眠故者謂諸內法耽著境界暫時為障而非究竟六六六三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有五受陰謂色受陰受想行識受陰比丘若沙門婆羅門計有我一切皆於此五受陰計有我何等為五諸沙門婆羅門於色見是我異我相在如是受想行識見是我異我相在如是愚癡無聞凡夫計我無明分別如是觀不離我所不離我所者入於諸根入於諸根已而生於觸六觸入所觸愚癡無聞凡夫生苦樂從是生此等及餘謂六觸身云何為六謂眼觸入處耳鼻舌身意觸入處比丘有意界法界無明界無明觸所觸愚癡無聞凡夫言有言無言有無言非有非無言我最勝言我劣言我相似我知我見復次比丘多聞聖弟子住六觸入處而能厭離無明能生於明彼於無明離欲而生於明不有不無非有無非不有無非有我勝非有我劣非有我相似我知我見作如是知如是見已所起前無明觸滅後明觸集起佛説是經已諸比丘聞佛所説歡喜奉行二種見差別復次若有我見若無我見同緣諸行為境事故説名同分而於彼事邪取正取染污清淨等義別故名不同分又由四相於所緣事邪僻執著增上力故能令我見作諸雜染一因緣故二自性故三由果故四等流故因緣故者謂二愚癡一事愚癡二見愚癡事愚癡者由愚事故先聞邪法後起我見見愚癡者謂愚見故於見相應諸無明觸所生起受妄計為我由此為緣恆為我愛之所隨逐復由此故常於我見不能捨離自性故者謂二因緣之所攝受等隨觀察於彼隨眠不得遠離由果故者謂即以彼薩迦耶見為依止故不能遠離我慢隨眠是二隨眠增上力故能引當來諸根令起由彼領納苦樂二受因更發起計我我所不如正理思惟相應意言分別謂我我所有其領受等流故者謂由先因力所持故即見種子所隨逐意後有意界由前因緣所熏修力而得成滿即於如是後有意中有無明種及無明界是二種子所隨逐意所緣法界彼由宿世依惡説法及毗奈耶所生分別薩迦耶見以為依止集成今界即由此界增上力故發起俱生薩迦耶見於善説法毗奈耶中亦復現行能為障礙又即此見由二種相六轉現行一由世故二由慢故由世故者謂我於過去為曾有耶為曾無耶乃至廣説如應當知由慢故者謂我為勝乃至廣説彼於如是一切如實不知不見由此因緣不如正理起於邪觀又明位有三謂聞他音如理作意是初明位已能證入正性離生是第二明位心善解脫阿羅漢果是第三明位其無明位復有二種一先二後隨眠位是先諸纏位為後又約見修所斷有異當知是名第二差別六一六一六四如是我聞一時佛住舍衛國東園鹿子母講堂爾時世尊晡時從禪起出講堂於堂陰中大衆前敷座而坐爾時世尊歎優陀那偈法無有吾我亦復無我所我既非當有我所何由生比丘解脫此則斷下分結時有一比丘從座起偏袒右肩右膝著地合掌白佛言世尊云何無吾我亦無有我所我既非當有我所何由生比丘解脫此則斷下分結佛告比丘愚癡無聞凡夫計色是我異我相在受想行識是我異我相在多聞聖弟子不見色是我異我相在不見受想行識是我異我相在亦非知者亦非見者此色是無常受想行識是無常色是苦受想行識是苦色是無我受想行識是無我此色非當有受想行識非當有此色壞有受想行識壞有故非我非我所我我所非當有如是解脫者則斷五下分結時彼比丘白佛言世尊斷五下分結已云何漏盡無漏心解脫慧解脫現法自知作證具足住我生已盡梵行已立所作已作自知不受後有佛告比丘愚癡凡夫無聞衆生於無畏處而生恐畏愚癡凡夫無聞衆生怖畏無我無我所二俱非當生攀緣四識住何等為四謂色識住色攀緣色愛樂增進廣大生長於受想行識住攀緣愛樂增進廣大生長比丘識於此處若來若去若住若起若滅增進廣大生長若作是説更有異法識若來若去若住若起若滅若增進廣大生長者但有言説問已不如增益生疑以非境界故所以者何比丘離色界貪已於色意生縛亦斷於色意生縛斷已識攀緣亦斷識不復住無復增進廣大生長受想行界離貪已於受想行意生縛亦斷受想行意生縛斷已攀緣亦斷識無所住無復增進廣大生長識無所住故不增長不增長故無所為作無所為作故則住住故知足知足故解脫解脫故於諸世間都無所取無所取故無所著無所著故自覺涅槃我生已盡梵行已立所作已作自知不受後有比丘我説識不住東方南西北方四維上下除欲見法涅槃滅盡寂靜清涼佛説此經已諸比丘聞佛所説歡喜奉行生滅以不樂及三種分別貪著等觀察是名優陀那聖教復次是處世尊依自聖教為欲顯示善説發起依他邪教為欲顯示惡説失墜自有所説後結集者於法門中稱為世尊嗢拖南説由二因緣善説法律名為發起大果大利惡説法律即為唐捐一者於善説法毗奈耶中一切衆苦永離可得謂三種苦性二者一切諸結永斷可得謂下上分結於惡説法毗奈耶中如是二事皆不可得彼由依止薩迦耶見於諸行中心厭苦苦欲樂為依起茲勝解願於當來無有苦我我無有苦或復已斷即彼苦因及彼當果於未來世由二種相而生勝解謂苦未來當離於我及我未來當無有苦雖由如是四種行相樂斷為依離欲界欲生初靜慮次第乃至於彼非想非非想處若定若生由是因緣超越苦苦而未能斷下分諸結未斷彼故當知苦苦未永超越彼於壞行二苦斷中尚不生樂何況能斷由彼隨順所未斷故當知於順上分諸結亦未能斷住內法者初修觀時雖於欲界未得離欲有情勝故而於三苦深心厭離依樂斷欲於諸行中用無我見以為依止發其勝解願於未來無三苦我我無三苦彼初修習如是行已於欲界欲而得遠離永斷苦苦如前復生如是勝解當無彼我我當無彼如是行者於其苦苦究竟解脫亦永超越順下分結即於此道次第進修乃至能得阿羅漢果若諸愚夫薩迦耶見以為依止於永超越壞行二苦及永斷滅隨順上分一切結中謂我當無於不應怖妄生怖畏尚不起樂況當能斷又於是處由二因緣不應生怖謂唯有心住四識住有轉有染又唯有心斷四識住無轉無染復有四依謂色受想行復有四取謂於欲見戒禁我語所有欲貪復有二緣謂若所緣及若能緣復有六識謂眼識等復有二識住謂煩惱纏住及彼隨眠住此中諸取增上力故以不如理分別為先由我我所邪境界取由緣自相境界之取由俱有依此三因緣令諸識轉及令染污復由三種謂於現法趣集諦故緣未來苦我當如是如是愛故於彼先因所生現苦而安住故復由三種謂趣樂位故緣苦位故安住不苦不樂位故復由三種謂趣來世故緣去世故住現世故復由三種謂由後有愛趣後有故由彼彼喜樂愛緣未來境界故由喜貪俱行愛住現在已得境界故復由三種由貪欲身繫趣向隨順貪處事故由瞋恚身繫緣彼事故由戒禁此實二取身繫住彼事故中嗢拖南曰果因與受世愛及繫喜愛滋潤如前應知謂如諸行因中宣説又即彼識如是轉時於二生處當知結生相續增廣一於有色二於無色於有色處依止中有而有去來於無色處唯有徙生即於兩處乃至壽盡相續而住故名為住當知此住欲界人中有三分位謂初入胎識所滋潤胎分圓滿自胎而出當知此三復有差別欲色無色如其次第若有棄捨如來所説識流轉道而作是言我當更作別異施設當知是人所施設者其文有異其義無別但有言事或餘智者於其異文先示道理後方詰問汝所施設別異者何彼於爾時茫然不了或於後時自得達鑑於前所立如理諦觀反生愚昧由愚昧故自覺無知我本受持為惡非善又十色界名為色界當知復