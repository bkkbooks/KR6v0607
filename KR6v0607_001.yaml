法後法雜染所作過患當知此中受雜染所作過患者謂愚癡者於其樂受并彼隨轉并所隨染有貪愛縛於苦受等有瞋恚縛於其不苦不樂受等有愚愛縛及隨眠縛由有愚癡所隨眠故世雜染所作過患者謂愚癡者於現在世有貪染縛於過去世有顧戀縛於未來世有繫心縛現法後法雜染所作過患者謂彼如是雜染心者於世於受有雜染故便能生長感後有業由此增益後有諸蘊令當得生又能增長所有貪愛謂後有愛及資財愛後有愛故能生當來所有自體資財愛故於追求時極生疲怠若得境界便生染惱若不獲得所欲不遂便自燒然若得已失便為愁惱之所損害如是名為現法過患若即由彼作及增長能感後有諸業煩惱增上力故起於當來生老死等衆苦差別如是名為後法過患第二心定補特伽羅應知一切與上相違當知是名第二殊勝餘如前説又彼第一補特伽羅心未定故於其無智所作過患若自若他不如實知第二心定補特伽羅於彼皆能如實了知當知是名第三殊勝餘如前説又彼第二心已得定補特伽羅於諸過患如實了知已入修地即前所得無我相應所有正見由此修故於二時中依其斷界及無欲界與彼一切菩提分法皆共圓滿初未得定補特伽羅心未定故於彼一切皆未圓滿當知是名第四殊勝餘如前説又彼第二心已得定補特伽羅所有多聞毗鉢舍那助伴支分彼能攝受勝三摩地能淨修治毗鉢舍那由是因緣止觀二種平等雙轉心未得定補特伽羅應知多聞與彼俱闕如是於成世間正見多聞不定住於正法補特伽羅即此成就世間正見多聞得定住於正法補特伽羅當知有此第五殊勝正加行果稱讚利益如是即彼由已獲得勝奢摩他毗鉢舍那依於斷界應遍知者能正遍知應永斷者能正永斷應作證者能正作證應修習者能正修習依無欲界於彼一切已知已斷已證已修於所依色及能依名正知已知於所依無明及能依有愛正斷已斷於所依明淨智及能依解脫煩惱斷正證已證於所依奢摩他及能依毗鉢舍那正修已修二三四八三六如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘獨一靜處專精思惟作是念比丘云何知云何見而得見法作是思惟已從禪起往詣佛所稽首禮足退坐一面白佛言世尊我獨一靜處專精思惟作是念比丘云何知云何見而得見法爾時世尊告彼比丘諦聽善思當為汝説有二法何等為二眼色為二如是廣説乃至非其境界故所以者何眼色緣生眼識三事和合觸觸俱生受想思此四無色陰眼色此等法名為人於斯等法作人想衆生那羅摩䨲闍摩那婆士夫福伽羅耆婆禪頭又如是説我眼見色我耳聞聲我鼻嗅香我舌嘗味我身覺觸我意識法彼施設又如是言説是尊者如是名如是生如是姓如是食如是受苦樂如是長壽如是久住如是壽分齊比丘是則為想是則為志是則言説此諸法皆悉無常有為思願緣生若無常有為思願緣生者彼則是苦又復彼苦生亦苦住亦苦滅亦苦數數出生一切皆苦若復彼苦無餘斷吐盡離欲滅息沒餘苦更不相續不出不生是則寂滅是則勝妙所謂捨一切有餘一切愛盡無欲滅盡涅槃耳鼻舌身觸緣生身識三事和合觸觸俱生受想思此四是無色陰身根是色陰此名為人如上説乃至滅盡涅槃緣意法生意識三事和合觸觸俱生受想思此四無色陰四大士夫所依此等法名為人如上廣説乃至滅盡涅槃若有於此諸法心隨入住解脫不退轉於彼所起繫著無有我比丘如是知如是見則為見法佛説此經已諸比丘聞佛所説歡喜奉行二三一四九三七如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘獨一靜處專精思惟作是念云何知云何見名為見法思惟已從禪起往詣佛所稽首禮足退坐一面白佛言世尊我獨一靜處專精思惟作是念比丘云何知云何見名為見法今問世尊唯願解説佛告比丘諦聽善思當為汝説有二法眼色緣生眼識如上廣説尊者如所説偈眼色二種緣生於心心法識觸及俱生受想等有因非我非我所亦非福伽羅亦非摩䨲闍亦非摩那婆是則為生滅苦陰變易法於斯等作想施設於衆生那羅摩䨲闍及與摩那婆亦餘衆多想皆因苦陰生諸業愛無明因積他世陰餘沙門異道異説二法者彼但有言説聞已增疑惑貪愛息無餘無明沒永滅愛盡衆苦息無上佛眼説佛説此經已諸比丘聞佛所説歡喜奉行見復次有二法見一有為法見二無為法見有為法見者謂如有一於諦依處及諦自性皆如實知云何名為諦所依處謂名色及人天等有情數物云何為諦謂世俗諦及勝義諦云何世俗諦謂即於彼諦所依處假想安立我或有情乃至命者及生者等又自稱言我眼見色乃至我意知法又起言説謂如是名乃至如是壽量邊際廣説如前當知此中唯有假想唯假自稱唯假言説所有性相作用差別名世俗諦云何勝義諦謂即於彼諦所依處有無常性廣説乃至有緣生性如前廣説如無常性有苦性等當知亦爾若於如是世俗勝義諦所依處其世俗諦如實了知是世俗諦其勝義諦如實了知是勝義諦如是名為有為法見若有成就有為法見苾芻齊此言説滿足云何名為無為法見謂即於彼諦所依處已得二種諦善巧者由此善巧增上力故於一切依等盡涅槃深見寂靜其心趣入如前廣説乃至解脫如是名為無為法見若有成就無為法見苾芻齊此言説滿足又此法見當知三種補特伽羅皆得成就一者異生法隨法行已得定心博識聰敏能如正理觀察諸法二者有學已見諦迹三者無學諸漏永盡二三二四一三八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘諸天世人於色染著愛樂住彼色若無常變易滅盡彼諸天人則生大苦於聲香味觸於法染著愛樂住彼法變易無常滅盡彼諸天人得大苦住如來於色色集色滅色味色患色離如實知如實知已於色不復染著愛樂住彼色變易無常滅盡則生樂住於聲香味觸法集滅味患離如實知如實知已不復染著愛樂住彼法變易無常滅盡則生樂住所以者何眼色緣生眼識三事和合觸觸緣受若苦若樂不苦不樂此受集此受滅此受味此受患此受離如實知於彼色因緣生厄礙厄礙盡已名無上安隱涅槃耳鼻舌身意法緣生意識三事和合觸觸緣受若苦若樂不苦不樂彼受集受滅受味受患受離如實知如實知已彼法因緣生厄礙厄礙盡已名無上安隱涅槃爾時世尊而説偈言於色聲香味觸法六境界一向生喜悅愛染深樂著諸天及世人唯以此為樂變易滅盡時彼則生大苦惟有諸賢聖見其滅為樂世間之所樂觀察悉為怨賢聖見苦者世間以為樂世間之所苦於聖則為樂甚深難解法世間疑惑生大暗所昏沒盲冥無所見唯有智慧者發朦開大明如是甚深句非聖孰能知不還受身者深達諦明了佛説此經已諸比丘聞佛所説歡喜奉行苦復次若有希求人天盛事自發誓願行梵行者當知彼為稱讚人天二種過患何等為二一者煩惱所生衆苦二者無常所生衆苦云何煩惱所生衆苦謂於人天住境界愛依現在世故住境界樂依過去世故住境界欣於現在世依過去境生愛樂故住境界喜於未來世依現在境生愛樂故若於如是三世境中住染污者當知彼為稱讚所欲有匱乏苦及生老等所有衆苦是名生起煩惱所作衆苦過患云何無常所作衆苦謂順樂處有背失故起變壞苦隨順苦處現在前故起厭離苦一切自體於終沒時皆滅壞故有滅故苦當知是名三種無常所作衆苦此中如來超過如是二種過患住一向樂即於此樂應如實知由此故樂復應如實知樂方便云何為樂謂一切境相應永盡無上安隱即有餘依般涅槃界云何方便謂如前説於五種受發起五轉如實妙智若諸聲聞棄捨大師所證超過人天妙樂希求下劣人天樂者當知彼於諸智者所多受毀辱亦自欺誑二三三四一一三九如是我聞一時佛住瞻婆國揭伽池側爾時尊者鹿紐來詣佛所稽首禮足退坐一面白佛言世尊如世尊説有第二住有一一住彼云何第二住云何一一住佛告鹿紐善哉善哉鹿紐能問如來如是之義佛告鹿紐若眼識色可愛可樂可念可意長養於欲彼比丘見已喜樂讚歎繫著住愛樂讚歎繫著住已心轉歡喜歡喜已深樂深樂已貪愛貪愛已厄礙歡喜深樂貪愛厄礙者是名第二住耳鼻舌身意亦如是説鹿紐有如是像類比丘正使空間獨處猶名第二住所以者何愛喜不斷不滅故愛欲不斷不知者諸佛如來説第二住若有比丘於可愛可樂可念可意長養於欲色彼比丘見已不喜樂不讚歎不繫著住不喜樂不讚歎不繫著住已不歡喜不歡喜故不深樂不深樂故不貪愛不貪愛故不厄礙不歡喜深樂貪愛厄礙者是名為一一住耳鼻舌身意亦如是説鹿紐如是像類比丘正使處於高樓重閣猶是一一住者所以者何貪愛已盡已知故貪愛已盡已知者諸佛如來説名一一住爾時尊者鹿紐聞佛所説歡喜隨喜作禮而去二三四四一二三一如是我聞一時佛住瞻婆國揭伽池側爾時尊者鹿紐來詣佛所稽首禮足退坐一面白佛言善哉世尊為我説法我聞法已當獨一靜處專精思惟不放逸住乃至自知不受後有佛告鹿紐善哉善哉鹿紐能問如來如是之義諦聽善思當為汝説佛告鹿紐若眼見可愛可樂可意可念長養於欲之色見已欣悅讚歎繫著欣悅讚歎繫著已則歡喜集歡喜集已則苦集耳鼻舌身意亦如是説鹿紐若有比丘眼見可愛可樂可念可意長養於欲之色見已不欣悅不讚歎不繫著不欣悅不讚歎不繫著故不歡喜集不歡喜集故則苦滅耳鼻舌身意法亦如是説爾時尊者鹿紐聞佛所説歡喜隨喜作禮而去爾時尊者鹿紐聞佛説法教誡已獨一靜處專精思惟不放逸住乃至得阿羅漢心善解脫復次嗢拖南曰一住遠涅槃略説內所證辨一切智相捨所學業等空隨行恆住師弟二圓滿一住由二因緣當知名為有第二住謂有愛故為欲生起第二自體受習其因此自體滅第二自體次生起故云何有愛謂諸可愛所緣境界將得現前最初生起染污欣悅名有喜樂從此已後乃至未得於彼多住作意思惟設復已得而未受用於其中間即由喜樂增上力故住染欣悅名有歡喜於受用時多生貪愛名有染著故名有愛又於未來起希求故及於已得生領納故名有喜樂於過去世隨憶念故名有歡喜於已獲得正受用時生貪愛故名有染著如是名為第二差別云何生起第二自體謂喜樂等為集因故於當來世生老為根衆苦生起與此相違當知是名無第二住二三五四一三三一一如是我聞一時佛住舍衛國祇樹給孤獨園爾時尊者富樓那來詣佛所稽首禮足退住一面白佛言善哉世尊為我説法我坐獨一靜處專精思惟不放逸住乃至自知不受後有佛告富樓那善哉善哉能問如來如是之義諦聽善思當為汝説若有比丘眼見可愛可樂可念可意長養欲之色見已欣悅讚歎繫著欣悅讚歎繫著已歡喜歡喜已樂著樂著已貪愛貪愛已厄礙歡喜樂著貪愛厄礙故去涅槃遠耳鼻舌身意亦如是説富樓那若比丘眼見可愛可樂可念可意長養欲之色見已不欣悅不讚歎不繫著不欣悅不讚歎不繫著故不歡喜不歡喜故不深樂不深樂故不貪愛不貪愛故不厄礙不歡喜不深樂不貪愛不厄礙故漸近涅槃耳鼻舌身意亦如是説佛告富樓那我已略説法教汝欲何所住富樓那白佛言世尊我已蒙世尊略説教誡我欲於西方輸盧那人間遊行佛告富樓那西方輸盧那人凶惡輕躁弊暴好罵富樓那汝若聞彼凶惡輕躁弊暴好罵毀辱者當如之何富樓那白佛言世尊若彼西方輸盧那國人面前凶惡訶罵毀辱者我作是念彼西方輸盧那人賢善智慧雖於我前凶惡弊暴好罵毀辱我猶尚不以手石而見打擲佛告富樓那彼西方輸盧那人但凶惡輕躁弊暴罵辱於汝則可脫復當以手石打擲者當如之何富樓那白佛言世尊西方輸盧那人脫以手石加於我者我當念言輸盧那人賢善智慧雖以手石加我而不用刀杖佛告富樓那若當彼人脫以刀杖而加汝者復當云何富樓那白佛言世尊若當彼人脫以刀杖而加我者當作是念彼輸盧那人賢善智慧雖以刀杖而加於我而不見殺佛告富樓那假使彼人脫殺汝者當如之何富樓那白佛言世尊若西方輸盧那人脫殺我者當作是念有諸世尊弟子當厭患身或以刀自殺或服毒藥或以繩自繫或投深坑彼西方輸盧那人賢善智慧於我朽敗之身以少作方便便得解脫佛言善哉富樓那汝善學忍辱汝今堪能於輸盧那人間住止汝今宜去度於未度安於未安未涅槃者令得涅槃爾時富樓那聞佛所説歡喜隨喜作禮而去爾時尊者富樓那夜過晨朝著衣持鉢入舍衛城乞食食已還出付囑臥具持衣鉢去至西方輸盧那人間遊行到已夏安居為五百優婆塞説法建立五百僧伽藍繩床臥褥供養衆具悉皆備足三月過已具足三明即於彼處入無餘涅槃遠復次有二種法更互相違一者煩惱二者涅槃是故安住雜染法已即便隨順後有而轉若於後有隨順轉時當知説名去涅槃遠復有六種鄙碎士夫補特伽羅鄙碎行相一者性多忿恚二者所作不思三者樂逼惱他四者若苦所觸便發不實麁惡語言五者或發真實能引無義麁惡語言六者因此展轉發起無量差別惡言非但少詞而生喜足由二因緣諸出家者力勵受行速疾能證沙門義利諸未信者令生淨信其已信者倍令增長何等為二一者忍辱二者柔和言忍辱者謂於他怨終無返報言柔和者謂心無憤性不惱他二三六四一四三一二如是我聞一時佛住舍衛國祇樹給孤獨園爾時摩羅迦舅來詣佛所稽首禮足退坐一面白佛言善哉世尊為我説法我聞法已獨一靜處專精思惟不放逸住乃至不受後有爾時世尊告摩羅迦舅言諸年少聰明利根於我法律出家未久於我法律尚無懈怠而況汝今日年耆根熟而欲聞我略説教誡摩羅迦舅白佛言世尊我雖年耆根熟而尚欲得聞世尊略説教誡唯願世尊為我略説教誡我聞法已當獨一靜處專精思惟乃至自知不受後有第二第三亦如是請佛告摩羅迦舅汝今且止如是再三亦不為説爾時世尊告摩羅迦舅我今問汝隨意答我佛告摩羅迦舅若眼未曾見色汝當欲見於彼色起欲起愛起念起染著不答言不也世尊耳聲鼻香舌味身觸意法亦如是説佛告摩羅迦舅善哉善哉摩羅迦舅見以見為量聞以聞為量覺以覺為量識以識為量而説偈言若汝非於彼彼亦復非此亦非兩中間是則為苦邊摩羅迦舅白佛言已知世尊已知善逝佛告摩羅迦舅汝云何於我略説法中廣解其義爾時摩羅迦舅説偈白佛言若眼已見色而失於正念則於所見色而取愛念相取愛樂相者心則常繫著起於種種愛無量色集生貪欲恚害覺令其心退減長養於衆苦永離於涅槃見色不取相其心隨正念不染惡心愛亦不生繫著不起於諸愛無量色集生貪欲恚害覺不能壞其心小長養衆苦漸次近涅槃日種尊所説離愛般涅槃若耳聞諸聲心失於正念而取諸聲相執持而不捨鼻香舌嘗味身觸意念法忘失於正念取相亦復然其心生愛樂繫著堅固住起種種諸愛無量法集生貪欲恚害覺退減壞其心長養衆苦聚永離於涅槃不染於諸法正智正念住其心不染汙亦復不樂著不起於諸愛無量法集生貪瞋恚害覺不退減其心衆苦隨損減漸近般涅槃愛盡般涅槃世尊之所説是名世尊略説法中廣解其義佛告摩羅迦舅汝真於我略説法中廣解其義所以者何如汝所説偈若眼見衆色忘失於正念則於所見色而取愛念相如前廣説爾時尊者摩羅迦舅聞佛所説歡喜隨喜作禮而去爾時尊者摩羅迦舅於世尊略説法中廣解其義已於獨一靜處專精思惟不放逸住乃至成阿羅漢心得解脫涅槃復次以要言之如來略依二種處所説無界教一者説有餘依涅槃界教二者説無餘依涅槃界教若由如是煩惱斷故名成就斷補特伽羅不成煩惱即由如是不住彼果後有衆苦當知是名説有餘依涅槃界教若由如是不住煩惱後有苦果即由如是乃至壽盡既滅沒已一切餘依都無所有不住此身不住餘身不住中有證得一切衆苦邊際當知是名説無餘依涅槃界教略有三種念力強因一由其年少壯二由前生串習三由現法數習二三七四一五三一三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有經法諸比丘崇向而於經法異信異欲異聞異行思惟異見審諦忍正知而説我生已盡梵行已立所作已作自知不受後有諸比丘白佛言世尊是法根法眼法依善哉世尊唯願廣説諸比丘聞已當受奉行佛告諸比丘諦聽善思當為汝説比丘眼見色已覺知色而不覺色貪我先眼識於色有貪而今眼識於色無貪如實知若比丘眼見於色已覺知色而不起色貪覺我先眼識有貪而言今眼識於色無貪如實知者諸比丘於意云何彼於此為有信有欲有聞有行思惟有見審諦忍不答言如是世尊歸於此法如實正知所知所見不答言如是世尊耳鼻舌身意識法亦如是説諸比丘是名有經法比丘於此經法崇向異信異欲異聞異行思惟異見審諦忍正知而説我生已盡梵行已立所作已作自知不受後有佛説此經已諸比丘聞佛所説歡喜奉行內所證復次由五種相當知涅槃是內證法謂離信故乃至離見審察忍故如前應知謂現法中於內各別內外增上所生雜染如實了知有及非有二三八四一六三一四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘當斷欲斷眼欲已眼則已斷已知斷其根本如截多羅樹頭於未來世永不復生耳鼻舌身意亦如是説佛説此經已諸比丘聞佛所説歡喜奉行二三九四一七三一五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘若眼生住轉出則苦生病住老死出耳鼻舌身意亦如是説若眼滅息沒苦生則滅病則息老死則沒耳鼻舌身意亦如是説佛説此經已諸比丘聞佛所説歡喜奉行二四四一八三一六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘眼無常若眼是常者則不應受逼迫苦亦應説於眼欲令如是不令如是以眼無常故是故眼受逼迫苦生是故不得於眼欲令如是不令如是耳鼻舌身意亦如是説佛説此經已諸比丘聞佛所説歡喜奉行二四一四一九三一七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘眼苦若眼是樂者不應受逼迫苦應得於眼欲令如是不令如是以眼是苦故受逼迫苦不得於眼欲令如是不令如是耳鼻舌身意亦如是説佛説此經已諸比丘聞佛所説歡喜奉行二四二四二三一八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘眼非我若眼是我者不應受逼迫苦應得於眼欲令如是不令如是以眼非我故受逼迫苦不得於眼欲令如是不令如是耳鼻舌身意亦如是説佛説此經已諸比丘聞佛所説歡喜奉行二四三二四五四二一四二三如內六入處三經外六入處三經亦如是説二四六四二四三一九如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門往詣佛所共相問訊問訊已退坐一面白佛言瞿曇所謂一切者云何名一切佛告婆羅門一切者謂十二入處眼色耳聲鼻香舌味身觸意法是名一切若復説言此非一切沙門瞿曇所説一切我今捨別立餘一切者彼但有言説問已不知增其疑惑所以者何非其境界故時生聞婆羅門聞佛所説歡喜隨喜奉行二四七四二五三二如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門往詣佛所面相問訊已退坐一面白佛言瞿曇所謂一切有云何一切有佛告生聞婆羅門我今問汝隨意答我婆羅門於意云何眼是有不答言是有沙門瞿曇色是有不答言是有沙門瞿曇婆羅門有色有眼識有眼觸有眼觸因緣生受若苦若樂不苦不樂不答言有沙門瞿曇耳鼻舌身意亦如是説如是廣説乃至非其境界故佛説此經已生聞婆羅門聞佛所説歡喜隨喜從坐起去二四八四二六三二一如是我聞一時佛住舍衛國祇樹給孤獨園時有生聞婆羅門往詣佛所共相問訊已退坐一面白佛言沙門瞿曇所謂一切法云何為一切法佛告婆羅門眼及色眼識眼觸眼觸因緣生受若苦若樂不苦不樂耳鼻舌身意法意識意觸意觸因緣生受若苦若樂不苦不樂是名為一切法若復有言此非一切法沙門瞿曇所説一切法我今捨更立一切法者此但有言數問已不知增其疑惑所以者何非其境界故佛説此經已生聞婆羅門聞佛説已歡喜隨喜從坐起去二四九二五七四二七四三五如生聞婆羅門所問三經有異比丘所問三經尊者阿難所問三經世尊法眼法根法依三經亦如上説辨一切智復次由三因緣顯示諸佛無上菩提一者覺了一切境故二者覺了有及非有如實事故三者覺了染淨二品一切法故是故他於如是三處請問世尊二五八四三六三二二如是我聞一時佛住舍衛國祇樹給孤獨園時有異比丘往詣佛所稽首佛足退坐一面白佛言世尊如世尊説眼是內入處世尊略説不廣分別云何眼是內入處佛告彼比丘眼是內入處四大所造淨色不可見有對耳鼻舌身內入處亦如是説復白佛言世尊如世尊説意是內入處不廣分別云何意是內入處佛告比丘意內入處者若心意識非色不可見無對是名意內入處復問如世尊説色外入處世尊略説不廣分別云何世尊色外入處佛告比丘色外入處若色四大造可見有對是名色是外入處復白佛言世尊説聲是外入處不廣分別云何聲是外入處佛告比丘若聲四大造不可見有對如聲香味亦如是復問世尊説觸外入處不廣分別云何觸外入處佛告比丘觸外入處者謂四大及四大造色不可見有對是名觸外入處復問世尊説法外入處不廣分別云何法外入處佛告比丘法外入處者十一入所不攝不可見無對是名法外入處佛説此經已諸比丘聞佛所説歡喜奉行相復次諸有為法俱有轉時令心迷亂能令於相邪取分別是故如來為諸弟子分別開示令於彼相決定悟入為欲了知真實相故又為於自無欺誑故又為於他坦然無畏正記別故二五九四三七三二三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六內入處云何為六謂眼內入處耳鼻舌身意內入處佛説此經已諸比丘聞佛所説歡喜奉行二六四三八三二四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六外入處云何為六謂色是外入處聲香味觸法是外入處是名六外入處佛説此經已諸比丘聞佛所説歡喜奉行二六一四三九三二五如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六識身云何為六謂眼識身耳識身鼻識身舌識身身識身意識身是名六識身佛説此經已諸比丘聞佛所説歡喜奉行二六二四四三二六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六觸身云何為六觸身謂眼觸身耳觸身鼻觸身舌觸身身觸身意觸身是名六觸身佛説此經已諸比丘聞佛所説歡喜奉行二六三四四一三二七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六受身云何為六謂眼觸生受耳鼻舌身意觸生受是名六受身佛説此經已諸比丘聞佛所説歡喜奉行二六四四四二三二八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六想身云何為六謂眼觸生想耳鼻舌身意觸生想是名六想身佛説此經已諸比丘聞佛所説歡喜奉行二六五四四三三二九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六思身云何為六謂眼觸生思耳鼻舌身意觸生思是名六思身佛説此經已諸比丘聞佛所説歡喜奉行二六六四四四三三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六愛身云何為六愛身謂眼觸生愛耳鼻舌身意觸生愛是名六愛身佛説此經已諸比丘聞佛所説歡喜奉行二六七四四五三三一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六顧念云何為六謂色顧念聲顧念香顧念味顧念觸顧念法顧念是名六顧念佛説此經已諸比丘聞佛所説歡喜奉行二六八四四六三三二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六覆云何為六謂色有漏是取心覆藏聲香味觸法有漏是取心覆藏是名六覆佛説此經已諸比丘聞佛所説歡喜奉行捨所學復次諸出家者棄捨所學增上力故當知安立顧戀境界又出家者毀犯尸羅增上力故當知安立未出家者棄背趣入心株覆事遠離慚愧故一向愛味故若堅執取所緣境界當知彼名最極愛味由是因緣於修上品諸善業中為心株杌是不調柔無堪能義又即由此增上力故行諸惡行內懷隱匿所造衆惡故生其覆如是一切略攝為一説名於境最極愛味心株覆事二六九四四七三三三如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘過去未來眼無常況現在眼多聞聖弟子如是觀者不顧過去眼不欣未來眼於現在眼生厭離欲滅盡向耳鼻舌身意亦如是説二七二七二四四八四五如無常如是苦空非我亦如是説二七三二七六四五一四五四如內入處四經外入處四經亦如是説二七七四五五三三四如是我聞一時佛住拘留搜調牛聚落爾時世尊告諸比丘今當為汝説法初中後善善義善味純一滿淨梵行清白諦聽善思謂有因有緣有縛法經云何有因有緣有縛法經謂眼有因有緣有縛何等為眼因眼緣眼縛謂眼業因業緣業縛業有因有緣有縛何等為業因業緣業縛謂業愛因愛緣愛縛愛有因有緣有縛何等為愛因愛緣愛縛謂愛無明因無明緣無明縛無明有因有緣有縛何等無明因無明緣無明縛謂無明不正思惟因不正思惟緣不正思惟縛不正思惟有因有緣有縛何等不正思惟因不正思惟緣不正思惟縛謂緣眼色生不正思惟生於癡緣眼色生不正思惟生於癡彼癡者是無明癡求欲名為愛愛所作名為業如是比丘不正思惟因無明無明因愛愛因為業業因為眼耳鼻舌身意亦如是説是名有因有緣有縛法經佛説此經已諸比丘聞佛所説歡喜奉行業等復次若於諸根無護行者由樂聽聞不正法故便生無明觸所生起染污作意即此作意增上力故於當來世諸處生起所有過患不如實知不如實知彼過患故便起希求希求彼故造作增長彼相應業造作增長相應業故於當來世六處生起如是名為順次道理逆次第者謂彼六處以業為因業愛為因愛復用彼無明為因無明復用不如正理作意為因不正作意復用無明觸為其因又於此中先所造業是現法受六處之因現法造業是次生受六處之緣或是後受六處由藉愛等業等隨其所應當知亦爾復次由二因緣後有生起一後有業二後有愛而但説言諸有情類隨業而行不言隨愛何以故略有三愛一者欲愛二者色愛三無色愛此中欲愛是不善者雖有異熟然若不起惡不善業終不能與惡趣異熟若欲界愛於無明觸所生諸受起希求時於可愛境發生貪欲於可憎境發生瞋恚於可迷境發生愚癡由此三種增上力故行不善業由此業故生諸惡趣非但由彼貪瞋癡纏定墮惡趣然即此愛於所造業異熟生時能為助伴又由希求可愛境界增上力故修行善行身語意業由此為因得生善趣此中可愛諸異熟果但應用業為引生因非染性愛又若此愛色無色繫雖非不善然是染污一切皆非有異熟果又即由此色無色愛名有愛者彼由聽聞正法因故於其欲界觀麁鄙相證得明觸而生世間如理作意相應諸受調伏欲界貪瞋癡等造修所成善有漏業由於此間造彼業故當得生彼不由於彼染污性愛然即此愛於所造業異熟生時能為助伴是故但説諸有情類隨業而行不言隨愛二七八四五六三三五如是我聞一時佛住拘留搜調牛聚落爾時世尊告諸比丘我今當為汝等説法初中後善善義善味純一滿淨梵行清白所謂第一義空經諦聽善思當為汝説云何為第一義空經諸比丘眼生時無有來處滅時無有去處如是眼不實而生生已盡滅有業報而無作者此陰滅已異陰相續除俗數法耳鼻舌身意亦如是説除俗數法俗數法者謂此有故彼有此起故彼起如無明緣行行緣識廣説乃至純大苦聚集起又復此無故彼無此滅故彼滅無明滅故行滅行滅故識滅如是廣説乃至純大苦聚滅比丘是名第一義空法經佛説此經已諸比丘聞佛所説歡喜奉行空復次於外事中世間假名增上力故亦説有果及有受者彼或時空世現可得或時不空如果受者因與作者當知亦爾如是名為世俗諦空非勝義空若説恆時一切諸行唯有因果都無受者及與作者當知是名勝義諦空應知此空復有七種一後際空二前際空三中際空四常空五我空六受者空七作者空當知此中無有諸行於未來世實有行聚自性安立諸行生時從彼而來若有是事彼不應生於未來世諸行自性已實有故又不應有無常可得既有可得是故當知諸行生時無所從來本無今有是名後際空又無諸行於過去世有實行聚自性安立已生已滅諸行往彼積集而住若有是事不應施設諸行有滅過去行聚自性儼然常安住故若無有滅彼無常性應不可知既有可知是故諸行於正滅時都無所往積集而住有已散滅不待餘因自然滅壞是名前際空又於剎那生滅行中唯有諸行暫時可得其中都無餘行可得亦無別物是名中際空當知亦是常空我空以無我故果性諸行空無受者因性業行空無作者如是名為受者作者二種皆空作者受者無所有故唯有諸行於前生滅唯有諸行於後生生於中都無捨前生者取後生者是故説言唯有諸法從衆緣生能生諸法又一切法都無作用無有少法能生少法是故説言此有故彼有此生故彼生但唯於彼因果法中依世俗諦假立作用宣説此法能生彼法二七九四五七三三六如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六喜行云何為六如是比丘若眼見色喜於彼色處行耳聲鼻香舌味身觸意識法喜於彼法處行諸比丘是名六喜行佛説此經已諸比丘聞佛所説歡喜奉行二八四五八三三七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六憂行云何為六諸比丘若眼見色憂於彼色處行耳聲鼻香舌味身觸意識法憂於彼法處行諸比丘是名六憂行佛説此經已諸比丘聞佛所説歡喜奉行二八一四五九三三八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六捨行云何為六諸比丘謂眼見色捨於彼色處行耳聲鼻香舌味身觸意識法捨於彼法處行是名比丘六捨行佛説此經已諸比丘聞佛所説歡喜奉行隨行復次由五種相於能順喜所緣境界隨順而行深心喜樂不如正理執取其相發生貪欲多起尋思方便求覓因此廣行福非福行如能順喜所緣境界順憂順捨所緣境界如其所應當知亦爾其差別者於能順憂所緣境界隨順而行深心厭惡發生瞋恚於能順捨所緣境界隨順而行深心愚昧發生愚癡餘如前説二八二四六三三九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六常行云何為六若比丘眼見色不苦不樂捨心住正念正智耳聲鼻香舌味身觸意識法不苦不樂捨心住正念正智是名比丘六常行佛説是經已諸比丘聞佛所説歡喜奉行二八三四六一三四如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六常行云何為六若比丘眼見色不苦不樂捨心住正念正智耳聲鼻香舌味身觸意識法不苦不樂捨心住正念正智若比丘成就此六常行者世間難得佛説此經已諸比丘聞佛所説歡喜奉行二八四四六二三四一如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六常行云何為六若比丘眼見色不苦不樂捨心住正念正智耳聲鼻香舌味身觸意識法不苦不樂捨心住正念正智若比丘成就此六常行者世間難得所應承事恭敬供養則為世間無上福田佛説此經已諸比丘聞佛所説歡喜奉行二八五四六三三四二如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘有六常行云何為六若比丘眼見色不苦不樂捨心住正念正智耳聲鼻香舌味身觸意識法不苦不樂捨心住正念正智若比丘成就此六常行者當知是舍利弗等舍利弗比丘眼見色已不苦不樂捨心住正念正智耳聲鼻香舌味身觸意識法不苦不樂捨心住正念正智舍利弗比丘成就此六常行故世間難得所應承事恭敬供養則為世間無上福田佛説此經已諸比丘聞佛所説歡喜奉行恆住復次有諸苾芻證阿羅漢諸漏永盡於一切境隨順而行恆時不堪乃至失念生諸煩惱是故恆住無雜染住由是因緣説名恆住彼隨行品若喜若憂若欣若戚諸阿羅漢皆無所有乃至善中亦無是事又彼恆住極難行故及無罪故名為最勝能成就者極難得故説名第一真實福田應當奉請乃至廣説當知如前攝異門分師弟二圓滿復次於善説法毗奈耶中應知大師及弟子衆各由二相其德圓滿云何二相應知大師其德圓滿謂依利他行欲令悟入諸所有受皆是苦故説受所依説彼因緣説能雜染所有隨行説所對治及能對治師句安立説一切種究竟出離是名第一師德圓滿又依自利行宣説不共三種念住無雜染住是名第二師德圓滿云何二相應知弟子其德圓滿謂於如來無量法教能了知已而未得到聞之彼岸若以得到其彼岸者要為修行法隨法行證得出離非為受持了知是已如理修行法隨法行非但隨説音聲語言以為究竟是名第一諸弟子衆其德圓滿如是修行法隨法行不以下劣而生喜足要當往趣賢敏丈夫所趣之地定當獲得彼所應得是名第二諸弟子衆其德圓滿復次於善説法毗奈耶中復由三相應知大師其德圓滿又由二相應知弟子其德圓滿云何三相應知大師其德圓滿謂佛世尊為諸弟子最初施設遠離二邊中道正行是名第一師德圓滿又於聖教未生信者有毀犯者以正方便令入聖教離諸毀犯是名第二師德圓滿又於聖教已得入者由四法攝正攝受之是名第三師德圓滿云何名為四種法攝一於祕密以其如法間靜教授而教授之不以非法二於違犯以其如法苦切語言現前呵擯非不如法三於尋思依止耽嗜教令於內勤修寂靜四令時時聽聞正法常無懈廢又令遠離相似正法及令對治棄捨正行當知即是於其祕密能引如法間靜教授於實毀犯若正了知要當呵擯方調伏者以如法言現前呵擯心無雜染於尋思者方便令其易得決了於諸流蕩五妙欲者示其過患令生厭離漸次修學乃至證入第四靜慮所有尋思依止耽嗜方能於內究竟寂靜自令無惱令他攝取當知是名於時時間聽聞正法常無懈廢云何二相諸弟子衆其德圓滿謂諸弟子最初忍受大師所見謂諸法中空無我見由是因緣於諸法中不增益我起邪執著亦不毀壞世俗道理勝意樂故無所隨從隨言説故亦不遠離是名第一諸弟子衆其德圓滿又彼於見既忍受已能正修行法隨法行由四法攝所攝受時若彼諸法有苦有害如實了知能速斷滅若彼諸法無苦無害如實了知能速作證是名第二諸弟子衆其德圓滿如是大師及弟子衆之所攝受諸佛聖教當知一向無染清淨諸聰慧者之所歸趣
