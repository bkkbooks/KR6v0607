諸行相教不因請説者謂若於彼多百衆中以無量門作美妙説或為大師近住弟子阿難陀等作如是説為令正法得久住故涅槃有二種復次當知由三分故攝受圓滿涅槃一由隨順教授故二由正觀察一切行故三由永斷一切煩惱故隨順教授者謂記説教誡神變所攝如來隨欲記説彼心由自定意以三行相遍照他心若展轉久遠滅心若無間滅心若於現在所緣轉心從定起已隨念分別思惟定內所受他心如其所受即如是記汝有如是心謂久遠滅者如是意謂無間滅者如是識謂現在者此據種類不據剎那即以如是記説神變為依止故於其三處而為教誡一於行處現前境界開許如理作意遮止不如理作意二於住處遮止不正尋思開許正尋思三於止觀勤修行處開許令斷未斷諸行及令煩惱永得離繫而證涅槃如是宣説令從三處諸隨煩惱心得清淨謂從行處住處依處又正觀察過去未來現在諸行名正觀察一切諸行又有三漏三漏為先而有欲害欲害為先而有尋思熱惱尋思熱惱為先而有追求憂惱如是一切皆永斷故説名永斷一切煩惱如是定住心善解脫無相樂住無恐怖時於現法中名入圓滿般涅槃數又依三法依止自義名住歸依依止他義名住洲渚何者為三一依內如理作意為先法隨法行二依佛聽聞所説正法三依親近正法內善士不依親近餘正法外一切外道諸不善士如是三法當知顯示人中四種多所作法謂親近善士聽聞正法如理作意法隨法行復由三緣及五種相當知證得彼分涅槃何等三緣一遍知苦故二深見一切隨順苦行諸過患故三超過愁等一切苦故云何五相一知苦種類相交涉時發生愁等是名於彼遍知自性二知有種子彼法得生是名於彼遍知因性三知自所行所知境界是名於彼遍知緣性四隨觀執著我所及我皆是能順衆苦諸行是名於彼遍知行性五隨觀三世欲界所繫諸行過患能斷一切愁等諸苦當知由此三緣五相獲得如是彼分涅槃由可愛事無常轉變悲傷心戚故名為愁由彼發言咨嗟歔欷故名為歎因此拊膺故名為苦內懷冤結故名為憂因茲迷亂故名為惱又以喪失財寶無病親戚等事隨一現前創生憂惱説名為愁由依此故次乃發言哀吟悲冤舉身煩熱名歎苦位過此愁歎身煩熱已內燒外靜心猶未平説名憂位過初日已或二三五十日夜月由彼因緣意尚未寧説名為惱一四九一四九三七如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘我不與世間諍世間與我諍所以者何比丘若如法語者不與世間諍世間智者言有我亦言有云何為世間智者言有我亦言有比丘色無常苦變易法世間智者言有我亦言有如是受想行識無常苦變易法世間智者言有我亦言有世間智者言無我亦言無謂色是常恆不變易正住者世間智者言無我亦言無受想行識常恆不變易正住者世間智者言無我亦言無是名世間智者言無我亦言無比丘有世間世間法我亦自知自覺為人分別演説顯示世間盲無目者不知不見非我咎也諸比丘云何為世間世間法我自知自覺為人演説分別顯示盲無目者不知不見比丘色無常苦變易法是名世間世間法如是受想行識無常苦變易法是世間世間法比丘此是世間世間法我自知自覺為人分別演説顯示盲無目者不知不見我於彼盲無目不知不見者其如之何佛説此經已諸比丘聞佛所説歡喜奉行一五一五三八如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘世人為卑下業種種求財活命而得巨富世人皆知如世人之所知我亦如是説所以者何莫令我異於世人諸比丘譬如一器有一處人名為揵茨有名鉢有名匕匕羅有名遮留有名毗悉多有名婆闍那有名薩牢如彼所知我亦如是説所以者何莫令我異於世人故如是比丘有世間世間法我自知自覺為人分別演説顯示知見而説世間盲無目者不知不見世間盲無目者不知不見我其如之何比丘云何世間世間法我自知自覺乃至不知不見色無常苦變易法是為世間世間法受想行識無常苦變易法是世間世間法比丘是名世間世間法我自知自見乃至盲無目者不知不見其如之何佛説此經已諸比丘聞佛所説歡喜奉行復次嗢拖南曰諍芽見大染一趣學四怖善説惡説中宿住念差別諍由四因緣如來不與世間迷執共為怨諍然彼世間起邪分別謂為怨諍何等為四一者宣説道理義故二者宣説真實義故三者宣説利益義故四者有時隨世轉故此中如來依四道理宣説正法如前所謂觀待道理作用道理因成道理法爾道理由此如來名法語者如來終不故往他所求興諍事所以者何由諸世間違返他義謂為自義故興諍論如來乃以一切他義即為自義故無所諍唯除哀愍令其得義故往他所為説正法而諸邪執愚癡世間顛倒妄謂自義我義而有差別故興我諍由此因緣當知如來名道理語者又復如來名真實語者謂若世間諸聰敏者共許為有如來於彼亦説為有謂一切行皆是無常若於世間諸聰敏者共許為無如來於彼亦説為無謂一切行皆是常住又復如來名利益語者謂諸世間有盲冥者自於世法不能了知如來於彼自現等覺而為開闡又復如來或時隨順世間而轉謂阿死羅摩登祇等依少事業以自存活然諸世人為彼假立大富大財大食名想如彼世人假立名想如來隨彼亦如是説又如一事於一國土假立名想於餘國土即於此事立餘名想如來隨彼亦如是説若懷怨諍而興怨諍則不得名道理語者真實語者利益語者隨世轉者由具如是四種因緣是故當知如來無諍又佛世尊自然觀察所應作義雖無請問而自宣揚現等覺法能以稱當名句文身施設建立諸法差別廣説如前攝異門分如是當知乃至説名平等開示一五一一五一三九如是我聞一時佛