不退如修方便為離欲貪於餘上位隨其所應當知亦爾若猛利見審觀察時而不生起彼便獲得決定勝解我於諸處已能勝伏謂此所緣應生煩惱我於是處已勝伏故令不生起超過學地猶如大王能隨己心自在而轉降伏一切摩羅聚落證得究竟盡無生智梵行圓滿二二四四二二七九如是我聞一時佛住舍衛國祇樹給孤獨園爾時世尊告諸比丘於此六根不調伏不關閉不守護不執持不修習於未來世必受苦報何等為六根眼根不調伏不關閉不守護不修習不執持於未來世必受苦報耳鼻舌身意根亦復如是愚癡無聞凡夫眼根見色執受相執受隨形好任彼眼根趣向不律儀執受住世間貪憂惡不善法以漏其心此等不能執持律儀防護眼根耳鼻舌身意根亦復如是如是於六根不調伏不關閉不守護不執持不修習於未來世必受苦報云何六根善調伏善關閉善守護善執持善修習於未來世必受樂報多聞聖弟子眼見色不取色相不取隨形好任其眼根之所趣向常住律儀世間貪憂惡不善法不漏其心能生律儀善護眼根耳鼻舌身意根亦復如是如是於六根善調伏善關閉善守護善執持善修習於未來世必受樂報即説偈言於六觸入處住於不律儀是等諸比丘長夜受大苦斯等於律儀常當勤修習正信心不二諸漏不漏心眼見於彼色可意不可意可意不生欲不可不憎惡耳聞彼諸聲亦有念不念於念不樂著不念不起惡鼻根之所嚊若香若臭物等心於香臭無欲亦無違所食於衆味彼亦有美惡美味不起貪惡味亦不擇樂觸以觸身不生於放逸為苦觸所觸不生過惡想平等捨苦樂不滅者令滅心意所觀察彼種彼種相虛偽而分別欲貪轉增廣覺悟彼諸惡安住離欲心善攝此六根六境觸不動摧伏衆魔怨度生死彼岸佛説此經已諸比丘聞佛所説歡喜奉行引發復次於其六根如前所説五寂靜相不寂靜故當知攝受三種苦果謂現法中依根增上雜染而住由諸不善現行為因或於他所成其退劣或被譏呵或被殺害受如是等現法衆苦又受當來生老病死種種諸苦又受當來由先數習所引等流不護諸根諸雜染故亦名為苦與此相違於其六根由有五種寂靜相故當知攝受三苦滅果二二五四三二八如是我聞一時世尊在拘薩羅國人間遊行到頻頭城北申恕林中爾時頻頭城中婆羅門長者皆聞世尊於拘薩羅國人間遊行住頻頭城申恕林中聞已悉共出城至申恕林詣世尊所稽首禮足退坐一面爾時世尊告頻頭城婆羅門長者若人問汝言何等像類沙門婆羅門不應恭敬尊重禮事供養汝當答言若沙門婆羅門眼見色未離貪未離欲未離愛未離渴未離念內心不寂靜所行非法所行踈澀行耳鼻舌身意法亦復如是如是像類比丘不應恭敬尊重禮事供養作是説已當復問言何故如此像類沙門婆羅門不應恭敬尊重禮事供養汝應答言我等眼見色不離欲不離愛不離渴不離念內心不寂靜耳鼻舌身意法亦復如是彼沙門婆羅門眼見色亦不離貪不離欲不離愛不離渴不離念內心不寂靜行非法行踈澀行耳鼻舌身意法亦復如是我於斯等求其差別不見差別之行是故我於斯等像類沙門婆羅門不應恭敬尊重禮事供養若復問言何等像類沙門婆羅門所應恭敬尊重禮事供養汝應答言若彼眼見色離貪離欲離愛離渴離念內心寂靜不行非法行行等行不踈澀行耳鼻舌身意法亦復如是如是像類沙門婆羅門所應恭敬尊重禮事供養若復問言何故於此像類沙門婆羅門恭敬尊重禮事供養汝應答言我等眼見色不離貪不離欲不離愛不離渴不離念內心不寂靜行非法行行踈澀行耳鼻舌身意法亦復如是斯等像類沙門婆羅門離貪離欲離渴離念內心寂靜行如法行不行踈澀行耳鼻舌身意法亦復如是我等於彼求其差別見差別故於彼像類沙門婆羅門所應恭敬尊重禮事供養如是説已若復問言彼沙門婆羅門有何行有何形貌有何相汝等知是沙門婆羅門離貪向調伏貪離恚向調伏恚離癡向調伏癡汝應答言我見彼沙門婆羅門有如是像類在空間處林中樹下卑床草蓐修行遠離離諸女人近樂獨人同禪思者若於彼處無眼見色可生樂著無耳聲鼻香舌味身觸可生樂著若彼沙門婆羅門有如是行如是形貌如是相令我等知是沙門婆羅門離貪向調伏貪離恚向調伏恚離癡向調伏癡時諸沙門婆羅門長者白佛言奇哉世尊不自譽不毀他正説其義各各自於諸入處分別染汙清淨廣説緣起如如來應等正覺説譬如士夫溺者能救閉者能開迷者示路暗處然燈世尊亦復如是不自譽不毀他正説其義乃至如如來應等正覺説爾時頻頭城婆羅門長者聞佛所説歡喜作禮而去不應供復次略有二種世俗梵志實非福田懷增上慢自謂福田自稱我是真實福田當知成就非實福田性及相故不應供養一者從他所得利養恭敬現前猛利耽著諸根叨餮為性躁擾詐示現前離欲之行二者攝受家産親屬雜居鄙穢專自修身凡所行行既非自利亦非利他遠離尸羅正法正行遠離能住善趣善行遠離能住涅槃妙行當知彼與一切愚夫異生之類無有差別住正法者與此相違當知是名勝義梵志二二六四四二八一如是我聞一時佛住王舍城迦蘭陀竹園時有縈髮目揵連出家來詣佛所共相問訊問訊已退坐一面爾時世尊告縈髮目揵連汝從何來縈髮目揵連白佛言我從彼衆多種種異道沙門婆羅門遮羅迦出家集會未曾講堂聽法從彼林來佛告縈髮目揵連汝為何等福力故從彼衆多種種異道沙門婆羅門遮羅迦出家所聽其説法縈髮目揵連言我試聽其競勝論義福利聽其相違反論議福利故佛告目揵連長夜久遠種種異道沙門婆羅門遮羅迦出家競勝論議相違反論議福利迭相破壞縈髮目揵連白佛言瞿曇為諸弟子説何等法福利令彼轉為人説不謗如來不增不減誠説法説法次法説無有餘人能來比挍難詰訶責佛告目揵連明解脫果報福利為人轉説者不謗如來不乖其理法次法説無有能來比挍難詰嫌責縈髮目揵連白佛言瞿曇諸弟子有法修習多修習令明解脫福利滿足者不佛告縈髮目揵連有七覺分修習多修習明解脫福利滿足縈髮目揵連白佛言有法修習能令七覺分滿足不佛告縈髮目揵連有四念處修習多修習能令七覺分滿足縈髮目揵連白佛復有法修習多修習令四念處滿足不佛告縈髮目揵連有三妙行修習多修習能令四念處滿足縈髮目揵連白佛言復有法修習多修習令三妙行滿足不佛告目揵連有六觸入處律儀修習多修習令三妙行滿足縈髮目揵連白佛言云何六觸入處律儀修習多修習令三妙行滿足佛告目揵連若眼見適意可愛念能長養欲樂令人緣著之色彼比丘見已不喜不讚歎不緣不著不住若眼見不適意不可愛念順於苦覺之色諸比丘見已不畏不惡不嫌不恚於彼好色起眼見已永不緣著不好色起眼見已永不緣著內心安住不動善修解脫心不懈倦耳鼻舌身意識法亦復如是如是於六觸入修習多修習滿足三妙行云何修三妙行滿足四念處多聞聖弟子於空間處林中樹下作如是學如是思惟此身惡行現世後世必得惡報我若行身惡行者心當自生厭悔他亦嫌薄大師亦責諸梵行者亦復以法而嫌我惡名流布遍於諸方身壞命終當墮地獄於身惡行見現世後世如是果報是故除身惡行修身妙行口意惡行亦復如是是名修習三妙行已得四念處清淨滿足云何修四念處得七覺分滿足目揵連比丘如是順身身觀住彼順身身觀住時攝念安住不忘爾時方便修習念覺分方便修習念覺分已得念覺分滿足於彼心念選擇於法覺想思量爾時方便修習擇法覺分方便修習擇法覺分已逮得擇法覺分滿足選擇彼法覺想思量方便修習精進覺分方便修習精進覺分已逮得精進覺分滿足勤精進已生歡喜心爾時修習方便歡喜覺分修習歡喜覺分已逮得歡喜覺分滿足心歡喜已身心止息爾時修習猗息覺分修習猗息覺分已逮得猗息覺分滿足身心息已得三摩提爾時修習定覺分修習定覺分已定覺分滿足謂一其心貪憂滅息內心行捨方便修習捨覺分方便修習捨覺分已逮得捨覺分清淨滿足受心法念處亦如是説如是修習四念處七覺分滿足云何修習七覺分明解脫滿足目揵連若比丘修念覺分依遠離依離欲依滅捨於進趣修念覺分逮得明解脫清淨滿足乃至修習捨覺分亦如是説是名修習七覺分已明解脫清淨滿足如是目揵連法法相依從此岸而到彼岸説是法時縈髮目揵連遠塵離垢得法眼淨時縈髮目揵連見法得法知法入法度諸疑惑不由於他於諸法律得無所畏從座起整衣服為佛作禮合掌白佛言我今寧得於正法律出家得具足比丘分不佛告目揵連汝今已得於正法律出家具足得比丘分得出家已專精思惟不放逸住乃至成阿羅漢明解脫復次此正法外有諸沙門婆羅門等為諸弟子宣説法時多分為求詰責勝利及求免脫他難勝利當知如是宣説法者就第一義無義無利非自利益非利益他諸佛如來為諸弟子宣説正法唯為證得明及解脫二果勝利當知如是説正法者大果大利自利利他無不圓滿行於三世無忘失住最勝義故三種所緣境差別故説名三明若心解脫若慧解脫皆名解脫是愛無明根本雜染勝對治故為得未得明與解脫當知略有四種修道謂修根故能正修身修身所引善行修故能正修戒修戒所引念住覺支無倒修故能修心慧此中修根復有三種一世間修二有學修三無學修若思擇力為所依止雖取可愛不可愛境不如理相而不發起煩惱諸纏設令暫起尋復除遣是世間修若於聖諦已得現觀由失念故或生適意或不適意或兼二意而心不為纏縛堅住速於雜染能得解脫是有學修若即此心堅固安住如前於內無有隘迮善脫善修都無一切下至失念於諸可意不可意等發心親近計彼有德而趣向之是名無學善淨修根當知修戒修心修慧三種亦爾此中最初是初修根所引第二是第二所引第三是第三所引修戒修心修慧相望各有三種所引當知亦爾此中可意不可意境界差別故有恩有怨有情差別故功德過失相應有情差別故所愛非所愛有情差別故當知一向適意一向不適意適意不適意相雜差別可意不可意境界差別故者自有境界一向可意自有境界一向不可意自有境界其類相雜少分可意少分不可意如是有情或一向有恩或一向有怨或恩怨相雜或一向有德或一向有失或德失俱備若於有情愛復生愛當知一向是其所愛若於有情恚復生恚當知一向非其所愛若於有情愛已生恚或於有情恚已生愛當知是名所愛非所愛由如是等差別因緣適意等三有其差別又於惡行隨觀現法所有過患隨觀當來所有過患是故遠離修習妙行若於六處由一切門皆被誹毀是名現法所有過患由是因緣墮於惡趣是名當來所有遇患此中為他所誹毀者謂為外道及餘世間有聰敏者聞其鄙惡名稱聲頌咸共誹毀當知其餘即如所説又此中言修念住者謂念覺分創始發起在異生地數修習者在有學地修圓滿者在無學地修習覺分未得斷界於其斷界正希求時名依遠離未得無欲界於無欲界正希求時名依離欲未得滅界於其滅界正希求時名依於滅棄捨下劣修覺分故回向勝妙修覺分故名棄捨回向又諸苾芻守護諸根有慚有愧由是因緣恥於惡行修習妙行修妙行故無有變悔無變悔故發生歡喜此為先故心得正定心正定故能見如實見如實故明及解脫皆悉圓滿當知是名修行次第二二七四五二八二如是我聞一時佛住迦徵伽羅牟真鄰陀林中時有年少名鬱多羅是波羅奢那弟子來詣佛所恭敬問訊已退坐一面爾時世尊告鬱多羅汝師波羅奢那為汝等説修諸根不鬱多羅言説已瞿曇佛告鬱多羅汝師波羅奢那云何説修諸根鬱多羅白佛言我師波羅奢那説眼不見色耳不聽聲是名修根佛告鬱多羅若如汝波羅奢那説盲者是修根不所以者何如唯盲者眼不見色爾時尊者阿難在世尊後執扇扇佛尊者阿難語鬱多羅言如波羅奢那所説聾者是修根不所以者何唯聾者耳不聞聲爾時世尊告尊者阿難異於賢聖法律無上修諸根阿難白佛言唯願世尊為諸比丘説賢聖法律無上修根諸比丘聞已當受奉行佛告阿難諦聽善思當為汝説緣眼色生眼識見可意色欲修如來厭離正念正智眼色緣生眼識不可意欲修如來不厭離正念正智眼色緣生眼識可意不可意欲修如來厭離不厭離正念正智眼色緣生眼識不可意可意欲修如來不厭離厭離正念正智眼色緣生眼識可意不可意可不可意欲修如來厭不厭俱離捨心住正念正智如是阿難若有於此五句心善調伏善關閉善守護善攝持善修習是則於眼色無上修根耳鼻舌身意法亦如是説阿難是名賢聖法律無上修根尊者阿難白佛言世尊云何賢聖法律為賢聖修根佛告阿難眼色緣生眼識生可意生不可意生可意不可意彼聖弟子如是如實知我眼色緣生眼識生可意生不可意生可意不可意此則寂滅此則勝妙所謂俱捨得彼捨已離厭不厭譬如力士彈指頃如是眼色緣生眼識生可意生不可意生可意不可意俄爾盡滅得離厭不厭捨如是耳聲緣生耳識生可意生不可意生可意不可意聖弟子如是如實知我耳識聞聲生可意生不可意生可意不可意此則寂滅勝妙所謂為捨得捨已離厭不厭譬如大力士夫彈指發聲即滅如是耳聲緣生耳識生可意生不可意生可意不可意生已盡滅是則為捨得彼捨已離厭不厭鼻香緣生鼻識生可意生不可意生可意不可意聖弟子如是如實知鼻香緣生鼻識生可意生不可意生可意不可意此則寂滅此則勝妙所謂為捨得彼捨已離厭不厭譬如蓮華水所不染如是鼻香緣生鼻識生可意生不可意生可意不可意生已盡滅所謂為捨得彼捨已離厭不厭舌味緣生舌識生可意生不可意生可意不可意彼聖弟子如是如實知舌味緣生舌識生可意生不可意生可意不可意生已盡滅寂滅勝妙所謂為捨得彼捨已離厭不厭譬如力士舌端唾沫盡唾令滅如是舌味緣生舌識生可意生不可意生可意不可意生已盡滅所謂為捨得彼捨已離厭不厭身觸緣生身識生可意生不可意生可意不可意生已盡滅聖弟子如是如實知身觸緣生身識生可意生不可意生可意不可意生已盡滅寂滅勝妙所謂為捨得彼捨已離厭不厭譬如鐵丸燒令極熱小渧水灑尋即消滅如是身觸緣生身識生可意生不可意生可意不可意生已盡滅所謂為捨得彼捨已離厭不厭意法緣生意識生可意生不可意生可意不可意生已速滅聖弟子如是如實知意法緣生意識生可意生不可意生可意不可意生已盡滅是則寂滅是則勝妙所謂為捨得彼捨已離厭不厭譬如力士斷多羅樹頭如是意法緣生意識生可意生不可意生可意不可意生已盡滅所謂為捨得彼捨已離厭不厭阿難是為賢聖法律為聖弟子修諸根云何為聖法律學見迹佛告阿難眼色緣生眼識生可意生不可意生可意不可意彼聖弟子慚恥厭惡耳鼻舌身意法緣生意識生可意生不可意生可意不可意彼聖弟子慚恥厭惡阿難是名賢聖法律學見迹阿難是名賢聖法律無上修諸根已説賢聖修諸根已説學見迹阿難我為諸聲聞所作所作已作汝等當作所作廣説如篋毒蛇經佛説此經已尊者阿難聞佛所説歡喜奉行修復次有一沙門若婆羅門自既不能善修諸根而不如理為他施設善修根法見唯棄背所有境界名護諸根然其自於諸弟子衆深生染著一分起愛一分生憎謂於其教順逆因緣適不適意常現行故於此微細自己雜染不能以慧如實悟入而謂自能善修諸根起增上慢諸有隨順如是見者彼雖令根離諸境界獨處空間而緣彼境發起種種尋思雜染然無智慧而自悟入是亦不名善修諸根又亦不為善修根故勤修正行但信他言起邪勝解及以邪慢諸佛如來為諸弟子如理施設煩惱斷故名善修根非唯一向背諸境界又諸如來於其三種不共念住善住其心故不染著諸弟子衆於正行衆悅意現行於邪行衆行不悅意由此所生貪欲雜染瞋恚雜染都無所有由是因緣雖與弟子等煩惱斷而名無上善修諸根又此修根依五品衆有差別故當知亦有五轉差別謂佛世尊或有弟子一向正行而亦畢竟或有弟子一向放逸而亦畢竟或有弟子修行正行而不畢竟或有弟子行於邪行而不畢竟或有弟子多種品類一行正行一行放逸一行一分或時放逸或不放逸如是名為第五品衆此中如來稱可意者謂諸弟子於善説法毗奈耶中為修諸根得圓滿故修行正行復有一類不可意者謂行邪行或不修行是故如來觀第一衆生起悅意觀第二衆生不悅意觀第三衆生起悅意生不悅意觀第四衆生不悅意生起悅意觀第五衆生起悅意生不悅意亦復生起悅不悅意如來雖復於此五衆發起如是五轉差別悅不悅意然諸如來終不為彼愛恚行相之所染污由諸煩惱并其習氣永離繫故善修根故是故如來一切煩惱并習永斷為所依止能善住念於弟子衆無諸雜染説名五轉無上修根又於如是一切五轉隨其所應當正思惟三種對治一無常想二者慈心三無想定如是三種隨其所應當知其相又佛世尊所作已辦無學弟子名已修根由彼長夜樂涅槃故雖遇如前諸有情數境相現前或純可愛或純非愛或多雜類通愛非愛由貪瞋癡永遠離故由心解脫及慧解脫