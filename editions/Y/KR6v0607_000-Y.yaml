與弟子所說的有偈部分相合稱為八眾相應屬於祇夜於是記說只有如來所說弟子所說了現存的別譯雜阿含經分為初誦與二誦初誦及二誦末卷是眾相應的祇夜二誦長行是如來所說從末卷又有偈頌來說全經體例不一致是否到此已是足本或者譯文傳寫已有所遺落但可以肯定的祇夜與記說如來記說弟子記說曾集成一類而別行這就是少分阿含但祇夜早與修多羅相聯合記說也附於修多羅終於綜合為大部雜相應阿含雜阿含經也就包含了修多羅祇夜記說三部分雜阿含經中屬於如來所說弟子所說的共一五卷是附於五陰誦雜因誦道品誦以下的其中佚失了一卷次第也有錯亂推定原譯本次第如下五陰誦卷六卷七雜因誦卷一八卷一九卷二卷二一卷二二佚失卷二三誤作卷三一道品誦卷三一誤作四一卷三二卷三三卷三四卷三五卷三六誤作四七卷三七卷三一為卷二三之誤初說兜率天化樂天他化自在天三經接著說如佛說六經如是異比丘問六經佛問諸比丘六經亦如是說可見在此卷以前還有說四王天忉利天夜摩天共六經但三經已佚失了此卷以前所缺失的不只三經而應該是一卷現存本五卷除去無憂王譬喻實際佚失了二卷上面說到卷二四與卷二六之間內容是念住末正斷神足根初道品誦佚失了這一卷另一卷就是這六欲天中四王天等三經那一卷了比對相應部與六欲天相近的如龍相應揵闥婆相應金翅鳥相應雜阿含經沒有這部分可能佚失的就是這些在實存的一四卷中卷一八到卷二一四卷宋譯本已別立為弟子所說誦品六修多羅阿含四部阿含原始佛教聖典的集成從修多羅到四部阿含的分別編集是經過先後多階段的起初集成陰入處因緣道品以精簡的散文集出名為修多羅分類編次名為相應教次集出的有偈的名為祇夜保留在相應教中的是八眾相應為適應印度社會所成的通俗教化八眾中天四眾是梵魔帝釋忉利天四王天天子天女夜叉林神多數屬於四王天代表印度一般的宗教信教對象人四眾是婆羅門剎利長者沙門本於印度社會四階級佛法主張四姓平等所以不立低賤的首陀羅而代以一無所有的出家沙門居士是吠奢姓中的富有者祇夜是可以通稱一切偈頌的由於有偈的眾相應名為祇夜於是傳誦中的其他偈頌或名伽陀或名優陀那如法句義品波羅延那大抵是在這一機運中成立的經說是不斷傳出的或是不了義偈頌的解說或是法義的問答分別或是深秘事理的決了集成了弟子所說與如來所說記說記說的集出比祇夜要遲一些從雜阿含經與相應部的組織知道祇夜別立而記說是附於修多羅四品陰入處因緣道品以下的以上所說是前來所說的結論記說是附於修多羅四品以下的在傳誦中文句漸長法義與事緣相結合的記說也不免參雜到修多羅中去以陰相應為例來說雜阿含經共一四攝頌初四頌一一一三頌文句比較簡要七至一頌一二頌文句長些但仍是法義的開示而五頌是弟子所說六頌及一四頌不但文段長還參合了事緣與譬喻就在這長篇中如大正二六二經是佛涅槃以後阿難以化迦旃延經來教化闡陀傳說是結集以後的事又如大正五八經對五陰作十門問答依攝頌是十問攝事分稱為問記這是問答論究的記說十門問記赤銅鍱部又編為中部一九滿月大經覺音判為九分教的與方廣相當的毘陀羅雜阿含經與相應部都有此二經可見是上座部誦本如此也表示了如來記說與弟子記說早已參入到修多羅中經是不斷集出來的如赤銅鍱律自恣揵度說自恣日比丘等說法誦經者集經持律者抉擇律又經分別說比丘中之誦經者相互誦經彼等共住一處古代不用文字記錄所以集出的經由誦經者誦持不忘而傳下來的不但誦習已集出的經在每年自恣日誦經者與誦經者還要共同審定結集新傳出的經不斷傳出的經或說從佛聽來的或說和合眾僧多聞耆舊上座處得來的或說眾多比丘處聽來的或說從一比丘聽來的種種傳出的經要誦經者來結集共同審定編成次第審定傳出的是否佛法準則是修多羅相應不越毘尼就是法義要與原始集出的修多羅相契合能調伏煩惱而不違毘尼的這樣的集出被稱為四大廣說是一切部派所共傳的古說多方面的不斷傳出審定為是佛法的比附於修多羅這是稱經為阿含的原始意義如善見律毘婆沙卷一大正二四六七七上說容受聚集義名阿含如修多羅說佛告諸比丘我於三界中不見一阿含如畜生阿含純是眾生聚集處也畜生阿含就是畜生趣趣是容受聚集的意義晉道安解阿含為秦言趣無僧肇說秦言法歸譬彼巨海百川所歸故以法歸為名與覺音所說有相同的意趣集出而會歸於一處形成一切經法的總匯名為阿含那時還沒有用文字記錄所以還不會稱為篋藏容器的藏這裡要肯定的指出原始結集相應修多羅以後集出的是祇夜記說也泛稱修多羅相應教為根本的相應阿含不斷的傳出集出到別編為四阿含時以修多羅為根本而成經說總集的相應阿含部類已非常眾多更有未結集的要結集內容太廣大於是有第二結集分經為四部四阿含瑜伽師地論攝事分說即彼相應教更以餘相而說成為長中增一相應教雖與修多羅相應不外乎蘊處等相應但內容大大的增廣了四阿含的別編是從經法總集的相應教中分出一部分更新集出一部分分編而成所以雜相應阿含是四部阿含的母體瑜伽論攝事分所抉擇的經義是雜阿含經的修多羅部分但有些卻是現存雜阿含經所沒有的如上修多羅與摩呾理迦舉出了二十餘部經攝事分攝頌所沒有的不妨說是造論者所附入的但攝頌所有的應該說是