  text: 序印順雜阿含經即相應阿含相應部是佛教界早期結集的聖典代表了釋尊在世時期的佛法實態佛法是簡要的平實中正的以修行為主依世間而覺悟世間實現出世的理想涅槃在流傳世間的佛教聖典中這是教法的根源後來的部派分化甚至大乘中觀與瑜伽的深義都可以從本經而發見其淵源這應該是每一位修學佛法者所應該閱讀探究的聖典現存漢譯的雜阿含經內容缺佚了二卷古人以阿育王譬喻補足次第也大有倒亂所以全經的組織部類無法明瞭呂澂發表了雜阿含經刊定記依瑜伽師地論知道四阿含經是依雜阿含經為根本的瑜伽論攝事分中抉擇契經的摩呾理迦本母是依雜阿含經的次第而造我在原始佛教聖典之集成有了進一步的研究主要是論定依瑜伽論攝事分分全經為能說所說所為說這三類與修多羅祇夜記說相當近代學者的研究或說依九分教而集成四部阿含或說依四阿含而類別為九十二分教其實四部阿含是先有雜阿含九分教是先有修多羅祇夜記說這三分也還是先後集出二者互相關聯同時發展而次第成立的中阿含經一九一大空經說到正經歌詠記說中部一一二空大經所說相同正是佛教初期三分教時代的明證瑜伽論攝事分中抉擇契經宗要的摩呾理迦是雜阿含經的部分論義也就是所說修多羅部分的論義修多羅分陰處因緣聖道四大類在雜阿含經的集成中修多羅是最早的正是如來教法的根本所在從雜阿含經刊定記去看這部分的經論對比不免粗疏而不夠精確抗戰期間聽漢藏教理院雪松法師說內學院有雜阿含經論的合刊本可惜沒有見到不知內容如何我在原始佛教聖典之集成中經論對比也還有些錯失因此我編印了這部雜阿含經論會編一經論先經後論比對合編二分別部類依修多羅祇夜記說的次第分全經為七誦五十一相應三校正衍文與訛字四採用新式標點五經前附入拙作的雜阿含經部類之整編說明雜阿含經的部類與會編的種種問題讀者可先讀此文我想這對於探究佛教的原始法義發心閱讀漢譯雜阿含經的會給予多少方便的這部書的比對配合部分心如給了很大的幫助發見了疑問也就隨時提出來重加審定校對方面性瀅依道慧潤也是非常精細所以本書的錯誤應該是能減到最少的末了謹以虔誠的心情祝願讀者的正見增明中華民國七十二年九月雜阿含經部類之整編一雜阿含經的傳譯我國譯出的雜阿含經與巴利本的相應部相當是劉宋元嘉年間求那跋陀羅在楊都祇洹寺所出的寶雲傳譯慧觀筆受分為五卷求那跋陀羅是中天竺的婆羅門種元嘉一二年西元四三五由海道抵廣州不久就到了楊都現在的南京西元四四五年以前隨從譙王到荊州所以雜阿含經在楊都的譯出在西元四三五四四五年之間歷代三寶紀與大唐內典錄依據道慧的宋齊錄說雜阿含經的梵本是法顯所賷來的但僧祐出三藏記集慧皎高僧傳都沒有說到所以當時依據的梵本是法顯還是求那跋陀羅賷來是難以論定的雜阿含經的現存本內容與次第都是有錯亂的這是宋藏本以來就如此了如卷二三卷二五兩卷實為阿育王譬喻的部分異譯卻被誤編在雜阿含經內考求那跋陀羅所譯的有無憂王即阿育王經一卷梁僧祐時已經佚失大抵本經在梁代以前已經缺少了兩卷次第也已經倒亂或者就以求那跋陀羅所譯的無憂王經編入充數於是雜阿含經保有五卷而無憂王經卻被誤傳為佚失了實際上雜阿含經現存的只有四八卷這是內容的缺失不全阿含經的集成從來就有攝頌大致以十經為一偈以便持經者的記憶雜阿含經的五陰誦部分傳譯時保存了攝頌所以可依攝頌而知道經文的次第保存攝頌的共五卷現存本編為卷一卷一卷三卷二卷五這是可依攝頌而確定為卷次倒亂的沒有攝頌的四三卷當然也還是有倒亂的這是經卷次第的倒亂現存刊本卷八初題誦六入處品第二卷一二初題雜因誦第三品之四卷一六初題雜因誦第三品之五卷一八初題弟子所說誦第四品卷二四初題第五誦道品第一可見全經是分為多少誦也就是多少品的但零落不全不能明瞭一經組織的全貌這是部類分判的不完全雜阿含經為原始佛教的根本聖典而傳譯為漢文的由於古代的展轉傳寫從譯出到刻版長達五百多年竟缺佚紊亂到如此不明全經的統緒次第實為聞思正法的最大障礙到近代民國十二年西元一九二三年支那內學院呂澂發表雜阿含經刊定記證明了瑜伽師地論攝事分的契經事擇攝實為雜阿含經主體的本母摩呾理迦論文從卷八五到九八凡一四卷依論義對讀經文經文應有二二卷但一卷已經佚失只存二一卷這樣的經論對讀雜阿含經主體的分部與次第總算已充分的明了出來日本昭和十年西元一九三五年出版的國譯一切經新訂雜阿含經繼承姉崎正治的考校分部論文發表於西元一九八年沒有能重視中國學者研究的業績在部類次第上仍不免有所倒亂關於雜阿含經當然是原始佛教聖典但不可不知道的那就是現存的原始佛教聖典都是部派所誦出的漢譯雜阿含經是上座部中說一切有系的誦本如說一切有部所傳誦的撫掌喻經順別處經都見於漢譯的雜阿含經說一切有部是說三世有的所以特說云何一切有肯定的說以有過去色故以有未來色故所以聖弟子要不顧戀過去色不欣求未來色這些都是現存巴利聖典相應部與雜阿含經同一原本屬上座部中分別說系的赤銅鍱部所誦所沒有的說一切有部的聖典可以對勘現存巴利的相應部但應從說一切有系傳承的立場去治理研究雜阿含經的另一譯本題名別譯雜阿含經二卷麗藏本分為一六卷次第極為紊亂內分二誦大正藏計數為三六四經這部經梁出三藏記集沒有說到隋法經錄初舉別譯雜阿含經名目失譯經中注說毘𠼝秦言雄也所以唐開元釋教錄附入秦錄失譯俱舍論稽古以為今撿譯文體裁蓋在魏晉之間全非東晉以下語氣且秦言字獨見經十二曰毘梨秦言雄一箇秦字惡足徵哉或晉字音誤亦不可知這是推想為漢代所譯的但或晉字音誤又容許可能是西晉所譯出然譯者巧拙不一不可一概而論如符秦建元二年西元三八四初譯的中阿含經增一阿含經是東晉的譯典而譯文卻是並違本失旨名不當實依悕屬辭句味亦差良由譯人造次未善晉言故使爾耳別譯雜阿含經既注有秦言似乎沒有非西晉以前譯出不可的理由總之別譯雜阿含經是古譯比五卷本的譯出為早所以別譯二字不是初譯的經名而是後人附加的二卷本的別譯雜阿含經只是五卷本的一部分次第相同而文義略有出入俱舍論稽古論斷二卷本為飲光部的誦本或推論為可能與化地部或法藏部誦本相近化地部法藏部飲光部都是上座部分別說系流出的部派同出於一系如說近於化地部與法藏部怎能一定說不近於飲光部呢在教義上飲光部主張過去未與果業是有與說三世有的說一切有部赤銅鍱部所傳飲光部從說一切有部分出要接近些五卷本是說一切有部的誦本次第與二卷本相近所以被稱為別譯雜阿含經的屬於飲光部誦本是更有可能的玄奘所譯俱舍論引雜阿笈摩為婆柁梨說偈真諦舊譯的俱舍釋論作少分阿含依此俱舍論稽古說雜含有大小二本而此文沒大本僅見小本故以別譯雜阿含經為小本少分阿含是雜阿含經的一部分而自成部類的二卷本分為二誦初誦一二卷是有偈的二誦七卷是長行末卷又有偈頌偈頌部分共一三卷與五卷本的八眾誦眾相應一三卷相當二誦的七卷長行是如來所說誦的一部分比對五卷本僅四卷弱從末卷又是偈頌及長行部分七卷僅及五卷本的四卷來說這部二卷本可能是有遺落的這部二卷本比之五卷本不只是不同部派所傳誦也是不同的組織稽古的大本小本說對雜阿含經的綜集完成過程倒是可以提貢說明的如下文說別譯雜阿含經全部都有攝頌偶缺比對雜阿含經凡一七卷這樣依瑜伽師地論攝事分得二一卷的次第依別譯雜阿含經得一七卷次第在全經四八卷中次第可見的已有三八卷了以此為基礎相信雜阿含經全部次第的整理誦品的分類應該會更適當些雜阿含經少數經的異譯從略二雜阿含經的三部分四阿含中的雜阿含經唐義淨在根本說一切有部毘奈耶雜事中列舉內容的種種相應名之為相應阿笈摩這一名稱與巴利五部中的相應部名義恰好相合唐玄奘在瑜伽師地論攝事分中也列舉了種種相應但說即彼一切事相應教間廁鳩集是故說名雜阿笈摩種種事相應教所集成的為什麼不名為相應而稱為雜呢雜與相應同是的對譯只是譯語的不同在中國文字中雜不一定是雜亂間廁正是次第相間雜的意義相應修多羅的結集如瑜伽論所說結集如來正法藏者攝聚如是種種聖語為令聖教久住世故以諸美妙名句文身如其所應次第安布次第結集原始的結集是隨義類相同的分為不同部類次第安布集成種種相應相應修多羅不只是相應又有相次相間雜的意義所以古人多數譯為雜阿含經四阿含經一向以為是同時集成的但在近代研究中雖意見不完全一致而同認為成立是有先後的關於四阿含經集成的先後瑜伽論攝事分中意外的保存了古代的結集傳說啟示了一項重要的意義那就是四阿含是以雜阿含經為根本的如論攝事分卷八五大正三七七二下說雜阿笈摩者謂於是中世尊觀待彼彼所化宣說如來及諸弟子所說相應蘊界處相應緣起食諦相應念住正斷神足根力覺支道支入出息念學證淨等相應又依八眾說眾相應即彼一切事相應教間廁鳩集是故說名雜阿笈摩即彼相應教復以餘相處中而說是故說名中阿笈摩即彼相應教更以餘相廣長而說是故說名長阿笈摩即彼相應教更以一二三等漸增分數道理而說是故說名增一阿笈摩佛法只是一切事相應教隨機散說依相應部類而集成的是雜阿含經然後依不同意趣更為不同的組織成為長中增一約分數說名為增支三部三阿含的法義雖有不同的部分但論到佛法根本不外乎固有的一切事相應教的闡明所以四部都被稱為事契經說到事如瑜伽師地論本地分卷三大正三二九四上說諸佛語言九事所攝云何九事一有情事二受用事三生起事四安住事五染淨事六差別事七說者事八所說事九眾會事有情事者謂五取蘊受用事者謂十二處生起事者謂十二分緣起及緣生安住事者謂四食染淨事者謂四聖諦差別事者謂無量界說者事者謂佛及彼弟子所說事者謂四念住等菩提分法眾會事者所謂八眾佛所說的不外乎九事就是一切事相應教的事雜相應阿含經的部類內容雜事也說到依種種相應立為多品上來三說今對列如下瑜伽本地分瑜伽攝事分雜事五取蘊蘊五蘊十二處處六處十二緣起緣起緣起四食食四聖諦諦聖諦無量界界十八界弟子所說聲聞所說佛及弟子如來所說佛所說四念住等念住等念住等八眾八眾伽他上列三說雖次第開合小異而內容是大體一致的雜事是說一切有部律雜阿含經是說一切有部的誦本瑜伽論多少採取經部說經部也是從說一切有部分化出來的所以瑜伽論與雜事所傳與漢譯雜阿含經相合可見事相應教的次第成立以雜阿含經為根本的傳說是屬於說一切有部的是上座部中說一切有系的古老傳承一切事相應教是分為三大類的如瑜伽師地論攝事分卷八五大正三七七二下說如是一切相應略由三相何等為三一是能說二是所說三是所為說若如來若如來弟子是能說如弟子所說佛所說分若所了知若能了知是所說如五取蘊六處因緣相應分所了知及道品分能了知若諸苾芻天魔等眾是所為說如結集品一切事相應教分為三類一約能說人立名是如來及弟子所說相應二約所說法立名如蘊相應等是所了知念住等相應是能了知三約所化眾立名如苾芻相應魔相應等這三大類是相應修多羅就是雜阿含經的全部內容進一步的探究起來如瑜伽論本地分解說十二分教的修多羅說無量蘊相應語處相應語緣起相應語食相應語諦相應語界相應語聲聞乘相應語獨覺乘相應語如來乘相應語念住正斷神足根力覺支道支等相應語不淨息念諸學證淨等相應語是名契經所說的內容與次第與九事相合但除去了八眾的眾會事偈頌部分以八事為契經修多羅那是修多羅與偈頌分立偈頌被看作修多羅相應以外的佛及弟子事分別為聲聞乘獨覺乘如來乘相應語是對雜阿含經中如來所說弟子所說部分解說為三乘教法的根源這是後代佛弟子面對三乘聖教的流行而理解到淵源於根本聖典在如來所說弟子所說部分也確乎是不無線索可尋的這樣修多羅僅是八事八眾的偈頌部分被簡別了再進一步說攝事分雖總舉九事以說明相應的事契經但抉擇事契經的摩呾理迦不但沒有偈頌部分也沒有如來所說及弟子所說僅有九事中的前七事這樣事契經修多羅的內容從四阿含而略為雜阿含經的三大類又從三類而除去偈頌部分更除去如來所說弟子所說而相應修多羅僅是蘊處緣起食諦界及念住等道品蘊相應等七事為事相應教的根本部分是原始的相應修多羅最初結集的名為相應修多羅其後次第集出的合在一起也就稱為一切事相應的事契經其實原始的根本的相應修多羅只是瑜伽師地論攝事分中抉擇事契經的部分三相應修多羅與摩呾理迦一先明雜阿含經三大部類的第一部相應修多羅內容為蘊處緣起食諦界道品七事瑜伽師地論攝事分中卷八五到九八共一四卷就是抉擇經義的摩呾理迦以論文對讀雜阿含經可說是完全一致的特別是界在聖諦以下道品以上與緣起合為一類似乎是次第不順但這恰好與雜阿含經相同在相應部中界相應也是編在因緣篇中的界與緣起為一類應該是上座部的古義由此可見雜事以處界為一類攝事分以蘊處界為一類都是依據後代論師的通說而改定的抉擇雜阿含經義的摩呾理迦曾於原始佛教聖典之集成詳為比對偶有些疏失將在經論會編中改正這裡不再詳列依論文這部分是分為四分的經與論的卷數總列如下行五蘊擇攝第一論卷八五八八經卷一卷一卷三卷二卷五處擇攝第二論卷八九九二經卷八卷九卷四三卷一一卷一三緣起食諦界擇攝第三論卷九三九六經卷一二卷一四卷一五卷一六卷一七菩提分法擇攝第四論卷九七九八經卷二四卷二五佚卷二六卷二七卷二八卷二九卷三依論文去對讀經文可以確信攝事分所依的經本與漢譯雜阿含經是一致的從經論的比對中可以理解到一論義是依經而立的經有五陰六入處雜因道四誦品論也分行擇攝處擇攝緣起食諦界擇攝菩提分法擇攝四擇攝每一擇攝立攝頌分論義為多少門然後分門解經或一經有二門三門或總攝數經為一門不一定是一經一論相對的二經義有些是相同的所以已經論到過的後面就略而不談這一類有經而沒有論不能說是缺失或所依經本不同的三瑜伽論的前三擇攝行處緣起食諦界內容上次第上與漢譯雜阿含經最為符合當然句義也有少些出入第四菩提分法擇攝由於經文多而義少所以論文綜合而說次第上偶有些倒亂四在道品中根與力應該是五根五力但雜阿含經與論根中說到二十二根相應部的根相應也是這樣的這可見在上座部中早就這樣的了力中廣說二力三力四力五力六力七力八力九力十力以增一法而編集種種力與相應部的力相應但明信等五力是非常不同了根與力都超出了菩提分法的範圍這是將有關根與力的教說都類集在根與力的相應中了五依據論文道品的經文是有缺失的如念住中末後有穗與成就二門而經文卻沒有接著論明正斷神足僅一攝頌經文也沒有次明根論明安立中總明二十二根次說所行境也不見經文經卷二六開始就說有三根未知當知根知根無知根這是二十二根中末後的三根經文雖廣說信精進念定慧五根卻沒有說到其他十四根這顯然是有缺失的考相應部的根相應共七品當然是以信等五根為主的第三六根品有女男命三根未知當知已知具知三根眼耳鼻舌身意六根第四樂根品明樂苦憂喜捨五根總合起來就是二十二根尤其是論說所行境明眼等六根領境的差別修四念住七覺分得明解脫而歸於涅槃的無對這雖然內容廣了些與根相應的四二經意義完全相合所以今斷定為雜阿含經的念住末後有缺失正斷神足全缺根的前分也有缺文念住為經的卷二四根為經的卷二六中間所缺的應為雜阿含經卷二五由於經文佚失或者以無憂王譬喻的一部分來代替六論文的抉擇經義有的或有攝頌或沒有攝頌長篇論義沒有雜阿含經文可以比對但經審細的探究這不是現存的雜阿含經有所遺落而是這些論義是抉擇其他的阿含經義主要是中阿含經說一切有部誦本瑜伽師地論攝事分依雜阿含經次第抉擇經義這是無可懷疑的論文先立嗢拕南頌攝頌然後依頌所列舉的項