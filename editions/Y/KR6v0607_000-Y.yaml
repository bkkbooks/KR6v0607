樣的二雜阿含經說於如來所起淨信心根本堅固世間無能沮壞其心者是名信根這是阿含經本義又說若聖弟子於如來初發菩提心所得淨信心是名信根菩提心是大乘所說相應部只說於如來之菩提起信菩提是如來證得的菩提瑜伽論攝事分解說為由思擇力如理作意思惟諸法乃於涅槃得正信解若依諸佛無上菩提所得正信信根是信佛的菩提涅槃與相應部的意義相通可見菩提心是後代所增附的三雜阿含經論到盡法滅法變易法時說到無常者是有為行從緣起攝事分解說為無常有為思所造緣生雜阿含經說到本行所作本所思願是無常滅法攝事分解說為諸業煩惱之所造作這是有為的原始意義及由先願之所思求與之相當的相應部說無常有為緣起所生思願緣生的意義雜阿含經多處譯為無常有為心緣生法無常有為心緣生無常有為心緣起法心緣生心緣起與大乘的唯心緣起不是容易混淆嗎瑜伽的攝事分也沒有說心緣起心緣生的雜阿含經說灰河喻菩薩摩訶薩發心修行成佛化度眾生瑜伽論說是後有菩薩相應部沒有此經菩薩摩訶薩的稱呼受到了大乘的影響不過每成立一部派就有部派所審定集成的經典在傳承的同一宗派中是不可能大事更張的雜阿含經的修多羅部分與攝事分所依經本一致即可以證明當然經典在長期流傳中會因時因地而有多少差別的求那跋陀羅為唯心大乘師所譯雜阿含經就偶有一二大乘名義然如依此而說宋譯雜阿含經是大乘佛教時代所完成的那就誤謬不經了經典在誦習流傳中不免有些出入的如說一切有部所誦雜阿含經與中阿含經在說到未成佛以前總是說我憶宿命未成正覺時我本未覺無上正盡覺時而赤銅鍱部所誦的相應部與中部卻說我正覺以前未成正覺菩薩時插入了菩薩一詞現存的雜阿含經與相應部都屬於部派的誦本從此以探求原始佛法而不是說經典的組織與意義這一切都是原始佛法九雜阿含經論會編雜阿含經在四部阿含集成中的地位全經的部類等上面都已說到了現在要說雜阿含經論會編所有的種種問題一瑜伽論決擇分所抉擇的事契經是雜阿含經經文是隨機散說的論義是抉擇貫通全經宗要的如先舉經文次列論文這樣的經論合編起來對於雜阿含經義的理解應該是一項有力的方便宋譯的術語有些比較晦澀如與唐譯對比也會明白得多例如經說如習近如是繫著如是味如是鄰聚若使受持繫著我所求欲淳濃不捨不容易點斷也不知以習近為例的到底有多少如參照論文就明白得多這是經論會編的主要意義在比對會編中知道一部分論義是抉擇中阿含經長阿含經等的一一的加以注明以便讀者去參考中阿含等經文論文的抉擇契經是先立攝頌的所以在每一段論文初標出攝頌以便對照抉擇契經的論文共一四卷所抉擇的經文共二二卷屬於五陰的六入處的雜因的都是五卷經四卷論為十與八之比屬於道品菩提分的經文七卷佚失了一卷論文僅有二卷簡直不成比例這因為有些論義已在陰處等說過而有關道品的主要是已在瑜伽論聲聞地說過了如說此中安立四念住為初道支為最後三十七種菩提分法若略若廣如聲聞地應知其相所以將聲聞地中有關道品及修出入息念等論文也引述而附編於中以便讀者了解論義的全貌這樣的經論合計約有三十六卷沒有論義的祇夜與記說部分共二八卷佚失了一卷雜阿含經與抉擇的論文合編雖然一部分沒有論義以少從多定名為雜阿含經論會編二宋譯雜阿含經分為五卷唐以前我國的經書是捲成一軸一軸的所以名為卷分為多少卷不是印度經論的舊制分多少卷主要是每卷的字數相近如依經論的內容一卷終了不一定成一段落如有關摩訶迦葉的共一一經而九經在卷三一舊誤編為卷四一二經在卷三二有關阿難的一一經也是四經在卷二七經在卷二一這是為分卷的字數所局限而不可免的情形本編依印度舊例約內容來分類卷數附注於下以便對照舊本依瑜伽論攝事分雜阿含經是分為三類的能說是弟子所說與如來所說記說所為說是八眾也就是有偈的祇夜所說依攝事分分為行擇攝處擇攝緣起食諦界擇攝菩提分擇攝也就是修多羅的四品這一分類與根本說一切有部毘奈耶雜事所說相合如雜事卷三九大正二四四七中說五蘊相應者即以蘊品而為建立若與六處十八界相應者即以處界品而為建立若與緣起聖諦相應者即名緣起而為建立若聲聞所說者於聲聞品處而為建立若是佛所說者於佛品處而為建立若與念處正勤神足根力覺道分相應者於聖道品處而為建立若經與伽他相應者於伽他品處而為建立此即名為相應阿笈摩雜事分雜阿含經為七品以處界為一品那是順於阿毘達磨論義的然雜阿含經相應部舊義界是應該與緣起合為一品的弟子所說即聲聞品如來所說即佛品與伽他相應者脫落了於伽他品而為建立一句即伽他品七品的分立與攝事分是一致的上來曾一再說到雜阿含經與相應部本來都是分為五品五誦五篇的記說附於修多羅四品之下修多羅與記說不同所以說一切有系記說雖附於修多羅而將弟子所說與如來所說從修多羅四品中分別出來宋譯雜阿含經已別立弟子所說誦品雜事已類集如來所說為一聚名為佛品記說在說一切有系中或列於最前或位於因緣與道品的中間本編依修多羅祇夜記說的次第而敘列雖不同古說而實更為合理合於經典結集的次第如弟子記說如來記說部分已解說波羅延那義品八眾誦的偈頌記說原是比祇夜遲一些的這樣的敘述不致於誤會為修多羅的成立比祇夜為遲雜阿含經論會編就依此內容與次第分為七誦七品再分為五一相應相應的分立上面已經說到這裡總列如下一五陰誦一相應二六入處誦二相應修多羅三雜因誦三六相應四道品誦七一六相應祇夜五八眾誦一七二七相應六弟子所說誦二八三三相應記說七如來所說誦三四五一相應三雜阿含經是集眾多短篇而成的到底有多少經從前沒有人提到過大正藏編次為一三六二經如除去有關阿育王的三經六四六四六四一實得一三五九經對於檢查引用是非常適用的赤銅鍱部誦本相應部古代傳說為七千七百六十二修多羅日譯的南傳大藏經相應部開端赤沼智善的相應部總說僅二八七五經經數的繁多從雜阿含與相應部去了解是一結集的經文來源不同文句相同或佛為阿難說或佛為異比丘說的或佛為比丘眾說的或佛問比丘而後說的一律保留下來一經就成為二經或三經雜阿含經與相應部都有這種情形表示了原始結集的忠實性二如無常苦無我雜阿含經多作無常苦空無我可以別別的說也可以結合的說五陰六內入處六外入處等因緣十一支念處正勤等道品也是這樣所以同一內容的文句如分別的說起來經數就不少了三遲一些佛教進入類集階段如大正一九五一九六經佛告諸比丘一切無常次說如說一切無常如是一切苦一切空一切魔一切魔勢皆如上二經廣說那是以一切無常二經為例一切苦等也都這樣有二經相應部三五六處相應五品六品三三五二經非常相近煩惱的類集如大正二一經與相應部六處相應的五三五九經相當這是以一經為例而其餘同性質的都這樣說而成更多的經四如相應部四三無為相應南傳大藏本作四四經其實第一品修身念止觀八支聖道以達無為共一一經第二品從止觀六種三昧三十七道品即前品止觀等後十法的分別共四五種達無為之道無為與無為同一內容異名同實的如終極無漏到彼岸共三三一一修四五道實得一四八五經加第一品的一一經應該共有一四九六經又如一二因緣相應第九中略品說如實知老死行十一支當求大師學不放逸等十二法南傳大藏作一二經其實攝頌明白的說百三十二經那是老死等每一支修不放逸等十二法分別說明一一乘一二就是一三二經中略品第九在第八品末不但有第八品的攝頌也有因緣相應八品的總頌如說佛陀食十力沙門婆羅門可見因緣相應起初只有八品中略品是以後附入的又如四五道相應前四品四經與雜阿含經相同的很多四一經以下及五八品為一獨到的組織是雜阿含經所沒有的這部分的內容為異學廣說八經日輪廣說遠離依止七經貪欲調伏七經一法廣說一遠離依止七經貪欲調伏七經一法廣說二遠離依止七經貪欲調伏七經恒河廣說遠離依止一二經貪欲調伏一二經不死究竟一二經趣向涅槃一二經不放逸品一經一一經有四實為四經力所作品一二經例上應為四八經尋覓品一一經實為四經瀑流品一經例道相應這一部分南傳大藏計算為一四經實際上應有二六六經這樣的組合如四六覺支相應四八根相應五力相應都以道相應為例而簡略些從恒河相應起到瀑流品共五品約遠離依止與貪欲調伏來分別每一相應約一一經左右四七念處相應四九正勤相應五一神足相應五二靜慮相應這四種相應大大的簡化了雖也分五品卻不分遠離與調伏每一相應為五四經其實都應該如道相應那樣廣說的都是雜阿含經所沒有的雜阿含經中也有類似的情形如斷知相應卷七下主要為無常分為八類的五陰應斷應知應沒共八類當求大師六類應修四念處止觀十類實為五五法等這樣的分別組成可得一萬餘經這正是相應部所沒有的這是類集纂組決非早期集成的形態因部派而所說不同方法卻是一致的富有初期阿毘達磨論者分別類集組合的特色雜阿含經與相應部經數的眾多原因就在這裡雜阿含經到底有多少經大正藏所編列的據可見五陰誦的攝頌顯然每與經不合如初頌十經大正藏計為六經如頌說受與生及樂亦說六入處一一十二種禪定三昧經受生樂六入處四經一一都有十二種就共有四八經了但大正藏只計為四經如依經文而計算確實數目不但便於檢查對經文類集組合的意義也能更明白的表示出來本編分全經為七誦五一相應每一經文上列在某一相應中的經數次第中列全經次第的經數下在中編入大正藏所編列的經數以便查對全經共計為一三四一二經與日本國譯一切經所計略有出入四雜阿含經本是眾多短篇所集成的每一篇經文本來是沒有名目的在現存雜阿含經中僅絕少數有經名的如第一義空經有因有緣有縛法經這是相應部所沒有的如法鏡經轉法輪經四品法經大空經相應部雖有經文卻沒有稱之為什麼經惟有經名清淨乞食住六六法經六分別六入處經赤銅鍱部編入中部的也有經的名稱此外如篋毒蛇喻經尸婆修多羅差摩修多羅鬱低迦修多羅那都是指述以前所已有的總之一篇篇的經文本沒有名目其後較長的或較重要的經文主要為記說為了引述的便利稱之為什麼經南傳大藏經的相應部似乎每一經都有名其實名目是從攝頌來的編集的攝頌或取說經的地點如波陀或取說者與問者如阿難或取法義如無常或取經文的譬喻如泡沫摘取經的一二字代表該經而集為攝頌後來就以攝頌的那一二字代表該經而演化為經名如屬長篇或特別著名的這是沒有問題的如雜阿含經相應部那樣多的經篇就不免有問題如相應部二二蘊相應中名無常的有七經名味的有六經名阿難的也有四經試想在相應部全部中該有多少同名的這樣的經名必須說某某相應某某品第幾經否則引用經名是不能明了到底是那一經以雜阿含經來說攝頌僅存五卷即使以別譯雜阿含經攝頌來補充也不到一半所以本編雖採用相應與全經的數目而沒有仿照相應部那樣的列舉經的名目因為這是徒勞而沒有實用的五相應部是雜阿含經的別部誦本比對起來有同有異到底相同的很多有些次第也是前後或相近的表示了二本根源的同一這是比對同異的重要部分大正藏的雜阿含經注出與相應部經的相同或相近並注出與漢譯經及巴利藏與雜阿含經相當的經偈這是便於對照研究的本編對於異部經偈的對同漢譯的有別譯雜阿含經中阿含經長阿含經與增壹阿含經巴利藏的依日譯本有相應部中部長部增支部小部中的經集至於律論所說及雜阿含經的別品異譯一概從略本編與相應部等對同的也有與大正藏所注不一致的讀者應更為比對而採取更合於實際的六雜阿含經譯於宋元嘉年間到宋代的雕刻印刷已有五百多年了長期的展轉抄寫以致佚失了二卷次第有錯誤字句當然也不免有訛誤如雜阿含經的轉法輪經各種藏本一致說尊者憍陳如知法未拘隣白佛已知善逝憍陳如與拘隣同是的音譯在同一經的上下文中怎能譯作憍陳如又忽而譯作拘隣呢這是絕對不可能的原來拘隣是漢代古譯一定是古代的抄寫者將熟悉習用的拘隣代替憍陳如了又如苦集滅道古譯或作苦習滅道雜阿含經當然是譯作苦集滅道的但也偶有作苦習滅道的這又是古譯誤入本譯了而且古代寫經是不禁行草的容易引起訛誤所以從譯出經展轉傳寫到刻版印刷即使是早期的宋藏本高麗藏本字句的訛誤也是不能免的大正藏經以麗藏本為底本用各種藏本來校勘同異是極有價值的工作本編依大正藏的麗藏本不在乎各種藏本的對勘而是捨短從長希望能校成一較正確的本子這又分為二類一依各種藏本來校正凡麗本而意義可通不違經義的一概依麗本如不及各本而是訛誤的依各本改正下注依某本改凡各本同於宋本的作依宋本改如取元本明本所同的作依元本改但依明本的作依明本改或取日本所藏聖語本的作依聖本改以下補與刪均依此例如認為麗本脫落了的依各本增補下注依某本補或文字有多餘的衍文刪去了下注依某本刪以上都是依各種藏本大正藏所勘校來校正麗藏本的二長期傳寫宋本麗本等都不免偶有訛誤依經文意義經文前後比對覺得應該校正的也有三類屬於寫訛而加以改正的下注今改如有所脫落而補字的下注今補也有補一二字文義更為顯了在補字上下加以表示這是補入而非原文所有的也就不加注了或有多餘的衍文可刪而沒有刪去的加刪去了的下注今刪這是本編校改的凡例還有值得附帶說到的一經文很長寫經的也不是一人所以全經用字每不能一致如麗本的閡字宋本多作礙偶有麗本作礙而宋本卻又作閡的像這樣的前後不一致也只能不一致未能改成一律二大正藏是排印本即使校對精確總不免有誤失所以如大正藏沒有校勘而文字顯然有誤的如身八勇猛我手頭沒有麗本可校只能認為大正藏的錯字依通用的木刻本而改為身心勇猛了三有些字宋本與麗本不同也不易決定訛與正只能下注宋本作某字以備研考
